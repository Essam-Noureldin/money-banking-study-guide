ts.", "ATMs.", "the hands of the nonbank public.", "the central bank."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following is not included in the measure of M1?", "o": ["NOW accounts", "Demand deposits", "Currency", "Savings deposits"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following is not included in M1 but is included in M2?", "o": ["Currency", "Demand deposits", "Checkable deposits", "Small-denomination time deposits"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following is included in both M1 and M2?", "o": ["Currency", "Savings deposits", "Small-denomination time deposits", "Money market deposit accounts"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "From this data: currency in circulation = 100, checkable deposits = 50, savings deposits = 100, long-term deposits = 100. M1 equals", "o": ["150", "250", "350", "300"], "a": 0, "s": "Exam 2023", "src": "exam"}, {"q": "From this data: currency in circulation = 100, checkable deposits = 50, savings deposits = 100, long-term deposits = 100. M2 equals", "o": ["150", "250", "350", "300"], "a": 1, "s": "Exam 2023", "src": "exam"}, {"q": "From this data: currency in circulation = 100, checkable deposits = 50, savings deposits = 100, long-term deposits = 100. M3 equals", "o": ["150", "250", "350", "300"], "a": 2, "s": "Exam 2023", "src": "exam"}, {"q": "If an individual moves money from a small-denomination time deposit to a demand deposit account,", "o": ["M1 increases and M2 stays the same.", "M1 stays the same and M2 increases.", "M1 stays the same and M2 stays the same.", "M1 increases and M2 decreases."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "If an individual moves money from currency to a demand deposit account,", "o": ["M1 decreases and M2 stays the same.", "M1 stays the same and M2 increases.", "M1 stays the same and M2 stays the same.", "M1 increases and M2 stays the same."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "If an individual moves money from a money market deposit account to currency,", "o": ["M1 increases and M2 stays the same.", "M1 stays the same and M2 increases.", "M1 stays the same and M2 stays the same.", "M1 increases and M2 decreases."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "______ is the relative ease and speed with which an asset can be converted into a medium of exchange.", "o": ["Efficiency", "Liquidity", "Deflation", "Specialization"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Since it does not have to be converted into anything else to make purchases, ______ is the most liquid asset.", "o": ["money", "stock", "artwork", "gold"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Of the following assets, the least liquid is", "o": ["stocks.", "traveler's checks.", "checking deposits.", "a house."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Ranking assets from most liquid to least liquid, the correct order is", "o": ["savings bonds; house; currency.", "currency; savings bonds; house.", "currency; house; savings bonds.", "house; savings bonds; currency."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Small-denomination time deposits refer to certificates of deposit with a denomination of less than", "o": ["$1,000", "$10,000", "$100,000", "$1,000,000"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "The conversion of a barter economy to one that uses money", "o": ["increases efficiency by reducing the need to exchange goods and services.", "increases efficiency by reducing the need to specialize.", "increases efficiency by reducing transactions costs.", "does not increase economic efficiency."], "a": 2, "s": "Test Bank", "src": "tb"}]}, {"id": "mb2", "l": "Ch.2", "c": "#457B9D", "grp": "mb", "mid": "pre", "t": "Ch. 2 — Analyzing the Financial System", "d": "Pre-midterm · Financial markets, direct vs. indirect finance, debt vs. equity, primary/secondary markets, exchanges vs. OTC, and money vs. capital markets.", "S": [{"h": "Function of financial markets", "p": ["<strong>Financial markets<\/strong> are any marketplace where savings are channeled from savers/lenders to borrowers/spenders.", "They move funds from people who have <strong>surplus funds<\/strong> (saved by spending less than income) to those with a <strong>shortage of funds<\/strong>.", "This raises production and efficiency for the overall economy."]}, {"h": "Direct vs. indirect finance", "p": ["<strong>Direct finance<\/strong> — borrowers borrow directly from lenders by selling them <strong>securities<\/strong> (financial instruments) in financial markets.", "<strong>Indirect finance<\/strong> — funds move through a <strong>financial intermediary<\/strong> (e.g. a bank).", "<strong>Securities<\/strong> are assets for the buyer but liabilities for the issuer."]}, {"h": "Debt vs. equity markets", "p": ["<strong>Debt instrument<\/strong> (bond/mortgage) — a contractual agreement to pay fixed amounts (interest + principal) until maturity.", "<strong>Short-term<\/strong>: maturity < 1 year · <strong>Intermediate<\/strong>: 1–10 years · <strong>Long-term<\/strong>: 10 years or more.", "<strong>Equity<\/strong> (common stock) — a claim to share in net income and assets; pays dividends, no maturity (long-term).", "An equity holder is a <strong>residual claimant<\/strong> (paid after debt holders) but benefits directly from rising profitability."]}, {"h": "Primary vs. secondary; exchanges vs. OTC", "p": ["<strong>Primary market<\/strong> — new issues sold to initial buyers; the <strong>investment bank<\/strong> underwrites them.", "<strong>Secondary market<\/strong> — previously-issued securities are resold; <strong>brokers<\/strong> match buyers/sellers, <strong>dealers<\/strong> buy/sell at stated prices.", "<strong>Exchanges<\/strong> — buyers and sellers meet in one central location.", "<strong>Over-the-counter (OTC)<\/strong> — dealers in different locations stand ready to buy/sell at their prices."]}, {"h": "Money vs. capital markets", "p": ["<strong>Money market<\/strong> — only <strong>short-term<\/strong> debt instruments (maturity < 1 year) are traded.", "<strong>Capital market<\/strong> — longer-term debt (≥ 1 year) and equity instruments are traded."]}], "Q": [{"q": "Financial markets have the basic function of", "o": ["getting people with funds to lend together with people who want to borrow funds.", "assuring that the swings in the business cycle are less pronounced.", "assuring that governments need never resort to printing money.", "providing a risk-free repository of spending power."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Financial markets promote economic efficiency by", "o": ["channeling funds from investors to savers.", "creating inflation.", "channeling funds from savers to investors.", "reducing investment."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Financial markets promote greater economic efficiency by channeling funds from ______ to ______.", "o": ["investors; savers", "borrowers; savers", "savers; borrowers", "savers; lenders"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Well-functioning financial markets", "o": ["cause inflation.", "eliminate the need for indirect finance.", "cause financial crises.", "produce an efficient allocation of capital."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "The principal lender-savers are", "o": ["governments.", "businesses.", "households.", "foreigners."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following can be described as direct finance?", "o": ["You take out a mortgage from your local bank.", "You borrow $2500 from a friend.", "You buy shares of common stock in the secondary market.", "You buy shares in a mutual fund."], "a": 2, "s": "Exam 2023", "src": "exam"}, {"q": "With ______ finance, borrowers obtain funds from lenders by selling them securities in the financial markets.", "o": ["active", "determined", "indirect", "direct"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Securities are ______ for the person who buys them but are ______ for the individual or firm that issues them.", "o": ["assets; liabilities", "liabilities; assets", "negotiable; nonnegotiable", "nonnegotiable; negotiable"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "If the maturity of a debt instrument is less than one year, the debt is called", "o": ["short-term.", "intermediate-term.", "long-term.", "prima-term."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Long-term debt has a maturity that is", "o": ["between one and ten years.", "less than a year.", "between five and ten years.", "ten years or longer."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following is an example of an intermediate-term debt?", "o": ["a fifteen-year mortgage", "a sixty-month car loan", "a six-month loan from a finance company", "a thirty-year U.S. Treasury bond"], "a": 1, "s": "Exam (Revision)", "src": "exam"}, {"q": "When I purchase ______, I own a portion of a firm and have the right to vote on issues important to the firm and to elect its directors.", "o": ["bonds", "bills", "notes", "stock"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following benefit directly from any increase in the corporation's profitability?", "o": ["a bond holder", "a commercial paper holder", "a shareholder", "a T-bill holder"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following statements about the characteristics of debt and equity is false?", "o": ["They can both be long-term financial instruments.", "They can both be short-term financial instruments.", "They both involve a claim on the issuer's income.", "They both enable a corporation to raise funds."], "a": 1, "s": "Exam 2024", "src": "exam"}, {"q": "______ are residual claimants.", "o": ["Bond holders", "Treasury-bill holders", "Mortgage holders", "Equity holders"], "a": 3, "s": "Exam (Revision)", "src": "exam"}, {"q": "A share of common stock is a claim on a corporation's", "o": ["debt.", "liabilities.", "expenses.", "earnings and assets."], "a": 3, "s": "Exam 2024", "src": "exam"}, {"q": "A corporation acquires new funds only when its securities are sold in the", "o": ["primary market by an investment bank.", "primary market by a stock exchange broker.", "secondary market by a securities dealer.", "secondary market by a commercial bank."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "A financial market in which previously issued securities can be resold is called a ______ market.", "o": ["primary", "secondary", "tertiary", "used securities"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "An important financial institution that assists in the initial sale of securities in the primary market is the", "o": ["investment bank.", "commercial bank.", "stock exchange.", "brokerage house."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "When an investment bank ______ securities, it guarantees a price for a corporation's securities and then sells them to the public.", "o": ["underwrites", "undertakes", "overwrites", "overtakes"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "______ work in the secondary markets matching buyers with sellers of securities.", "o": ["Dealers", "Underwriters", "Brokers", "Claimants"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "When secondary market buyers and sellers of securities meet in one central location to conduct trades, the market is called a(n)", "o": ["exchange.", "over-the-counter market.", "common market.", "barter market."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "In a(n) ______ market, dealers in different locations buy and sell securities to anyone who comes to them and is willing to accept their prices.", "o": ["exchange", "over-the-counter", "common", "barter"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Shares of corporations that are not listed on one of the organized exchanges are called", "o": ["blue chips.", "junk bonds.", "dividends.", "over-the-counter stocks."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "A financial market in which only short-term debt instruments are traded is called the ______ market.", "o": ["bond", "money", "capital", "stock"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Equity instruments are traded in the ______ market.", "o": ["money", "bond", "capital", "commodities"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Equity and debt instruments with maturities greater than one year are called ______ market instruments.", "o": ["capital", "money", "federal", "benchmark"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Markets for financial instruments with maturities less than a year are", "o": ["primary markets.", "secondary markets.", "money markets.", "capital markets."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Markets for financial instruments with maturities of a year or longer are", "o": ["primary markets.", "secondary markets.", "money markets.", "capital markets."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Newly issued financial instruments are traded mainly in", "o": ["primary markets.", "secondary markets.", "wholesale markets.", "discount markets."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Newly issued three-month Treasury bills are traded in: I. money markets  II. capital markets  III. primary markets  IV. secondary markets", "o": ["Both I and III.", "Both I and IV.", "Both II and III.", "Both II and IV."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "A 10-year corporate bond that was issued last year is sold in the: I. money market  II. capital market  III. primary market  IV. secondary market", "o": ["Both I and III.", "Both I and IV.", "Both II and III.", "Both II and IV."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Secondary markets make financial instruments more", "o": ["solid.", "vapid.", "liquid.", "risky."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "A liquid asset is", "o": ["an asset that can easily and quickly be sold to raise cash.", "a share of an ocean resort.", "difficult to resell.", "always sold in an over-the-counter market."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following is NOT a financial instrument?", "o": ["Treasury bond", "Federal funds loan", "A house", "Commercial paper"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Bond-like debt instruments backed by a bundle of individual mortgages are", "o": ["stocks.", "mortgage-backed securities.", "Treasury bills.", "municipal bonds."], "a": 1, "s": "Exam 2024", "src": "exam"}, {"q": "______ are long-term debt instruments issued by state and local government to finance expenditure on schools, roads, and other large programs.", "o": ["Treasury bills", "Stocks", "Treasury bonds", "Municipal bonds"], "a": 3, "s": "Exam 2024", "src": "exam"}, {"q": "Compared to interest rates on three-month Treasury bills, interest rates on long-term government bonds are ______ on average.", "o": ["higher", "less", "equal", "cannot be determined"], "a": 0, "s": "Exam 2024", "src": "exam"}]}, {"id": "mb3", "l": "Ch.3", "c": "#27AE60", "grp": "mb", "mid": "pre", "t": "Ch. 3 — Financial Intermediaries & Internationalization", "d": "Pre-midterm · Why intermediaries exist (transaction costs, risk sharing, asymmetric information) and the three categories of financial intermediaries; foreign vs. Eurobonds.", "S": [{"h": "Indirect finance & intermediaries", "p": ["An intermediary borrows from lenders/savers and uses the funds to make loans to borrowers/spenders.", "This route is <strong>indirect finance<\/strong> and involves a <strong>financial intermediary<\/strong>."]}, {"h": "Why intermediaries exist", "p": ["<strong>Transaction costs<\/strong> — time and money spent on financial transactions; intermediaries reduce them via expertise and <strong>economies of scale<\/strong>, and provide <strong>liquidity services<\/strong>.", "<strong>Risk sharing<\/strong> (asset transformation) — they create/sell low-risk assets and buy riskier ones; turning risky assets into safer ones for investors.", "<strong>Diversification<\/strong> — investing in a portfolio of assets whose returns don't move together lowers overall risk ('don't put all your eggs in one basket')."]}, {"h": "Asymmetric information", "p": ["<strong>Asymmetric information<\/strong> — one party doesn't know enough about the other to make accurate decisions.", "<strong>Adverse selection<\/strong> — problem created <strong>before<\/strong> the transaction: the riskiest borrowers are the most eager to borrow.", "<strong>Moral hazard<\/strong> — problem created <strong>after<\/strong> the transaction: the borrower engages in undesirable (risky) activities making repayment less likely."]}, {"h": "Three categories of intermediaries", "p": ["<strong>Depository institutions (banks)<\/strong> — commercial banks, savings & loan associations, mutual savings banks, credit unions; raise funds via checkable, savings, and time deposits.", "<strong>Contractual savings institutions<\/strong> — life insurance companies and pension funds; acquire funds at periodic intervals on a contractual basis.", "<strong>Investment intermediaries<\/strong> — finance companies, mutual funds, money-market mutual funds."]}, {"h": "Internationalization of financial markets", "p": ["<strong>Foreign bond<\/strong> — sold in a foreign country and denominated in that country's currency (e.g. Porsche selling a dollar bond in the US).", "<strong>Eurobond<\/strong> — denominated in a currency other than that of the country where it is sold (e.g. a dollar bond sold in London)."]}], "Q": [{"q": "Financial intermediaries", "o": ["provide a channel for linking those who want to save with those who want to invest.", "produce nothing of value and are therefore a drain on society's resources.", "can hurt the performance of the economy.", "hold very little of the average person's wealth."], "a": 0, "s": "Exam 2023", "src": "exam"}, {"q": "The financial intermediaries that the average person interacts with most frequently are", "o": ["exchanges.", "over-the-counter markets.", "finance companies.", "banks."], "a": 3, "s": "Exam 2023", "src": "exam"}, {"q": "The time and money spent in carrying out financial transactions are called", "o": ["economies of scale.", "financial intermediation.", "liquidity services.", "transaction costs."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "______ are the time and resources spent trying to exchange goods and services.", "o": ["Bargaining costs", "Transaction costs", "Contracting costs", "Barter costs"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Economies of scale enable financial institutions to", "o": ["reduce transactions costs.", "avoid the asymmetric information problem.", "avoid adverse selection problems.", "reduce moral hazard."], "a": 0, "s": "Exam 2024", "src": "exam"}, {"q": "An example of economies of scale in the provision of financial services is", "o": ["investing in a diversified collection of assets.", "providing depositors with a variety of savings certificates.", "hiring more support staff so customers don't wait so long.", "spreading the cost of writing a standardized contract over many borrowers."], "a": 3, "s": "Exam 2024", "src": "exam"}, {"q": "The process where financial intermediaries create and sell low-risk assets and use the proceeds to purchase riskier assets is known as", "o": ["risk sharing.", "risk aversion.", "risk neutrality.", "risk selling."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "The process of asset transformation refers to the conversion of", "o": ["safer assets into risky assets.", "safer assets into safer liabilities.", "risky assets into safer assets.", "risky assets into risky liabilities."], "a": 2, "s": "Exam 2024", "src": "exam"}, {"q": "Reducing risk through the purchase of assets whose returns do not always move together is", "o": ["diversification.", "intermediation.", "intervention.", "discounting."], "a": 0, "s": "Exam 2023", "src": "exam"}, {"q": "The concept of diversification is captured by the statement", "o": ["don't look a gift horse in the mouth.", "don't put all your eggs in one basket.", "it never rains, but it pours.", "make hay while the sun shines."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Financial intermediaries promote risk sharing by investing funds in different assets. This is known as", "o": ["asset transformation.", "diversification.", "moral hazard.", "adverse selection."], "a": 1, "s": "Exam (Revision)", "src": "exam"}, {"q": "Typically, borrowers have superior information relative to lenders about the potential returns and risks of an investment project. This difference in information is called", "o": ["moral selection.", "risk sharing.", "asymmetric information.", "adverse hazard."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "The problem created by asymmetric information before the transaction occurs is called ______, while the problem created after the transaction occurs is called ______.", "o": ["adverse selection; moral hazard", "moral hazard; adverse selection", "costly state verification; free-riding", "free-riding; costly state verification"], "a": 0, "s": "Exam 2024", "src": "exam"}, {"q": "The problem associated with asymmetric information after the financial transaction occurs is known as", "o": ["moral hazard.", "adverse selection.", "free-riding.", "inside trading."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Adverse selection means loans are likely to go to ______, so ______ may decide not to make any loans.", "o": ["bad credit risks, lenders", "bad credit risks, borrowers", "good credit risks, lenders", "good credit risks, borrowers"], "a": 0, "s": "Exam (Revision)", "src": "exam"}, {"q": "Asymmetric information, adverse selection, and moral hazard are among the reasons that", "o": ["cause individuals to commit crimes.", "cause individuals to prefer only new banks.", "cause many savers to prefer to have their savings in financial intermediaries.", "cause individuals to prefer to lend directly to a borrower rather than keep the funds in an intermediary."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Individuals may find it efficient to save their funds in a financial intermediary because", "o": ["financial intermediaries have higher transaction costs when making loans.", "they help reduce the exposure of investors to risk.", "it is more difficult for them to provide liquidity services.", "they cannot incorporate economies of scale."], "a": 1, "s": "Exam 2024", "src": "exam"}, {"q": "When financial intermediation is needed between savers and borrowers, the investment process is called", "o": ["inequity finance.", "equity finance.", "indirect finance.", "direct finance."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following financial intermediaries is not a depository institution?", "o": ["A savings and loan association", "A commercial bank", "A credit union", "A finance company"], "a": 3, "s": "Exam 2023", "src": "exam"}, {"q": "All of the following are depository institutions EXCEPT", "o": ["credit unions.", "savings banks.", "savings and loan associations.", "stock exchanges."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "______ institutions are financial intermediaries that acquire funds at periodic intervals on a contractual basis.", "o": ["Investment", "Contractual savings", "Thrift", "Depository"], "a": 1, "s": "Exam 2024", "src": "exam"}, {"q": "Which of the following is a contractual savings institution?", "o": ["A life insurance company", "A credit union", "A savings and loan association", "A mutual fund"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following are not contractual savings institutions?", "o": ["Life insurance companies", "Credit unions", "Pension funds", "State and local government retirement funds"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "All of the following are considered investment intermediaries EXCEPT", "o": ["money market mutual funds.", "hedge funds.", "finance companies.", "credit unions."], "a": 3, "s": "Exam 2024", "src": "exam"}, {"q": "An investment bank helps ______ issue securities.", "o": ["a corporation", "the SEC", "a credit union", "an individual depositor"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "An investment bank purchases securities from a corporation at a predetermined price and then resells them in the market. This process is called", "o": ["underwriting.", "underhanded.", "understanding.", "undertaking."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "If a company sells a bond in London and it is denominated in dollars, the bond is a", "o": ["Eurobond.", "foreign bond.", "British bond.", "currency bond."], "a": 0, "s": "Exam (Revision)", "src": "exam"}, {"q": "Euro deposits in Germany are considered", "o": ["a Euro bond.", "Euro-currency.", "Euro deposits.", "ordinary deposits."], "a": 1, "s": "Exam 2024", "src": "exam"}, {"q": "A bond sold in a foreign country and denominated in that country's currency is a", "o": ["Eurobond.", "foreign bond.", "domestic bond.", "municipal bond."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Mutual funds acquire funds by", "o": ["accepting checkable deposits.", "selling shares to many individuals and using the proceeds to buy diversified portfolios of stocks and bonds.", "issuing insurance policies.", "making consumer loans only."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Finance companies raise funds primarily by", "o": ["accepting demand deposits.", "selling commercial paper and issuing stocks and bonds.", "collecting insurance premiums.", "accepting savings deposits."], "a": 1, "s": "Test Bank", "src": "tb"}]}, {"id": "mb4", "l": "Ch.4", "c": "#8E44AD", "grp": "mb", "mid": "pre", "t": "Ch. 4 — Commercial Banks: Financial Management", "d": "Pre-midterm · The bank balance sheet (assets/liabilities), reserves (required, excess, secondary), bank capital, deposit outflows, and the four areas of bank management.", "S": [{"h": "The commercial bank & its balance sheet", "p": ["<strong>Commercial banks<\/strong> receive deposits from savers and give loans to investors, earning the <strong>interest rate spread (IRS)<\/strong>.", "On the balance sheet: <strong>sources of funds = liabilities<\/strong> (a cost); <strong>uses of funds = assets<\/strong> (a return).", "Total assets = total liabilities + equity capital."]}, {"h": "Liabilities (sources of funds)", "p": ["<strong>Deposits<\/strong> — checkable (demand), savings, and time deposits; a liability toward savers.", "<strong>Borrowings<\/strong> — from other banks or the central bank (e.g. discount loans).", "<strong>Capital<\/strong> — a liability toward the owners (shareholders); bank capital = total assets − total liabilities."]}, {"h": "Assets (uses of funds)", "p": ["<strong>Reserves<\/strong> — the most liquid asset; vault cash + deposits at the central bank. <strong>Required reserves RR = rd × D<\/strong>; <strong>excess reserves ER = re × D<\/strong>; total reserves R = RR + ER.", "<strong>Securities<\/strong> — the 'secondary reserves'; ranked 2nd in liquidity after reserves.", "<strong>Loans<\/strong> — the main function of the bank; consumer, business, and mortgage loans earn interest.", "<strong>Fixed assets<\/strong> — buildings and land."]}, {"h": "The four areas of bank management", "p": ["<strong>Asset management<\/strong> — set the optimal diversified portfolio of assets to maximize return.", "<strong>Liability management<\/strong> — set the optimal mix of liabilities to minimize cost.", "<strong>Liquidity management<\/strong> — hold the optimal level of reserves (avoid shortage without overestimating).", "<strong>Capital adequacy management<\/strong> — hold enough capital to cover losses and avoid insolvency without sacrificing too much profitability."]}, {"h": "Managing a liquidity shortage", "p": ["Borrow from other commercial banks (federal funds market).", "Sell securities (must accept the current market price).", "Recall loans (risks losing customers).", "Borrow from the central bank at the discount rate (repeated use risks 'closing the window')."]}], "Q": [{"q": "A bank's assets are", "o": ["the various uses of funds that are acquired.", "the various sources of funds that are acquired.", "those items that are owed by the bank to depositors and others.", "by definition equal to the bank's liabilities."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "A bank's liabilities are", "o": ["the various uses of funds that are acquired.", "the various sources of funds that are acquired.", "those items the bank owns and earns income from.", "by definition equal to the bank's reserves."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following statements is true?", "o": ["A bank's assets are its sources of funds.", "A bank's liabilities are its uses of funds.", "A bank's balance sheet shows that total assets equal total liabilities plus equity capital.", "A bank's balance sheet indicates whether or not the bank is profitable."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following statements is false?", "o": ["A bank's assets are its uses of funds.", "A bank issues liabilities to acquire funds.", "The bank's assets provide the bank with income.", "Bank capital is recorded as an asset on the bank balance sheet."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following are reported as liabilities on a bank's balance sheet?", "o": ["Reserves", "Checkable deposits", "Loans", "Deposits with other banks"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following items is reported as a liability on a bank's balance sheet?", "o": ["Discount loans (borrowings)", "Reserves", "U.S. Treasury securities", "Loans"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Which of these are NOT bank liabilities?", "o": ["Checkable deposits", "CDs", "Mortgage loans", "Borrowings from the central bank"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "The primary liabilities of a commercial bank are", "o": ["bonds.", "mortgages.", "deposits.", "commercial paper."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Because checking accounts are ______ liquid for the depositor than passbook savings, they earn ______ interest rates.", "o": ["less; higher", "less; lower", "more; higher", "more; lower"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Bank reserves include", "o": ["deposits at the central bank and short-term Treasury securities.", "vault cash and short-term Treasury securities.", "vault cash and deposits at the central bank.", "deposits at other banks and deposits at the central bank."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "The amount of checkable deposits that banks are required by regulation to hold are the", "o": ["excess reserves.", "required reserves.", "vault cash.", "total reserves."], "a": 1, "s": "Exam 2022", "src": "exam"}, {"q": "Which of the following are reported as assets on a bank's balance sheet?", "o": ["Borrowings", "Reserves", "Savings deposits", "Bank capital"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following are NOT reported as assets on a bank's balance sheet?", "o": ["Cash items in the process of collection", "Deposits with other banks", "U.S. Treasury securities", "Checkable deposits"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following bank assets is the most liquid?", "o": ["Consumer loans", "Reserves", "Cash items in process of collection", "U.S. government securities"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Secondary reserves include", "o": ["deposits at the central bank.", "deposits at other large banks.", "short-term Treasury securities.", "consumer loans."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Because of their ______ liquidity, ______ U.S. government securities are called secondary reserves.", "o": ["low; short-term", "low; long-term", "high; short-term", "high; long-term"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Banks make their profits primarily by issuing", "o": ["equity.", "negotiable CDs.", "loans.", "NOW accounts."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "The most important category of assets on a bank's balance sheet is", "o": ["discount loans.", "securities.", "loans.", "cash items in the process of collection."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following are bank assets?", "o": ["the building owned by the bank", "a discount loan", "a negotiable CD", "a customer's checking account"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Bank capital is equal to ______ minus ______.", "o": ["total assets; total liabilities", "total liabilities; total assets", "total assets; total reserves", "total liabilities; total borrowings"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Bank capital is listed on the ______ side of the bank's balance sheet because it represents a ______ of funds.", "o": ["liability; use", "liability; source", "asset; use", "asset; source"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Bank loans from the central bank are called ______ and represent a ______ of funds.", "o": ["discount loans; use", "discount loans; source", "fed funds; use", "fed funds; source"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "When a new depositor opens a checking account at the bank, the bank's assets ______ and its liabilities ______.", "o": ["increase; increase", "increase; decrease", "decrease; increase", "decrease; decrease"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "When you deposit a $50 bill in a bank,", "o": ["its liabilities decrease by $50.", "its assets increase by $50.", "its reserves decrease by $50.", "its cash items in the process of collection increase by $50."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "When you deposit $50 in currency at Old National Bank,", "o": ["its assets increase by less than $50 because of reserve requirements.", "its reserves increase by less than $50 because of reserve requirements.", "its liabilities increase by $50.", "its liabilities decrease by $50."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "When a $10 check written on the First National Bank of Chicago is deposited in an account at Citibank, then", "o": ["the liabilities of the First National Bank increase by $10.", "the reserves of the First National Bank increase by $10.", "the liabilities of Citibank increase by $10.", "the assets of Citibank fall by $10."], "a": 2, "s": "Exam 2022", "src": "exam"}, {"q": "When $1 million is deposited at a bank, the required reserve ratio is 20 percent, and the bank chooses not to hold any excess reserves but makes loans instead, then in the bank's final balance sheet,", "o": ["the assets at the bank increase by $800,000.", "the liabilities of the bank increase by $1,000,000.", "the liabilities of the bank increase by $800,000.", "reserves increase by $160,000."], "a": 1, "s": "Exam 2022", "src": "exam"}, {"q": "With a 10% reserve requirement ratio, a $100 deposit into New Bank means that the maximum amount New Bank could lend is", "o": ["$90.", "$100.", "$10.", "$110."], "a": 0, "s": "Exam 2022", "src": "exam"}, {"q": "With a 12% reserve requirement ratio, a $200 deposit into New Bank means that the maximum amount New Bank could lend is", "o": ["$176.", "$200.", "$24.", "$224."], "a": 0, "s": "Exam 2023", "src": "exam"}, {"q": "A $5 million deposit outflow from a bank has the immediate effect of", "o": ["reducing deposits and reserves by $5 million.", "reducing deposits and loans by $5 million.", "reducing deposits and securities by $5 million.", "reducing deposits and capital by $5 million."], "a": 0, "s": "Exam 2022", "src": "exam"}, {"q": "If a bank has excess reserves greater than the amount of a deposit outflow, the outflow will result in equal reductions in", "o": ["deposits and reserves.", "deposits and loans.", "capital and reserves.", "capital and loans."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "If, after a deposit outflow, a bank needs an additional $3 million to meet its reserve requirements, the bank can", "o": ["reduce deposits by $3 million.", "increase loans by $3 million.", "sell $3 million of securities.", "repay its discount loans from the central bank."], "a": 2, "s": "Exam 2022", "src": "exam"}, {"q": "Of the following, which would be the first choice for a bank facing a reserve deficiency?", "o": ["Call in loans", "Borrow from the central bank", "Sell securities", "Borrow from other banks"], "a": 3, "s": "Exam 2022", "src": "exam"}, {"q": "A bank with insufficient reserves can increase its reserves by", "o": ["lending federal funds.", "calling in loans.", "buying short-term Treasury securities.", "buying municipal bonds."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Bankers' concerns regarding the optimal mix of excess reserves, secondary reserves, and borrowings to deal with deposit outflows is an example of", "o": ["liability management.", "liquidity management.", "managing interest rate risk.", "managing credit risk."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following statements most accurately describes the task of bank asset management?", "o": ["Banks seek the highest returns possible subject to minimizing risk and making adequate provisions for liquidity.", "Banks seek the highest liquidity possible subject to earning a positive rate of return.", "Banks seek to prevent bank failure at all cost.", "Banks seek to acquire funds in the least costly way."], "a": 0, "s": "Exam 2022", "src": "exam"}, {"q": "The goals of bank asset management include", "o": ["maximizing risk.", "minimizing liquidity.", "lending at high interest rates regardless of risk.", "purchasing securities with high returns and low risk."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "A bank failure occurs whenever", "o": ["a bank cannot satisfy its obligations to pay its depositors and meet its reserve requirements.", "a bank suffers a large deposit outflow.", "a bank has to call in a large volume of loans.", "a bank is not allowed to borrow from the central bank."], "a": 0, "s": "Exam 2022", "src": "exam"}, {"q": "A bank is insolvent when", "o": ["its liabilities exceed its assets.", "its assets exceed its liabilities.", "its capital exceeds its liabilities.", "its assets increase in value."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Holding large amounts of bank capital helps prevent bank failures because", "o": ["it means the bank has a higher income.", "it makes loans easier to sell.", "it can be used to absorb the losses resulting from bad loans.", "it makes it easier to call in loans."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Bank capital has both benefits and costs for the bank owners. Higher bank capital ______ the likelihood of bankruptcy, but higher bank capital ______ the return on equity for a given return on assets.", "o": ["reduces; reduces", "increases; increases", "reduces; increases", "increases; reduces"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Banks that actively manage liabilities will most likely meet a reserve shortfall by", "o": ["calling in loans.", "borrowing federal funds.", "selling municipal bonds.", "seeking new deposits."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "______ may antagonize customers and thus can be a very costly way of acquiring funds to meet an unexpected deposit outflow.", "o": ["Selling securities", "Selling loans", "Calling in loans", "Selling negotiable CDs"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following would a bank NOT hold as insurance against the highest cost of a deposit outflow — bank failure?", "o": ["Excess reserves", "Secondary reserves", "Bank capital", "Mortgages"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "A loan of excess reserves from one bank to another bank is recorded as a(n) ______ for the borrowing bank and a(n) ______ for the lending bank.", "o": ["asset; asset", "asset; liability", "liability; liability", "liability; asset"], "a": 3, "s": "Exam 2022", "src": "exam"}, {"q": "Large-denomination CDs are ______, so that like a bond they can be resold in a ______ market before they mature.", "o": ["nonnegotiable; secondary", "nonnegotiable; primary", "negotiable; secondary", "negotiable; primary"], "a": 2, "s": "Exam (Revision)", "src": "exam"}, {"q": "Banks hold excess and secondary reserves to", "o": ["reduce the interest-rate risk problem.", "provide for deposit outflows.", "satisfy margin requirements.", "achieve higher earnings than they can with loans."], "a": 1, "s": "Test Bank", "src": "tb"}]}, {"id": "mb5", "l": "Ch.5", "c": "#2A9D8F", "grp": "mb", "mid": "post", "t": "Ch. 5 — Central Banking & Monetary Policy", "d": "Post-midterm · The role and functions of the central bank and the instruments of monetary policy. Questions here are expected/practice questions written from your lecture notes.", "S": [{"h": "What is a central bank?", "p": ["A <strong>central bank<\/strong> is an independent national authority that conducts monetary policy, regulates banks, and provides financial services including economic research.", "Its goals are to stabilize the nation's currency, keep unemployment low, and prevent inflation.", "It holds a <strong>monopoly<\/strong> on increasing the monetary base and usually prints the national currency (legal tender).", "It acts as a <strong>lender of last resort<\/strong> to the banking sector during financial crises."]}, {"h": "Functions of the central bank", "p": ["<strong>Issue of currency<\/strong> — sole monopoly of issuing currency; keeps a reserve of gold and foreign securities.", "<strong>Banker to government<\/strong> — carries out the government's banking business; government keeps cash balances with it and can borrow by selling securities.", "<strong>Banker's bank & supervisor<\/strong> — custodian of banks' cash reserves, lender of last resort, and bank of central clearance/settlement; supervises banks to ensure solvency.", "<strong>Controller of credit & money supply<\/strong> — controls credit and money supply through monetary policy."]}, {"h": "Monetary policy & its instruments", "p": ["The main objective of credit control is <strong>price stability with full employment<\/strong>.", "The central bank adjusts a monetary aggregate, an interest rate, or the exchange rate to affect goals it does not directly control.", "<strong>Reserve requirement<\/strong> — banks must hold a fraction of deposit liabilities as reserves; limits how much they can lend.", "<strong>Open market operations (OMO)<\/strong> — buying/selling securities (e.g. Treasury bills) affects the supply of reserves and money.", "<strong>Interest rate<\/strong> — lending to sound banks at the <strong>minimum rediscount rate (MRR)<\/strong> sets the floor for money-market rates."]}], "Q": [{"q": "A central bank is best described as", "o": ["a private commercial bank that maximizes profit.", "an independent national authority that conducts monetary policy, regulates banks, and provides financial services.", "a bank that only accepts deposits from individuals.", "an international lending organization."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Which of the following is a function of the central bank?", "o": ["Issuing the national currency", "Accepting checkable deposits from the public", "Granting consumer loans", "Selling shares to investors"], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The central bank acts as a 'lender of last resort,' meaning it", "o": ["lends to households during recessions.", "provides loans to banks during times of financial crisis.", "guarantees all bank deposits.", "never lends to commercial banks."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The central bank has a monopoly on", "o": ["accepting deposits.", "increasing the monetary base and issuing currency.", "making consumer loans.", "trading stocks."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "When the central bank carries out the banking business of the government, it is acting as", "o": ["banker's bank.", "banker to the government.", "lender of last resort.", "controller of credit."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "As the 'banker's bank,' the central bank acts in all of the following capacities EXCEPT", "o": ["custodian of banks' cash reserves.", "lender of last resort.", "bank of central clearance and settlement.", "issuer of corporate equity."], "a": 3, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The main objective of the credit-control function of the central bank is", "o": ["maximizing bank profits.", "price stability along with full employment.", "increasing government spending.", "eliminating commercial banks."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Which of the following is an instrument of monetary policy?", "o": ["Reserve requirement", "Income tax rates", "Government wages", "Tariffs"], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "When the central bank raises the reserve requirement, the amount of loans banks can make to the economy", "o": ["increases.", "decreases.", "stays the same.", "becomes unlimited."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Open market operations refer to the central bank's", "o": ["setting of tax rates.", "buying or selling of securities (such as Treasury bills) in the open market.", "printing of corporate bonds.", "supervision of bank branches."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "When the central bank buys securities in the open market, the supply of reserves and money", "o": ["decreases.", "increases.", "is unaffected.", "becomes zero."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The rate at which the central bank lends to financially sound banks is called the", "o": ["minimum rediscount rate (MRR).", "federal funds rate.", "prime rate.", "coupon rate."], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "By controlling the volume of currency and credit, the central bank functions as the", "o": ["controller of credit and money supply.", "residual claimant.", "underwriter.", "broker."], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Which of the following best describes a goal of the central bank?", "o": ["Maximizing inflation", "Stabilizing the nation's currency and keeping unemployment low", "Maximizing commercial-bank dividends", "Expanding the barter system"], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "To conduct monetary policy, the central bank adjusts variables such as", "o": ["a monetary aggregate, an interest rate, or the exchange rate.", "corporate profits.", "household savings directly.", "import quotas."], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "When the central bank sells securities in the open market, the money supply will", "o": ["increase.", "decrease.", "not change.", "double."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "If a commercial bank repeatedly borrows from the central bank at the discount window, it may face", "o": ["higher profits.", "the case of 'closing the window' (restricted access).", "an automatic bailout.", "lower reserve requirements."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The central bank keeps a reserve in the form of ______ to back the currency it issues.", "o": ["gold and foreign securities", "consumer loans", "corporate stock", "real estate"], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Which institution supervises and regulates commercial banks to ensure their solvency?", "o": ["The central bank", "The stock exchange", "Finance companies", "Mutual funds"], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "A lower minimum rediscount rate (MRR) tends to ______ the supply of credit and investment.", "o": ["decrease", "increase", "not affect", "freeze"], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Monetary policy primarily aims to influence goals the central bank does not directly control, such as", "o": ["full employment and price stability.", "the number of bank branches.", "corporate dividend policy.", "tariff schedules."], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The reserve requirement works by requiring banks to hold a fraction of their ______ as reserves.", "o": ["deposit liabilities", "total loans", "equity capital", "fixed assets"], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}]}, {"id": "it1", "l": "IT.1", "c": "#F4A261", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 1 — The Pattern of World Trade", "d": "Post-midterm · The value, direction and commodity structure of world trade, the importance of trade, and the index of openness. Expected/practice questions from your notes.", "S": [{"h": "Why countries trade", "p": ["Countries trade because they have a <strong>comparative advantage<\/strong> arising from international differences in the availability of factors of production → differences in production costs and prices.", "Trade lets countries buy foreign goods at a lower price than it would cost to make them at home."]}, {"h": "The world trade pattern", "p": ["World trade has expanded very rapidly since <strong>1950<\/strong>; the Great Depression of the 1930s and WWII destroyed international trade.", "About <strong>half of world trade<\/strong> is between the industrial countries, which hold about <strong>two-thirds<\/strong> of world exports.", "The share of <strong>primary products<\/strong> (agriculture, minerals, fuels) fell (≈50.5% → 38.3%), while <strong>manufactured goods<\/strong> rose to about <strong>60%<\/strong>."]}, {"h": "Importance of trade, living standards & growth", "p": ["No country can live in isolation; country size is measured by area and population.", "<strong>Index of openness = Exports / GDP (or GNP) × 100<\/strong>, varying between 0 and 100; high = relatively open, low = relatively closed.", "<strong>Standard of living<\/strong> is measured by <strong>per-capita income<\/strong> (GDP or GNP per person).", "<strong>Economic growth<\/strong> is measured by the growth rate of per-capita income/GDP; <strong>human capital<\/strong> (knowledge and skills) is a major source of growth.", "Trade creates a competitive environment and lets countries dispose of surpluses and import needed raw and intermediate goods."]}], "Q": [{"q": "The index of openness is calculated as", "o": ["Exports / GDP × 100.", "Imports × Exports.", "GDP / Population.", "Exports − Imports."], "a": 0, "s": "IT-1 · Expected", "src": "gen"}, {"q": "A country with a high value of the index of openness is", "o": ["relatively closed.", "relatively open, trading a lot with the rest of the world.", "completely self-sufficient.", "not trading at all."], "a": 1, "s": "IT-1 · Expected", "src": "gen"}, {"q": "The index of openness varies between", "o": ["0 and 1.", "0 and 100.", "1 and 1000.", "-100 and 100."], "a": 1, "s": "IT-1 · Expected", "src": "gen"}, {"q": "The standard of living in a country is measured by", "o": ["per-capita income (GDP or GNP per person).", "total exports.", "the number of banks.", "the inflation rate."], "a": 0, "s": "IT-1 · Expected", "src": "gen"}, {"q": "According to the world trade pattern, world trade has expanded very rapidly since", "o": ["1850.", "1929.", "1950.", "2000."], "a": 2, "s": "IT-1 · Expected", "src": "gen"}, {"q": "Which historical events destroyed international trade according to the world trade pattern?", "o": ["The Great Depression of the 1930s and the Second World War", "The Industrial Revolution", "The fall of the Berlin Wall", "The 2008 financial crisis"], "a": 0, "s": "IT-1 · Expected", "src": "gen"}, {"q": "Almost half of world trade takes place between", "o": ["developing countries.", "the industrial countries.", "oil-producing countries.", "the Soviet bloc."], "a": 1, "s": "IT-1 · Expected", "src": "gen"}, {"q": "Over the studied period, the share of primary products in world trade", "o": ["rose to 60%.", "fell (from about 50.5% to 38.3%).", "stayed constant.", "disappeared."], "a": 1, "s": "IT-1 · Expected", "src": "gen"}, {"q": "Manufactured goods make up roughly what share of world trade?", "o": ["20%", "40%", "60%", "90%"], "a": 2, "s": "IT-1 · Expected", "src": "gen"}, {"q": "Primary products include", "o": ["agricultural products, minerals, and fuels.", "cars and chemicals.", "machinery.", "electronics."], "a": 0, "s": "IT-1 · Expected", "src": "gen"}, {"q": "The size of a country can be measured by", "o": ["its area and population.", "its exports only.", "its number of banks.", "its inflation rate."], "a": 0, "s": "IT-1 · Expected", "src": "gen"}, {"q": "Per-capita income (GDP per person) tells us", "o": ["the total value of exports.", "how much each person would have if the country's production were divided equally among all members of society.", "the trade deficit.", "the money supply."], "a": 1, "s": "IT-1 · Expected", "src": "gen"}, {"q": "Foreign trade raises a country's standard of living because it enables the country to", "o": ["obtain goods it does not produce domestically at all.", "increase tariffs.", "reduce its population.", "stop specialization."], "a": 0, "s": "IT-1 · Expected", "src": "gen"}, {"q": "International trade contributes to economic growth partly by", "o": ["reducing human capital.", "creating a competitive environment that pushes countries to produce competitive products.", "eliminating exports.", "discouraging investment."], "a": 1, "s": "IT-1 · Expected", "src": "gen"}, {"q": "A country with a low value of the index of openness is said to be", "o": ["relatively open.", "relatively closed.", "highly industrialized.", "an oil exporter."], "a": 1, "s": "IT-1 · Expected", "src": "gen"}, {"q": "International trade allows countries to", "o": ["get rid of production surpluses and import needed raw materials and intermediate goods.", "avoid all competition.", "stop producing goods.", "ignore comparative advantage."], "a": 0, "s": "IT-1 · Expected", "src": "gen"}, {"q": "Why do countries trade, according to the introduction?", "o": ["Because they have a comparative advantage arising from international differences in production costs.", "Because all goods cost the same everywhere.", "Because they have identical resources.", "To reduce their GDP."], "a": 0, "s": "IT-1 · Expected", "src": "gen"}, {"q": "The industrial countries hold about ______ of world exports.", "o": ["one third", "two thirds", "one tenth", "all"], "a": 1, "s": "IT-1 · Expected", "src": "gen"}, {"q": "Economic growth in a country is measured by", "o": ["the growth rate of per-capita income or GDP/GNP.", "the number of imports only.", "the exchange rate.", "the tariff rate."], "a": 0, "s": "IT-1 · Expected", "src": "gen"}, {"q": "A major source of economic growth identified in the notes is", "o": ["the accumulation of knowledge and skills by workers (human capital).", "reducing investment.", "raising tariffs.", "closing the economy."], "a": 0, "s": "IT-1 · Expected", "src": "gen"}]}, {"id": "it2", "l": "IT.2", "c": "#E76F51", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 2 — Classical Theory: Absolute & Comparative Advantage", "d": "Post-midterm · The labour theory of value, Adam Smith's absolute advantage, Ricardo's comparative advantage and opportunity cost. Expected/practice questions from your notes.", "S": [{"h": "Assumptions of the classical theory", "p": ["<strong>Labour theory of value<\/strong> — labour is the only factor of production; a commodity's value = the labour spent on it; all labour is homogeneous.", "<strong>International immobility of factors<\/strong> — factors move freely within a country but not between countries, so wage differences persist.", "<strong>Perfect competition<\/strong> — price = marginal cost = average cost (unit labour cost); prices are constant.", "For simplicity: no transport costs, two countries, two commodities."]}, {"h": "Adam Smith — Absolute Advantage", "p": ["<strong>Absolute advantage<\/strong> = ability to produce a good with lower unit-labour requirements than another country.", "Countries gain by each specializing in the good in which it has an absolute advantage and exchanging.", "The theory works at the barter level, without money."]}, {"h": "Ricardo — Comparative Advantage", "p": ["A country has a <strong>comparative advantage<\/strong> in a good if its <strong>opportunity cost<\/strong> of producing it is lower than in the other country.", "Trade benefits all countries even when one country has an absolute advantage in <strong>both<\/strong> goods.", "<strong>Opportunity cost<\/strong> = the amount of one good that must be given up to produce another.", "Example: Portugal has a comparative advantage in wine, England in cloth; each specializes and both gain (more consumption / leisure with the same resources)."]}], "Q": [{"q": "The classical theory of international trade was based on", "o": ["the labour theory of value, where labour is the only factor of production.", "capital as the only factor.", "land as the only factor.", "the money supply."], "a": 0, "s": "IT-2 · Expected", "src": "gen"}, {"q": "According to the labour theory of value, the value of any commodity is determined by", "o": ["the amount of capital used.", "the amount of labour spent on its production.", "the exchange rate.", "government policy."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "The theory of absolute advantage was developed by", "o": ["David Ricardo.", "Adam Smith.", "Heckscher and Ohlin.", "Wassily Leontief."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "The theory of comparative advantage was developed by", "o": ["Adam Smith.", "David Ricardo.", "Wassily Leontief.", "Bertil Ohlin."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "Absolute advantage means the ability to produce a good", "o": ["with lower unit-labour requirements than other countries.", "using more workers.", "at a higher price.", "with imported capital."], "a": 0, "s": "IT-2 · Expected", "src": "gen"}, {"q": "A country has a comparative advantage in producing a good if", "o": ["it has an absolute advantage in all goods.", "its opportunity cost of producing the good is lower than in the other country.", "it uses more labour.", "it has a higher wage."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "Ricardo showed that trade can benefit both countries even when one country", "o": ["has no resources.", "has an absolute advantage in producing both goods.", "has a larger population.", "uses money."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "In Ricardo's example, Portugal had a comparative advantage in ______ and England in ______.", "o": ["cloth; wine", "wine; cloth", "both goods; neither", "neither; both"], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "The opportunity cost of producing a good is", "o": ["the money price of the good.", "the amount of another good that must be given up to produce it.", "the wage rate.", "the tariff."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "Under the classical assumption of perfect competition,", "o": ["price = marginal cost = average cost.", "price is set by the government.", "firms earn large profits.", "prices always rise."], "a": 0, "s": "IT-2 · Expected", "src": "gen"}, {"q": "Which is an assumption of the classical theory of international trade?", "o": ["Factors of production are perfectly mobile between countries.", "Factors of production are mobile within a country but immobile between countries.", "Transport costs are very high.", "There are many factors of production."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "Wheat: A = 5h, B = 10h; Cotton: A = 15h, B = 8h. Which statement is correct?", "o": ["Country A has an absolute advantage in both goods.", "Country A should specialize in wheat and Country B in cotton.", "Country B has an absolute advantage in wheat.", "Country A should specialize in cotton."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "If a unit of good X costs 5 labour hours and a unit of good Y costs 10 labour hours in Country A, the opportunity cost of one unit of X is", "o": ["2 units of Y.", "1/2 unit of Y.", "5 units of Y.", "10 units of Y."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "Under the classical theory, after trade each country specializes in the good in which it has a", "o": ["comparative advantage.", "absolute disadvantage.", "higher opportunity cost.", "larger labour force."], "a": 0, "s": "IT-2 · Expected", "src": "gen"}, {"q": "The gains from trade arise because countries can", "o": ["reallocate resources to their line of comparative advantage and produce/consume more.", "raise tariffs.", "reduce their workforce.", "avoid specialization."], "a": 0, "s": "IT-2 · Expected", "src": "gen"}, {"q": "According to the labour theory of value, all labour is assumed to be", "o": ["heterogeneous.", "homogeneous.", "highly skilled only.", "immobile within the country."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "For simplicity, the classical theory assumes", "o": ["no transportation costs, two countries, and two commodities.", "many countries and many goods.", "high transport costs.", "three factors of production."], "a": 0, "s": "IT-2 · Expected", "src": "gen"}, {"q": "International immobility of factors of production means that", "o": ["wage differences between countries are eliminated by migration.", "wage differences persist because migration cannot eliminate them.", "capital flows freely between countries.", "labour cannot move within a country."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "If Country A can produce both goods using fewer labour hours than Country B, Country A has", "o": ["a comparative disadvantage.", "an absolute advantage in both goods.", "no advantage.", "higher opportunity costs."], "a": 1, "s": "IT-2 · Expected", "src": "gen"}, {"q": "The classical theory explains international trade at the level of", "o": ["production and exchange (barter), without money.", "monetary policy.", "central banking.", "exchange rates."], "a": 0, "s": "IT-2 · Expected", "src": "gen"}, {"q": "Adam Smith argued that countries gain from trade when each specializes in the good in which it has", "o": ["an absolute advantage.", "the highest cost.", "a comparative disadvantage.", "no advantage."], "a": 0, "s": "IT-2 · Expected", "src": "gen"}, {"q": "If Egypt needs 5h for wheat and 15h for cotton, while India needs 10h for wheat and 8h for cotton, then", "o": ["Egypt should specialize in wheat and India in cotton.", "India should specialize in wheat.", "Egypt has an absolute advantage in cotton.", "neither should trade."], "a": 0, "s": "IT-2 · Expected", "src": "gen"}]}, {"id": "it3", "l": "IT.3", "c": "#9B59B6", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 3 — Factor Endowments & Heckscher-Ohlin", "d": "Post-midterm · The two-factor H-O model, factor abundance, factor-price equalization, and why H-O fails to hold in the real world. Expected/practice questions from your notes.", "S": [{"h": "From Ricardo to Heckscher-Ohlin", "p": ["Ricardo: labour is the only factor → a <strong>one-factor model<\/strong>; differences in labour productivity cause trade.", "<strong>H-O model<\/strong>: labour and capital are the two factors → a <strong>two-factor model<\/strong>.", "Capital-rich countries export <strong>capital-intensive<\/strong> goods; labour-rich countries export <strong>labour-intensive<\/strong> goods.", "Trade eliminates differences in factor prices between countries."]}, {"h": "H-O assumptions", "p": ["No transportation costs (so goods' prices are equal in both countries).", "Production functions are homogeneous of the first degree (inputs up by a proportion → output up by the same proportion).", "Perfect competition in both commodity and factor markets; the producer produces where the ratio of marginal productivities = the factor-price ratio.", "The two commodities show different factor intensities; technology is the same in both countries."]}, {"h": "Factor abundance, equalization & limits", "p": ["<strong>By factor prices<\/strong>: A is capital-rich vs. B if capital is relatively cheaper in A.", "<strong>In physical terms<\/strong>: A is capital-rich if the capital-to-labour ratio is larger in A than in B.", "<strong>Factor-price equalization<\/strong> — trade reduces international differences in prices of homogeneous factors; needs no transport costs and no trade barriers.", "<strong>Why H-O fails in reality<\/strong> — its assumptions don't hold: there ARE transport costs, trade barriers, different technologies, economies of scale, and imperfect competition.", "Summary: countries share tastes and technology but differ in factor endowments; the international difference in <strong>supply<\/strong> conditions alone determines the trade pattern."]}], "Q": [{"q": "The Heckscher-Ohlin (H-O) model is known as a", "o": ["one-factor model.", "two-factor model.", "three-factor model.", "zero-factor model."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "In the H-O model, the two factors of production are", "o": ["land and labour.", "labour and capital.", "capital and entrepreneurship.", "labour and land."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "According to H-O, a country rich in capital will export", "o": ["labour-intensive goods.", "capital-intensive goods.", "primary products only.", "no goods."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "According to H-O, a country rich in labour will export", "o": ["capital-intensive goods.", "labour-intensive goods.", "services only.", "no goods."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "Compared with H-O, Ricardo's model is a", "o": ["two-factor model.", "one-factor model (labour only).", "three-factor model.", "no-factor model."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "Which is an assumption of the H-O model?", "o": ["High transportation costs", "No transportation costs of trade", "Different technology in each country", "Economies of scale"], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "In the H-O model, international trade tends to", "o": ["increase differences in factor prices between countries.", "eliminate (equalize) differences in factor prices between countries.", "have no effect on factor prices.", "raise transport costs."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "Factor abundance defined by factor prices says Country A is capital-rich relative to B if", "o": ["capital is relatively cheaper in A than in B.", "labour is cheaper in A.", "A has more workers.", "A has higher tariffs."], "a": 0, "s": "IT-3 · Expected", "src": "gen"}, {"q": "Factor abundance defined in physical terms says Country A is capital-rich if", "o": ["the ratio of capital to labour is larger in A than in B.", "A has fewer machines.", "A has a smaller population.", "wages are higher in A."], "a": 0, "s": "IT-3 · Expected", "src": "gen"}, {"q": "The marginal productivity of labour (MPL) increases when", "o": ["the stock of capital used increases.", "the labour force shrinks.", "tariffs rise.", "transport costs increase."], "a": 0, "s": "IT-3 · Expected", "src": "gen"}, {"q": "Under perfect competition in the H-O model, the producer combines labour and capital so that", "o": ["prices are ignored.", "the ratio of marginal productivities equals the ratio of factor prices.", "only labour is used.", "only capital is used."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "Under H-O, each country exports products that use intensively its", "o": ["relatively scarce factor.", "relatively abundant factor.", "imported factor.", "most expensive factor."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "Under H-O, each country imports products that use intensively its", "o": ["relatively abundant factor.", "relatively scarce factor.", "cheapest factor.", "only factor."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "H-O assumes production functions are homogeneous of the first degree, meaning if all inputs rise by a proportion, output", "o": ["rises by the same proportion.", "rises more than proportionally.", "falls.", "stays constant."], "a": 0, "s": "IT-3 · Expected", "src": "gen"}, {"q": "Which condition is required for full factor-price equalization?", "o": ["High tariffs", "No transportation costs and no trade barriers", "Different technologies", "Economies of scale"], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "The H-O theory assumes countries have", "o": ["the same tastes and technology but differ in factor endowments.", "different tastes and technology.", "identical factor endowments.", "no trade."], "a": 0, "s": "IT-3 · Expected", "src": "gen"}, {"q": "Why does the H-O model not hold perfectly in the real world?", "o": ["Because its assumptions (no transport costs, no trade barriers, same technology, perfect competition) are not met", "Because countries never trade", "Because labour is the only factor", "Because prices are fixed"], "a": 0, "s": "IT-3 · Expected", "src": "gen"}, {"q": "According to H-O, what alone determines the trade pattern?", "o": ["Demand conditions", "The international difference in supply (factor endowment) conditions", "Government policy", "Exchange rates"], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "In the H-O model, a given good is assumed to be produced", "o": ["with different techniques in each country.", "with the same technique in both countries.", "only in one country.", "without any factors."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}, {"q": "As Country A produces more capital-intensive goods, its demand for capital rises, so the price of capital (interest rate) in A", "o": ["falls.", "rises.", "stays constant.", "becomes zero."], "a": 1, "s": "IT-3 · Expected", "src": "gen"}]}, {"id": "it4", "l": "IT.4", "c": "#3498DB", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 4 — New Theories of Trade", "d": "Post-midterm · The Leontief Paradox and its explanations, the Human-Skills theory, and the technology theories of trade. Expected/practice questions from your notes.", "S": [{"h": "The Leontief Paradox", "p": ["H-O predicts a capital-rich country exports capital-intensive goods. <strong>Leontief<\/strong> (using input-output tables) found the opposite for the US: its exports were <strong>less<\/strong> capital-intensive than its imports.", "This unexpected result — the <strong>Leontief Paradox<\/strong> — contradicts the Heckscher-Ohlin assumption.", "Explanations include: US demand bias for capital-intensive goods; factor-intensity reversal; US import restrictions; scarcity of natural resources; relative abundance of skilled labour; and US comparative advantage in technology-intensive industries."]}, {"h": "Human-Skills theory", "p": ["The traditional theory treated labour as homogeneous; the <strong>human-skills theory<\/strong> separates skilled from unskilled labour.", "It increases the numerator (capital) by adding the value of labour skills, making the US <strong>capital-abundant<\/strong> (because creating skills requires saving and investment).", "By adding a new factor of production (labour skills) to the H-O model, it is called a <strong>'neofactor'<\/strong> theory."]}, {"h": "Technology theories", "p": ["<strong>Technology gap model (Posner)<\/strong> — examines technological change between countries with similar factor endowments; an <strong>imitation lag<\/strong> stops others from immediately copying new products, giving the innovator an export monopoly.", "The <strong>demand lag<\/strong> is the time consumers in other countries take to react; the innovating country gains because the demand lag is usually shorter than the imitation/reaction lag.", "The technology gap theory does not explain why some countries lead and others follow, nor imitation lags in detail — the <strong>product life cycle model<\/strong> answers these questions."]}], "Q": [{"q": "The Leontief Paradox refers to the finding that", "o": ["the US, a capital-rich country, had exports that were less capital-intensive than its imports.", "the US exported only primary products.", "trade does not benefit any country.", "labour is the only factor."], "a": 0, "s": "IT-4 · Expected", "src": "gen"}, {"q": "The Leontief Paradox contradicts the assumption of which model?", "o": ["Ricardian model", "Heckscher-Ohlin model", "Adam Smith's model", "Product life cycle model"], "a": 1, "s": "IT-4 · Expected", "src": "gen"}, {"q": "Leontief discovered the paradox by using", "o": ["input-output tables.", "exchange rates.", "tariff schedules.", "opportunity-cost ratios."], "a": 0, "s": "IT-4 · Expected", "src": "gen"}, {"q": "Which is one explanation offered for the Leontief Paradox?", "o": ["US demand bias toward capital-intensive goods", "the absence of trade", "perfect competition", "zero transport costs"], "a": 0, "s": "IT-4 · Expected", "src": "gen"}, {"q": "Factor-intensity reversal occurs when a good is", "o": ["always capital-intensive.", "capital-intensive at one set of factor prices but labour-intensive at another.", "never traded.", "produced only by labour."], "a": 1, "s": "IT-4 · Expected", "src": "gen"}, {"q": "The Human-Skills theory of trade differs from the classical theory by", "o": ["treating all labour as homogeneous.", "separating skilled from unskilled labour.", "ignoring labour entirely.", "assuming only capital matters."], "a": 1, "s": "IT-4 · Expected", "src": "gen"}, {"q": "The Human-Skills approach is called a 'neofactor' theory because it", "o": ["removes capital from the model.", "adds a new factor of production (labour skills) to the H-O model.", "ignores all factors.", "assumes one country."], "a": 1, "s": "IT-4 · Expected", "src": "gen"}, {"q": "Instead of multiplying US labour by three (as Leontief suggested), the human-skills theory", "o": ["reduces capital.", "increases capital by adding the value of labour skills.", "ignores skills.", "removes labour."], "a": 1, "s": "IT-4 · Expected", "src": "gen"}, {"q": "The technology gap model (Posner) examines the influence of technological change on trade between countries with", "o": ["very different factor endowments.", "similar factor endowments.", "no resources.", "fixed exchange rates."], "a": 1, "s": "IT-4 · Expected", "src": "gen"}, {"q": "An 'imitation lag' in technology theories refers to", "o": ["the delay before other countries can duplicate the new products of the innovating country.", "the time to ship goods.", "a tariff delay.", "a wage delay."], "a": 0, "s": "IT-4 · Expected", "src": "gen"}, {"q": "Technology gaps give the innovating country", "o": ["an export monopoly during the period of imitation lag.", "a permanent disadvantage.", "higher transport costs.", "no benefit."], "a": 0, "s": "IT-4 · Expected", "src": "gen"}, {"q": "The demand lag is the time it takes for", "o": ["producers in other countries to imitate a product.", "consumers in other countries to react to a new product or price change.", "goods to be shipped.", "tariffs to change."], "a": 1, "s": "IT-4 · Expected", "src": "gen"}, {"q": "An innovating country obtains an export advantage because", "o": ["the demand lag is usually shorter than the imitation (reaction) lag.", "the imitation lag is zero.", "there is no demand.", "tariffs are high."], "a": 0, "s": "IT-4 · Expected", "src": "gen"}, {"q": "Technological innovation can take the form of", "o": ["new, more economical ways of producing existing products.", "higher tariffs.", "reduced trade.", "factor immobility."], "a": 0, "s": "IT-4 · Expected", "src": "gen"}, {"q": "A limitation of the technology gap theory is that it does not explain", "o": ["why some countries are technological leaders and others followers.", "opportunity cost.", "absolute advantage.", "the index of openness."], "a": 0, "s": "IT-4 · Expected", "src": "gen"}, {"q": "Which model explains imitation lags in more detail and answers questions the technology gap theory leaves open?", "o": ["The product life cycle model", "The labour theory of value", "The H-O model", "Adam Smith's model"], "a": 0, "s": "IT-4 · Expected", "src": "gen"}, {"q": "One explanation of the Leontief Paradox is the relative abundance of ______ in the US.", "o": ["natural resources", "skilled labour", "unskilled labour", "gold"], "a": 1, "s": "IT-4 · Expected", "src": "gen"}, {"q": "US import restrictions (tariffs) biased against labour-intensive imports could explain the paradox because they", "o": ["increase the labour intensity of US imports.", "lower the labour intensity of US imports.", "have no effect.", "raise exports."], "a": 1, "s": "IT-4 · Expected", "src": "gen"}, {"q": "According to the human-skills theory, redefining capital to include human skills makes the US", "o": ["labour-abundant.", "capital-abundant.", "resource-poor.", "closed."], "a": 1, "s": "IT-4 · Expected", "src": "gen"}, {"q": "The scarcity-of-natural-resources explanation suggests Leontief's paradox arises because the US imports natural-resource products that are also", "o": ["labour-intensive.", "capital-intensive.", "free.", "non-traded."], "a": 1, "s": "IT-4 · Expected", "src": "gen"}]}]</script>
