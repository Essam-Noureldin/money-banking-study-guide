om US import data, so what remains in the data appears <b>less labor-intensive<\/b> than the true free-trade mix would be."}, {"q": "The traditional theory of international trade divided the labor force into distinct categories of highly skilled and non-skilled workers.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "Traditional theory treated labor as a single <b>homogeneous<\/b> factor; the human-skills literature — not classical theory — introduced the distinction between skilled and unskilled workers."}, {"q": "The human-skills theory adjusts the capital-labor ratio by multiplying the denominator (labor) by three, exactly as Leontief originally proposed.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "The human-skills approach adds skill value to the <b>capital numerator<\/b>. Leontief's proposal was to multiply the <b>labor denominator<\/b>. The two adjustments are distinct and should not be conflated."}, {"q": "The human skills approach is considered a \"neofactor\" theory because it redefines capital or adds labor skills as a distinct factor of production.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "By treating accumulated labor skills as a form of capital that can be measured and added to the numerator, the theory introduces a <b>new factor<\/b>, qualifying it as a neofactor approach."}, {"q": "Posner's Technology Gap Model explains trade between nations that possess completely different factor endowments and demand environments.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "Posner's model was designed for countries with <b>similar<\/b> factor endowments and demand structures. Different endowments are better handled by H-O; the technology gap is irrelevant there."}, {"q": "An imitation lag prevents foreign competitor nations from duplicating an innovative product instantly.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "The imitation lag is precisely the delay between innovation and successful foreign duplication; without it, competitors would copy instantly and no trade advantage would arise."}, {"q": "The time between the launch of a new product in an innovative nation and the moment foreign producers see it as a domestic competitive threat is called the demand lag.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "The time before foreign producers treat a new product as a competitive threat is the <b>reaction lag<\/b> (part of the imitation lag), not the demand lag. The demand lag refers to the delay in foreign <b>consumer<\/b> adoption."}, {"q": "The innovating country successfully secures an export advantage because the demand lag is typically shorter than the imitation lag.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "Export trade flows during the gap where foreign consumers already demand the good (short demand lag) but foreign producers still cannot supply it (longer imitation lag), giving the innovator a net export window."}, {"q": "The Technology Gap Theory provides an exhaustive explanation as to why specific countries consistently act as technological innovators.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "The technology-gap theory describes <b>how<\/b> innovation creates a temporary trade advantage but offers no theory of <b>why<\/b> certain nations are consistently innovative — this is a recognized shortcoming."}, {"q": "Vernon's Product Life Cycle Model serves as an analytical framework for both international trade and international investment.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "Vernon explicitly framed the PLC as explaining both the pattern of <b>exports<\/b> in early stages and the shift to <b>foreign direct investment<\/b> as firms move production abroad in later stages."}, {"q": "During the initial \"new product\" stage of the life cycle, the price elasticity of demand is extremely high because consumers can choose from many close substitutes.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "In the new-product stage there are <b>few or no substitutes<\/b>, so demand is relatively <b>price inelastic<\/b>. High elasticity would require many close alternatives, which do not yet exist for a genuinely new good."}, {"q": "Production in the new product stage relies heavily on stable, unchanging production functions and a high volume of unskilled manufacturing labor.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "The new-product stage is characterized by <b>unstable, evolving production functions<\/b> and reliance on <b>highly skilled<\/b> workers, not stable methods or unskilled mass-production labor."}, {"q": "In the maturing product stage, manufacturing methods shift toward mass-production, and labor inputs move from highly skilled to semiskilled workers.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "As design stabilizes in the maturing stage, firms adopt <b>mass-production techniques<\/b> and replace expensive specialists with <b>semiskilled<\/b> workers, reducing unit costs and expanding output."}, {"q": "Once a product reaches the standardized product stage, production becomes more labor-skill intensive, causing manufacturing locations to return to high-wage nations.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "The standardized stage is characterized by intense <b>price competition<\/b>; production migrates to low-wage, labor-abundant countries — the opposite of returning to high-wage, high-skill nations."}]}, {"id": "it5", "l": "IT.5", "c": "#16A085", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 5 — The Balance of Payments (BOP)", "d": "Residents, credits vs debits, the current / capital / official-settlement accounts, SDRs, double-entry bookkeeping, and the CA = NS − I and CA = Y − E problems. Real answer-keyed revision questions.", "S": [{"h": "What the BOP is", "p": ["The <strong>balance of payments<\/strong> records all economic transactions between the <strong>residents<\/strong> of a country and the rest of the world over a <strong>calendar year<\/strong>.", "Its main purpose is to <strong>inform the government of its international position and assist in policy formulation<\/strong> (monetary, fiscal, commercial). It <strong>aggregates<\/strong> millions of transactions into a few major categories.", "<strong>Residents<\/strong> include diplomats, citizens, and military personnel (residents of their home country); a corporation is a resident of the country where it is <strong>incorporated<\/strong>. International bodies (UN, IMF, World Bank) are <strong>not<\/strong> residents of their host country.", "An <strong>international transaction<\/strong> is the exchange of a good, service, or asset; <strong>gifts and grants<\/strong> are included even though no payment is required."]}, {"h": "Credits (+) vs Debits (−)", "p": ["<strong>Credit (+)<\/strong> transactions involve the <strong>receipt of payments from foreigners<\/strong>: exports, unilateral transfers received, capital inflows.", "<strong>Debit (−)<\/strong> transactions involve <strong>making payments to foreigners<\/strong>: imports, unilateral transfers to foreigners, capital outflows.", "The BOP uses <strong>double-entry bookkeeping<\/strong> — each transaction is recorded twice, once as a credit and once as a debit of equal amount — so it is always in accounting equilibrium (helped by errors & omissions)."]}, {"h": "The three accounts", "p": ["<strong>Current Account<\/strong> = trade in <strong>merchandise<\/strong> (tangible goods), <strong>services<\/strong> (travel, tourism, insurance, remittances, diplomatic costs), and <strong>unilateral transfers<\/strong>. Trade Balance = merchandise exports − merchandise imports.", "<strong>Capital Account<\/strong> = international investments and loans (long-term = maturity of one year or more; short-term). <strong>Direct investment<\/strong> = building a plant/factory abroad; <strong>portfolio investment<\/strong> = buying foreign stocks/bonds.", "<strong>Capital inflow (+)<\/strong> = an increase in foreign assets in the country; <strong>capital outflow (−)<\/strong> = an increase in the country's assets abroad.", "<strong>Official Settlement Account<\/strong> = changes in liquid/non-liquid liabilities to foreign official holders and in <strong>official reserve assets<\/strong> (SDRs and gold). <strong>SDRs<\/strong> are a reserve asset created on the books of the IMF. An increase in official reserves is a debit (−)."]}, {"h": "Autonomous vs accommodating & the CA problems", "p": ["<strong>Autonomous<\/strong> transactions (\"above the line\") = all current- and capital-account transactions. <strong>Accommodating<\/strong> transactions (\"below the line\") = the official settlements account.", "<strong>Basic Balance<\/strong> = current-account balance + long-term capital balance.", "<strong>CA = NS − I<\/strong> (national saving − domestic investment): if NS &gt; I → surplus; if NS &lt; I → deficit.", "<strong>CA = Y − E<\/strong> (national income − national expenditure): if Y &gt; E → surplus; if Y &lt; E → deficit. A deficit must be financed by foreign investment or foreign borrowing."]}, {"h": "Worked examples — credit (+) or debit (−)?", "p": ["<strong>The rule<\/strong>: a payment coming <strong>IN from foreigners is a credit (+)<\/strong>; a payment going <strong>OUT to foreigners is a debit (−)<\/strong>.", "<strong>Credits (+)<\/strong>: exports of goods/services, gifts/transfers <em>received<\/em>, and <strong>capital inflows<\/strong> (foreigners buy our assets, or we sell foreign assets).", "<strong>Debits (−)<\/strong>: imports, transfers <em>given<\/em> to foreigners, and <strong>capital outflows<\/strong> (we buy foreign assets — our assets abroad rise).", "<strong>Example<\/strong> — Egypt pays dividends to a foreign shareholder: payment out → <strong>debit, current account<\/strong>. An Egyptian buys a UK treasury bill: our assets abroad rise, money flows out → <strong>debit, capital account<\/strong>. A foreigner buys an Egyptian stock: money in → <strong>credit, capital inflow<\/strong>.", "<strong>Residents<\/strong>: citizens, diplomats and military abroad remain residents of home; a firm is a resident of where it is <strong>incorporated<\/strong>; the IMF, UN and World Bank are <strong>not<\/strong> residents of their host country."]}, {"h": "Worked examples — the Current Account formulas", "p": ["Two equivalent formulas: <strong>CA = Y − E<\/strong> (national income − expenditure) and <strong>CA = NS − I<\/strong> (national saving − domestic investment).", "<strong>CA &gt; 0 → surplus<\/strong> (the country earns/saves more than it spends/invests and lends abroad). <strong>CA &lt; 0 → deficit<\/strong> (it spends more than it earns and must borrow from abroad).", "<strong>Example<\/strong>: Y = 1,500, E = 1,700 → CA = −200 → <strong>deficit<\/strong>, financed by foreign borrowing or investment.", "<strong>Example<\/strong>: NS = 700, I = 550 → CA = +150 → <strong>surplus<\/strong>.", "<strong>Net Foreign Investment (IF)<\/strong> equals the current-account balance: a deficit of 50 must be financed by external funding of 50 (IF = −50)."]}, {"h": "🔑 Exam keyword cues — what to pick when you see…", "p": ["&ldquo;<strong>payment received from foreigners / exports / capital inflow<\/strong>&rdquo; → credit (+)", "&ldquo;<strong>payment made to foreigners / imports / capital outflow<\/strong>&rdquo; → debit (−)", "&ldquo;<strong>merchandise + services + unilateral transfers<\/strong>&rdquo; → current account", "&ldquo;<strong>investments &amp; loans (long &amp; short term)<\/strong>&rdquo; → capital account", "&ldquo;<strong>SDRs, gold, official reserves<\/strong>&rdquo; → official settlement account", "&ldquo;<strong>building a factory abroad<\/strong>&rdquo; → direct investment &nbsp;·&nbsp; &ldquo;<strong>buying foreign stocks/bonds<\/strong>&rdquo; → portfolio investment", "&ldquo;<strong>our assets abroad increase<\/strong>&rdquo; → capital outflow (debit)", "&ldquo;<strong>foreign assets in our country increase<\/strong>&rdquo; → capital inflow (credit)", "&ldquo;<strong>recorded twice (a credit and a debit)<\/strong>&rdquo; → double-entry bookkeeping", "&ldquo;<strong>CA = Y−E = NS−I; if Y&lt;E or NS&lt;I<\/strong>&rdquo; → deficit", "&ldquo;<strong>resident where incorporated; IMF / UN / World Bank<\/strong>&rdquo; → NOT residents of the host country"]}, {"h": "🔑 Exam keyword cues · Part 2 — more phrases → answers", "p": ["&ldquo;<strong>a systematic record of all transactions with the rest of the world over a year<\/strong>&rdquo; → the Balance of Payments", "&ldquo;<strong>merchandise (visible) exports vs imports only<\/strong>&rdquo; → the balance of trade", "&ldquo;<strong>goods + services + income + transfers<\/strong>&rdquo; → the current account", "&ldquo;<strong>total credits always equal total debits<\/strong>&rdquo; → the BOP accounting identity (it always balances)", "&ldquo;<strong>remittances, foreign aid, gifts<\/strong>&rdquo; → unilateral transfers", "&ldquo;<strong>a deficit covered by drawing down reserves<\/strong>&rdquo; → the official settlements balance", "&ldquo;<strong>the small balancing entry for measurement gaps<\/strong>&rdquo; → errors &amp; omissions (statistical discrepancy)", "&ldquo;<strong>a rise in the currency's value<\/strong>&rdquo; → appreciation &nbsp;·&nbsp; &ldquo;<strong>a fall in the currency's value<\/strong>&rdquo; → depreciation", "&ldquo;<strong>exports of goods exceed imports of goods<\/strong>&rdquo; → a trade surplus"]}, {"h": "🔑 Exam keyword cues · Part 3 — even more phrases → answers", "p": ["&ldquo;<strong>tourism, shipping, insurance, banking services<\/strong>&rdquo; → invisibles (services in the current account)", "&ldquo;<strong>interest, dividends and profits earned abroad<\/strong>&rdquo; → investment income (current account)", "&ldquo;<strong>set by supply and demand<\/strong>&rdquo; → a floating (flexible) exchange rate &nbsp;·&nbsp; &ldquo;<strong>set/defended by the central bank<\/strong>&rdquo; → a fixed (pegged) exchange rate", "&ldquo;<strong>the central bank buys/sells currency to influence its value<\/strong>&rdquo; → official intervention", "&ldquo;<strong>an overall BOP surplus<\/strong>&rdquo; → official reserves rise &nbsp;·&nbsp; &ldquo;<strong>an overall BOP deficit<\/strong>&rdquo; → official reserves fall", "&ldquo;<strong>short-term speculative capital flows<\/strong>&rdquo; → 'hot money'", "&ldquo;<strong>foreign tourists spending in our country<\/strong>&rdquo; → a credit (an export of services)", "&ldquo;<strong>our citizens travelling and spending abroad<\/strong>&rdquo; → a debit (an import of services)", "&ldquo;<strong>a current-account deficit offset by a capital-account surplus<\/strong>&rdquo; → how the BOP balances"]}], "Q": [{"q": "What is the standard specific period of time used to record a country's balance of payments (BOP)?", "o": ["A fiscal quarter", "A calendar year", "Five years", "A single month"], "a": 1, "s": "Revision", "src": "rev", "x": "The BOP is a systematic record of all economic transactions between a country's residents and the rest of the world over <b>one calendar year<\/b>. A quarter or month is too short; five years is too long for this standard measure."}, {"q": "Which of the following is considered a primary purpose of the balance of payments?", "o": ["To track the exact daily wealth of individual citizens", "To inform the government of its international position and assist in policy formulation", "To eliminate the need for international monetary exchange", "To record illegal domestic transactions"], "a": 1, "s": "Revision", "src": "rev", "x": "The BOP gives policymakers a snapshot of a country's international economic position — surpluses, deficits, reserve changes — enabling informed decisions on exchange-rate, trade, and monetary policy."}, {"q": "Because millions of individual transactions occur, how does the balance of payments present data?", "o": ["It records every transaction individually by name", "It omits small transactions entirely", "It aggregates transactions into a few major categories", "It only tracks transactions involving cash"], "a": 2, "s": "Revision", "src": "rev", "x": "Because individual transactions number in the millions, the BOP <b>aggregates<\/b> them into broad categories (current, capital, official settlements) so analysts can identify meaningful trends."}, {"q": "Which of the following is included in a country's balance of payments even though no payment is normally required?", "o": ["Commercial merchandise trade", "Portfolio investments", "Gifts and grants", "Central bank loans"], "a": 2, "s": "Revision", "src": "rev", "x": "<b>Gifts and grants<\/b> involve a transfer of value without a corresponding payment in return, yet they still represent economic flows between residents and non-residents, so they are included in the BOP under unilateral transfers."}, {"q": "Who among the following is considered a resident of the country where they hold citizenship rather than where they are currently located?", "o": ["A foreign branch of a domestic corporation", "A tourist or a temporarily migrated worker", "An international institution like the United Nations", "A foreign subsidiary of a local bank"], "a": 1, "s": "Revision", "src": "rev", "x": "Temporary presence abroad does not change residency status. A tourist or temporarily migrated worker retains residency in their <b>home (citizenship) country<\/b>, unlike a branch or subsidiary which is resident where it operates."}, {"q": "According to the text, a corporation is considered a resident of:", "o": ["Every country where it opens a small branch", "The country in which it is incorporated", "International waters", "Only countries that do not levy corporate taxes"], "a": 1, "s": "Revision", "src": "rev", "x": "A corporation's legal domicile — the country where it is <b>incorporated<\/b> — determines its residency for BOP purposes, regardless of where branches or subsidiaries may operate."}, {"q": "Which of the following organizations is explicitly NOT considered a resident of the country in which it is located?", "o": ["A domestic manufacturing plant", "A local military base", "The International Monetary Fund (IMF)", "A registered domestic corporation"], "a": 2, "s": "Revision", "src": "rev", "x": "International institutions such as the <b>IMF<\/b>, World Bank, and UN enjoy extraterritorial status and are explicitly <em>not<\/em> considered residents of the host country where they are physically located."}, {"q": "What are the three main accounts that make up the balance of payments?", "o": ["Merchandise Account, Service Account, and Income Account", "Current Account, Capital Account, and Official Settlements Account", "Savings Account, Investment Account, and Government Account", "Autonomous Account, Accommodating Account, and Trade Account"], "a": 1, "s": "Revision", "src": "rev", "x": "The BOP is divided into three accounts: the <b>Current Account<\/b> (goods, services, transfers), the <b>Capital Account<\/b> (investments and loans), and the <b>Official Settlements Account<\/b> (reserve asset changes)."}, {"q": "A transaction that leads to the receipt of a payment from foreigners is classified as a:", "o": ["Debit transaction", "Credit transaction", "Balanced transaction", "Deficit transaction"], "a": 1, "s": "Revision", "src": "rev", "x": "A <b>credit<\/b> records any transaction that generates a receipt of payment <em>from<\/em> foreigners — it brings money into the country. The opposite, a debit, records payments made to foreigners."}, {"q": "A debit transaction is defined as one that leads to:", "o": ["A payment to foreigners", "A receipt of funds from an international body", "An increase in national saving", "An accumulation of gold reserves"], "a": 0, "s": "Revision", "src": "rev", "x": "A <b>debit<\/b> records any transaction requiring a payment to foreigners — money leaves the country. Examples include imports of goods, purchases of foreign assets, or income paid to foreign investors."}, {"q": "The Current Account includes the value of trade in which three categories?", "o": ["Liquid assets, non-liquid assets, and portfolio investments", "Long-term loans, short-term loans, and direct investments", "Merchandise, services, and unilateral transfers", "Official reserve assets, liabilities, and gold"], "a": 2, "s": "Revision", "src": "rev", "x": "The Current Account covers three trade flows: <b>merchandise<\/b> (tangible goods), <b>services<\/b> (travel, insurance, etc.), and <b>unilateral transfers<\/b> (gifts, remittances, aid) — all involving current, not financial, transactions."}, {"q": "Trade in \"merchandise\" refers specifically to:", "o": ["Financial derivative assets", "Tangible goods (commodities)", "Foreign currency reserves", "Tourism and travel expenses"], "a": 1, "s": "Revision", "src": "rev", "x": "\"Merchandise\" trade refers exclusively to physical, <b>tangible goods (commodities)<\/b> such as cars, wheat, or machinery. Intangibles like tourism or banking are classified as services, not merchandise."}, {"q": "Which of the following items is classified under \"services\" in the current account?", "o": ["Building a foreign plant or factory", "Purchasing foreign stocks and bonds", "Travel, tourism, and insurance services", "Trade in tangible commodities"], "a": 2, "s": "Revision", "src": "rev", "x": "<b>Travel, tourism, and insurance<\/b> are classic service exports/imports. Direct investment (building a plant) belongs in the capital account; buying stocks is portfolio investment; tangible goods are merchandise."}, {"q": "Why are the exports of goods and services entered in the current account as credits (+)?", "o": ["Because they result in a net loss of physical goods", "Because they lead to the receipt of payments from foreigners", "Because they increase government expenditure", "Because they are mandated by the World Bank"], "a": 1, "s": "Revision", "src": "rev", "x": "Exports bring money <em>in<\/em> from foreigners — the definition of a credit. The credit sign (+) reflects that the country receives payment, increasing the current account balance."}, {"q": "The import of goods and services is entered into the current account as a debit (−) because it leads to:", "o": ["Receipts from foreign consumers", "Payments to foreigners", "An increase in the basic balance", "An accumulation of Special Drawing Rights"], "a": 1, "s": "Revision", "src": "rev", "x": "Imports require the domestic country to <b>pay foreigners<\/b>, which is the definition of a debit (−). Money flows out, so imports reduce the current account balance."}, {"q": "What type of flows does the Capital Account display?", "o": ["Only unilateral transfers and gifts", "Trade in tangible goods and tourism costs", "International investments and loans (long-term and short-term)", "Changes in official gold reserves"], "a": 2, "s": "Revision", "src": "rev", "x": "The Capital Account records <b>international investment and loan flows<\/b> — both long-term (FDI, portfolio bonds) and short-term (trade credit, bank deposits). Unilateral transfers belong in the current account."}, {"q": "Long-term international capital transactions are defined as transactions with a maturity of:", "o": ["Less than six months", "Exactly one calendar year", "One year or more", "More than ten years"], "a": 2, "s": "Revision", "src": "rev", "x": "The standard threshold is <b>one year or more<\/b>. Transactions maturing in less than one year are classified as short-term capital flows."}, {"q": "Building a factory or plant in a foreign country is an example of what type of investment?", "o": ["Portfolio investment", "Unilateral transfer", "Direct investment", "Accommodating transaction"], "a": 2, "s": "Revision", "src": "rev", "x": "<b>Direct investment<\/b> means acquiring ownership or control of a productive asset abroad, such as building or buying a factory. Portfolio investment (stocks/bonds) involves no direct operational control."}, {"q": "The purchase of foreign stocks and bonds is categorized as:", "o": ["Direct investment", "Portfolio investment", "Merchandise trade", "Official reserve asset"], "a": 1, "s": "Revision", "src": "rev", "x": "Buying foreign stocks and bonds gives the investor a financial claim but no operational control — that is the defining feature of <b>portfolio investment<\/b>, as opposed to direct investment."}, {"q": "Which of the following represents a \"capital inflow\" to a country?", "o": ["An increase in domestic assets held abroad", "An increase in foreign assets in the domestic country", "A reduction in foreign assets inside the country", "An increase in unilateral transfers to foreign entities"], "a": 1, "s": "Revision", "src": "rev", "x": "A <b>capital inflow<\/b> means foreigners are bringing funds into the domestic economy — an increase in foreign-owned assets inside the country. An increase in domestic assets held abroad is an outflow."}, {"q": "When an Egyptian citizen sells a foreign stock, Egypt's assets abroad decrease. This is recorded as a:", "o": ["Capital outflow and entered as a debit (−)", "Capital inflow and entered as a credit (+)", "Service export", "Unilateral transfer"], "a": 1, "s": "Revision", "src": "rev", "x": "Selling a foreign asset brings money <strong>into<\/strong> Egypt (a payment received from abroad), so it is a <strong>capital inflow recorded as a credit (+)<\/strong>."}, {"q": "Capital outflows occur when transactions lead to payments to foreigners, and they are entered as:", "o": ["Credits (+)", "Debits (−)", "Autonomous receipts", "Errors and omissions"], "a": 1, "s": "Revision", "src": "rev", "x": "Capital outflows occur when domestic residents send money to foreigners (e.g., buying foreign assets). Because payment goes out, they are recorded as <b>debits (−)<\/b>, exactly like import payments."}, {"q": "What does the Official Settlement Account measure?", "o": ["Only the trade in tangible commodities and services", "Changes in liquid/non-liquid liabilities to foreign official holders and changes in official reserve assets", "Private household savings and domestic corporate profits", "The total expenditure of the Ministry of Foreign Affairs"], "a": 1, "s": "Revision", "src": "rev", "x": "The Official Settlement Account tracks two things: changes in <b>liabilities to foreign official holders<\/b> (what foreigners' central banks hold in domestic instruments) and changes in the country's own <b>official reserve assets<\/b>."}, {"q": "Liquid liabilities to foreign official holders usually take the form of:", "o": ["Direct investments in foreign manufacturing facilities", "Short-term private trade loans", "Government bonds, treasury bills, and national convertible currency", "Gold deposits inside commercial banks"], "a": 2, "s": "Revision", "src": "rev", "x": "Liquid liabilities are short-term instruments that foreign central banks and governments can quickly call on: <b>government bonds, treasury bills, and convertible national currency<\/b>. Gold deposits in commercial banks are not official reserves."}, {"q": "Which of the following is explicitly listed as part of a country's official reserve assets?", "o": ["Private foreign bank deposits", "Foreign branches of domestic corporations", "Special Drawing Rights (SDRs) and gold reserves", "Domestic corporate stocks"], "a": 2, "s": "Revision", "src": "rev", "x": "<b>SDRs and gold<\/b> are explicitly listed as official reserve assets, alongside reserve position in the IMF and foreign exchange holdings. Private bank deposits abroad are not official reserves."}, {"q": "What are Special Drawing Rights (SDRs)?", "o": ["A type of long-term commercial trade loan", "A new type of reserve asset created on the books of the IMF", "The right of a country to export merchandise tax-free", "A measure of private corporate investments abroad"], "a": 1, "s": "Revision", "src": "rev", "x": "SDRs are a <b>reserve asset created on the IMF's books<\/b> and allocated to member countries. They supplement other reserves and can be exchanged for freely usable currencies between member states."}, {"q": "In the Official Settlement Account, an increase in a country's official reserve assets is recorded as a:", "o": ["Credit (+)", "Debit (−)", "Surplus balance", "Basic balance"], "a": 1, "s": "Revision", "src": "rev", "x": "An increase in reserve assets means the country is <b>spending<\/b> to acquire them (money flows out to obtain gold, foreign exchange, etc.), so it is recorded as a <b>debit (−)<\/b> — a capital outflow of sorts."}, {"q": "Why is the balance of payments always in an accounting equilibrium?", "o": ["Because governments never make tracking errors", "Due to the double-entry bookkeeping system and the inclusion of errors and omissions", "Because international trade is always perfectly balanced", "Because capital outflows are illegal"], "a": 1, "s": "Revision", "src": "rev", "x": "The BOP always balances in an accounting sense because every transaction is recorded twice under <b>double-entry bookkeeping<\/b>, and any unmeasured residual is captured in the \"errors and omissions\" line."}, {"q": "Autonomous transactions (transactions \"above the line\") include:", "o": ["Only the official settlements account", "All transactions in the current and capital accounts", "Only errors and omissions", "Special drawing rights adjustments"], "a": 1, "s": "Revision", "src": "rev", "x": "<b>Autonomous transactions<\/b> are undertaken for independent commercial or financial motives and include everything in the current account and capital account. The official settlements account contains accommodating transactions."}, {"q": "How is the \"Trade Balance\" calculated?", "o": ["National Saving minus Domestic Investment", "Current Account Balance plus Long-Term Capital Balance", "Merchandise exports minus merchandise imports", "Total Credits minus Total Debits in all three major accounts"], "a": 2, "s": "Revision", "src": "rev", "x": "The <b>Trade Balance<\/b> (or merchandise balance) = merchandise exports − merchandise imports. It is narrower than the current account, which also includes services and transfers."}, {"q": "An American citizen buys a Japanese car. This will be recorded in the balance of payments as which transaction?", "o": ["Capital account", "Official reserves account", "Current account", "None of the above"], "a": 2, "s": "Revision", "src": "rev", "x": "Buying a car is trade in a <b>tangible good (merchandise)<\/b>, which falls under the <b>current account<\/b>. The purchase of a foreign car counts as a US merchandise import, recorded as a debit."}, {"q": "If an Egyptian citizen invests in New York, this person is considered ______ in Egypt and ______ in America.", "o": ["Resident, non-resident", "Non-resident, resident", "Resident, resident", "Non-resident, non-resident"], "a": 0, "s": "Revision", "src": "rev", "x": "The citizen's country of citizenship is <b>Egypt<\/b>, so they are a <b>resident<\/b> of Egypt and a <b>non-resident<\/b> in America. Residency follows legal domicile/citizenship, not physical location for individuals."}, {"q": "A British person buys an iPhone, paying by writing a check on an account with a bank in London. How is this accounted for in the balance of payments?", "o": ["Current account, an American good import", "Current account, a British good import", "Capital account, a British asset import", "Current account good import and a capital account asset export"], "a": 1, "s": "Revision", "src": "rev", "x": "From Britain's perspective, buying an iPhone is an <b>import of a British good<\/b> (a good purchased by a UK resident) — recorded in Britain's current account as a merchandise debit. The check drawn on a London bank offsets it as a capital outflow, but the question asks how the purchase itself is classified."}, {"q": "The payment of dividends to a foreigner holding Egyptian equity is recorded as:", "o": ["A credit in the Egyptian current account", "A credit in the Egyptian capital account", "A debit in the Egyptian current account", "A debit in the Egyptian capital account"], "a": 2, "s": "Revision", "src": "rev", "x": "Dividends paid to a foreign investor are a payment to a foreigner — an outflow — recorded as a <b>debit in Egypt's current account<\/b> under investment income (a services/income sub-item)."}, {"q": "Purchase of a UK treasury bill by an Egyptian resident ______ the Egyptian assets abroad and is recorded as a:", "o": ["Decrease; credit", "Increase; debit", "Decrease; debit", "Increase; credit"], "a": 1, "s": "Revision", "src": "rev", "x": "Buying a UK treasury bill is a capital <b>outflow<\/b>: Egypt's assets abroad <b>increase<\/b> and money flows out to pay the UK seller, so it is recorded as a <b>debit (−)<\/b> in the capital account."}, {"q": "Capital inflow can take the form of:", "o": ["An Egyptian resident sells foreign stocks", "A UK resident sells Egyptian stocks", "Both of the above", "None of the above"], "a": 0, "s": "Revision", "src": "rev", "x": "When an Egyptian resident sells foreign stocks, funds flow <em>into<\/em> Egypt (foreigners pay Egypt), so Egypt's foreign assets fall and it receives payment — a <b>capital inflow<\/b>. A UK resident selling Egyptian stocks would be an inflow too, but selling <em>foreign<\/em> stocks by the domestic resident is the direct match here."}, {"q": "Problem: National Saving (NS) = 700 billion and Domestic Investment (I) = 550 billion. Using CA = NS − I, the current account balance is:", "o": ["+150 billion — a Current Account Surplus", "−150 billion — a Current Account Deficit", "+250 billion — a Current Account Surplus", "Zero — the account is balanced"], "a": 0, "s": "Revision", "src": "rev", "x": "CA = NS − I = 700 − 550 = <strong>+150<\/strong>. Saving exceeds investment, so the country lends abroad → a <strong>surplus<\/strong>."}, {"q": "Problem: National Income (Y) = 1,500 billion and National Expenditure (E) = 1,700 billion. Using CA = Y − E, the current account balance is:", "o": ["+200 billion — a Current Account Surplus", "−200 billion — a Current Account Deficit", "−200 billion — a Current Account Surplus", "+200 billion — a Current Account Deficit"], "a": 1, "s": "Revision", "src": "rev", "x": "CA = Y − E = 1,500 − 1,700 = <strong>−200<\/strong>. Spending exceeds income → a <strong>deficit<\/strong> that must be financed from abroad."}, {"q": "The main purpose of the BOP is to eliminate all domestic taxes.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The BOP's purpose is to record and summarize international economic transactions and inform government policy — it has nothing to do with eliminating domestic taxes."}, {"q": "Economic transactions in the BOP include gifts and certain other transactions for which no payment is required.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. The BOP's definition of \"economic transactions\" is broad enough to include gifts, aid, and grants — one-way transfers where no payment is required from the recipient."}, {"q": "Foreign branches and subsidiaries of a corporation are legally considered residents of the country where the parent company is incorporated.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Foreign branches and subsidiaries are considered residents of the <b>country where they operate<\/b>, not where the parent is incorporated. Only the parent company itself is a resident of its own country."}, {"q": "Diplomats and military personnel are considered residents of the country in which they hold citizenship.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Diplomats and military personnel are treated as residents of their <b>home (citizenship) country<\/b> regardless of where they are stationed, because their presence abroad is official and temporary."}, {"q": "A credit transaction is one that results in making a payment to foreigners.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. A credit results in <em>receiving<\/em> payment from foreigners, not making a payment. Making a payment to foreigners is a <b>debit<\/b>."}, {"q": "Remittances of workers abroad and costs of diplomatic missions are classified under \"services\" in the current account.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Workers' remittances sent home and costs of running diplomatic missions abroad are classified as current transfers/services in the current account."}, {"q": "Unilateral transfers refer strictly to long-term commercial loans between private banks.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Unilateral transfers are one-way flows (gifts, aid, remittances) with no quid pro quo. Long-term commercial loans between private banks are capital account transactions, not unilateral transfers."}, {"q": "The import of goods and services is entered in the current account as a credit (+).", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Imports require payment to foreigners — a debit (−). Exports, not imports, are recorded as credits (+) because they bring in foreign payments."}, {"q": "Long-term international capital transactions refer to transactions with a maturity of less than six months.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Long-term capital transactions are those with a maturity of <b>one year or more<\/b>. Transactions maturing in less than one year are short-term capital."}, {"q": "Portfolio investments include direct actions like building a foreign plant or factory.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Building a factory abroad is <b>direct investment<\/b>, not portfolio investment. Portfolio investment covers the purchase of foreign stocks and bonds without acquiring operational control."}, {"q": "When a foreigner purchases an Egyptian stock, it represents a capital inflow to Egypt and is recorded as a credit (+).", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. A foreigner buying Egyptian stock brings money into Egypt — a capital inflow. Inflows are credits (+) because they represent receipts of payment from foreigners."}, {"q": "Capital outflows can take the form of an increase in the country's assets abroad.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. When domestic residents buy assets abroad (e.g., foreign stocks or property), the country's assets abroad increase — money flows out — making it a capital outflow."}, {"q": "Non-liquid liabilities to foreign official holders refer mainly to short-term and long-term loans received from foreign monetary authorities.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Non-liquid liabilities to foreign official holders are mainly medium- and long-term loans received from foreign monetary authorities or central banks, which cannot be quickly liquidated."}, {"q": "An increase in a country's liabilities to foreign official holders is recorded as a debit (−).", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. An increase in liabilities to foreign official holders means foreigners are holding more of the country's instruments — money has flowed <em>in<\/em> — so it is recorded as a <b>credit (+)<\/b>, not a debit."}, {"q": "Special Drawing Rights (SDRs) are distributed to IMF member countries in accordance with their geographical size.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. SDRs are allocated to IMF member countries in proportion to their <b>IMF quota<\/b> (broadly reflecting economic size and trade share), not their geographical size."}, {"q": "Under double-entry bookkeeping, each international economic transaction is recorded twice: once as a credit and once as a debit of an equal amount.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Double-entry bookkeeping records every transaction twice: once as a credit (the receipt side) and once as a debit (the payment side) of equal value, ensuring the accounts always sum to zero."}, {"q": "Accommodating transactions (transactions \"below the line\") form the official settlements accounts.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Accommodating transactions are those undertaken specifically to finance imbalances in the autonomous accounts — they constitute the Official Settlements Account, the \"below the line\" entries."}, {"q": "The balance of payments will be in economic equilibrium if total credits equal total debits across all three accounts, including official settlements.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The BOP is always in <b>accounting<\/b> equilibrium (credits = debits) due to double-entry bookkeeping. <em>Economic<\/em> equilibrium is a different concept — it requires the autonomous accounts (current + capital) to balance without official settlements."}, {"q": "The \"Basic Balance\" includes the current account balance and the long-term capital balance.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. The Basic Balance = Current Account Balance + Long-Term Capital Balance. It excludes short-term capital and official settlements, focusing on more stable long-run flows."}, {"q": "If national saving (NS) is less than domestic investment (I), there will be a current account surplus.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. If NS < I, the country invests more than it saves domestically, financing the gap by borrowing abroad — which is a <b>current account deficit<\/b> (CA = NS − I < 0), not a surplus."}, {"q": "When capital transactions lead to the receipt of payments from foreigners, they are capital inflows and entered as a debit (−).", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Capital inflows (receipts from foreigners) are recorded as <b>credits (+)<\/b>, not debits. Debits record payments <em>to<\/em> foreigners (outflows)."}, {"q": "Surplus means that the balance on a subaccount is positive.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. A surplus on any BOP sub-account simply means total credits exceed total debits on that account, yielding a positive (surplus) balance."}, {"q": "\"Service\" is the trade in tangible goods.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. \"Service\" refers to <b>intangible<\/b> transactions such as tourism, insurance, and transport. Trade in tangible goods is classified as <b>merchandise<\/b>."}, {"q": "International institutions such as the United Nations, the IMF and the World Bank are residents of the country in which they are located.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. International institutions such as the UN, IMF, and World Bank enjoy extraterritorial status and are <b>not<\/b> considered residents of their host country for BOP purposes."}, {"q": "The capital account is the sum of the balance of trade.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The Balance of Trade (trade balance) is the sum of merchandise exports minus imports and belongs to the <b>current account<\/b>. The capital account records investment and loan flows, not goods trade."}, {"q": "Microsoft Corporation made an investment in Egypt of $2 billion. This is considered:", "o": ["Portfolio investment in the basic balance", "Short-term capital in the capital account balance", "Foreign Direct Investment (FDI) in the capital account balance", "Trade of goods in the current account balance"], "a": 2, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "Microsoft's $2 billion investment in Egypt involves acquiring or establishing a productive asset — a classic <b>Foreign Direct Investment (FDI)<\/b>, recorded in the capital account. Portfolio investment involves only financial securities without operational control."}, {"q": "The US received donations of $1 million for corona-virus casualties. This transaction is recorded in:", "o": ["The capital account as inflows", "Unilateral transfers inflows", "The current account as outflows", "Trade balance inflows"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "Donations received from abroad are one-way transfers with no payment required in return — they are <b>unilateral transfer inflows<\/b> in the current account. They are not capital account items because no asset or liability is created."}, {"q": "Importing more than exporting is a:", "o": ["trade surplus", "trade deficit", "balance of trade", "balance of payments"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "Importing more than exporting means the value of imports exceeds exports, producing a <b>trade deficit<\/b> (negative trade balance). A surplus is the opposite; balance of payments is the broader overall account."}, {"q": "Problem: National Income (Y) = 500m, National Expenditure (E) = 550m, National Saving (NS) = 80m, Domestic Investment (I) = 130m. The Current Account balance (CA = Y−E = NS−I) is:", "o": ["−50m — a Current Account Deficit", "+50m — a Current Account Surplus", "−210m — a Current Account Deficit", "Zero — balanced"], "a": 0, "s": "Revision", "src": "rev", "x": "CA = Y − E = 500 − 550 = <strong>−50<\/strong> (the same as NS − I = 80 − 130 = −50). A negative balance is a <strong>deficit<\/strong> — the country spends/invests more than it earns/saves."}, {"q": "Problem: With Y=500m, E=550m, NS=80m, I=130m (CA = −50m), the required Net Foreign Investment (IF) to finance the deficit is:", "o": ["50 million (the country needs external financing of the same value)", "−630 million", "130 million", "Zero — no financing needed"], "a": 0, "s": "Revision", "src": "rev", "x": "Net Foreign Investment equals the current-account balance, so a deficit of 50 must be financed by <strong>50 of external borrowing/investment<\/strong> (IF = −50)."}, {"q": "An international transaction is the exchange of a good, service or asset between residents of the same nation.", "o": ["True", "False"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "False. An international transaction is an exchange between residents of <b>different<\/b> nations. Transactions between residents of the same country are domestic, not international."}, {"q": "The financial (capital) account in the BOP measures international capital flows in the short run only.", "o": ["True", "False"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "False. The capital (financial) account measures both <b>short-term and long-term<\/b> international capital flows — portfolio investment, FDI, loans, and bank deposits of varying maturities."}, {"q": "An increase in Foreign Investments in Egypt represents a credit in its balance of payments.", "o": ["True", "False"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "True. Foreign investment entering Egypt means foreigners are bringing funds in — a receipt of payment from foreigners — which is recorded as a <b>credit (+)<\/b> in Egypt's BOP."}, {"q": "A country's balance of payments is said to be in equilibrium when its credits are more than its debits.", "o": ["True", "False"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "False. BOP equilibrium means total credits <b>equal<\/b> total debits (balance = zero), not that credits exceed debits. Credits exceeding debits would indicate a surplus, not equilibrium."}, {"q": "The balance of payments helps in determining the influence of foreign trade and transactions on the level of national income of a country.", "o": ["True", "False"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "True. By recording all external trade and financial flows, the BOP shows how foreign transactions affect aggregate demand, national income, and the overall economic position of the country."}, {"q": "When a country's balance of payments runs a current account deficit, it consumes more at home than is produced there.", "o": ["True", "False"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "True. A current account deficit (CA = Y − E < 0) means national expenditure exceeds national income, so the country is consuming more than it produces domestically, with the difference financed by foreign borrowing or asset sales."}, {"q": "Debit transactions in the BOP have a positive sign and indicate that domestic residents receive payment from the rest of the world.", "o": ["True", "False"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "False. Debit transactions carry a <b>negative (−) sign<\/b> and represent payments <em>to<\/em> foreigners (money flowing out). Credits, not debits, have a positive sign and reflect receipts from the rest of the world."}]}]</script>

function isRev(q){return q.src==="rev";}
function isGen(q){return q.src==="gen";}
var SRCMETA={exam:{lbl:"📚 Past Exams"},rev:{lbl:"📝 Revision"},tb:{lbl:"📋 Test Bank"},gen:{lbl:"✦ Expected"}};
var SRCORDER=["exam","rev","tb","gen"];
function allQ(){var a=[];for(var i=0;i<CH.length;i++){for(var j=0;j<CH[i].Q.length;j++){a.push(CH[i].Q[j]);}}return a;}
function chOf(q){return CH[q._ci];}
function qcolor(q){return CH[q._ci].c;}
function qlabel(q){return CH[q._ci].l;}

function sh2(a){
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  for(var i=0;i<a.length-1;i++){var j=i+1+Math.floor(Math.random()*(a.length-i-1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function gc(){
  if(view==="final") return FINAL;
  if(view==="past")  return PAST;
  if(view==="mix")   return MIX;
  return CH[ci];
}

function getPool(){
  if(view==="past") return allQ().filter(isExam);
  if(view==="mix") return allQ();
  var base = CH[ci].Q;
  if(srcFilter==="all") return base;
  return base.filter(function(q){return q.src===srcFilter;});
}

/* ---------- init ---------- */
function init(){
  // tag each question with its chapter index
  for(var i=0;i<CH.length;i++){for(var j=0;j<CH[i].Q.length;j++){CH[i].Q[j]._ci=i;}}

  var hm="",hi="";
  for(var i=0;i<CH.length;i++){
    var b='<button class="tab" id="tab'+i+'" onclick="sc('+i+')">'+CH[i].l+'</button>';
    if(CH[i].grp==="mb") hm+=b; else hi+=b;
  }
  document.getElementById("tabs-mb").innerHTML=hm;
  document.getElementById("tabs-it").innerHTML=hi;
  document.getElementById("tabs-mix").innerHTML=
     '<button class="tab" id="tabmix"   onclick="smix()">All Chapters</button>'
   + '<button class="tab" id="tabfinal" onclick="sfinal()">📝 Final Exam</button>'
   + '<button class="tab" id="tabpast"  onclick="spast()">📚 Past Exams</button>';

  var ex=allQ().filter(isExam).length, rev=allQ().filter(isRev).length, tb=allQ().filter(isTB).length, gn=allQ().filter(isGen).length;
  document.getElementById("banner").innerHTML=
    '<b>Final exam:</b> 50 questions — 25 Money &amp; Banking + 25 International Trade (equal weight). '
    +'This guide has <b>'+allQ().length+'</b> questions ('+ex+' from real past exams, '+rev+' from the exam-revision booklet, '+tb+' test-bank, '+gn+' expected).';

  sc(0);
}

function clearTabs(){
  for(var i=0;i<CH.length;i++){var e=document.getElementById("tab"+i);e.className="tab";e.style.background="";}
  ["tabmix","tabfinal","tabpast"].forEach(function(id){var e=document.getElementById(id);e.className="tab";e.style.background="";});
}

function sc(i){
  view="ch"; srcFilter="all"; ci=i;
  clearTabs();
  var e=document.getElementById("tab"+i);e.className="tab ac";e.style.background=CH[i].c;
  document.getElementById("ct").textContent=CH[i].t;
  var cd=document.getElementById("cdesc");
  cd.textContent=CH[i].d||"";
  cd.className=CH[i].d?"cdesc":"cdesc hide";
  document.getElementById("mbar").className="mbar";
  buildMbar();
  sm("s");
}

function smix(){ startMode("mix","tabmix"); }
function sfinal(){ startMode("final","tabfinal"); }
function spast(){ startMode("past","tabpast"); }

function startMode(v,tabid){
  view=v; srcFilter="all"; md="q";
  clearTabs();
  var e=document.getElementById(tabid);e.className="tab ac";e.style.background=gc().c;
  document.getElementById("ct").innerHTML=gc().t;
  document.getElementById("cdesc").className="cdesc hide";
  document.getElementById("mbar").className="mbar hide";
  document.getElementById("tifbar").className="tifbar hide";
  document.getElementById("sp").innerHTML="";
  document.getElementById("sp").className="hide";
  document.getElementById("qp").className="";
  if(v==="final"){ renderStart("Start the 50-question final exam. 25 Money &amp; Banking + 25 International Trade, shuffled. The Money &amp; Banking half is weighted toward the test bank.","Start Final Exam (50 Q)",sfinalstart); }
  else if(v==="past"){ buildSz(); }
  else { buildSz(); }
}

/* ---------- mode bar (notes/quiz) ---------- */
function buildMbar(){
  document.getElementById("mbar").innerHTML=
     '<button class="mbtn" id="mb-s" onclick="sm(\'s\')">📖 Study Notes</button>'
   + '<button class="mbtn" id="mb-q" onclick="sm(\'q\')">✍️ Quiz</button>';
}

function sm(m){
  md=m;
  var s=document.getElementById("mb-s"), q=document.getElementById("mb-q");
  if(s){ s.className="mbtn"+(m==="s"?" ac":""); q.className="mbtn"+(m==="q"?" ac":"");
    if(m==="s"){s.style.background=CH[ci].c;q.style.background="";}
    else{q.style.background=CH[ci].c;s.style.background="";} }
  if(m==="s"){
    document.getElementById("tifbar").className="tifbar hide";
    document.getElementById("szbar").className="szbar hide";
    document.getElementById("qp").className="hide";
    document.getElementById("sp").className="";
    renderNotes();
  }else{
    document.getElementById("sp").className="hide";
    document.getElementById("qp").className="";
    buildTif();
    buildSz();
  }
}

/* ---------- source filter (per-chapter M&B only) ---------- */
function buildTif(){
  var bar=document.getElementById("tifbar");
  if(view!=="ch"){ bar.className="tifbar hide"; return; }
  var base=CH[ci].Q;
  var counts={}; for(var i=0;i<base.length;i++){counts[base[i].src]=(counts[base[i].src]||0)+1;}
  var present=SRCORDER.filter(function(s){return counts[s];});
  if(present.length<2){ bar.className="tifbar hide"; return; }
  var html='<span class="tiflabel">Source</span>'
    +'<button class="tifbtn" id="tf-all" onclick="sfil(\'all\')">All ('+base.length+')</button>';
  for(var k=0;k<present.length;k++){ var s=present[k];
    html+='<button class="tifbtn" id="tf-'+s+'" onclick="sfil(\''+s+'\')">'+SRCMETA[s].lbl+' ('+counts[s]+')</button>'; }
  bar.className="tifbar"; bar.innerHTML=html; markFil();
}
function sfil(f){ srcFilter=f; markFil(); buildSz(); }
function markFil(){
  ["all"].concat(SRCORDER).forEach(function(f){var e=document.getElementById("tf-"+f);if(e)e.className="tifbtn"+(srcFilter===f?" ac":"");});
}

/* ---------- size selector ---------- */
function buildSz(){
  var bar=document.getElementById("szbar"); bar.className="szbar";
  var pool=getPool(); var n=pool.length;
  var tiers = view==="mix" ? [25,50] : (view==="past" ? [25,50] : [15,25]);
  var html="";
  for(var k=0;k<tiers.length;k++){ if(tiers[k]<n) html+='<button class="sbtn" onclick="ssz('+tiers[k]+',this)">'+tiers[k]+'</button>'; }
  html+='<button class="sbtn" onclick="ssz('+n+',this)">All '+n+'</button>';
  bar.innerHTML=html;
  // auto-select a sensible default
  var def = view==="mix"||view==="past" ? Math.min(25,n) : Math.min(15,n);
  qsz=def; sq();
  // highlight the matching button
  var btns=bar.querySelectorAll(".sbtn");
  for(var b=0;b<btns.length;b++){ if(parseInt(btns[b].textContent.replace(/\D/g,''),10)===def){btns[b].className="sbtn ac";btns[b].style.background=gc().c;} }
}
function ssz(nq,el){
  qsz=nq;
  var bar=document.getElementById("szbar");
  var btns=bar.querySelectorAll(".sbtn");
  for(var b=0;b<btns.length;b++){btns[b].className="sbtn";btns[b].style.background="";}
  if(el){el.className="sbtn ac";el.style.background=gc().c;}
  sq();
}

/* ---------- quiz build ---------- */
function sq(){
  var pool=getPool().slice();
  sh2(pool);
  var list=pool.slice(0,qsz);
  QS={l:list,i:0,s:-1,sc:0,an:0,d:false,mx:[],mode:view};
  rq();
}

function sfinalstart(){
  var mb=allQ().filter(function(q){return CH[q._ci].grp==="mb";});
  var it=allQ().filter(function(q){return CH[q._ci].grp==="it";});
  // Money & Banking half is weighted toward the Mishkin test bank (the bulk of
  // real practice questions). International Trade has no separate test bank, so
  // its half is drawn from the revision booklet + past exams.
  var mbTb=mb.filter(isTB), mbOther=mb.filter(function(q){return !isTB(q);});
  sh2(mbTb); sh2(mbOther); sh2(it);
  var TB_TARGET=20;                                  // ~80% of the M&B half
  var mbPick=mbTb.slice(0, Math.min(TB_TARGET, mbTb.length));
  mbPick=mbPick.concat(mbOther.slice(0, 25-mbPick.length));   // top up with exam/revision
  if(mbPick.length<25) mbPick=mbPick.concat(mbTb.slice(mbPick.length));
  mbPick=mbPick.slice(0,25);
  var itPick=it.slice(0,25);
  var pick=mbPick.concat(itPick);
  sh2(pick);
  QS={l:pick,i:0,s:-1,sc:0,an:0,d:false,mx:[],mode:"final",mbCount:mbPick.length,itCount:itPick.length};
  document.getElementById("szbar").className="szbar hide";
  rq();
}

function renderStart(msg,btn,fn){
  document.getElementById("szbar").className="szbar hide";
  window._startfn=fn;
  document.getElementById("qp").innerHTML='<div class="startwrap"><p>'+msg+'</p><button class="start" style="background:'+gc().c+'" onclick="_startfn()">'+btn+'</button></div>';
}

/* ---------- render question ---------- */
function rq(){
  var qp=document.getElementById("qp");
  if(QS.d){ renderResults(); return; }
  var q=QS.l[QS.i];
  var showChip = (QS.mode==="mix"||QS.mode==="final"||QS.mode==="past");
  var pct=Math.round(QS.i/QS.l.length*100);
  var h='<div class="pbar"><i style="width:'+pct+'%;background:'+gc().c+'"></i></div>';
  h+='<div class="qcard">';
  h+='<div class="qmeta">';
  if(showChip) h+='<span class="qchip" style="background:'+qcolor(q)+'">'+qlabel(q)+'</span>';
  h+='<span class="qsrc '+esc(q.src)+'">'+esc(q.s)+'</span>';
  if(q.tf) h+='<span class="qtf">True / False</span>';
  h+='<span class="qprog">'+(QS.i+1)+' / '+QS.l.length+'</span>';
  h+='</div>';
  h+='<div class="qtxt">'+esc(q.q)+'</div>';
  h+='<div class="ops'+(q.tf?' tf':'')+'" id="ops">';
  var L=["A","B","C","D","E"];
  for(var i=0;i<q.o.length;i++){
    var dly=(i*0.05).toFixed(2);
    h+='<button class="op" style="animation-delay:'+dly+'s" onclick="pk('+i+')">'
      +(q.tf?'':'<span class="lt">'+L[i]+'</span>')+'<span>'+esc(q.o[i])+'</span></button>';
  }
  h+='</div></div>';
  qp.innerHTML=h;
}

function pk(i){
  if(QS.s!==-1) return;
  QS.s=i; QS.an++;
  var q=QS.l[QS.i];
  var ops=document.getElementById("ops").children;
  for(var k=0;k<ops.length;k++){ ops[k].style.animationDelay="0s"; ops[k].className="op lk"; }
  ops[q.a].className="op lk ok";
  if(i===q.a){ QS.sc++; }
  else{ ops[i].className="op lk no"; QS.mx.push({q:q,pi:i}); }
  if(q.x){
    var ex=document.createElement("div");
    ex.className="expl"; ex.innerHTML="<b>Why &middot;</b> "+q.x;
    document.getElementById("ops").parentNode.appendChild(ex);
  }
  var last=(QS.i>=QS.l.length-1);
  var btn=document.createElement("button");
  btn.className="nxt"; btn.style.background=gc().c;
  btn.textContent=last?"See Results":"Next Question →";
  btn.onclick=nx;
  document.getElementById("ops").parentNode.appendChild(btn);
}

function nx(){
  if(QS.i>=QS.l.length-1){ QS.d=true; rq(); return; }
  QS.i++; QS.s=-1; rq();
}

/* ---------- results ---------- */
function renderResults(){
  var pct=QS.l.length?Math.round(QS.sc/QS.l.length*100):0;
  var em = pct>=85?"🏆":pct>=70?"🎉":pct>=50?"👍":"📚";
  var h='<div class="res"><div class="em">'+em+'</div>';
  h+='<div class="sc">'+QS.sc+' / '+QS.l.length+'</div>';
  h+='<div class="sl">'+pct+'% correct</div>';
  if(QS.mode==="final"){ h+='<div class="bd">'+QS.mbCount+' Money &amp; Banking + '+QS.itCount+' International Trade</div>'; }
  var restart = QS.mode==="final" ? "sfinalstart()" : (QS.mode==="past"||QS.mode==="mix" ? "buildSz()" : "sq()");
  h+='<button class="rb" style="background:'+gc().c+'" onclick="'+restart+'">↻ Try Again</button></div>';
  if(QS.mx.length){
    h+='<div class="mx-hd">Review your '+QS.mx.length+' mistake'+(QS.mx.length>1?"s":"")+'</div>';
    var L=["A","B","C","D","E"];
    for(var m=0;m<QS.mx.length;m++){
      var q=QS.mx[m].q, pi=QS.mx[m].pi;
      h+='<div class="mx-card">';
      h+='<div class="mx-q">'+(QS.mode==="mix"||QS.mode==="final"||QS.mode==="past"?'<span class="qchip" style="background:'+qcolor(q)+'">'+qlabel(q)+'</span> ':'')+esc(q.q)+'</div>';
      h+='<div class="mx-op no">Your answer: '+L[pi]+') '+esc(q.o[pi])+'</div>';
      h+='<div class="mx-op ok">Correct: '+L[q.a]+') '+esc(q.o[q.a])+'</div>';
      if(q.x) h+='<div class="mx-expl"><b>Why:</b> '+q.x+'</div>';
      h+='<div class="mx-src">'+esc(q.s)+'</div>';
      h+='</div>';
    }
  }
  document.getElementById("qp").innerHTML=h;
}

/* ---------- study notes ---------- */
function renderNotes(){
  var c=CH[ci]; var h="";
  if(!c.S||!c.S.length){ h='<div class="cdesc">No study notes for this chapter yet.</div>'; document.getElementById("sp").innerHTML=h; return; }
  for(var i=0;i<c.S.length;i++){
    h+='<div class="sec">';
    h+='<button class="sec-h" onclick="ta(this)"><span>'+esc(c.S[i].h)+'</span><span class="ar">▸</span></button>';
    h+='<div class="sec-b">';
    for(var j=0;j<c.S[i].p.length;j++){ h+='<div class="pt">'+c.S[i].p[j]+'</div>'; }
    h+='</div></div>';
  }
  document.getElementById("sp").innerHTML=h;
}
function ta(b){
  b.classList.toggle("op");
  var body=b.nextElementSibling;
  body.className="sec-b"+(body.className.indexOf("sh")<0?" sh":"");
}

(function boot(){
  try { CH = B(); init(); }
  catch(e){
    var b=document.getElementById("banner");
    if(b){ b.className="exam-banner"; b.innerHTML="⚠️ Could not load the guide: "+((e&&e.message)?e.message:e)+"<br>Try opening the file in <b>Safari</b> or <b>Chrome</b> (a file-preview window may block JavaScript)."; }
  }
})();
</script>
</body>
