es include", "o": ["deposits at the central bank.", "deposits at other large banks.", "short-term Treasury securities.", "consumer loans."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Secondary reserves are short-term, highly liquid assets held as a buffer. <b>Short-term Treasury securities<\/b> fit this role because they can be quickly sold. Central bank deposits are primary reserves, not secondary."}, {"q": "Because of their ______ liquidity, ______ U.S. government securities are called secondary reserves.", "o": ["low; short-term", "low; long-term", "high; short-term", "high; long-term"], "a": 2, "s": "Test Bank", "src": "tb", "x": "Short-term government securities are called secondary reserves precisely because of their <b>high liquidity<\/b> — they can be sold rapidly. Long-term securities carry more price risk and are less liquid."}, {"q": "Banks make their profits primarily by issuing", "o": ["equity.", "negotiable CDs.", "loans.", "NOW accounts."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Loans earn interest income, which is the main revenue stream for banks. Issuing equity, CDs, or NOW accounts are ways to <b>raise<\/b> funds, not earn profits directly."}, {"q": "The most important category of assets on a bank's balance sheet is", "o": ["discount loans.", "securities.", "loans.", "cash items in the process of collection."], "a": 2, "s": "Test Bank", "src": "tb", "x": "<b>Loans<\/b> typically constitute over half of bank assets and generate the most interest income. Securities are also significant but secondary; cash and discount loans are much smaller categories."}, {"q": "Which of the following are bank assets?", "o": ["the building owned by the bank", "a discount loan", "a negotiable CD", "a customer's checking account"], "a": 0, "s": "Test Bank", "src": "tb", "x": "The bank's own <b>building<\/b> is physical property the bank owns — an asset. Discount loans are liabilities (borrowed funds); negotiable CDs and customer checking accounts are liabilities owed to others."}, {"q": "Bank capital is equal to ______ minus ______.", "o": ["total assets; total liabilities", "total liabilities; total assets", "total assets; total reserves", "total liabilities; total borrowings"], "a": 0, "s": "Test Bank", "src": "tb", "x": "Bank capital = <b>total assets minus total liabilities<\/b>; it is the owners' residual claim after all debts are paid, analogous to net worth in any balance sheet."}, {"q": "Bank capital is listed on the ______ side of the bank's balance sheet because it represents a ______ of funds.", "o": ["liability; use", "liability; source", "asset; use", "asset; source"], "a": 1, "s": "Test Bank", "src": "tb", "x": "Bank capital sits on the <b>liability side<\/b> because it represents funds <b>provided by<\/b> (sourced from) shareholders — a claim on the bank's assets, just like depositor claims."}, {"q": "Bank loans from the central bank are called ______ and represent a ______ of funds.", "o": ["discount loans; use", "discount loans; source", "fed funds; use", "fed funds; source"], "a": 1, "s": "Test Bank", "src": "tb", "x": "When a bank borrows from the central bank it receives cash (increases assets) but also incurs an obligation to repay — a <b>source<\/b> of funds recorded as a liability called a <b>discount loan<\/b>."}, {"q": "When a new depositor opens a checking account at the bank, the bank's assets ______ and its liabilities ______.", "o": ["increase; increase", "increase; decrease", "decrease; increase", "decrease; decrease"], "a": 0, "s": "Test Bank", "src": "tb", "x": "The deposit adds cash to the bank's reserves (<b>asset rises<\/b>) while simultaneously creating an obligation to the depositor (<b>liability rises<\/b>), keeping the balance sheet balanced."}, {"q": "When you deposit a $50 bill in a bank,", "o": ["its liabilities decrease by $50.", "its assets increase by $50.", "its reserves decrease by $50.", "its cash items in the process of collection increase by $50."], "a": 1, "s": "Test Bank", "src": "tb", "x": "The $50 bill becomes part of the bank's vault cash, increasing <b>assets by $50<\/b>. Simultaneously, the bank's liabilities rise $50 (the deposit owed), keeping the balance sheet in balance."}, {"q": "When you deposit $50 in currency at Old National Bank,", "o": ["its assets increase by less than $50 because of reserve requirements.", "its reserves increase by less than $50 because of reserve requirements.", "its liabilities increase by $50.", "its liabilities decrease by $50."], "a": 2, "s": "Test Bank", "src": "tb", "x": "The bank now owes $50 to the depositor, so <b>liabilities rise by $50<\/b>. The full $50 also enters reserves as an asset; reserve requirements only affect how reserves are allocated, not the total deposit amount."}, {"q": "When a $10 check written on the First National Bank of Chicago is deposited in an account at Citibank, then", "o": ["the liabilities of the First National Bank increase by $10.", "the reserves of the First National Bank increase by $10.", "the liabilities of Citibank increase by $10.", "the assets of Citibank fall by $10."], "a": 2, "s": "Exam 2022", "src": "exam", "x": "Citibank credits the depositor's account for $10, creating a new $10 obligation — a <b>liability increase<\/b>. First National's reserves fall and its liabilities (deposits) decrease, but Citibank's liabilities rise."}, {"q": "When $1 million is deposited at a bank, the required reserve ratio is 20 percent, and the bank chooses not to hold any excess reserves but makes loans instead, then in the bank's final balance sheet,", "o": ["the assets at the bank increase by $800,000.", "the liabilities of the bank increase by $1,000,000.", "the liabilities of the bank increase by $800,000.", "reserves increase by $160,000."], "a": 1, "s": "Exam 2022", "src": "exam", "x": "The $1 million deposit always <b>increases the bank's liabilities by $1,000,000<\/b> regardless of reserve requirements. The bank lends $800,000 and keeps $200,000 in required reserves, but the deposit liability stays at $1 million."}, {"q": "With a 10% reserve requirement ratio, a $100 deposit into New Bank means that the maximum amount New Bank could lend is", "o": ["$90.", "$100.", "$10.", "$110."], "a": 0, "s": "Exam 2022", "src": "exam", "x": "Required reserves = 10% × $100 = $10. The bank can lend the rest: $100 − $10 = <strong>$90<\/strong>."}, {"q": "With a 12% reserve requirement ratio, a $200 deposit into New Bank means that the maximum amount New Bank could lend is", "o": ["$176.", "$200.", "$24.", "$224."], "a": 0, "s": "Exam 2023", "src": "exam", "x": "Required reserves = 12% × $200 = $24. Maximum lending = $200 − $24 = <strong>$176<\/strong>."}, {"q": "A $5 million deposit outflow from a bank has the immediate effect of", "o": ["reducing deposits and reserves by $5 million.", "reducing deposits and loans by $5 million.", "reducing deposits and securities by $5 million.", "reducing deposits and capital by $5 million."], "a": 0, "s": "Exam 2022", "src": "exam", "x": "When deposits leave the bank, the bank pays out cash from its vault or central-bank account, so <b>both deposits (liability) and reserves (asset)<\/b> fall by $5 million simultaneously."}, {"q": "If a bank has excess reserves greater than the amount of a deposit outflow, the outflow will result in equal reductions in", "o": ["deposits and reserves.", "deposits and loans.", "capital and reserves.", "capital and loans."], "a": 0, "s": "Test Bank", "src": "tb", "x": "With excess reserves to spare, a deposit outflow simply draws down the reserve cushion without touching loans or capital — <b>deposits and reserves<\/b> fall by equal amounts."}, {"q": "If, after a deposit outflow, a bank needs an additional $3 million to meet its reserve requirements, the bank can", "o": ["reduce deposits by $3 million.", "increase loans by $3 million.", "sell $3 million of securities.", "repay its discount loans from the central bank."], "a": 2, "s": "Exam 2022", "src": "exam", "x": "<b>Selling securities<\/b> converts an asset into reserves immediately, restoring the reserve requirement without involving customers. Reducing deposits or repaying discount loans would shrink liabilities, not raise reserves."}, {"q": "Of the following, which would be the first choice for a bank facing a reserve deficiency?", "o": ["Call in loans", "Borrow from the central bank", "Sell securities", "Borrow from other banks"], "a": 3, "s": "Exam 2022", "src": "exam", "x": "<b>Borrowing federal funds<\/b> from other banks is typically fastest and cheapest. Calling in loans damages customer relationships; central bank borrowing carries stigma; selling securities takes more time."}, {"q": "A bank with insufficient reserves can increase its reserves by", "o": ["lending federal funds.", "calling in loans.", "buying short-term Treasury securities.", "buying municipal bonds."], "a": 1, "s": "Test Bank", "src": "tb", "x": "<b>Calling in loans<\/b> — demanding repayment — converts loan assets into reserve cash, directly raising reserve balances. Lending fed funds or buying securities would reduce reserves further."}, {"q": "Bankers' concerns regarding the optimal mix of excess reserves, secondary reserves, and borrowings to deal with deposit outflows is an example of", "o": ["liability management.", "liquidity management.", "managing interest rate risk.", "managing credit risk."], "a": 1, "s": "Test Bank", "src": "tb", "x": "Deciding how much to hold in excess reserves, secondary reserves, and borrowed funds to handle unexpected withdrawals is the core of <b>liquidity management<\/b> — ensuring the bank can meet cash demands."}, {"q": "Which of the following statements most accurately describes the task of bank asset management?", "o": ["Banks seek the highest returns possible subject to minimizing risk and making adequate provisions for liquidity.", "Banks seek the highest liquidity possible subject to earning a positive rate of return.", "Banks seek to prevent bank failure at all cost.", "Banks seek to acquire funds in the least costly way."], "a": 0, "s": "Exam 2022", "src": "exam", "x": "Asset management means seeking <b>the highest possible return while keeping risk acceptable and maintaining enough liquidity<\/b> to meet obligations. Pure return-maximisation or pure liquidity would be incomplete goals."}, {"q": "The goals of bank asset management include", "o": ["maximizing risk.", "minimizing liquidity.", "lending at high interest rates regardless of risk.", "purchasing securities with high returns and low risk."], "a": 3, "s": "Test Bank", "src": "tb", "x": "Asset management targets both yield and safety: banks want <b>high returns with low risk<\/b>. Maximising risk or ignoring liquidity would undermine solvency."}, {"q": "A bank failure occurs whenever", "o": ["a bank cannot satisfy its obligations to pay its depositors and meet its reserve requirements.", "a bank suffers a large deposit outflow.", "a bank has to call in a large volume of loans.", "a bank is not allowed to borrow from the central bank."], "a": 0, "s": "Exam 2022", "src": "exam", "x": "Bank failure is specifically triggered when a bank <b>cannot meet obligations to depositors and reserve requirements<\/b> — i.e., it runs out of liquid funds to pay what it owes."}, {"q": "A bank is insolvent when", "o": ["its liabilities exceed its assets.", "its assets exceed its liabilities.", "its capital exceeds its liabilities.", "its assets increase in value."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Insolvency means <b>liabilities exceed assets<\/b>, so equity (capital) is negative — the bank owes more than it owns. When assets exceed liabilities, capital is positive and the bank is solvent."}, {"q": "Holding large amounts of bank capital helps prevent bank failures because", "o": ["it means the bank has a higher income.", "it makes loans easier to sell.", "it can be used to absorb the losses resulting from bad loans.", "it makes it easier to call in loans."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Capital acts as a <b>buffer<\/b>: loan losses reduce asset values, but as long as capital is large enough to absorb those losses, liabilities can still be met and the bank stays solvent."}, {"q": "Bank capital has both benefits and costs for the bank owners. Higher bank capital ______ the likelihood of bankruptcy, but higher bank capital ______ the return on equity for a given return on assets.", "o": ["reduces; reduces", "increases; increases", "reduces; increases", "increases; reduces"], "a": 0, "s": "Test Bank", "src": "tb", "x": "More capital reduces the chance of insolvency (benefit), but it also means equity is spread over a larger base, <b>lowering return on equity<\/b> for the same level of profits (cost)."}, {"q": "Banks that actively manage liabilities will most likely meet a reserve shortfall by", "o": ["calling in loans.", "borrowing federal funds.", "selling municipal bonds.", "seeking new deposits."], "a": 1, "s": "Test Bank", "src": "tb", "x": "Active liability management means raising funds by <b>borrowing federal funds<\/b> from other banks — quick and flexible. Calling in loans harms customers; selling bonds takes longer."}, {"q": "______ may antagonize customers and thus can be a very costly way of acquiring funds to meet an unexpected deposit outflow.", "o": ["Selling securities", "Selling loans", "Calling in loans", "Selling negotiable CDs"], "a": 2, "s": "Test Bank", "src": "tb", "x": "<b>Calling in loans<\/b> forces borrowers to repay early, damaging relationships and harming creditworthy customers. Selling securities or CDs does not directly harm existing customers."}, {"q": "Which of the following would a bank NOT hold as insurance against the highest cost of a deposit outflow — bank failure?", "o": ["Excess reserves", "Secondary reserves", "Bank capital", "Mortgages"], "a": 3, "s": "Test Bank", "src": "tb", "x": "<b>Mortgages<\/b> are long-term, illiquid assets — they cannot be quickly converted to cash. Excess reserves, secondary reserves, and capital all serve as buffers against deposit-outflow losses."}, {"q": "A loan of excess reserves from one bank to another bank is recorded as a(n) ______ for the borrowing bank and a(n) ______ for the lending bank.", "o": ["asset; asset", "asset; liability", "liability; liability", "liability; asset"], "a": 3, "s": "Exam 2022", "src": "exam", "x": "The borrowing bank gains reserves it must repay — a <b>liability<\/b>. The lending bank gives up reserves in exchange for a claim it will be repaid — an <b>asset<\/b> (a federal funds loan receivable)."}, {"q": "Large-denomination CDs are ______, so that like a bond they can be resold in a ______ market before they mature.", "o": ["nonnegotiable; secondary", "nonnegotiable; primary", "negotiable; secondary", "negotiable; primary"], "a": 2, "s": "Exam (Revision)", "src": "exam", "x": "Large-denomination CDs are <b>negotiable<\/b> (ownership can be transferred), allowing holders to sell them in the <b>secondary<\/b> market before maturity, providing liquidity similar to bonds."}, {"q": "Banks hold excess and secondary reserves to", "o": ["reduce the interest-rate risk problem.", "provide for deposit outflows.", "satisfy margin requirements.", "achieve higher earnings than they can with loans."], "a": 1, "s": "Test Bank", "src": "tb", "x": "Excess and secondary reserves serve as a <b>liquidity buffer<\/b> to cover unexpected deposit withdrawals without the bank having to sell illiquid assets or borrow at short notice."}]}, {"id": "mb5", "l": "Ch.5", "c": "#2A9D8F", "grp": "mb", "mid": "post", "t": "Ch. 5 — Central Banking & Monetary Policy", "d": "Post-midterm · The role and functions of the central bank and the instruments of monetary policy. Questions here are expected/practice questions written from your lecture notes.", "S": [{"h": "What is a central bank?", "p": ["A <strong>central bank<\/strong> is an independent national authority that conducts monetary policy, regulates banks, and provides financial services including economic research.", "Its goals are to stabilize the nation's currency, keep unemployment low, and prevent inflation.", "It holds a <strong>monopoly<\/strong> on increasing the monetary base and usually prints the national currency (legal tender).", "It acts as a <strong>lender of last resort<\/strong> to the banking sector during financial crises."]}, {"h": "Functions of the central bank", "p": ["<strong>Issue of currency<\/strong> — sole monopoly of issuing currency; keeps a reserve of gold and foreign securities.", "<strong>Banker to government<\/strong> — carries out the government's banking business; government keeps cash balances with it and can borrow by selling securities.", "<strong>Banker's bank & supervisor<\/strong> — custodian of banks' cash reserves, lender of last resort, and bank of central clearance/settlement; supervises banks to ensure solvency.", "<strong>Controller of credit & money supply<\/strong> — controls credit and money supply through monetary policy."]}, {"h": "Monetary policy & its instruments", "p": ["The main objective of credit control is <strong>price stability with full employment<\/strong>.", "The central bank adjusts a monetary aggregate, an interest rate, or the exchange rate to affect goals it does not directly control.", "<strong>Reserve requirement<\/strong> — banks must hold a fraction of deposit liabilities as reserves; limits how much they can lend.", "<strong>Open market operations (OMO)<\/strong> — buying/selling securities (e.g. Treasury bills) affects the supply of reserves and money.", "<strong>Interest rate<\/strong> — lending to sound banks at the <strong>minimum rediscount rate (MRR)<\/strong> sets the floor for money-market rates."]}, {"h": "🔑 Exam keyword cues — what to pick when you see…", "p": ["&ldquo;<strong>lender of last resort<\/strong>&rdquo; → the central bank", "&ldquo;<strong>monopoly on issuing currency / the monetary base<\/strong>&rdquo; → the central bank", "&ldquo;<strong>banker to the government / banker's bank<\/strong>&rdquo; → a central-bank function", "&ldquo;<strong>buying or selling securities in the open market<\/strong>&rdquo; → open market operations", "&ldquo;<strong>lowering the reserve ratio<\/strong>&rdquo; → lending capacity increases", "&ldquo;<strong>raising the reserve ratio<\/strong>&rdquo; → lending capacity decreases", "&ldquo;<strong>increase spending and/or cut taxes<\/strong>&rdquo; → expansionary fiscal policy", "&ldquo;<strong>minimum rediscount rate (MRR)<\/strong>&rdquo; → the central-bank lending rate"]}, {"h": "🔑 Exam keyword cues · Part 2 — more phrases → answers", "p": ["&ldquo;<strong>open-market operations, discount rate, reserve requirements<\/strong>&rdquo; → the three tools of monetary policy", "&ldquo;<strong>the rate the central bank lends to banks / the discount window<\/strong>&rdquo; → the discount rate", "&ldquo;<strong>central bank BUYS securities<\/strong>&rdquo; → reserves &amp; money supply rise (expansionary)", "&ldquo;<strong>central bank SELLS securities<\/strong>&rdquo; → reserves &amp; money supply fall (contractionary)", "&ldquo;<strong>1 ÷ the required-reserve ratio<\/strong>&rdquo; → the (simple) money multiplier", "&ldquo;<strong>currency in circulation + bank reserves<\/strong>&rdquo; → the monetary base", "&ldquo;<strong>stable prices / low inflation<\/strong>&rdquo; → the main goal of monetary policy", "&ldquo;<strong>the central bank acts free of political pressure<\/strong>&rdquo; → central-bank independence", "&ldquo;<strong>most-used / most-flexible policy tool<\/strong>&rdquo; → open-market operations"]}, {"h": "🔑 Exam keyword cues · Part 3 — even more phrases → answers", "p": ["&ldquo;<strong>informal pressure / jawboning by the central bank<\/strong>&rdquo; → moral suasion (a qualitative tool)", "&ldquo;<strong>directing credit to certain sectors<\/strong>&rdquo; → selective (qualitative) credit controls", "&ldquo;<strong>'high-powered money'<\/strong>&rdquo; → the monetary base", "&ldquo;<strong>raising the discount rate<\/strong>&rdquo; → contractionary (discourages bank borrowing)", "&ldquo;<strong>full employment &amp; economic growth<\/strong>&rdquo; → goals of monetary policy", "&ldquo;<strong>issuing and managing the government's debt<\/strong>&rdquo; → the fiscal-agent function of the central bank", "&ldquo;<strong>powerful but rarely changed tool<\/strong>&rdquo; → the reserve-requirement ratio", "&ldquo;<strong>an open-market purchase of securities<\/strong>&rdquo; → injects reserves (raises the money supply)", "&ldquo;<strong>currency once backed by a fixed weight of gold<\/strong>&rdquo; → the gold standard"]}], "Q": [{"q": "A central bank is best described as", "o": ["a private commercial bank that maximizes profit.", "an independent national authority that conducts monetary policy, regulates banks, and provides financial services.", "a bank that only accepts deposits from individuals.", "an international lending organization."], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "A central bank is a public authority, not a profit-seeking firm or international body. Its defining roles are conducting monetary policy, regulating commercial banks, and providing financial services to the government and banking system."}, {"q": "Which of the following is a function of the central bank?", "o": ["Issuing the national currency", "Accepting checkable deposits from the public", "Granting consumer loans", "Selling shares to investors"], "a": 0, "s": "Ch.5 · Expected", "src": "gen", "x": "Only the central bank has the legal monopoly to issue the nation's currency. Commercial banks accept deposits and make loans but cannot create banknotes."}, {"q": "The central bank acts as a 'lender of last resort,' meaning it", "o": ["lends to households during recessions.", "provides loans to banks during times of financial crisis.", "guarantees all bank deposits.", "never lends to commercial banks."], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "When solvent banks face a liquidity squeeze during a crisis, the central bank steps in as lender of last resort, providing emergency loans so the banking system does not collapse. It does not lend to households in this role."}, {"q": "The central bank has a monopoly on", "o": ["accepting deposits.", "increasing the monetary base and issuing currency.", "making consumer loans.", "trading stocks."], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "The central bank alone controls the monetary base — the currency in circulation plus bank reserves. This exclusive power over base money underpins all other monetary policy tools."}, {"q": "When the central bank carries out the banking business of the government, it is acting as", "o": ["banker's bank.", "banker to the government.", "lender of last resort.", "controller of credit."], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "When the central bank manages government accounts, processes payments, and holds treasury funds, it is performing the 'banker to the government' role, distinct from its role as banker's bank or lender of last resort."}, {"q": "As the 'banker's bank,' the central bank acts in all of the following capacities EXCEPT", "o": ["custodian of banks' cash reserves.", "lender of last resort.", "bank of central clearance and settlement.", "issuer of corporate equity."], "a": 3, "s": "Ch.5 · Expected", "src": "gen", "x": "As banker's bank, the central bank holds reserves for commercial banks, clears interbank payments, and lends in emergencies. Issuing corporate equity is a private capital-market activity, entirely outside its mandate."}, {"q": "The main objective of the credit-control function of the central bank is", "o": ["maximizing bank profits.", "price stability along with full employment.", "increasing government spending.", "eliminating commercial banks."], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "The credit-control function targets the macroeconomic goals of price stability and full employment by expanding or contracting the supply of money and credit. Maximizing bank profits is not a central bank objective."}, {"q": "Which of the following is an instrument of monetary policy?", "o": ["Reserve requirement", "Income tax rates", "Government wages", "Tariffs"], "a": 0, "s": "Ch.5 · Expected", "src": "gen", "x": "The reserve requirement is a direct monetary policy tool: changing it alters how much banks must hold back, affecting their lending power. Tax rates and tariffs are fiscal/trade instruments, not monetary ones."}, {"q": "When the central bank raises the reserve requirement, the amount of loans banks can make to the economy", "o": ["increases.", "decreases.", "stays the same.", "becomes unlimited."], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "A higher reserve requirement means banks must hold more of each deposit in reserve, leaving less available to lend. This directly shrinks the volume of loans and, through the money multiplier, the money supply."}, {"q": "Open market operations refer to the central bank's", "o": ["setting of tax rates.", "buying or selling of securities (such as Treasury bills) in the open market.", "printing of corporate bonds.", "supervision of bank branches."], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "Open market operations are the central bank's purchases or sales of government securities (e.g., T-bills) in the financial market. This is the most frequently used monetary policy tool; it is not related to tax-setting or bank supervision."}, {"q": "When the central bank buys securities in the open market, the supply of reserves and money", "o": ["decreases.", "increases.", "is unaffected.", "becomes zero."], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "When the central bank buys securities, it pays sellers with newly created reserves, injecting money into the banking system. Banks then have more reserves to lend, expanding the money supply."}, {"q": "The rate at which the central bank lends to financially sound banks is called the", "o": ["minimum rediscount rate (MRR).", "federal funds rate.", "prime rate.", "coupon rate."], "a": 0, "s": "Ch.5 · Expected", "src": "gen", "x": "The minimum rediscount rate (MRR) is the official rate at which the central bank lends to banks in good standing. The federal funds rate is the interbank overnight rate, not set by the central bank directly."}, {"q": "By controlling the volume of currency and credit, the central bank functions as the", "o": ["controller of credit and money supply.", "residual claimant.", "underwriter.", "broker."], "a": 0, "s": "Ch.5 · Expected", "src": "gen", "x": "By adjusting reserve requirements, open market operations, and the discount rate, the central bank controls the volume of credit and money in circulation — its 'controller of credit and money supply' role."}, {"q": "Which of the following best describes a goal of the central bank?", "o": ["Maximizing inflation", "Stabilizing the nation's currency and keeping unemployment low", "Maximizing commercial-bank dividends", "Expanding the barter system"], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "Central bank goals center on currency stability (low, predictable inflation) and macroeconomic health (low unemployment). Maximizing inflation or bank dividends would undermine both objectives."}, {"q": "To conduct monetary policy, the central bank adjusts variables such as", "o": ["a monetary aggregate, an interest rate, or the exchange rate.", "corporate profits.", "household savings directly.", "import quotas."], "a": 0, "s": "Ch.5 · Expected", "src": "gen", "x": "The central bank's operating targets are monetary aggregates (e.g., M2), interest rates, or the exchange rate — all of which feed through to the broader economy. It has no direct power over corporate profits or import quotas."}, {"q": "When the central bank sells securities in the open market, the money supply will", "o": ["increase.", "decrease.", "not change.", "double."], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "Selling securities removes reserves from the banking system because buyers pay with money that flows to the central bank. With fewer reserves, banks lend less, contracting the money supply."}, {"q": "If a commercial bank repeatedly borrows from the central bank at the discount window, it may face", "o": ["higher profits.", "the case of 'closing the window' (restricted access).", "an automatic bailout.", "lower reserve requirements."], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "The discount window is meant for temporary, emergency liquidity needs. Habitual borrowing signals a structural problem, so the central bank may restrict access ('close the window') to discourage over-reliance."}, {"q": "The central bank keeps a reserve in the form of ______ to back the currency it issues.", "o": ["gold and foreign securities", "consumer loans", "corporate stock", "real estate"], "a": 0, "s": "Ch.5 · Expected", "src": "gen", "x": "Central banks traditionally back their currency issue with gold reserves and foreign securities, which provide credibility and exchange-rate stability. Consumer loans and real estate are not appropriate backing assets."}, {"q": "Which institution supervises and regulates commercial banks to ensure their solvency?", "o": ["The central bank", "The stock exchange", "Finance companies", "Mutual funds"], "a": 0, "s": "Ch.5 · Expected", "src": "gen", "x": "Supervising and regulating commercial banks to maintain solvency and financial stability is a core central bank function. Stock exchanges, finance companies, and mutual funds do not have that regulatory authority."}, {"q": "A lower minimum rediscount rate (MRR) tends to ______ the supply of credit and investment.", "o": ["decrease", "increase", "not affect", "freeze"], "a": 1, "s": "Ch.5 · Expected", "src": "gen", "x": "A lower MRR reduces the cost of borrowing from the central bank, encouraging commercial banks to borrow more and on-lend at cheaper rates. This stimulates credit expansion and investment spending."}, {"q": "Monetary policy primarily aims to influence goals the central bank does not directly control, such as", "o": ["full employment and price stability.", "the number of bank branches.", "corporate dividend policy.", "tariff schedules."], "a": 0, "s": "Ch.5 · Expected", "src": "gen", "x": "The central bank cannot directly dictate employment or price levels; it influences them indirectly through its policy tools. Full employment and price stability are therefore the ultimate goals monetary policy works toward."}, {"q": "The reserve requirement works by requiring banks to hold a fraction of their ______ as reserves.", "o": ["deposit liabilities", "total loans", "equity capital", "fixed assets"], "a": 0, "s": "Ch.5 · Expected", "src": "gen", "x": "Reserve requirements apply to deposit liabilities — the funds customers place in the bank. Banks must keep a set fraction of those deposits as reserves, limiting how much of each deposited dollar can be re-lent."}, {"q": "Which of the following is NOT a function of the central bank of a country?", "o": ["Being the custodian of foreign exchange reserves", "Accepting deposits from the general public", "Both a and b are correct", "Both a and b are incorrect"], "a": 1, "s": "Final 2024 (Model 2)", "src": "exam", "x": "Accepting deposits from the general public is a commercial banking function, not a central bank function. Holding foreign exchange reserves, on the other hand, is a standard central bank duty."}, {"q": "Which of the following statements represents the main function of the central bank in a country?", "o": ["It is responsible for the regulation over the supply of money in the market", "It is responsible for the issuance of notes within the country", "It acts as a banker both to the government and to other banks in the country", "All of the above"], "a": 3, "s": "Final 2024 (Model 2)", "src": "exam", "x": "The central bank performs all three listed functions: regulating money supply, issuing currency, and serving as banker to both the government and commercial banks — so 'All of the above' is correct."}, {"q": "Which statement gives a true picture of the effect of lowering the cash reserve ratio by the central bank of a country?", "o": ["The lending capacity of commercial banks will increase", "The lending capacity of commercial banks will decrease", "The lending capacity of commercial banks may increase or decrease", "There is no effect on the lending capacity of commercial banks"], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam", "x": "A lower cash reserve ratio means banks must hold a smaller fraction of deposits as reserves, freeing up more funds to lend. This unambiguously <em>increases<\/em> their lending capacity."}, {"q": "Expansionary fiscal policy refers to:", "o": ["A reduction in government expenditures and/or an increase in taxes", "An increase in government expenditures and/or a decrease in taxes", "An increase in the money supply", "A decrease in the money supply"], "a": 1, "s": "Final 2024 (Model 2)", "src": "exam", "x": "Expansionary fiscal policy uses government spending increases and/or tax cuts to boost aggregate demand. Options C and D describe expansionary and contractionary <em>monetary<\/em> policy, not fiscal policy."}]}, {"id": "it1", "l": "IT.1", "c": "#F4A261", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 1 — The Pattern & Importance of World Trade", "d": "The value and importance of trade, GDP vs GNP, the index of openness, standard of living and economic growth. All questions are real, answer-keyed revision questions.", "S": [{"h": "Why trade & what it lets countries do", "p": ["<strong>International trade<\/strong> = trade between <strong>residents<\/strong> of two countries (residents may be persons, firms, non-profit organizations, or other associations).", "<strong>Exports<\/strong> — goods/services sold by economic units in one country to units in other countries. <strong>Imports<\/strong> — goods/services bought by domestic units from other countries.", "Trade lets a country obtain goods it cannot produce domestically (or that would cost much more at home), clear out <strong>production surpluses<\/strong>, and import raw materials and <strong>intermediate goods<\/strong> for development.", "No country today — however large — can live in complete economic isolation."]}, {"h": "GDP vs GNP, capital & growth", "p": ["<strong>GDP<\/strong> = value of final goods & services produced <strong>within<\/strong> a country (by anyone inside its borders).", "<strong>GNP<\/strong> = value of final goods & services produced by a country's <strong>domestic factors<\/strong> of production (including those working overseas).", "<strong>Physical capital<\/strong> = investment in plants and equipment. <strong>Human capital<\/strong> = the accumulation of knowledge and skills by workers — a major source of economic growth.", "<strong>Economic growth<\/strong> is measured by the growth rate of per-capita income / GDP / GNP."]}, {"h": "Index of openness & standard of living", "p": ["<strong>Index of openness = (Exports / GDP or GNP) × 100<\/strong> — measures the participation and importance of international trade to a country. It varies between <strong>0 and 100<\/strong>.", "<strong>High<\/strong> index → the country trades a lot with the rest of the world → <strong>relatively open<\/strong>. <strong>Low<\/strong> index → <strong>relatively closed<\/strong>.", "<strong>Standard of living<\/strong> is directly measured by <strong>per-capita income<\/strong> (GDP or GNP per person) = how much each person would have if production were divided equally.", "A country with an <strong>abundant<\/strong> endowment of a factor tends to have a comparative advantage in goods that use that factor intensively."]}, {"h": "🔑 Exam keyword cues — what to pick when you see…", "p": ["&ldquo;<strong>Exports ÷ GDP × 100<\/strong>&rdquo; → Index of Openness", "&ldquo;<strong>high index<\/strong>&rdquo; → relatively open &nbsp;·&nbsp; &ldquo;<strong>low index<\/strong>&rdquo; → relatively closed", "&ldquo;<strong>per-capita income / GDP per person<\/strong>&rdquo; → standard of living", "&ldquo;<strong>produced within a country<\/strong>&rdquo; → GDP &nbsp;·&nbsp; &ldquo;<strong>produced by domestic factors<\/strong>&rdquo; → GNP", "&ldquo;<strong>knowledge &amp; skills of workers<\/strong>&rdquo; → human capital &nbsp;·&nbsp; &ldquo;<strong>plants &amp; equipment<\/strong>&rdquo; → physical capital", "&ldquo;<strong>growth rate of per-capita income<\/strong>&rdquo; → economic growth", "&ldquo;<strong>clear out surpluses / import intermediate goods<\/strong>&rdquo; → the benefits of trade"]}, {"h": "🔑 Exam keyword cues · Part 2 — more phrases → answers", "p": ["&ldquo;<strong>both parties expect to gain / voluntary exchange<\/strong>&rdquo; → the basis of trade", "&ldquo;<strong>high income, manufactured exports<\/strong>&rdquo; → a developed country &nbsp;·&nbsp; &ldquo;<strong>low income, primary-commodity exports<\/strong>&rdquo; → a developing country (LDC)", "&ldquo;<strong>raw materials &amp; agricultural goods<\/strong>&rdquo; → primary commodities", "&ldquo;<strong>adjusted for inflation / constant prices<\/strong>&rdquo; → real GDP &nbsp;·&nbsp; &ldquo;<strong>at current prices<\/strong>&rdquo; → nominal GDP", "&ldquo;<strong>nations rely on one another<\/strong>&rdquo; → interdependence / globalization", "&ldquo;<strong>removing tariffs &amp; quotas<\/strong>&rdquo; → free trade &nbsp;·&nbsp; &ldquo;<strong>shielding domestic industry<\/strong>&rdquo; → protectionism", "&ldquo;<strong>the absolute size of an economy<\/strong>&rdquo; → measured by GDP, not per-capita income"]}, {"h": "🔑 Exam keyword cues · Part 3 — even more phrases → answers", "p": ["&ldquo;<strong>(Exports + Imports) ÷ GDP<\/strong>&rdquo; → the trade-to-GDP ratio (an openness measure)", "&ldquo;<strong>the more open the economy, the more world prices affect it<\/strong>&rdquo; → the vulnerability of open economies", "&ldquo;<strong>GDP + net factor income from abroad<\/strong>&rdquo; → GNP", "&ldquo;<strong>a price-taker on world markets<\/strong>&rdquo; → a small country &nbsp;·&nbsp; &ldquo;<strong>can move the world price<\/strong>&rdquo; → a large country", "&ldquo;<strong>a high share of manufactured exports<\/strong>&rdquo; → a more developed economy", "&ldquo;<strong>literacy, life expectancy and income combined<\/strong>&rdquo; → the Human Development Index (HDI)", "&ldquo;<strong>land and natural resources<\/strong>&rdquo; → a factor endowment", "&ldquo;<strong>falling export prices vs import prices for LDCs<\/strong>&rdquo; → deteriorating terms of trade", "&ldquo;<strong>trade lets a country obtain goods it can't produce<\/strong>&rdquo; → a gain from trade"]}], "Q": [{"q": "The formula (Exports / GDP or GNP × 100) measures which of the following?", "o": ["A country's total population density", "The inflation rate relative to the global average", "The scale of domestic tax revenue", "The participation and importance of international trade to a country"], "a": 3, "s": "Revision", "src": "rev", "x": "Exports ÷ GDP × 100 shows what share of a country's output is traded internationally, making it a direct measure of trade participation and importance — not prices, taxes, or population."}, {"q": "If a country scores a very low value on the Index of Openness, it is considered to be:", "o": ["Relatively open", "Relatively closed", "Highly dependent on oil production", "Economically unstable"], "a": 1, "s": "Revision", "src": "rev", "x": "A low Index of Openness means exports are a small fraction of GDP, so the economy relies mostly on domestic production and trade — it is relatively closed to international exchange."}, {"q": "If a country scores a high value on the Index of Openness (it trades a lot with the rest of the world), it is considered to be:", "o": ["Relatively open", "Relatively closed", "Highly dependent on oil production", "Economically unstable"], "a": 0, "s": "Revision", "src": "rev", "x": "A high Index of Openness means a large share of GDP is exported, showing the country is heavily engaged with world markets — it is relatively open."}, {"q": "How is per-capita income (or per-capita GDP/GNP) calculated?", "o": ["Total Exports × Total Imports", "GDP or GNP / Population", "Physical Capital + Human Capital", "(Primary Products / Manufactured Goods) × 100"], "a": 1, "s": "Revision", "src": "rev", "x": "Per-capita income divides total output (GDP or GNP) by the number of people, giving a per-person average. The other options mix unrelated concepts like trade volumes or capital types."}, {"q": "A major source of economic growth is the accumulation of knowledge and skills by workers, which is known as:", "o": ["Physical capital", "Human capital", "Comparative advantage", "Production surplus treasure"], "a": 1, "s": "Revision", "src": "rev", "x": "Human capital is the stock of knowledge, skills, and expertise embodied in workers. Physical capital refers to machinery and buildings — a common mix-up to avoid."}, {"q": "What term is defined as \"the value of final goods and services produced within a country\"?", "o": ["Gross National Product (GNP)", "Index of Openness", "Gross Domestic Product (GDP)", "Comparative Advantage"], "a": 2, "s": "Revision", "src": "rev", "x": "GDP counts output produced <em>within a country's borders<\/em>, regardless of who owns the factors. GNP, by contrast, tracks output by a country's <em>nationals<\/em> wherever they work."}, {"q": "What term is defined as \"the value of final goods and services produced by domestic factors of production\"?", "o": ["Gross National Product (GNP)", "Index of Openness", "Gross Domestic Product (GDP)", "Comparative Advantage"], "a": 0, "s": "Revision", "src": "rev", "x": "GNP measures the value produced by a country's <em>own factors of production<\/em> — at home or abroad. GDP counts production inside borders, so the two differ by net factor income from abroad."}, {"q": "Standard of living in a country is directly measured by:", "o": ["Gross area size", "The index of openness value", "Per-capita income, GDP, or GNP", "The volume of structural export surpluses"], "a": 2, "s": "Revision", "src": "rev", "x": "Standard of living reflects how much output is available per person, so per-capita income, GDP, or GNP are the standard measures. Geographic size or trade openness alone do not capture living standards."}, {"q": "If a country is described as having a high Index of Openness, it means the country:", "o": ["Imposes heavy trade restrictions", "Trades a lot with the rest of the world", "Has a declining population size", "Focuses purely on primary goods"], "a": 1, "s": "Revision", "src": "rev", "x": "The Index of Openness equals exports ÷ GDP × 100; a high value means exports are large relative to output, confirming the country trades heavily with the rest of the world."}, {"q": "Per-capita income explicitly tells us:", "o": ["The total value of raw materials imported", "The exact number of industrial factories built", "How much each person would have if production value were equally divided", "The opportunity cost of missing factor endowments"], "a": 2, "s": "Revision", "src": "rev", "x": "Per-capita income is GDP (or GNP) divided by population — it answers the hypothetical of equal distribution, giving a meaningful benchmark for comparing living standards across countries."}, {"q": "What is defined as \"investment in plants and equipment\"?", "o": ["Human capital", "Physical capital", "Comparative advantage", "Index of openness"], "a": 1, "s": "Revision", "src": "rev", "x": "Physical capital is defined as investment in tangible productive assets: plants, machinery, and equipment. Human capital is knowledge and skills — a different, often confused, category."}, {"q": "International trade allows countries to clear out their:", "o": ["Production deficits", "Production surpluses", "Index limits", "Human capital investments"], "a": 1, "s": "Revision", "src": "rev", "x": "Trade gives countries an outlet for goods they produce beyond domestic needs. By exporting surpluses, they avoid waste and gain income to fund imports."}, {"q": "What type of goods, alongside raw materials, does trade help countries import for economic development?", "o": ["Final luxury items", "Closed commodities", "Intermediate goods", "Depleted resources"], "a": 2, "s": "Revision", "src": "rev", "x": "Countries import raw materials and <em>intermediate goods<\/em> (inputs used in further production) to feed their industries. Final luxury goods are not the development-focused category the course highlights."}, {"q": "The ______ is a trade between residents of two countries; the residents may be persons, firms, non-profit organizations, or other forms of association.", "o": ["International trade", "Exports", "Imports", "Investments"], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam", "x": "International trade is defined as exchange between residents (persons, firms, or organisations) of <em>two different countries<\/em>. Exports and imports are components of trade, not the definition of trade itself."}, {"q": "Less Developed Countries (LDCs) only export manufactured goods and do not export primary products.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. LDCs are heavily dependent on <em>primary product<\/em> exports (agricultural goods, minerals, raw materials). Manufactured goods dominate the exports of industrial countries, not LDCs."}, {"q": "There are several large countries in the world today that can live completely in economic isolation from the rest of the world.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. No large country today can sustain complete economic isolation; every economy depends on trade for resources, technology, and goods it cannot efficiently produce alone."}, {"q": "The Index of Openness value will always vary between 0 and 100.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Because the index is (Exports ÷ GDP) × 100, and exports cannot exceed GDP (nor be negative), the result is bounded between 0 and 100."}, {"q": "International trade contributes to a country's standard of living by allowing it to obtain goods it cannot produce domestically, or goods that would cost much more to produce at home.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Trade raises living standards by supplying goods unavailable domestically and reducing costs through comparative advantage, giving consumers access to a wider range of goods at lower prices."}, {"q": "Gross National Product (GNP) measures the final goods and services produced exclusively by domestic factors of production.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. GNP is defined as the value of final goods and services produced by a country's own (domestic) factors of production, whether those factors are located at home or abroad."}, {"q": "If a country has an abundant endowment of a specific factor, it will tend to have a comparative advantage in producing goods that use that factor intensively.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. This is the core of factor-endowment (Heckscher-Ohlin) theory: abundant factors are cheap, so goods using them intensively can be produced at lower opportunity cost, creating comparative advantage."}, {"q": "Japan, Australia, and New Zealand are classified as industrial countries.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Japan, Australia, and New Zealand are all classified as advanced/industrial economies alongside North America and Western Europe in standard international trade groupings."}, {"q": "Today, very large countries can easily live in complete economic isolation from the rest of the world because of their population size.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Even very large economies (e.g., the USA, China) cannot achieve complete self-sufficiency; they depend on trade for certain resources, technology, and efficiency gains that size alone cannot replace."}, {"q": "The Index of Openness is calculated by dividing GDP/GNP by total exports and then multiplying by 100.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The formula is <b>Exports ÷ GDP × 100<\/b> — exports in the numerator, GDP in the denominator. Dividing GDP by exports (as stated) inverts the ratio."}, {"q": "Countries with low values on the Index of Openness are said to be relatively open.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Low Index of Openness values indicate the country trades little relative to its GDP — it is relatively <em>closed<\/em>, not open."}, {"q": "Standard of living can be measured by both the quantity and quality of goods and services an average person consumes.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. In this course, standard of living is measured by <em>per-capita income (GDP or GNP)<\/em>, not by quantity and quality of goods consumed. That broader definition belongs to a different framework."}, {"q": "Foreign trade lowers a country's standard of living because it forces dependency on foreign nations.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Foreign trade <em>raises<\/em> living standards by expanding access to goods and enabling specialisation. The correct view is that trade benefits both parties through comparative advantage."}, {"q": "International trade helps a country obtain items it can produce domestically, but only if domestic production costs are lower than import costs.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Countries trade precisely to obtain goods they <em>cannot<\/em> produce domestically, or goods that are cheaper abroad even if domestic production is possible — comparative advantage, not cost parity, drives trade."}, {"q": "Economic growth is measured by the growth rate of per-capita income, GDP, or GNP.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Economic growth is tracked through changes in per-capita income or total GDP/GNP over time; a rising growth rate signals improving productive capacity."}, {"q": "Human capital refers to the accumulation of buildings, machinery, and production plants.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Buildings, machinery, and production plants are <em>physical<\/em> capital. Human capital is the knowledge and skills embedded in workers — an entirely different source of growth."}, {"q": "International trade creates a competitive environment that encourages the growth of human capital.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Exposure to international competition pressures firms and workers to innovate and upgrade skills, spurring investment in education and training — key drivers of human capital growth."}, {"q": "Gross Domestic Product (GDP) includes goods and services produced by domestic factors of production working overseas.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. GDP measures output produced <em>inside a country's borders<\/em>, regardless of the nationality of the producer. Output by domestic factors working overseas is excluded from GDP but included in GNP."}, {"q": "Exports are defined as goods and services sold by economic units in one country to economic units located in other countries.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Exports are, by definition, goods and services sold by domestic economic units to buyers in other countries — they represent the outward flow of domestic production."}, {"q": "Imports are goods and services purchased by domestic economic units from other countries.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Imports are goods and services bought by domestic economic units from foreign sources — they represent the inward flow of foreign production into the domestic economy."}, {"q": "An abundance of a particular production factor gives a country a comparative advantage in goods that use that factor intensively.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Factor abundance lowers the cost of that factor, making goods that use it intensively relatively cheap to produce — the basis of the Heckscher-Ohlin theory of comparative advantage."}, {"q": "A decrease in exports increases trade openness.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Since Index of Openness = Exports ÷ GDP × 100, a <em>decrease<\/em> in exports lowers the numerator and therefore <em>reduces<\/em> openness, not increases it."}, {"q": "Foreign trade enables countries to obtain goods that they do not produce domestically.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. One of the primary functions of international trade is to supply nations with goods they lack the resources or capability to produce domestically, filling gaps that purely domestic production cannot."}]}, {"id": "it2", "l": "IT.2", "c": "#E76F51", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 2 — Classical Theory: Absolute & Comparative Advantage", "d": "The labour theory of value, the classical assumptions, Adam Smith's absolute advantage and Ricardo's comparative advantage (opportunity cost). Real answer-keyed revision questions + 2024 final.", "S": [{"h": "Mercantilism (the pre-classical view)", "p": ["<strong>Mercantilists<\/strong> believed in <strong>running trade surpluses<\/strong> — export more than you import to accumulate bullion/gold.", "They saw <strong>trade as a zero-sum activity<\/strong>, viewed imports as undesirable, and supported government-granted monopolies.", "The classical economists (Smith, Ricardo) replaced this with mutual gains from trade."]}, {"h": "Assumptions of the classical theory", "p": ["<strong>Labour theory of value<\/strong> — labour is the <strong>only<\/strong> factor of production; a commodity's value = the amount of labour spent on it; all labour is <strong>homogeneous<\/strong> (identical).", "<strong>International immobility of factors<\/strong> — factors move freely within a country but not between countries, so wage differences persist (migration can't eliminate them).", "<strong>Perfect competition<\/strong> — Price = Marginal Cost = Average Cost; unit labour cost (and price) stays constant as output expands.", "Simplifying assumptions: <strong>two countries, two commodities, zero transport costs<\/strong>; analysis is at the <strong>barter level, without money<\/strong>."]}, {"h": "Adam Smith — Absolute Advantage", "p": ["<strong>Absolute advantage<\/strong> = the ability to produce a good using <strong>lower unit-labour requirements<\/strong> than other countries.", "Each country specializes in and exports the good it produces at <strong>lower cost<\/strong>, and imports the other.", "Solving a table: the country needing <strong>fewer labour hours<\/strong> for a good is more efficient → has the absolute advantage → exports it."]}, {"h": "David Ricardo — Comparative Advantage", "p": ["A nation has a <strong>comparative advantage<\/strong> in a good if its <strong>opportunity cost<\/strong> of producing it is <strong>lower<\/strong> than the other country's.", "<strong>Opportunity cost<\/strong> = the quantity of other goods that must be sacrificed to produce one more unit of a good.", "Trade benefits both countries <strong>even when one has an absolute advantage in both goods<\/strong> — each specializes by comparative advantage.", "Solving a table: opportunity cost of X = (labour for X) / (labour for Y). The country with the <strong>lower<\/strong> ratio has the comparative advantage in X.", "Ricardo's classic illustration: <strong>Portugal & England; Wine & Cloth<\/strong>. Gains from trade = higher consumption with the same resources."]}, {"h": "Worked method — absolute &amp; comparative advantage (heavily tested)", "p": ["First read whether the table gives <strong>labour-hours per unit<\/strong> or <strong>output per labour-hour<\/strong> — the logic flips between them, and exams use both.", "<strong>Absolute advantage<\/strong>: with hours-per-unit, the country needing <strong>fewer hours<\/strong> has it; with output-per-hour, the country producing <strong>more per hour<\/strong> has it.", "<strong>Comparative advantage<\/strong>: compare <strong>opportunity costs<\/strong>. With hours-per-unit, the opportunity cost of X = (hours for X) ÷ (hours for Y). The country with the <strong>lower<\/strong> opportunity cost of X exports X.", "<strong>Example (hours/unit)<\/strong> — A: X=1, Y=4; B: X=6, Y=8. OC of X: A = 1/4 = 0.25 Y, B = 6/8 = 0.75 Y. A's is lower → <strong>A has the comparative advantage in X<\/strong>, even though A also has the absolute advantage in both goods.", "<strong>Example (output/hour)<\/strong> — US: 6 wheat or 4 cloth; UK: 1 wheat or 2 cloth. OC of cloth: US = 6/4 = 1.5 wheat, UK = 1/2 = 0.5 wheat. UK's is lower → <strong>UK exports cloth, US exports wheat<\/strong>.", "Key exam fact (Ricardo): a country always has a comparative advantage in <strong>something<\/strong> — even if it is absolutely less efficient at <strong>everything<\/strong>, mutually beneficial trade is still possible."]}, {"h": "Gains from trade, the PPF &amp; terms of trade", "p": ["The <strong>Production Possibility Frontier (PPF)<\/strong> shows the maximum output combinations a country can produce. Points <strong>inside<\/strong> are inefficient but attainable; points <strong>outside<\/strong> are unattainable on its own.", "With specialization and trade, a country can <strong>consume at a point beyond (above) its own PPF<\/strong> — that is the gain from trade.", "<strong>Terms of trade<\/strong> = the rate at which the two goods actually exchange internationally. For both countries to gain, it must lie <strong>between<\/strong> their two domestic opportunity-cost ratios.", "<strong>Distribution of the gains<\/strong>: the <strong>closer<\/strong> the international exchange rate is to a country's <strong>own domestic rate<\/strong>, the <strong>smaller<\/strong> that country's share of the gains (and the larger its partner's share).", "Trade exhibits <strong>constant returns to scale<\/strong> and assumes <strong>no government intervention<\/strong> in the classical/comparative-advantage model."]}, {"h": "🔑 Exam keyword cues — what to pick when you see…", "p": ["&ldquo;<strong>lower unit labour requirements<\/strong>&rdquo; → Absolute Advantage (Adam Smith)", "&ldquo;<strong>lower opportunity cost / relatively more efficient<\/strong>&rdquo; → Comparative Advantage (Ricardo)", "&ldquo;<strong>quantity of other goods sacrificed<\/strong>&rdquo; → opportunity cost", "&ldquo;<strong>labour is the only factor / value = labour spent<\/strong>&rdquo; → labour theory of value", "&ldquo;<strong>all labour is the same<\/strong>&rdquo; → homogeneous", "&ldquo;<strong>mobile within a country, immobile between countries<\/strong>&rdquo; → factor immobility", "&ldquo;<strong>MC = AC = price<\/strong>&rdquo; → perfect competition", "&ldquo;<strong>the barter level, without money<\/strong>&rdquo; → the classical theory", "&ldquo;<strong>amount of factors available in an economy<\/strong>&rdquo; → factor endowment", "&ldquo;<strong>trade surplus / accumulate gold / zero-sum<\/strong>&rdquo; → mercantilism", "&ldquo;<strong>Wine &amp; cloth, Portugal &amp; England<\/strong>&rdquo; → Ricardo's example", "&ldquo;<strong>isolation / no international trade<\/strong>&rdquo; → autarky", "&ldquo;<strong>consume beyond (above) the PPF<\/strong>&rdquo; → the gain from trade"]}, {"h": "🔑 Exam keyword cues · Part 2 — more phrases → answers", "p": ["&ldquo;<strong>constant opportunity cost / a straight-line PPF<\/strong>&rdquo; → the classical (Ricardian) model", "&ldquo;<strong>the ratio at which two goods are exchanged in trade<\/strong>&rdquo; → the terms of trade", "&ldquo;<strong>lies between the two countries' domestic price ratios<\/strong>&rdquo; → mutually beneficial terms of trade", "&ldquo;<strong>each country makes only one good<\/strong>&rdquo; → complete specialization", "&ldquo;<strong>Wealth of Nations, 1776<\/strong>&rdquo; → Adam Smith (absolute advantage)", "&ldquo;<strong>a country has the disadvantage in BOTH goods yet still trades<\/strong>&rdquo; → the point of comparative advantage", "&ldquo;<strong>maximum output combinations of two goods<\/strong>&rdquo; → the production-possibilities frontier (PPF)", "&ldquo;<strong>how much of good Y is given up for one more X<\/strong>&rdquo; → the opportunity-cost ratio", "&ldquo;<strong>the slope of the PPF<\/strong>&rdquo; → the opportunity cost / domestic price ratio"]}, {"h": "🔑 Exam keyword cues · Part 3 — even more phrases → answers", "p": ["&ldquo;<strong>no transport costs and no trade barriers<\/strong>&rdquo; → a classical assumption", "&ldquo;<strong>full employment of all resources<\/strong>&rdquo; → a classical assumption", "&ldquo;<strong>free trade maximises total world output<\/strong>&rdquo; → the classical conclusion", "&ldquo;<strong>David Ricardo, Principles of Political Economy 1817<\/strong>&rdquo; → comparative advantage", "&ldquo;<strong>be relatively better at something even if worse at everything<\/strong>&rdquo; → the idea of comparative advantage", "&ldquo;<strong>the international (world) price ratio after trade<\/strong>&rdquo; → the terms of trade", "&ldquo;<strong>if the two domestic price ratios are identical<\/strong>&rdquo; → no trade occurs (no comparative advantage)", "&ldquo;<strong>a simple two-country, two-good world<\/strong>&rdquo; → the 2×2 classical model", "&ldquo;<strong>indifference curves shifting onto a higher one with trade<\/strong>&rdquo; → the welfare gain from trade"]}], "Q": [{"q": "According to the classical theory of international trade, what is considered the only factor of production?", "o": ["Capital", "Land", "Labor", "Entrepreneurship"], "a": 2, "s": "Revision", "src": "rev", "x": "Classical economists used the Labor Theory of Value, which treats labor as the sole input that creates value; capital and land are not considered separate factors in this framework."}, {"q": "The Pure Theory of International Trade primarily aims to provide an explanation for which of the following?", "o": ["Exchange rate fluctuations", "The world trade pattern", "Central bank interventions", "Domestic inflation rates"], "a": 1, "s": "Revision", "src": "rev", "x": "The Pure Theory of International Trade explains <em>why<\/em> countries trade with each other and which goods they export or import — i.e., it explains the pattern of world trade."}, {"q": "Who developed the Theory of Absolute Advantage?", "o": ["David Ricardo", "Adam Smith", "John Maynard Keynes", "Milton Friedman"], "a": 1, "s": "Revision", "src": "rev", "x": "Adam Smith introduced absolute advantage in <em>The Wealth of Nations<\/em> (1776). Ricardo later built on it with comparative advantage."}, {"q": "Who introduced the Theory of Comparative Advantage?", "o": ["Adam Smith", "David Ricardo", "Alfred Marshall", "Thomas Malthus"], "a": 1, "s": "Revision", "src": "rev", "x": "David Ricardo developed comparative advantage in his 1817 work <em>Principles of Political Economy<\/em>, extending Smith's ideas to cases where one country is more efficient in everything."}, {"q": "What does the Labor Theory of Value state?", "o": ["The value of a commodity is determined by its scarcity.", "The value of a commodity is determined by consumer demand.", "The value of a commodity is determined by the amount of labor spent on its production.", "The value of a commodity is determined by the cost of capital."], "a": 2, "s": "Revision", "src": "rev", "x": "The Labor Theory of Value holds that the price of a commodity reflects the number of labor-hours embedded in its production, not its scarcity or consumer demand."}, {"q": "Under the classical theory's assumption of perfect competition, what is the relationship between price, marginal cost (MC), and average cost (AC)?", "o": ["Price > MC > AC", "Price = MC = AC", "Price < MC = AC", "Price is unrelated to MC and AC"], "a": 1, "s": "Revision", "src": "rev", "x": "Under perfect competition, free entry drives profits to zero, so price equals both marginal cost and average cost — no firm can charge above cost in the long run."}, {"q": "What happens to the unit labor cost as production output expands under the classical assumptions of perfect competition?", "o": ["It rises sharply.", "It falls steadily.", "It fluctuates randomly.", "It neither rises nor falls (prices remain constant)."], "a": 3, "s": "Revision", "src": "rev", "x": "With constant returns to labor (a classical assumption), adding more output does not change the cost per unit; hence unit labor costs — and prices — remain constant as output expands."}, {"q": "Which of the following describes the mobility of factors of production in the classical trade theory?", "o": ["Fully mobile between countries, but immobile within a country.", "Immobile both within a country and between countries.", "Fully mobile within a country, but entirely immobile between countries.", "Fully mobile globally without any restrictions."], "a": 2, "s": "Revision", "src": "rev", "x": "Classical theory assumes workers can move freely between industries <em>within<\/em> a country but face barriers (language, law, culture) that make cross-border migration practically impossible."}, {"q": "If wages are higher in Country A than in Country B, why do classical economists argue that they stay higher?", "o": ["Governments set strict minimum wage laws.", "Labor migration cannot take place on a scale sufficient to eliminate discrepancies.", "Capital flows quickly to offset the differences.", "Consumers prefer goods from Country A."], "a": 1, "s": "Revision", "src": "rev", "x": "Because international migration is limited in scale, wage differences between countries cannot be arbitraged away by workers moving abroad, so persistent wage gaps remain."}, {"q": "To simplify the classical trade models, how many countries and how many commodities are typically assumed?", "o": ["3 countries, 3 commodities", "2 countries, 3 commodities", "2 countries, 2 commodities", "1 country, 2 commodities"], "a": 2, "s": "Revision", "src": "rev", "x": "The standard simplifying framework uses two countries and two commodities so the trade-off can be shown clearly without complex multi-country algebra."}, {"q": "Absolute advantage is defined as the ability to produce a good using:", "o": ["Higher total capital inputs than other nations.", "Lower unit labor requirements than other countries.", "More natural resources than neighboring countries.", "Complex domestic trade tariffs."], "a": 1, "s": "Revision", "src": "rev", "x": "Absolute advantage is measured by unit labor requirements: the country that needs fewer labor-hours to produce a good is absolutely more efficient — i.e., has lower unit labor cost."}, {"q": "The classical theory of international trade is primarily concerned with production and exchange at what level?", "o": ["The monetary policy level", "The banking and credit level", "The barter level, without the intervention of money", "The digital currency level"], "a": 2, "s": "Revision", "src": "rev", "x": "Classical trade theory abstracts away from money and exchange rates, treating trade as a barter of goods for goods to focus purely on real productive differences."}, {"q": "What is defined as the quantity of other goods that must be sacrificed to produce one more unit of a specific good?", "o": ["Absolute cost", "Marginal utility", "Opportunity cost", "Factor endowment"], "a": 2, "s": "Revision", "src": "rev", "x": "Opportunity cost is the foregone output of another good when resources are redirected; it captures the real trade-off a country faces in production."}, {"q": "Factor endowment refers to:", "o": ["The total amount of trade tariffs collected by a government.", "The amount of factors of production (e.g., capital and labor) available in an economy.", "The level of education of the workforce.", "The historical wealth of a country's banking system."], "a": 1, "s": "Revision", "src": "rev", "x": "Factor endowment describes the stock of productive inputs — labor, capital, land — available in an economy, which shapes what a country can produce relatively cheaply."}, {"q": "If Country A requires 10 hours to produce a unit of Good X and Country B requires 20 hours, which country has the absolute advantage in Good X?", "o": ["Country B", "Neither country", "Country A", "Both countries share it"], "a": 2, "s": "Revision", "src": "rev", "x": "Country A needs only 10 hours vs. Country B's 20 hours; fewer hours means higher productivity, so Country A has the absolute advantage in Good X."}, {"q": "If Country A has an absolute advantage in producing all goods over Country B, David Ricardo proved that:", "o": ["Trade cannot benefit Country A.", "Trade cannot benefit Country B.", "Trade will still benefit both countries if they specialize according to comparative advantage.", "Country B should fully close its borders to trade."], "a": 2, "s": "Revision", "src": "rev", "x": "Ricardo showed that even the country with absolute advantages in everything still benefits from concentrating on its <em>relatively<\/em> best good and importing the rest."}, {"q": "In David Ricardo's classic model, which two countries and two goods were utilized for illustration?", "o": ["France and Germany; Wheat and Beer", "Portugal and England; Wine and Cloth", "Spain and Italy; Olives and Silk", "America and Britain; Cotton and Tobacco"], "a": 1, "s": "Revision", "src": "rev", "x": "Ricardo's famous numerical example used Portugal and England producing wine and cloth to illustrate that both gain from specialization even when Portugal is more efficient in both goods."}, {"q": "A nation possesses a comparative advantage in a good if its domestic opportunity cost for producing that good is:", "o": ["Higher than the other country's opportunity cost.", "Lower than the other country's opportunity cost.", "Equal to the other country's opportunity cost.", "Determined entirely by currency exchange rates."], "a": 1, "s": "Revision", "src": "rev", "x": "Comparative advantage rests on opportunity cost: a country should produce the good whose opportunity cost is lower domestically than abroad, reflecting relative — not absolute — efficiency."}, {"q": "When countries engage in international trade based on comparative advantage, they can enjoy:", "o": ["A lower level of overall consumption.", "A higher level of consumption with the same amount of resources.", "An immediate reduction in total domestic employment.", "Isolation from global economic shocks."], "a": 1, "s": "Revision", "src": "rev", "x": "By each country reallocating labor to its comparative-advantage good, total world output rises, allowing both countries to consume more than under autarky with the same resources."}, {"q": "If Country A must give up 2 units of Good Y to produce 1 unit of Good X, and Country B must give up 3 units of Good Y to produce 1 unit of Good X, which country has a comparative advantage in Good X?", "o": ["Country B", "Country A", "Neither country", "Both countries have the same advantage"], "a": 1, "s": "Revision", "src": "rev", "x": "Country A sacrifices only 2 units of Y per unit of X, while Country B sacrifices 3; the lower opportunity cost gives Country A the comparative advantage in X."}, {"q": "Under autarky, if Country A requires 20 hours to make a unit of Good Y, and under trade it can exchange a unit of Good X (which takes 10 hours to make) for a unit of Good Y, how many hours does Country A effectively save per unit of Y?", "o": ["5 hours", "10 hours", "15 hours", "20 hours"], "a": 1, "s": "Revision", "src": "rev", "x": "Without trade, Country A must spend 20 hours making Y. With trade, it makes X in 10 hours and swaps it for Y — saving 10 hours compared to domestic production."}, {"q": "According to the classical trade theory, what factor causes different production costs among countries?", "o": ["Fluctuating exchange rates", "Differing labor productivities", "Divergent corporate tax structures", "Varying transportation infrastructure quality"], "a": 1, "s": "Revision", "src": "rev", "x": "Classical theory traces cost differences to labor productivity differences: where workers produce more per hour, costs per unit are lower, creating incentives to trade."}, {"q": "Which of the following is an explicit simplifying assumption of the classical theory of international trade?", "o": ["High transportation costs", "Domestically immobile labor", "Zero transportation costs", "Massive global labor migration"], "a": 2, "s": "Revision", "src": "rev", "x": "Zero transportation costs is a standard classical assumption that ensures prices equalize across countries after trade and that no good is too costly to ship."}, {"q": "The concept that states all units of labor are identical and uniform within a country is known as labor being:", "o": ["Heterogeneous", "Homogeneous", "Specialized", "Fragmented"], "a": 1, "s": "Revision", "src": "rev", "x": "The classical model treats all workers as identical (homogeneous) so that the only production cost is the number of labor-hours, making comparisons between countries straightforward."}, {"q": "International trade enables countries to buy foreign goods at a price that is:", "o": ["Higher than it costs to make the same goods at home.", "Lower than it costs to make the same goods at home.", "Exactly equal to domestic production costs.", "Unrelated to domestic production costs."], "a": 1, "s": "Revision", "src": "rev", "x": "The core rationale for trade is that a country can obtain a foreign good by exporting something it produces cheaply, paying less (in labor cost terms) than if it produced the good domestically."}, {"q": "The Mercantilists believed in", "o": ["running trade surpluses", "balanced trade", "the logic of Adam Smith", "no government intervention in markets"], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam", "x": "Mercantilists equated national wealth with gold and silver accumulation, achieved by exporting more than importing, thereby running a persistent trade surplus."}, {"q": "Which of the following statements would a mercantilist NOT agree with?", "o": ["Imports are desirable.", "Trade is a zero-sum activity.", "The purpose of trade is to amass revenues from exports.", "A country can benefit by granting monopoly rights to individuals."], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam", "x": "Mercantilists viewed imports as draining gold out of the country, so they opposed them. They would agree with export promotion and trade-as-zero-sum, but not with valuing imports."}, {"q": "If a country has an absolute advantage in both goods, the country should specialize in and export that good which is", "o": ["relatively more efficient", "relatively less efficient", "relatively less inefficient", "None of the above"], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam", "x": "Comparative advantage: even with an absolute advantage in both, a country gains most by specializing where it is <strong>relatively more efficient<\/strong> (lowest opportunity cost) and importing the other good."}, {"q": "According to absolute advantage theory, each country will specialize in a good that it produces at ______ cost.", "o": ["Higher", "Lower", "The same", "None of the above"], "a": 1, "s": "Final 2024 (Model 2)", "src": "exam", "x": "Absolute advantage directs each country to the good it can produce with fewer labor-hours — i.e., at a lower (absolute) cost — than its trading partner."}, {"q": "According to the theory of comparative advantage, countries gain from trade because", "o": ["Trade makes firms behave more competitively, reducing their market power.", "All firms can take advantage of cheap labor.", "Output per worker in each firm increases.", "World output can rise when each country specializes in what it does relatively best."], "a": 3, "s": "Final 2024 (Model 2)", "src": "exam", "x": "Comparative advantage works by directing each country to its relatively most productive activity; global specialization raises total output, so both countries can consume more."}, {"q": "Each table shows labour hours to produce one unit of X and Y. X: A=1, B=6; Y: A=4, B=8. Identify which country has a comparative advantage in good X.", "o": ["Country A has a comparative advantage in good X.", "Country B has a comparative advantage in good X.", "Country A has a comparative disadvantage in good X.", "Country A has an absolute advantage in good X."], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam", "x": "Opportunity cost of X = (hours for X) ÷ (hours for Y). A: 1/4 = 0.25 Y; B: 6/8 = 0.75 Y. A's is lower → <strong>A has the comparative advantage in X<\/strong>. (A also has the absolute advantage in both, but the question asks about comparative advantage.)"}, {"q": "Each table shows labour hours to produce one unit of X and Y. X: A=3, B=6; Y: A=4, B=12. Identify which country has a comparative advantage in good X.", "o": ["Country A has a comparative advantage in good X.", "Country B has a comparative advantage in good X.", "Country A has an absolute disadvantage in good X.", "Country A has an absolute advantage in good X."], "a": 1, "s": "Final 2024 (Model 2)", "src": "exam", "x": "OC of X: A = 3/4 = 0.75 Y; B = 6/12 = 0.5 Y. B's is lower → <strong>B has the comparative advantage in X<\/strong>."}, {"q": "David Ricardo developed the Theory of Absolute Advantage.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. It was <b>Adam Smith<\/b> who developed the Theory of Absolute Advantage; David Ricardo developed the Theory of Comparative Advantage."}, {"q": "The classical theory of international trade assumes that labor is completely mobile between different countries.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The classical assumption is that labor is mobile <em>within<\/em> a country but <em>immobile between<\/em> countries — international migration is assumed not to occur on a meaningful scale."}, {"q": "According to the Labor Theory of Value, all labor is considered homogeneous.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. The Labor Theory of Value treats all workers as identical units; there are no skill differences, so all labor is homogeneous and interchangeable."}, {"q": "In a condition of perfect competition, marginal cost is equal to average cost, which is equal to price (MC = AC = Price).", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Perfect competition forces prices down to cost through free entry, so in long-run equilibrium every firm earns zero economic profit: P = MC = AC."}, {"q": "The classical theory assumes that unit labor costs rise significantly as output expands.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The classical model assumes <em>constant<\/
