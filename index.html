the only factor → a <strong>one-factor model<\/strong>; trade is caused by differences in <strong>labour productivity<\/strong>.", "<strong>H-O model<\/strong>: labour and capital are the <strong>two factors<\/strong> → a <strong>two-factor model<\/strong>.", "A <strong>capital-rich<\/strong> country exports <strong>capital-intensive<\/strong> goods; a <strong>labour-rich<\/strong> country exports <strong>labour-intensive<\/strong> goods.", "Each country imports goods that use intensively its relatively <strong>scarce<\/strong> factor."]}, {"h": "H-O assumptions & production functions", "p": ["<strong>Zero transport costs<\/strong> → goods' prices are the same in both trading countries; <strong>perfect competition<\/strong> → prices are given (producers are price-takers).", "Production functions are <strong>homogeneous of the first degree<\/strong>: doubling all inputs doubles output (raising K & L by a proportion raises output by the same proportion).", "<strong>MPL<\/strong> (marginal productivity of labour) rises as the stock of capital used rises; <strong>MPK<\/strong> is the extra output from one more unit of capital, holding labour constant.", "Profit-maximizing factor combination: <strong>MPK / MPL = PK / PL<\/strong> — the slope of the isoquant equals the factor-price ratio."]}, {"h": "Factor abundance, equalization & limits", "p": ["<strong>By factor prices<\/strong>: A is capital-rich vs. B if capital is relatively cheaper in A, i.e. <strong>P_AK/P_AL &lt; P_BK/P_BL<\/strong>.", "<strong>In physical terms<\/strong>: A is capital-rich if <strong>K_A/L_A &gt; K_B/L_B<\/strong> (higher capital-to-labour ratio).", "Trade takes place when <strong>relative prices differ<\/strong> between countries; trade <strong>reduces<\/strong> international differences in the prices of homogeneous factors (factor-price equalization).", "Full equalization needs <strong>no transport costs and no trade barriers<\/strong> — which is why the strict H-O conclusions are not met in the real world (tariffs, transport costs, economies of scale exist).", "Summary: the trade pattern is determined <strong>solely by international differences in supply (factor-endowment) conditions<\/strong>; tastes and technology are assumed the same."]}], "Q": [{"q": "According to the Ricardian theory of international trade, what is the only factor of production?", "o": ["Capital", "Land", "Labour", "Technology"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "The Heckscher-Ohlin (H-O) model is explicitly characterized as a:", "o": ["One-factor model", "Two-factor model", "Three-factor model", "Multi-factor dynamic model"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "In the Ricardian theory, the primary cause of international trade is a difference in:", "o": ["Consumer tastes", "Resource endowments", "Capital accumulation", "Labour productivity"], "a": 3, "s": "Revision", "src": "rev"}, {"q": "Under the H-O model assumptions, what is the effect of having zero transportation costs?", "o": ["Wages become completely unequal worldwide.", "Goods' prices will be the same in both trading countries.", "Trade becomes completely impossible.", "Capital flows instantly across borders."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "A production function is said to be homogeneous of the first degree if doubling all inputs results in:", "o": ["Tripling the final output", "Keeping the output constant", "Doubling the final output", "Decreasing marginal returns only"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "If a firm's production function is homogeneous of the first degree, what happens to output when capital and labour are increased by a specific proportion?", "o": ["Output increases by a larger proportion.", "Output increases by the exact same proportion.", "Output remains completely unchanged.", "Output drops due to crowding effects."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "According to the properties of the H-O production functions, the marginal productivity of labour (MPL) increases when:", "o": ["The stock of capital used increases.", "The amount of labour decreases while capital remains zero.", "The wage rate drops.", "Capital is held strictly at zero."], "a": 0, "s": "Revision", "src": "rev"}, {"q": "Marginal productivity of capital (MPK) is defined as the increase in output caused by a one-unit increase in capital while assuming:", "o": ["Technology is constantly improving.", "Labour is kept constant.", "Output prices are falling.", "The amount of capital is halved."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The more capital-intensive a country's methods of production are, the:", "o": ["Lower the marginal productivity of labour becomes.", "Higher the marginal productivity of labour becomes.", "Lower the total output will be.", "Higher the trade barriers must be."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Under perfect competition in both commodity and factor markets, prices are treated as:", "o": ["Entirely unpredictable", "Given", "Set by the largest monopoly", "Determined by transportation costs"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "To maximize profits, a producer will combine labour and capital such that the slope of the isoquant curve equals:", "o": ["The absolute amount of total cost", "The factor prices ratio (PK / PL)", "The consumer preference ratio", "The total supply of commodities"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The mathematical condition for profit maximization and optimal factor combination is given as:", "o": ["MPK × MPL = PK × PL", "MPK / MPL = PK / PL", "MPK / PK = LA × KA", "KA / LA = KB / LB"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "When defining factor abundance by factor prices, Country A is considered capital-rich compared to Country B if:", "o": ["Total capital in A is numerically less than in B.", "Capital is relatively cheaper in A than in B.", "Wages are lower in A than in B.", "Interest rates are higher in A than in B."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Which algebraic expression correctly defines Country A as capital-abundant based on factor prices?", "o": ["P_AK / P_AL < P_BK / P_BL", "P_AK / P_AL > P_BK / P_BL", "K_A / L_A < K_B / L_B", "P_AK × P_AL = P_BK × P_BL"], "a": 0, "s": "Revision", "src": "rev"}, {"q": "When defining factor abundance in physical terms, we directly compare the:", "o": ["Interest rates and wages of both countries", "Physical amounts of labour and capital", "Total value of exports and imports", "Tariffs and transport fees"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Which algebraic expression states that Country A is capital-rich in physical terms?", "o": ["P_AK / P_AL < P_BK / P_BL", "K_A / L_A > K_B / L_B", "K_A / L_A < K_B / L_B", "L_A / K_A > L_B / K_B"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "According to the H-O theory, a country that is rich in capital will export:", "o": ["Labour-intensive goods", "Capital-intensive goods", "Agricultural goods only", "Low-technology commodities"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "According to the H-O theory, a country that is rich in labour will export:", "o": ["Capital-intensive goods", "High-tech goods", "Labour-intensive goods", "Services exclusively"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "International trade continues to equalize prices until relative differences are eliminated, with the exception of:", "o": ["Labour costs", "Technology differences", "Transportation costs", "Capital endowments"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Trade between two nations takes place when:", "o": ["Relative prices are identical in both countries.", "Relative prices differ between countries.", "Transportation costs are higher than commodity prices.", "Both countries have the exact same factor endowments."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "As Country A produces more capital-intensive machines and less wheat, its internal demand for:", "o": ["Capital falls while labour rises.", "Both capital and labour fall.", "Capital rises while labour falls.", "Both capital and labour rise."], "a": 2, "s": "Revision", "src": "rev"}, {"q": "International trade acts to:", "o": ["Magnify the global gaps in factor prices.", "Reduce international differences in prices of homogeneous factors.", "Ensure that capital-rich countries eventually lose all their capital.", "Eliminate the use of technology."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Which of the following is an explicit condition required for factor price equalization to occur?", "o": ["High protective tariffs", "No transportation costs and no trade barriers", "Imperfect competition in commodity markets", "Different production technologies for the same good"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Why are the strict conclusions of the H-O model not perfectly met in the real world?", "o": ["Because real-world markets have perfect competition.", "Because transportation costs and trade barriers actually exist.", "Because technology is perfectly uniform across all nations.", "Because economies of scale do not exist in reality."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "According to the H-O summary, the trade pattern is determined solely by international differences in:", "o": ["Demand conditions alone", "Supply conditions alone", "Government regulations alone", "Consumer preferences alone"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "A difference in relative commodity prices between two nations can be based upon a difference in:", "o": ["factor endowments", "technology", "tastes", "all of the above"], "a": 3, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "The Ricardian theory relies on a model that incorporates both labour and capital as production factors.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The Heckscher-Ohlin model assumes that capital and labour are the two main factors of production.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Trade eliminates the differences in factor prices between participating countries according to the H-O model.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The H-O model assumes that transportation costs are heavy and heavily influence final trade equilibrium prices.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Homogeneity of the first degree means that if you double only your labour input while keeping capital constant, your final output will double.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The marginal productivity of labour (MPL) drops as the stock of capital increases.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The marginal productivity of capital (MPK) increases when the amount of labour used increases.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Methods of production that are highly capital-intensive result in a higher marginal productivity of labour.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "In conditions of perfect competition, producers are price-takers, meaning prices are given.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The slope of the isoquant curve represents the ratio of the marginal productivities of capital and labour.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The slope of the price or cost line represents the factor prices ratio.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The production functions in the H-O model assume that all commodities share the exact same factor intensities.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The H-O model assumes that a specific good (e.g., good X) is produced using entirely different technologies in different countries.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Defining factor abundance by factor prices relies on comparing physical ratios of resources (K/L).", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "If P_AK / P_AL < P_BK / P_BL, it means capital is relatively cheaper in Country A than in Country B.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "In the equation for physical factor abundance, K_A stands for the total amount of capital in Country A.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "According to the physical definition of abundance, Country A is capital-rich if K_A / L_A > K_B / L_B.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Once international relative differences in commodity prices are fully eliminated, trade stops expanding.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "When Country A increases its production of capital-intensive goods, its internal price of capital (interest rate) decreases.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Tariffs are an example of trade barriers that prevent perfect factor price equalization in the real world.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The H-O model assuming \"no economies of scale\" is perfectly reflected in real-world industries.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The H-O theory assumes that trading countries have completely different tastes and consumption preferences.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Differences in relative factor endowments lead to differences in relative factor prices, which ultimately drive international trade.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Under H-O theory, each country imports products that use intensively its relatively abundant factor of production.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Each country imports products that intensively use its relatively scarce factor of production.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}]}, {"id": "it4", "l": "IT.4", "c": "#3498DB", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 4 — New Theories of Trade", "d": "The Leontief Paradox, the Human-Skills (neofactor) theory, the Technology-Gap model and Vernon's Product Life Cycle. Real answer-keyed revision questions.", "S": [{"h": "The Leontief Paradox", "p": ["H-O predicts a capital-rich country exports capital-intensive goods. Using <strong>input-output tables<\/strong>, <strong>Leontief<\/strong> found the US's exports had a <strong>lower<\/strong> capital-labour ratio than its imports — the opposite of H-O.", "This <strong>Leontief Paradox directly contradicts the Heckscher-Ohlin assumption<\/strong>.", "Explanations: a US demand bias toward capital-intensive goods (which can reverse comparative advantage), <strong>factor-intensity reversal<\/strong>, US import restrictions biased against labour-intensive imports, and abundant US skilled labour.", "<strong>Factor-intensity reversal<\/strong>: a good that is capital-intensive at one set of factor prices becomes labour-intensive at another — breaking the link between factor endowments and comparative advantage."]}, {"h": "Human-Skills (neofactor) theory", "p": ["The traditional theory treated labour as <strong>homogeneous<\/strong>; the human-skills theory separates skilled from unskilled labour.", "It resolves the paradox by <strong>increasing the numerator (capital) by adding the value of labour skills<\/strong> (creating skills needs saving/investment) — making the US capital-abundant.", "Because it <strong>adds a new factor of production (labour skills)<\/strong> to the H-O model, it is called a <strong>'neofactor'<\/strong> theory."]}, {"h": "Technology-Gap model (Posner) & lags", "p": ["Developed by <strong>Michael Posner<\/strong>; examines technological change between countries with <strong>similar factor endowments<\/strong>.", "Innovations take two forms: <strong>process innovations<\/strong> (cheaper production) and the <strong>production of wholly new products / improvements<\/strong>.", "An <strong>imitation lag<\/strong> stops foreign nations from copying instantly, giving the innovator an <strong>export monopoly<\/strong>; its duration depends on patent protection.", "A <strong>demand lag<\/strong> is the time foreign consumers take to react/accept the new product. Trade occurs because the demand lag is usually <strong>shorter<\/strong> than the imitation lag.", "Limitation: the model can't explain why some countries are persistent leaders and others followers."]}, {"h": "Vernon's Product Life Cycle", "p": ["Unlike Posner, Vernon's model relies on <strong>different factor endowments across countries<\/strong> and frames both trade <strong>and investment<\/strong>.", "Three stages: <strong>New product → Maturing product → Standardized product<\/strong>.", "<strong>New product<\/strong>: introduced in a <strong>capital-rich, labour-scarce<\/strong> country; unstable production functions, short runs, highly skilled labour.", "<strong>Maturing product<\/strong>: mass production; labour shifts from skilled to semiskilled; firms keep market share via product differentiation (promotion & packaging).", "<strong>Standardized product<\/strong>: comparative advantage shifts to <strong>labour-abundant countries with low unit-labour costs<\/strong>."]}], "Q": [{"q": "The Heckscher-Ohlin model assumes that a country will export products that intensively use its:", "o": ["Relatively scarce factors of production", "Relatively abundant factors of production", "Natural resources only", "Technology-intensive inputs"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Wassily Leontief discovered his famous paradox by analyzing international trade data using:", "o": ["Consumer indifference curves", "Production possibility frontiers", "Input-output tables", "Linear programming models"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "The Leontief Paradox found that the capital-labor ratio in US exports was:", "o": ["Higher than the capital-labor ratio in its imports", "Lower than the capital-labor ratio in its imports", "Exactly equal to the capital-labor ratio in its imports", "Double the country's national savings rate"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Which theory or model does the Leontief Paradox directly contradict?", "o": ["The Technology Gap Model", "The Product Life Cycle Model", "The Human-Skills Theory of Trade", "The Heckscher-Ohlin Assumption"], "a": 3, "s": "Revision", "src": "rev"}, {"q": "If a capital-abundant country has a strong demand bias toward capital-intensive goods, this bias can:", "o": ["Reinforce its existing comparative advantage", "Reverse its comparative advantage in those specific goods", "Keep domestic prices strictly below foreign prices", "Eliminate the need for any domestic labor force"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "When factor-intensity reversal occurs, a good that is capital-intensive at one set of factor prices becomes:", "o": ["Wholly obsolete at another set of factor prices", "Standardized across all nations instantly", "Labor-intensive compared to another good at a different set of factor prices", "Dependent entirely on technology gaps"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Factor-intensity reversal breaks the fundamental link between:", "o": ["Technology innovations and consumer preferences", "Import restrictions and domestic tariff rates", "Factor endowments and comparative advantage", "Human skills and capital-intensive manufacturing"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "If the US imposes heavy tariffs and trade restrictions targeted specifically against labor-intensive imports, the observed result will be:", "o": ["A higher labor intensity for US imports than under free trade", "A lower labor intensity for US imports than in the absence of restrictions", "An immediate end to all domestic technology innovation", "An absolute specialization in agricultural products"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The traditional theory of international trade simplified its analysis by treating labor as:", "o": ["A heterogeneous factor of production", "A homogeneous factor of production", "A neofactor based on high-technology patents", "A completely obsolete input"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "To resolve his paradox, Leontief suggested that if an American worker is three times as productive as a foreign worker, the analyst should:", "o": ["Multiply the total number of American workers by three", "Divide the total US capital stock by three", "Subtract the value of human skills from the capital numerator", "Eliminate labor calculations from the model entirely"], "a": 0, "s": "Revision", "src": "rev"}, {"q": "The Technology Gap Model was originally developed by:", "o": ["Wassily Leontief", "Raymond Vernon", "Michael Posner", "Bertil Ohlin"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "The human-skills theory of trade differentiates itself from Leontief's worker adjustment by:", "o": ["Multiplying the denominator (labor) by three", "Increasing the numerator (capital) by adding the value of labor skills", "Restricting all skilled labor to the service sector", "Assuming human skills do not require any previous saving or investment"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Why is the human skills approach classified as a \"neofactor\" theory?", "o": ["It replaces capital completely with digital algorithms", "It treats international trade as a static, closed environment", "It adds a new factor of production (labor skills) to the traditional H-O model", "It completely eliminates the role of natural resources"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "According to technology theories of trade, technological innovations can take two basic forms: process innovations (more economical production methods) and:", "o": ["Complete elimination of import restrictions", "The production of wholly new products and improvements in existing goods", "The reduction of human skills in favor of raw labor", "Permanent expansion of demand bias"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The Technology Gap Model specifically examines the influence of technological change on trade between countries that have:", "o": ["Drastically different natural resource allocations", "Similar factor endowments", "No domestic consumer demand for manufactured goods", "Closed economic boundaries and strict tariffs"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "What prevents non-innovating countries from immediately replicating a new product?", "o": ["A permanent demand lag", "An imitation lag", "A factor-intensity reversal", "Strict mass-production quotas"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "During the imitation lag period, the innovating country enjoys:", "o": ["An import dependency on low-wage nations", "An export monopoly", "Perfectly elastic domestic demand curves", "A completely stable and fixed production function"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The demand lag occurs because foreign consumers:", "o": ["Take time to react to the price drop or need time to accept the new product as a substitute", "Refuse to purchase any goods containing human skills", "Are legally blocked from trading by the World Trade Organization", "Instantly copy the product design within day zero"], "a": 0, "s": "Revision", "src": "rev"}, {"q": "The duration of the imitation or reaction lag depends heavily on the nature of the innovation and:", "o": ["The abundance of unskilled labor", "Whether the innovating country has patent protection", "The size of the input-output table", "The presence of a strong demand bias toward old goods"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Trade successfully takes place because the net effect of the two lags usually shows that:", "o": ["The imitation lag is shorter than the demand lag", "The demand lag is shorter than the reaction or imitation lag", "Both lags are perfectly equal to zero", "The demand lag disappears immediately upon innovation"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "A major limitation of the Technology Gap Model is that it fails to explain:", "o": ["Why trade happens between similar nations", "Why certain countries are technological leaders while others are followers", "The concept of an export monopoly", "The existence of consumer demand"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Unlike the Posner analysis, Vernon's product life cycle model explicitly relies on:", "o": ["Identical consumer behavior worldwide", "Disappearing imitation lags", "Different factor endowments across countries", "Fixed, unalterable technology parameters"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "What are the three successive stages of the product life cycle?", "o": ["Innovation, Replication, Obsolescence", "Primary product, Secondary product, Standardized product", "New product, Maturing product, and Standardized product", "Domestic product, Exported product, Restrained product"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "In the first stage of the Product Life Cycle, the new product is typically introduced in a country that is:", "o": ["Capital-poor and labor-abundant", "Capital-rich and labor-scarce", "Dependent entirely on natural resource imports", "Characterized by low wages and high production volumes"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "During the \"new product\" stage, production is characterized by:", "o": ["Highly stable production functions and massive production scales", "Long production runs using unskilled labor", "Unstable production functions, short production runs, and highly skilled labor", "Intensely fierce price competition from foreign nations"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "As a product moves into the \"maturing product\" stage, firms often attempt to maintain market share by:", "o": ["Stopping all exports to foreign nations", "Utilizing product differentiation through promotion and packaging", "Increasing their reliance on highly specialized, expensive scientific labor", "Making the demand curve completely price inelastic"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "When a product enters the \"standardized product\" stage, the comparative advantage shifts toward:", "o": ["Countries with the highest concentration of research and development", "Labor-abundant countries where unit labor costs are relatively low", "Nations that possess an absolute export monopoly", "Countries with small, highly unstable production markets"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The Heckscher-Ohlin model assumes that a capital-abundant country will import capital-intensive goods.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Wassily Leontief's empirical findings supported the primary assumptions of the Heckscher-Ohlin theorem regarding US trade patterns.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "A strong domestic demand bias toward capital-intensive goods in a capital-rich country can make those goods more expensive domestically and alter traditional trade flows.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Factor-intensity reversal occurs when a good remains capital-intensive relative to another good across all possible ranges of factor prices.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "If factor reversibility occurs, a labor-rich country could establish a comparative advantage in a capital-intensive good.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The Heckscher-Ohlin model comprehensively integrates the role of scarce natural resources in determining international trade patterns.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "If US import restrictions are heavily biased against labor-intensive goods, the recorded data will reflect a lower labor intensity for US imports than would occur under free trade conditions.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The traditional theory of international trade divided the labor force into distinct categories of highly skilled and non-skilled workers.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The human-skills theory adjusts the capital-labor ratio by multiplying the denominator (labor) by three, exactly as Leontief originally proposed.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The human skills approach is considered a \"neofactor\" theory because it redefines capital or adds labor skills as a distinct factor of production.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Posner's Technology Gap Model explains trade between nations that possess completely different factor endowments and demand environments.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "An imitation lag prevents foreign competitor nations from duplicating an innovative product instantly.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The time between the launch of a new product in an innovative nation and the moment foreign producers see it as a domestic competitive threat is called the demand lag.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The innovating country successfully secures an export advantage because the demand lag is typically shorter than the imitation lag.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The Technology Gap Theory provides an exhaustive explanation as to why specific countries consistently act as technological innovators.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Vernon's Product Life Cycle Model serves as an analytical framework for both international trade and international investment.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "During the initial \"new product\" stage of the life cycle, the price elasticity of demand is extremely high because consumers can choose from many close substitutes.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Production in the new product stage relies heavily on stable, unchanging production functions and a high volume of unskilled manufacturing labor.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "In the maturing product stage, manufacturing methods shift toward mass-production, and labor inputs move from highly skilled to semiskilled workers.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Once a product reaches the standardized product stage, production becomes more labor-skill intensive, causing manufacturing locations to return to high-wage nations.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}]}, {"id": "it5", "l": "IT.5", "c": "#16A085", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 5 — The Balance of Payments (BOP)", "d": "Residents, credits vs debits, the current / capital / official-settlement accounts, SDRs, double-entry bookkeeping, and the CA = NS − I and CA = Y − E problems. Real answer-keyed revision questions.", "S": [{"h": "What the BOP is", "p": ["The <strong>balance of payments<\/strong> records all economic transactions between the <strong>residents<\/strong> of a country and the rest of the world over a <strong>calendar year<\/strong>.", "Its main purpose is to <strong>inform the government of its international position and assist in policy formulation<\/strong> (monetary, fiscal, commercial). It <strong>aggregates<\/strong> millions of transactions into a few major categories.", "<strong>Residents<\/strong> include diplomats, citizens, and military personnel (residents of their home country); a corporation is a resident of the country where it is <strong>incorporated<\/strong>. International bodies (UN, IMF, World Bank) are <strong>not<\/strong> residents of their host country.", "An <strong>international transaction<\/strong> is the exchange of a good, service, or asset; <strong>gifts and grants<\/strong> are included even though no payment is required."]}, {"h": "Credits (+) vs Debits (−)", "p": ["<strong>Credit (+)<\/strong> transactions involve the <strong>receipt of payments from foreigners<\/strong>: exports, unilateral transfers received, capital inflows.", "<strong>Debit (−)<\/strong> transactions involve <strong>making payments to foreigners<\/strong>: imports, unilateral transfers to foreigners, capital outflows.", "The BOP uses <strong>double-entry bookkeeping<\/strong> — each transaction is recorded twice, once as a credit and once as a debit of equal amount — so it is always in accounting equilibrium (helped by errors & omissions)."]}, {"h": "The three accounts", "p": ["<strong>Current Account<\/strong> = trade in <strong>merchandise<\/strong> (tangible goods), <strong>services<\/strong> (travel, tourism, insurance, remittances, diplomatic costs), and <strong>unilateral transfers<\/strong>. Trade Balance = merchandise exports − merchandise imports.", "<strong>Capital Account<\/strong> = international investments and loans (long-term = maturity of one year or more; short-term). <strong>Direct investment<\/strong> = building a plant/factory abroad; <strong>portfolio investment<\/strong> = buying foreign stocks/bonds.", "<strong>Capital inflow (+)<\/strong> = an increase in foreign assets in the country; <strong>capital outflow (−)<\/strong> = an increase in the country's assets abroad.", "<strong>Official Settlement Account<\/strong> = changes in liquid/non-liquid liabilities to foreign official holders and in <strong>official reserve assets<\/strong> (SDRs and gold). <strong>SDRs<\/strong> are a reserve asset created on the books of the IMF. An increase in official reserves is a debit (−)."]}, {"h": "Autonomous vs accommodating & the CA problems", "p": ["<strong>Autonomous<\/strong> transactions (\"above the line\") = all current- and capital-account transactions. <strong>Accommodating<\/strong> transactions (\"below the line\") = the official settlements account.", "<strong>Basic Balance<\/strong> = current-account balance + long-term capital balance.", "<strong>CA = NS − I<\/strong> (national saving − domestic investment): if NS &gt; I → surplus; if NS &lt; I → deficit.", "<strong>CA = Y − E<\/strong> (national income − national expenditure): if Y &gt; E → surplus; if Y &lt; E → deficit. A deficit must be financed by foreign investment or foreign borrowing."]}], "Q": [{"q": "What is the standard specific period of time used to record a country's balance of payments (BOP)?", "o": ["A fiscal quarter", "A calendar year", "Five years", "A single month"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Which of the following is considered a primary purpose of the balance of payments?", "o": ["To track the exact daily wealth of individual citizens", "To inform the government of its international position and assist in policy formulation", "To eliminate the need for international monetary exchange", "To record illegal domestic transactions"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Because millions of individual transactions occur, how does the balance of payments present data?", "o": ["It records every transaction individually by name", "It omits small transactions entirely", "It aggregates transactions into a few major categories", "It only tracks transactions involving cash"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Which of the following is included in a country's balance of payments even though no payment is normally required?", "o": ["Commercial merchandise trade", "Portfolio investments", "Gifts and grants", "Central bank loans"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Who among the following is considered a resident of the country where they hold citizenship rather than where they are currently located?", "o": ["A foreign branch of a domestic corporation", "A tourist or a temporarily migrated worker", "An international institution like the United Nations", "A foreign subsidiary of a local bank"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "According to the text, a corporation is considered a resident of:", "o": ["Every country where it opens a small branch", "The country in which it is incorporated", "International waters", "Only countries that do not levy corporate taxes"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Which of the following organizations is explicitly NOT considered a resident of the country in which it is located?", "o": ["A domestic manufacturing plant", "A local military base", "The International Monetary Fund (IMF)", "A registered domestic corporation"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "What are the three main accounts that make up the balance of payments?", "o": ["Merchandise Account, Service Account, and Income Account", "Current Account, Capital Account, and Official Settlements Account", "Savings Account, Investment Account, and Government Account", "Autonomous Account, Accommodating Account, and Trade Account"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "A transaction that leads to the receipt of a payment from foreigners is classified as a:", "o": ["Debit transaction", "Credit transaction", "Balanced transaction", "Deficit transaction"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "A debit transaction is defined as one that leads to:", "o": ["A payment to foreigners", "A receipt of funds from an international body", "An increase in national saving", "An accumulation of gold reserves"], "a": 0, "s": "Revision", "src": "rev"}, {"q": "The Current Account includes the value of trade in which three categories?", "o": ["Liquid assets, non-liquid assets, and portfolio investments", "Long-term loans, short-term loans, and direct investments", "Merchandise, services, and unilateral transfers", "Official reserve assets, liabilities, and gold"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Trade in \"merchandise\" refers specifically to:", "o": ["Financial derivative assets", "Tangible goods (commodities)", "Foreign currency reserves", "Tourism and travel expenses"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Which of the following items is classified under \"services\" in the current account?", "o": ["Building a foreign plant or factory", "Purchasing foreign stocks and bonds", "Travel, tourism, and insurance services", "Trade in tangible commodities"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Why are the exports of goods and services entered in the current account as credits (+)?", "o": ["Because they result in a net loss of physical goods", "Because they lead to the receipt of payments from foreigners", "Because they increase government expenditure", "Because they are mandated by the World Bank"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The import of goods and services is entered into the current account as a debit (−) because it leads to:", "o": ["Receipts from foreign consumers", "Payments to foreigners", "An increase in the basic balance", "An accumulation of Special Drawing Rights"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "What type of flows does the Capital Account display?", "o": ["Only unilateral transfers and gifts", "Trade in tangible goods and tourism costs", "International investments and loans (long-term and short-term)", "Changes in official gold reserves"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Long-term international capital transactions are defined as transactions with a maturity of:", "o": ["Less than six months", "Exactly one calendar year", "One year or more", "More than ten years"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Building a factory or plant in a foreign country is an example of what type of investment?", "o": ["Portfolio investment", "Unilateral transfer", "Direct investment", "Accommodating transaction"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "The purchase of foreign stocks and bonds is categorized as:", "o": ["Direct investment", "Portfolio investment", "Merchandise trade", "Official reserve asset"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Which of the following represents a \"capital inflow\" to a country?", "o": ["An increase in domestic assets held abroad", "An increase in foreign assets in the domestic country", "A reduction in foreign assets inside the country", "An increase in unilateral transfers to foreign entities"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "When an Egyptian citizen sells a foreign stock, Egypt's assets abroad decrease. This is recorded as a:", "o": ["Capital outflow and entered as a debit (−)", "Capital inflow and entered as a credit (+)", "Service export", "Unilateral transfer"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Capital outflows occur when transactions lead to payments to foreigners, and they are entered as:", "o": ["Credits (+)", "Debits (−)", "Autonomous receipts", "Errors and omissions"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "What does the Official Settlement Account measure?", "o": ["Only the trade in tangible commodities and services", "Changes in liquid/non-liquid liabilities to foreign official holders and changes in official reserve assets", "Private household savings and domestic corporate profits", "The total expenditure of the Ministry of Foreign Affairs"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Liquid liabilities to foreign official holders usually take the form of:", "o": ["Direct investments in foreign manufacturing facilities", "Short-term private trade loans", "Government bonds, treasury bills, and national convertible currency", "Gold deposits inside commercial banks"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Which of the following is explicitly listed as part of a country's official reserve assets?", "o": ["Private foreign bank deposits", "Foreign branches of domestic corporations", "Special Drawing Rights (SDRs) and gold reserves", "Domestic corporate stocks"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "What are Special Drawing Rights (SDRs)?", "o": ["A type of long-term commercial trade loan", "A new type of reserve asset created on the books of the IMF", "The right of a country to export merchandise tax-free", "A measure of private corporate investments abroad"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "In the Official Settlement Account, an increase in a country's official reserve assets is recorded as a:", "o": ["Credit (+)", "Debit (−)", "Surplus balance", "Basic balance"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Why is the balance of payments always in an accounting equilibrium?", "o": ["Because governments never make tracking errors", "Due to the double-entry bookkeeping system and the inclusion of errors and omissions", "Because international trade is always perfectly balanced", "Because capital outflows are illegal"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Autonomous transactions (transactions \"above the line\") include:", "o": ["Only the official settlements account", "All transactions in the current and capital accounts", "Only errors and omissions", "Special drawing rights adjustments"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "How is the \"Trade Balance\" calculated?", "o": ["National Saving minus Domestic Investment", "Current Account Balance plus Long-Term Capital Balance", "Merchandise exports minus merchandise imports", "Total Credits minus Total Debits in all three major accounts"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "An American citizen buys a Japanese car. This will be recorded in the balance of payments as which transaction?", "o": ["Capital account", "Official reserves account", "Current account", "None of the above"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "If an Egyptian citizen invests in New York, this person is considered ______ in Egypt and ______ in America.", "o": ["Resident, non-resident", "Non-resident, resident", "Resident, resident", "Non-resident, non-resident"], "a": 0, "s": "Revision", "src": "rev"}, {"q": "A British person buys an iPhone, paying by writing a check on an account with a bank in London. How is this accounted for in the balance of payments?", "o": ["Current account, an American good import", "Current account, a British good import", "Capital account, a British asset import", "Current account good import and a capital account asset export"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The payment of dividends to a foreigner holding Egyptian equity is recorded as:", "o": ["A credit in the Egyptian current account", "A credit in the Egyptian capital account", "A debit in the Egyptian current account", "A debit in the Egyptian capital account"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Purchase of a UK treasury bill by an Egyptian resident ______ the Egyptian assets abroad and is recorded as a:", "o": ["Decrease; credit", "Increase; debit", "Decrease; debit", "Increase; credit"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Capital inflow can take the form of:", "o": ["An Egyptian resident sells foreign stocks", "A UK resident sells Egyptian stocks", "Both of the above", "None of the above"], "a": 0, "s": "Revision", "src": "rev"}, {"q": "Problem: National Saving (NS) = 700 billion and Domestic Investment (I) = 550 billion. Using CA = NS − I, the current account balance is:", "o": ["+150 billion — a Current Account Surplus", "−150 billion — a Current Account Deficit", "+250 billion — a Current Account Surplus", "Zero — the account is balanced"], "a": 0, "s": "Revision", "src": "rev"}, {"q": "Problem: National Income (Y) = 1,500 billion and National Expenditure (E) = 1,700 billion. Using CA = Y − E, the current account balance is:", "o": ["+200 billion — a Current Account Surplus", "−200 billion — a Current Account Deficit", "−200 billion — a Current Account Surplus", "+200 billion — a Current Account Deficit"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The main purpose of the BOP is to eliminate all domestic taxes.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Economic transactions in the BOP include gifts and certain other transactions for which no payment is required.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Foreign branches and subsidiaries of a corporation are legally considered residents of the country where the parent company is incorporated.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Diplomats and military personnel are considered residents of the country in which they hold citizenship.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "A credit transaction is one that results in making a payment to foreigners.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Remittances of workers abroad and costs of diplomatic missions are classified under \"services\" in the current account.", "o": [" ": "rev", "tf": 1}, {"q": "Accommodating transactions (transactions \"below the line\") form the official settlements accounts.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The balance of payments will be in economic equilibrium if total credits equal total debits across all three accounts, including official settlements.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The \"Basic Balance\" includes the current account balance and the long-term capital balance.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "If national saving (NS) is less than domestic investment (I), there will be a current account surplus.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "When capital transactions lead to the receipt of payments from foreigners, they are capital inflows and entered as a debit (−).", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Surplus means that the balance on a subaccount is positive.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "\"Service\" is the trade in tangible goods.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "International institutions such as the United Nations, the IMF and the World Bank are residents of the country in which they are located.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The capital account is the sum of the balance of trade.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}]}]</script>
<script>
function B(){ return JSON.parse(document.getElementById("qdata").textContent); }

/* ---------- state ---------- */
var CH;
var ci = 0;
var md = "s";            // "s" notes, "q" quiz
var QS = {};
var qsz = 0;
var view = "ch";         // "ch" | "mix" | "final" | "past"
var srcFilter = "all";   // "all" | "exam" | "tb"

var MIX   = {c:"#9B59B6", t:"All Chapters — Mixed Quiz"};
var FINAL = {c:"#F4A261", t:"Final Exam — 50 Questions (25 Money &amp; Banking + 25 International Trade)"};
var PAST  = {c:"#56C271", t:"Past Cairo University Exams — Real Questions Only"};

/* ---------- helpers ---------- */
function esc(s){return (""+s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}
function isExam(q){return q.src==="exam";}
function isTB(q){return q.src==="tb";}
function isRev(q){return q.src==="rev";}
function isGen(q){return q.src==="gen";}
var SRCMETA={exam:{lbl:"📚 Past Exams"},rev:{lbl:"📝 Revision"},tb:{lbl:"📋 Test Bank"},gen:{lbl:"✦ Expected"}};
var SRCORDER=["exam","rev","tb","gen"];
function allQ(){var a=[];for(var i=0;i<CH.length;i++){for(var j=0;j<CH[i].Q.length;j++){a.push(CH[i].Q[j]);}}return a;}
function chOf(q){return CH[q._ci];}
function qcolor(q){return CH[q._ci].c;}
function qlabel(q){return CH[q._ci].l;}

function sh2(a){
  for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}
  for(var i=0;i<a.length-1;i++){var j=i+1+Math.floor(Math.random()*(a.length-i-1));var t=a[i];a[i]=a[j];a[j]=t;}
  return a;
}

function gc(){
  if(view==="final") return FINAL;
  if(view==="past")  return PAST;
  if(view==="mix")   return MIX;
  return CH[ci];
}

function getPool(){
  if(view==="past") return allQ().filter(isExam);
  if(view==="mix") return allQ();
  var base = CH[ci].Q;
  if(srcFilter==="all") return base;
  return base.filter(function(q){return q.src===srcFilter;});
}

/* ---------- init ---------- */
function init(){
  // tag each question with its chapter index
  for(var i=0;i<CH.length;i++){for(var j=0;j<CH[i].Q.length;j++){CH[i].Q[j]._ci=i;}}

  var hm="",hi="";
  for(var i=0;i<CH.length;i++){
    var b='<button class="tab" id="tab'+i+'" onclick="sc('+i+')">'+CH[i].l+'</button>';
    if(CH[i].grp==="mb") hm+=b; else hi+=b;
  }
  document.getElementById("tabs-mb").innerHTML=hm;
  document.getElementById("tabs-it").innerHTML=hi;
  document.getElementById("tabs-mix").innerHTML=
     '<button class="tab" id="tabmix"   onclick="smix()">All Chapters</button>'
   + '<button class="tab" id="tabfinal" onclick="sfinal()">📝 Final Exam</button>'
   + '<button class="tab" id="tabpast"  onclick="spast()">📚 Past Exams</button>';

  var ex=allQ().filter(isExam).length, rev=allQ().filter(isRev).length, tb=allQ().filter(isTB).length, gn=allQ().filter(isGen).length;
  document.getElementById("banner").innerHTML=
    '<b>Final exam:</b> 50 questions — 25 Money &amp; Banking + 25 International Trade (equal weight). '
    +'This guide has <b>'+allQ().length+'</b> questions ('+ex+' from real past exams, '+rev+' from the exam-revision booklet, '+tb+' test-bank, '+gn+' expected).';

  sc(0);
}

function clearTabs(){
  for(var i=0;i<CH.length;i++){var e=document.getElementById("tab"+i);e.className="tab";e.style.background="";}
  ["tabmix","tabfinal","tabpast"].forEach(function(id){var e=document.getElementById(id);e.className="tab";e.style.background="";});
}

function sc(i){
  view="ch"; srcFilter="all"; ci=i;
  clearTabs();
  var e=document.getElementById("tab"+i);e.className="tab ac";e.style.background=CH[i].c;
  document.getElementById("ct").textContent=CH[i].t;
  var cd=document.getElementById("cdesc");
  cd.textContent=CH[i].d||"";
  cd.className=CH[i].d?"cdesc":"cdesc hide";
  document.getElementById("mbar").className="mbar";
  buildMbar();
  sm("s");
}

function smix(){ startMode("mix","tabmix"); }
function sfinal(){ startMode("final","tabfinal"); }
function spast(){ startMode("past","tabpast"); }

function startMode(v,tabid){
  view=v; srcFilter="all"; md="q";
  clearTabs();
  var e=document.getElementById(tabid);e.className="tab ac";e.style.background=gc().c;
  document.getElementById("ct").innerHTML=gc().t;
  document.getElementById("cdesc").className="cdesc hide";
  document.getElementById("mbar").className="mbar hide";
  document.getElementById("tifbar").className="tifbar hide";
  document.getElementById("sp").innerHTML="";
  document.getElementById("sp").className="hide";
  document.getElementById("qp").className="";
  if(v==="final"){ renderStart("Start the 50-question final exam. 25 Money &amp; Banking + 25 International Trade, shuffled.","Start Final Exam (50 Q)",sfinalstart); }
  else if(v==="past"){ buildSz(); }
  else { buildSz(); }
}

/* ---------- mode bar (notes/quiz) ---------- */
function buildMbar(){
  document.getElementById("mbar").innerHTML=
     '<button class="mbtn" id="mb-s" onclick="sm(\'s\')">📖 Study Notes</button>'
   + '<button class="mbtn" id="mb-q" onclick="sm(\'q\')">✍️ Quiz</button>';
}

function sm(m){
  md=m;
  var s=document.getElementById("mb-s"), q=document.getElementById("mb-q");
  if(s){ s.className="mbtn"+(m==="s"?" ac":""); q.className="mbtn"+(m==="q"?" ac":"");
    if(m==="s"){s.style.background=CH[ci].c;q.style.background="";}
    else{q.style.background=CH[ci].c;s.style.background="";} }
  if(m==="s"){
    document.getElementById("tifbar").className="tifbar hide";
    document.getElementById("szbar").className="szbar hide";
    document.getElementById("qp").className="hide";
    document.getElementById("sp").className="";
    renderNotes();
  }else{
    document.getElementById("sp").className="hide";
    document.getElementById("qp").className="";
    buildTif();
    buildSz();
  }
}

/* ---------- source filter (per-chapter M&B only) ---------- */
function buildTif(){
  var bar=document.getElementById("tifbar");
  if(view!=="ch"){ bar.className="tifbar hide"; return; }
  var base=CH[ci].Q;
  var counts={}; for(var i=0;i<base.length;i++){counts[base[i].src]=(counts[base[i].src]||0)+1;}
  var present=SRCORDER.filter(function(s){return counts[s];});
  if(present.length<2){ bar.className="tifbar hide"; return; }
  var html='<span class="tiflabel">Source</span>'
    +'<button class="tifbtn" id="tf-all" onclick="sfil(\'all\')">All ('+base.length+')</button>';
  for(var k=0;k<present.length;k++){ var s=present[k];
    html+='<button class="tifbtn" id="tf-'+s+'" onclick="sfil(\''+s+'\')">'+SRCMETA[s].lbl+' ('+counts[s]+')</button>'; }
  bar.className="tifbar"; bar.innerHTML=html; markFil();
}
function sfil(f){ srcFilter=f; markFil(); buildSz(); }
function markFil(){
  ["all"].concat(SRCORDER).forEach(function(f){var e=document.getElementById("tf-"+f);if(e)e.className="tifbtn"+(srcFilter===f?" ac":"");});
}

/* ---------- size selector ---------- */
function buildSz(){
  var bar=document.getElementById("szbar"); bar.className="szbar";
  var pool=getPool(); var n=pool.length;
  var tiers = view==="mix" ? [25,50] : (view==="past" ? [25,50] : [15,25]);
  var html="";
  for(var k=0;k<tiers.length;k++){ if(tiers[k]<n) html+='<button class="sbtn" onclick="ssz('+tiers[k]+',this)">'+tiers[k]+'</button>'; }
  html+='<button class="sbtn" onclick="ssz('+n+',this)">All '+n+'</button>';
  bar.innerHTML=html;
  // auto-select a sensible default
  var def = view==="mix"||view==="past" ? Math.min(25,n) : Math.min(15,n);
  qsz=def; sq();
  // highlight the matching button
  var btns=bar.querySelectorAll(".sbtn");
  for(var b=0;b<btns.length;b++){ if(parseInt(btns[b].textContent.replace(/\D/g,''),10)===def){btns[b].className="sbtn ac";btns[b].style.background=gc().c;} }
}
function ssz(nq,el){
  qsz=nq;
  var bar=document.getElementById("szbar");
  var btns=bar.querySelectorAll(".sbtn");
  for(var b=0;b<btns.length;b++){btns[b].className="sbtn";btns[b].style.background="";}
  if(el){el.className="sbtn ac";el.style.background=gc().c;}
  sq();
}

/* ---------- quiz build ---------- */
function sq(){
  var pool=getPool().slice();
  sh2(pool);
  var list=pool.slice(0,qsz);
  QS={l:list,i:0,s:-1,sc:0,an:0,d:false,mx:[],mode:view};
  rq();
}

function sfinalstart(){
  var mb=allQ().filter(function(q){return CH[q._ci].grp==="mb";});
  var it=allQ().filter(function(q){return CH[q._ci].grp==="it";});
  sh2(mb); sh2(it);
  var pick=mb.slice(0,25).concat(it.slice(0,25));
  sh2(pick);
  QS={l:pick,i:0,s:-1,sc:0,an:0,d:false,mx:[],mode:"final",mbCount:Math.min(25,mb.length),itCount:Math.min(25,it.length)};
  document.getElementById("szbar").className="szbar hide";
  rq();
}

function renderStart(msg,btn,fn){
  document.getElementById("szbar").className="szbar hide";
  window._startfn=fn;
  document.getElementById("qp").innerHTML='<div class="startwrap"><p>'+msg+'</p><button class="start" style="background:'+gc().c+'" onclick="_startfn()">'+btn+'</button></div>';
}

/* ---------- render question ---------- */
function rq(){
  var qp=document.getElementById("qp");
  if(QS.d){ renderResults(); return; }
  var q=QS.l[QS.i];
  var showChip = (QS.mode==="mix"||QS.mode==="final"||QS.mode==="past");
  var pct=Math.round(QS.i/QS.l.length*100);
  var h='<div class="pbar"><i style="width:'+pct+'%;background:'+gc().c+'"></i></div>';
  h+='<div class="qcard">';
  h+='<div class="qmeta">';
  if(showChip) h+='<span class="qchip" style="background:'+qcolor(q)+'">'+qlabel(q)+'</span>';
  h+='<span class="qsrc '+esc(q.src)+'">'+esc(q.s)+'</span>';
  if(q.tf) h+='<span class="qtf">True / False</span>';
  h+='<span class="qprog">'+(QS.i+1)+' / '+QS.l.length+'</span>';
  h+='</div>';
  h+='<div class="qtxt">'+esc(q.q)+'</div>';
  h+='<div class="ops'+(q.tf?' tf':'')+'" id="ops">';
  var L=["A","B","C","D","E"];
  for(var i=0;i<q.o.length;i++){
    var dly=(i*0.05).toFixed(2);
    h+='<button class="op" style="animation-delay:'+dly+'s" onclick="pk('+i+')">'
      +(q.tf?'':'<span class="lt">'+L[i]+'</span>')+'<span>'+esc(q.o[i])+'</span></button>';
  }
  h+='</div></div>';
  qp.innerHTML=h;
}

function pk(i){
  if(QS.s!==-1) return;
  QS.s=i; QS.an++;
  var q=QS.l[QS.i];
  var ops=document.getElementById("ops").children;
  for(var k=0;k<ops.length;k++){ ops[k].style.animationDelay="0s"; ops[k].className="op lk"; }
  ops[q.a].className="op lk ok";
  if(i===q.a){ QS.sc++; }
  else{ ops[i].className="op lk no"; QS.mx.push({q:q,pi:i}); }
  var last=(QS.i>=QS.l.length-1);
  var btn=document.createElement("button");
  btn.className="nxt"; btn.style.background=gc().c;
  btn.textContent=last?"See Results":"Next Question →";
  btn.onclick=nx;
  document.getElementById("ops").parentNode.appendChild(btn);
}

function nx(){
  if(QS.i>=QS.l.length-1){ QS.d=true; rq(); return; }
  QS.i++; QS.s=-1; rq();
}

/* ---------- results ---------- */
function renderResults(){
  var pct=QS.l.length?Math.round(QS.sc/QS.l.length*100):0;
  var em = pct>=85?"🏆":pct>=70?"🎉":pct>=50?"👍":"📚";
  var h='<div class="res"><div class="em">'+em+'</div>';
  h+='<div class="sc">'+QS.sc+' / '+QS.l.length+'</div>';
  h+='<div class="sl">'+pct+'% correct</div>';
  if(QS.mode==="final"){ h+='<div class="bd">'+QS.mbCount+' Money &amp; Banking + '+QS.itCount+' International Trade</div>'; }
  var restart = QS.mode==="final" ? "sfinalstart()" : (QS.mode==="past"||QS.mode==="mix" ? "buildSz()" : "sq()");
  h+='<button class="rb" style="background:'+gc().c+'" onclick="'+restart+'">↻ Try Again</button></div>';
  if(QS.mx.length){
    h+='<div class="mx-hd">Review your '+QS.mx.length+' mistake'+(QS.mx.length>1?"s":"")+'</div>';
    var L=["A","B","C","D","E"];
    for(var m=0;m<QS.mx.length;m++){
      var q=QS.mx[m].q, pi=QS.mx[m].pi;
      h+='<div class="mx-card">';
      h+='<div class="mx-q">'+(QS.mode==="mix"||QS.mode==="final"||QS.mode==="past"?'<span class="qchip" style="background:'+qcolor(q)+'">'+qlabel(q)+'</span> ':'')+esc(q.q)+'</div>';
      h+='<div class="mx-op no">Your answer: '+L[pi]+') '+esc(q.o[pi])+'</div>';
      h+='<div class="mx-op ok">Correct: '+L[q.a]+') '+esc(q.o[q.a])+'</div>';
      h+='<div class="mx-src">'+esc(q.s)+'</div>';
      h+='</div>';
    }
  }
  document.getElementById("qp").innerHTML=h;
}

/* ---------- study notes ---------- */
function renderNotes(){
  var c=CH[ci]; var h="";
  if(!c.S||!c.S.length){ h='<div class="cdesc">No study notes for this chapter yet.</div>'; document.getElementById("sp").innerHTML=h; return; }
  for(var i=0;i<c.S.length;i++){
    h+='<div class="sec">';
    h+='<button class="sec-h" onclick="ta(this)"><span>'+esc(c.S[i].h)+'</span><span class="ar">▸</span></button>';
    h+='<div class="sec-b">';
    for(var j=0;j<c.S[i].p.length;j++){ h+='<div class="pt">'+c.S[i].p[j]+'</div>'; }
    h+='</div></div>';
  }
  document.getElementById("sp").innerHTML=h;
}
function ta(b){
  b.classList.toggle("op");
  var body=b.nextElementSibling;
  body.className="sec-b"+(body.className.indexOf("sh")<0?" sh":"");
}

(function boot(){
  try { CH = B(); init(); }
  catch(e){
    var b=document.getElementById("banner");
    if(b){ b.className="exam-banner"; b.innerHTML="⚠️ Could not load the guide: "+((e&&e.message)?e.message:e)+"<br>Try opening the file in <b>Safari</b> or <b>Chrome</b> (a file-preview window may block JavaScript)."; }
  }
})();
</script>
</body>
</html>
