uo; → Income", "&ldquo;<strong>total collection of property that stores value<\/strong>&rdquo; → Wealth", "&ldquo;<strong>narrowest aggregate / currency + checkable deposits<\/strong>&rdquo; → M1", "&ldquo;<strong>ease and speed of conversion into a medium of exchange<\/strong>&rdquo; → Liquidity", "&ldquo;<strong>distinguishes money from other assets<\/strong>&rdquo; → medium of exchange", "&ldquo;<strong>reduces the number of prices<\/strong>&rdquo; → unit of account", "&ldquo;<strong>precious metals<\/strong>&rdquo; → commodity money &nbsp;·&nbsp; &ldquo;<strong>legal tender, not convertible<\/strong>&rdquo; → fiat money", "&ldquo;<strong>double coincidence of wants<\/strong>&rdquo; → the drawback of barter"]}, {"h": "🔑 Exam keyword cues · Part 2 — more phrases → answers", "p": ["&ldquo;<strong>holds value over time / purchasing power for later<\/strong>&rdquo; → store of value (a function of money)", "&ldquo;<strong>M1 + savings + small time deposits + retail money-market<\/strong>&rdquo; → M2", "&ldquo;<strong>M2 + large time deposits + institutional money-market<\/strong>&rdquo; → M3", "&ldquo;<strong>savings &amp; time deposits / 'near money'<\/strong>&rdquo; → in M2, NOT in M1", "&ldquo;<strong>money loses its store-of-value function<\/strong>&rdquo; → hyperinflation", "&ldquo;<strong>intrinsic value of its own<\/strong>&rdquo; → commodity money &nbsp;·&nbsp; &ldquo;<strong>no intrinsic value, value by decree<\/strong>&rdquo; → fiat money", "&ldquo;<strong>bad money drives out good money<\/strong>&rdquo; → Gresham's Law", "&ldquo;<strong>rising prices erode what money buys<\/strong>&rdquo; → a fall in purchasing power (inflation)", "&ldquo;<strong>cheques, debit cards, electronic transfer<\/strong>&rdquo; → the evolution of the payments system"]}, {"h": "🔑 Exam keyword cues · Part 3 — even more phrases → answers", "p": ["&ldquo;<strong>lets debts be repaid in future fixed amounts<\/strong>&rdquo; → standard of deferred payment (a function of money)", "&ldquo;<strong>coins + paper notes in circulation<\/strong>&rdquo; → currency &nbsp;·&nbsp; &ldquo;<strong>balances you can write cheques on<\/strong>&rdquo; → checkable (demand) deposits", "&ldquo;<strong>money the law says must be accepted<\/strong>&rdquo; → legal tender", "&ldquo;<strong>smart cards / stored-value / digital cash<\/strong>&rdquo; → e-money", "&ldquo;<strong>interest given up by holding cash instead of bonds<\/strong>&rdquo; → the opportunity cost of holding money", "&ldquo;<strong>lets people specialise and divide labour<\/strong>&rdquo; → a benefit money provides", "&ldquo;<strong>an economy with no money<\/strong>&rdquo; → barter (needs a double coincidence of wants)", "&ldquo;<strong>how easily an asset becomes a means of payment<\/strong>&rdquo; → its liquidity", "&ldquo;<strong>paper money no longer backed by gold<\/strong>&rdquo; → fiat money"]}], "Q": [{"q": "To an economist, ______ is anything that is generally accepted in payment for goods and services or in the repayment of debt.", "o": ["wealth", "income", "money", "credit"], "a": 2, "s": "Test Bank", "src": "tb", "x": "The economist's definition of money centres on general acceptability in exchange or debt repayment — not on wealth, income, or credit, which are related but distinct concepts."}, {"q": "Money is", "o": ["anything that is generally accepted in payment for goods and services or in the repayment of debt.", "a flow of earnings per unit of time.", "the total collection of pieces of property that are a store of value.", "always based on a precious metal like gold or silver."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Money is defined by its function: general acceptance in payment for goods/services or debt repayment. Income is a flow of earnings, and wealth is a stock of property — neither matches this definition."}, {"q": "Money is defined as", "o": ["bills of exchange.", "anything that is generally accepted in payment for goods and services or in the repayment of debt.", "a risk-free repository of spending power.", "the unrecognized liability of governments."], "a": 1, "s": "Exam 2023", "src": "exam", "x": "The standard economic definition of money is general acceptance in payment or debt repayment. Bills of exchange are a specific instrument, and 'risk-free repository' describes a quality, not a definition."}, {"q": "Currency includes", "o": ["paper money and coins.", "paper money, coins, and checks.", "paper money and checks.", "paper money, coins, checks, and savings deposits."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Currency refers specifically to physical money: paper notes and coins. Checks and deposits are separate payment instruments and are not part of currency."}, {"q": "The total collection of pieces of property that serve to store value is a person's", "o": ["wealth.", "income.", "money.", "liabilities."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Wealth is the total stock of property that stores value — homes, bonds, cars, etc. Income is a flow, money is a medium of exchange, and liabilities are what you owe."}, {"q": "______ is a flow of earnings per unit of time.", "o": ["Income", "Money", "Wealth", "Currency"], "a": 0, "s": "Test Bank", "src": "tb", "x": "Income is measured per unit of time (e.g. salary per year), making it a flow concept. Money and wealth are stocks — they exist at a point in time, not over a period."}, {"q": "A person's house is part of her", "o": ["money.", "income.", "liabilities.", "wealth."], "a": 3, "s": "Test Bank", "src": "tb", "x": "A house is a real asset that stores value, making it part of wealth. It is not money (not generally used for transactions), not income, and not a liability."}, {"q": "______ is used to make purchases while ______ is the total collection of pieces of property that serve to store value.", "o": ["Money; income", "Wealth; income", "Income; money", "Money; wealth"], "a": 3, "s": "Test Bank", "src": "tb", "x": "Money is the medium used to make purchases. Wealth is the broader stock of all property holding value. Income is a flow, so the only pair that correctly distinguishes the two concepts is Money; wealth."}, {"q": "The difference between money and income is that", "o": ["money is a flow and income is a stock.", "money is a stock and income is a flow.", "there is no difference — both are stocks.", "there is no difference — both are flows."], "a": 1, "s": "Test Bank", "src": "tb", "x": "Money is a stock — you hold a certain amount at any moment. Income is a flow — it arrives over time (e.g. per month). Confusing the two is a common error."}, {"q": "Of money's three functions, the one that distinguishes money from other assets is its function as a", "o": ["store of value.", "unit of account.", "standard of deferred payment.", "medium of exchange."], "a": 3, "s": "Test Bank", "src": "tb", "x": "All assets can store value, and a unit of account can be anything by convention, but only money serves as the <em>medium of exchange<\/em> — what sellers universally accept — setting it apart from other assets."}, {"q": "If peanuts serve as a medium of exchange, a unit of account, and a store of value, then peanuts are", "o": ["bank deposits.", "reserves.", "money.", "loanable funds."], "a": 2, "s": "Test Bank", "src": "tb", "x": "If peanuts fulfil all three functions — medium of exchange, unit of account, and store of value — they satisfy the complete definition of money, regardless of the commodity used."}, {"q": "Compared to an economy that uses a medium of exchange, in a barter economy", "o": ["transaction costs are higher.", "transaction costs are lower.", "liquidity costs are higher.", "liquidity costs are lower."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Barter requires finding a trading partner who both has what you want and wants what you have (double coincidence of wants), driving up search and transaction costs compared to money economies."}, {"q": "When compared to exchange systems that rely on money, disadvantages of the barter system include", "o": ["the requirement of a double coincidence of wants.", "lowering the cost of exchanging goods over time.", "lowering the cost of exchange to those who would specialize.", "encouraging specialization and the division of labor."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Barter's core disadvantage is the need for a double coincidence of wants — both parties must want exactly what the other offers. Money eliminates this problem and lowers transaction costs."}, {"q": "Money's superior advantage as a store of value is its", "o": ["liquidity.", "durability.", "high interest return.", "backing by gold."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Money's key advantage as a store of value is its <b>liquidity<\/b> — it can be spent immediately without conversion. Other assets may earn more but take time and cost to convert into spendable form."}, {"q": "Because it is a unit of account, money", "o": ["increases transaction costs.", "reduces the number of prices that need to be calculated.", "does not earn interest.", "discourages specialization."], "a": 1, "s": "Test Bank", "src": "tb", "x": "A unit of account gives a common price standard, so in a market with <em>N<\/em> goods only <em>N<\/em> prices are needed instead of <em>N(N-1)/2<\/em> barter exchange rates, dramatically reducing calculation costs."}, {"q": "Dennis notices that jackets are on sale for $99. In this case money is functioning as a", "o": ["medium of exchange.", "unit of account.", "store of value.", "payments-system ruler."], "a": 1, "s": "Test Bank", "src": "tb", "x": "Quoting a price in dollars uses money as a measuring stick for value — that is the <b>unit of account<\/b> function. The exchange of cash at the register would be medium of exchange."}, {"q": "Kevin purchasing concert tickets with his debit card is an example of the ______ function of money.", "o": ["medium of exchange", "unit of account", "store of value", "specialization"], "a": 0, "s": "Test Bank", "src": "tb", "x": "Using a debit card to pay for tickets transfers purchasing power in exchange for goods — the classic <b>medium of exchange<\/b> function. Quoting a price would be unit of account."}, {"q": "As a store of value, money", "o": ["does not earn interest.", "cannot be a durable asset.", "must be currency.", "is a way of saving for future purchases."], "a": 3, "s": "Test Bank", "src": "tb", "x": "Holding money preserves purchasing power for later use — that is saving for future purchases. Money does not necessarily earn interest, and store of value does not require it to be currency only."}, {"q": "People hold money even during inflationary episodes when other assets prove to be better stores of value. This can be explained by the fact that money is", "o": ["extremely liquid.", "a unique good for which there are no substitutes.", "the only thing accepted in economic exchange.", "backed by gold."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Even when inflation erodes money's purchasing power, people still hold it because it is <b>extremely liquid<\/b> — instantly usable for any transaction — a convenience no other asset fully replicates."}, {"q": "If the price level doubles, the value of money", "o": ["doubles.", "more than doubles, due to scale economies.", "rises but does not double, due to diminishing returns.", "falls by 50 percent."], "a": 3, "s": "Test Bank", "src": "tb", "x": "Money's value is its purchasing power: what it buys. If prices double, each unit of currency buys only half as much, so its value falls by 50%. The two move inversely."}, {"q": "Type of money made up of precious metals is called", "o": ["fiat money.", "commodity money.", "checks.", "e-money."], "a": 1, "s": "Exam 2023", "src": "exam", "x": "<b>Commodity money<\/b> has intrinsic value because it is made of a precious metal (gold, silver). Fiat money has no intrinsic value; it is declared legal tender by government decree."}, {"q": "A disadvantage of ______ is that it is very heavy and hard to transport from one place to another.", "o": ["commodity money", "fiat money", "electronic money", "paper money"], "a": 0, "s": "Test Bank", "src": "tb", "x": "Gold and silver coins are heavy and costly to transport, which is the main practical disadvantage of commodity money. Fiat and electronic money have no such weight problem."}, {"q": "Paper currency that has been declared legal tender but is not convertible into coins or precious metals is called ______ money.", "o": ["commodity", "fiat", "electronic", "funny"], "a": 1, "s": "Test Bank", "src": "tb", "x": "<b>Fiat money<\/b> derives its value from government decree ('fiat' means 'let it be'), not from any commodity backing. It is legal tender but not convertible into gold or silver."}, {"q": "Which of the following sequences accurately describes the evolution of the payments system?", "o": ["Barter, coins made of precious metals, paper currency, checks, electronic funds transfers", "Barter, coins made of precious metals, checks, paper currency, electronic funds transfers", "Barter, checks, paper currency, coins made of precious metals, electronic funds transfers", "Barter, checks, paper currency, electronic funds transfers"], "a": 0, "s": "Test Bank", "src": "tb", "x": "The historical sequence runs from direct barter → metal coins → paper currency (receipts for metals) → checks (instructions to banks) → electronic funds transfers. Checks came after paper currency."}, {"q": "Which of the following is not a form of e-money?", "o": ["a debit card", "a credit card", "a stored-value card", "a smart card"], "a": 1, "s": "Test Bank", "src": "tb", "x": "A <b>credit card<\/b> is not e-money — it creates a loan that must be repaid later. Debit cards, stored-value cards, and smart cards all draw on pre-existing funds, making them forms of e-money."}, {"q": "An electronic payments system has not completely replaced the paper payments system because of all of the following reasons except", "o": ["expensive equipment is necessary to set up the system.", "security concerns.", "privacy concerns.", "transportation costs."], "a": 3, "s": "Test Bank", "src": "tb", "x": "Transportation costs are a reason paper checks persist, not a barrier to electronic payments. The real obstacles are high setup costs, security risks, and privacy concerns."}, {"q": "Monetary aggregates are", "o": ["measures of the money supply reported by the central bank.", "measures of the wealth of individuals.", "never redefined since 'money' never changes.", "reported by the Treasury Department annually."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Monetary aggregates (M1, M2, M3) are official measures of the money supply published by the central bank. They are not measures of individual wealth, and they are periodically revised as the financial system evolves."}, {"q": "______ is the narrowest monetary aggregate that the central bank reports.", "o": ["M0", "M1", "M2", "M3"], "a": 1, "s": "Test Bank", "src": "tb", "x": "<b>M1<\/b> is the narrowest aggregate, comprising currency in circulation plus checkable deposits. M2 and M3 add progressively less liquid assets. (M0/monetary base is a separate concept not typically listed as a monetary aggregate.)"}, {"q": "The currency component includes paper money and coins held in", "o": ["bank vaults.", "ATMs.", "the hands of the nonbank public.", "the central bank."], "a": 2, "s": "Test Bank", "src": "tb", "x": "The currency component of M1 counts only notes and coins held by the <b>non-bank public<\/b>. Vault cash and ATM cash held by banks is not yet in circulation and is excluded."}, {"q": "Which of the following is not included in the measure of M1?", "o": ["NOW accounts", "Demand deposits", "Currency", "Savings deposits"], "a": 3, "s": "Test Bank", "src": "tb", "x": "<b>Savings deposits<\/b> are not checkable and are excluded from M1. M1 includes only the most liquid assets: currency, demand deposits, and other checkable deposits such as NOW accounts."}, {"q": "Which of the following is not included in M1 but is included in M2?", "o": ["Currency", "Demand deposits", "Checkable deposits", "Small-denomination time deposits"], "a": 3, "s": "Test Bank", "src": "tb", "x": "<b>Small-denomination time deposits<\/b> (CDs under $100,000) are less liquid — funds are locked until maturity — so they are added only in M2, not M1."}, {"q": "Which of the following is included in both M1 and M2?", "o": ["Currency", "Savings deposits", "Small-denomination time deposits", "Money market deposit accounts"], "a": 0, "s": "Test Bank", "src": "tb", "x": "<b>Currency<\/b> is in both M1 and M2 because M2 = M1 + additional less-liquid items. Savings deposits, time deposits, and money market accounts are M2 additions not found in M1."}, {"q": "From this data: currency in circulation = 100, checkable deposits = 50, savings deposits = 100, long-term deposits = 100. M1 equals", "o": ["150", "250", "350", "300"], "a": 0, "s": "Exam 2023", "src": "exam", "x": "M1 = currency + checkable deposits = 100 + 50 = <strong>150<\/strong>. (Savings and long-term deposits are not in M1.)"}, {"q": "From this data: currency in circulation = 100, checkable deposits = 50, savings deposits = 100, long-term deposits = 100. M2 equals", "o": ["150", "250", "350", "300"], "a": 1, "s": "Exam 2023", "src": "exam", "x": "M2 = M1 + savings deposits = 150 + 100 = <strong>250<\/strong>."}, {"q": "From this data: currency in circulation = 100, checkable deposits = 50, savings deposits = 100, long-term deposits = 100. M3 equals", "o": ["150", "250", "350", "300"], "a": 2, "s": "Exam 2023", "src": "exam", "x": "M3 = M2 + long-term time deposits = 250 + 100 = <strong>350<\/strong>."}, {"q": "If an individual moves money from a small-denomination time deposit to a demand deposit account,", "o": ["M1 increases and M2 stays the same.", "M1 stays the same and M2 increases.", "M1 stays the same and M2 stays the same.", "M1 increases and M2 decreases."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Moving funds from a small time deposit (M2 only) into a demand deposit (M1) raises M1. But because M2 already includes M1, the total in M2 is unchanged — the money just shifts within M2."}, {"q": "If an individual moves money from currency to a demand deposit account,", "o": ["M1 decreases and M2 stays the same.", "M1 stays the same and M2 increases.", "M1 stays the same and M2 stays the same.", "M1 increases and M2 stays the same."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Both currency and demand deposits are in M1 (and therefore M2). Shifting money between them changes the composition of M1 but not its total, so both M1 and M2 remain the same."}, {"q": "If an individual moves money from a money market deposit account to currency,", "o": ["M1 increases and M2 stays the same.", "M1 stays the same and M2 increases.", "M1 stays the same and M2 stays the same.", "M1 increases and M2 decreases."], "a": 0, "s": "Test Bank", "src": "tb", "x": "A money market deposit account is in M2 but not M1. Converting it to currency brings the funds into M1, raising M1. Since M2 already contained both items, M2 is unchanged."}, {"q": "______ is the relative ease and speed with which an asset can be converted into a medium of exchange.", "o": ["Efficiency", "Liquidity", "Deflation", "Specialization"], "a": 1, "s": "Test Bank", "src": "tb", "x": "<b>Liquidity<\/b> measures how quickly and cheaply an asset can be turned into a medium of exchange (spendable money). Cash is perfectly liquid; real estate is highly illiquid."}, {"q": "Since it does not have to be converted into anything else to make purchases, ______ is the most liquid asset.", "o": ["money", "stock", "artwork", "gold"], "a": 0, "s": "Test Bank", "src": "tb", "x": "Money (cash) is accepted directly in any transaction without conversion, making it the most liquid asset. Stocks, gold, and artwork must first be sold before they can be spent."}, {"q": "Of the following assets, the least liquid is", "o": ["stocks.", "traveler's checks.", "checking deposits.", "a house."], "a": 3, "s": "Test Bank", "src": "tb", "x": "A <b>house<\/b> takes significant time, effort, and transaction costs to sell, making it the least liquid of the options. Traveler's checks and checking deposits are nearly as liquid as cash."}, {"q": "Ranking assets from most liquid to least liquid, the correct order is", "o": ["savings bonds; house; currency.", "currency; savings bonds; house.", "currency; house; savings bonds.", "house; savings bonds; currency."], "a": 1, "s": "Test Bank", "src": "tb", "x": "<b>Currency<\/b> is instantly spendable (most liquid). Savings bonds can be redeemed through a bank but take some steps (moderate liquidity). A house requires a lengthy sale process (least liquid)."}, {"q": "Small-denomination time deposits refer to certificates of deposit with a denomination of less than", "o": ["$1,000", "$10,000", "$100,000", "$1,000,000"], "a": 2, "s": "Test Bank", "src": "tb", "x": "Small-denomination time deposits are CDs with a face value below <b>$100,000<\/b>. Those at or above $100,000 are large-denomination and treated differently in monetary aggregates."}, {"q": "The conversion of a barter economy to one that uses money", "o": ["increases efficiency by reducing the need to exchange goods and services.", "increases efficiency by reducing the need to specialize.", "increases efficiency by reducing transactions costs.", "does not increase economic efficiency."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Using money eliminates the need for a double coincidence of wants, lowering the time and effort spent finding trading partners — i.e. reducing <b>transaction costs<\/b> — and thereby improving economic efficiency."}, {"q": "Wealth includes not only money but also other assets such as bonds, stocks, land, furniture, cars, and houses.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "Wealth is a broad stock concept encompassing all assets with value — bonds, stocks, land, property, and money. The statement is therefore true."}, {"q": "Money is not the only store of value. Many assets, such as stocks, bonds, and gold, can be used as a store of value.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Stocks, bonds, gold, and other assets all preserve value over time. Money is just one store of value, and often an inferior one during inflation."}, {"q": "Financial systems use the monetary aggregates for measuring money.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Central banks define and publish monetary aggregates (M1, M2, M3) as the standard way of measuring and tracking the money supply."}, {"q": "M2 includes M2 and the long-term time deposits (with a maturity of more than one year).", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The statement is self-referential and wrong. <b>M3<\/b> (not M2) includes M2 plus long-term time deposits with a maturity of more than one year."}, {"q": "Debit cards can be used to withdraw money directly from the ATM machine or to purchase goods and services.", "o": ["True", "False"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "True. Debit cards are directly linked to a bank account, allowing both ATM cash withdrawals and point-of-sale purchases — both involve transferring existing funds."}, {"q": "Money is the only store of value.", "o": ["True", "False"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "False. Many assets — bonds, stocks, gold, real estate — serve as stores of value. Money is just one option, and often not the best when inflation is high."}]}, {"id": "mb2", "l": "Ch.2", "c": "#457B9D", "grp": "mb", "mid": "pre", "t": "Ch. 2 — Analyzing the Financial System", "d": "Pre-midterm · Financial markets, direct vs. indirect finance, debt vs. equity, primary/secondary markets, exchanges vs. OTC, and money vs. capital markets.", "S": [{"h": "Function of financial markets", "p": ["<strong>Financial markets<\/strong> are any marketplace where savings are channeled from savers/lenders to borrowers/spenders.", "They move funds from people who have <strong>surplus funds<\/strong> (saved by spending less than income) to those with a <strong>shortage of funds<\/strong>.", "This raises production and efficiency for the overall economy."]}, {"h": "Direct vs. indirect finance", "p": ["<strong>Direct finance<\/strong> — borrowers borrow directly from lenders by selling them <strong>securities<\/strong> (financial instruments) in financial markets.", "<strong>Indirect finance<\/strong> — funds move through a <strong>financial intermediary<\/strong> (e.g. a bank).", "<strong>Securities<\/strong> are assets for the buyer but liabilities for the issuer."]}, {"h": "Debt vs. equity markets", "p": ["<strong>Debt instrument<\/strong> (bond/mortgage) — a contractual agreement to pay fixed amounts (interest + principal) until maturity.", "<strong>Short-term<\/strong>: maturity < 1 year · <strong>Intermediate<\/strong>: 1–10 years · <strong>Long-term<\/strong>: 10 years or more.", "<strong>Equity<\/strong> (common stock) — a claim to share in net income and assets; pays dividends, no maturity (long-term).", "An equity holder is a <strong>residual claimant<\/strong> (paid after debt holders) but benefits directly from rising profitability."]}, {"h": "Primary vs. secondary; exchanges vs. OTC", "p": ["<strong>Primary market<\/strong> — new issues sold to initial buyers; the <strong>investment bank<\/strong> underwrites them.", "<strong>Secondary market<\/strong> — previously-issued securities are resold; <strong>brokers<\/strong> match buyers/sellers, <strong>dealers<\/strong> buy/sell at stated prices.", "<strong>Exchanges<\/strong> — buyers and sellers meet in one central location.", "<strong>Over-the-counter (OTC)<\/strong> — dealers in different locations stand ready to buy/sell at their prices."]}, {"h": "Money vs. capital markets", "p": ["<strong>Money market<\/strong> — only <strong>short-term<\/strong> debt instruments (maturity < 1 year) are traded.", "<strong>Capital market<\/strong> — longer-term debt (≥ 1 year) and equity instruments are traded."]}, {"h": "🔑 Exam keyword cues — what to pick when you see…", "p": ["&ldquo;<strong>previously issued / can be resold<\/strong>&rdquo; → secondary market", "&ldquo;<strong>new issues / sold to initial buyers<\/strong>&rdquo; → primary market", "&ldquo;<strong>assets for the buyer, liabilities for the issuer<\/strong>&rdquo; → securities", "&ldquo;<strong>residual claimant / right to vote / claim on income &amp; assets<\/strong>&rdquo; → equity (stock)", "&ldquo;<strong>only short-term (&lt;1 yr) instruments<\/strong>&rdquo; → money market", "&ldquo;<strong>longer-term debt + equity (≥1 yr)<\/strong>&rdquo; → capital market", "&ldquo;<strong>guarantees a price / underwrites<\/strong>&rdquo; → investment bank", "&ldquo;<strong>one central location<\/strong>&rdquo; → exchange &nbsp;·&nbsp; &ldquo;<strong>dealers in different locations<\/strong>&rdquo; → OTC", "&ldquo;<strong>matches buyers with sellers<\/strong>&rdquo; → brokers"]}, {"h": "🔑 Exam keyword cues · Part 2 — more phrases → answers", "p": ["&ldquo;<strong>channels funds from lender-savers to borrower-spenders<\/strong>&rdquo; → the role of the financial system", "&ldquo;<strong>borrower sells securities directly to the lender<\/strong>&rdquo; → direct finance &nbsp;·&nbsp; &ldquo;<strong>funds flow through an intermediary<\/strong>&rdquo; → indirect finance", "&ldquo;<strong>fixed payments at set dates / a maturity date<\/strong>&rdquo; → a debt instrument (bond)", "&ldquo;<strong>risk the issuer fails to pay<\/strong>&rdquo; → default (credit) risk", "&ldquo;<strong>T-bills, commercial paper, CDs, repos<\/strong>&rdquo; → money-market instruments", "&ldquo;<strong>stocks, mortgages, corporate &amp; government bonds<\/strong>&rdquo; → capital-market instruments", "&ldquo;<strong>one party has more information than the other<\/strong>&rdquo; → asymmetric information", "&ldquo;<strong>holds an inventory / trades on own account<\/strong>&rdquo; → a dealer", "&ldquo;<strong>makes government &amp; corporate info more reliable<\/strong>&rdquo; → the purpose of regulation"]}, {"h": "🔑 Exam keyword cues · Part 3 — even more phrases → answers", "p": ["&ldquo;<strong>maturity of one year or less<\/strong>&rdquo; → a money-market (short-term) instrument", "&ldquo;<strong>no maturity date / a residual claim<\/strong>&rdquo; → equity (a share of stock)", "&ldquo;<strong>pays face value at maturity plus periodic coupons<\/strong>&rdquo; → a coupon bond", "&ldquo;<strong>NYSE / one trading floor<\/strong>&rdquo; → an organized exchange &nbsp;·&nbsp; &ldquo;<strong>NASDAQ / electronic dealer network<\/strong>&rdquo; → an over-the-counter (OTC) market", "&ldquo;<strong>households / net suppliers of funds<\/strong>&rdquo; → the main lender-savers", "&ldquo;<strong>businesses &amp; government / net users of funds<\/strong>&rdquo; → the main borrower-spenders", "&ldquo;<strong>the price paid for borrowing funds<\/strong>&rdquo; → the interest rate", "&ldquo;<strong>moving risk to those better able to bear it<\/strong>&rdquo; → the risk-sharing function", "&ldquo;<strong>a claim that must be paid before equity holders<\/strong>&rdquo; → debt (bondholders rank ahead)"]}], "Q": [{"q": "Financial markets have the basic function of", "o": ["getting people with funds to lend together with people who want to borrow funds.", "assuring that the swings in the business cycle are less pronounced.", "assuring that governments need never resort to printing money.", "providing a risk-free repository of spending power."], "a": 0, "s": "Test Bank", "src": "tb", "x": "The core function of financial markets is matching lenders (those with surplus funds) to borrowers (those who need funds), enabling the flow of capital through the economy."}, {"q": "Financial markets promote economic efficiency by", "o": ["channeling funds from investors to savers.", "creating inflation.", "channeling funds from savers to investors.", "reducing investment."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Financial markets direct funds from savers — those with a surplus — to investors who can put that money to productive use, improving how resources are allocated across the economy."}, {"q": "Financial markets promote greater economic efficiency by channeling funds from ______ to ______.", "o": ["investors; savers", "borrowers; savers", "savers; borrowers", "savers; lenders"], "a": 2, "s": "Test Bank", "src": "tb", "x": "Savers supply funds; borrowers demand them. Financial markets exist precisely to bridge this gap, moving money from those who have it to those who need it."}, {"q": "Well-functioning financial markets", "o": ["cause inflation.", "eliminate the need for indirect finance.", "cause financial crises.", "produce an efficient allocation of capital."], "a": 3, "s": "Test Bank", "src": "tb", "x": "Well-functioning financial markets direct funds to their highest-value uses, ensuring capital reaches the most productive investments — this is the definition of efficient capital allocation."}, {"q": "The principal lender-savers are", "o": ["governments.", "businesses.", "households.", "foreigners."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Households typically spend less than they earn, making them the economy's primary net savers. Businesses and governments are usually net borrowers."}, {"q": "Which of the following can be described as direct finance?", "o": ["You take out a mortgage from your local bank.", "You borrow $2500 from a friend.", "You buy shares of common stock in the secondary market.", "You buy shares in a mutual fund."], "a": 2, "s": "Exam 2023", "src": "exam", "x": "In direct finance, borrowers sell securities directly to lenders in financial markets. Buying stock on a secondary exchange is a direct transaction; borrowing from a bank or mutual fund involves an intermediary."}, {"q": "With ______ finance, borrowers obtain funds from lenders by selling them securities in the financial markets.", "o": ["active", "determined", "indirect", "direct"], "a": 3, "s": "Test Bank", "src": "tb", "x": "Direct finance means the borrower sells securities (stocks, bonds) directly to lenders in financial markets, without a financial intermediary standing in between."}, {"q": "Securities are ______ for the person who buys them but are ______ for the individual or firm that issues them.", "o": ["assets; liabilities", "liabilities; assets", "negotiable; nonnegotiable", "nonnegotiable; negotiable"], "a": 0, "s": "Test Bank", "src": "tb", "x": "A security represents a claim on future payments, so the buyer gains an asset. For the issuer, it is an obligation to pay — a liability."}, {"q": "If the maturity of a debt instrument is less than one year, the debt is called", "o": ["short-term.", "intermediate-term.", "long-term.", "prima-term."], "a": 0, "s": "Test Bank", "src": "tb", "x": "By convention, debt maturing in under one year is short-term. Intermediate-term spans one to ten years, and long-term is ten years or more."}, {"q": "Long-term debt has a maturity that is", "o": ["between one and ten years.", "less than a year.", "between five and ten years.", "ten years or longer."], "a": 3, "s": "Test Bank", "src": "tb", "x": "The standard classification defines long-term debt as having a maturity of ten years or longer; one-to-ten years is intermediate, and under one year is short-term."}, {"q": "Which of the following is an example of an intermediate-term debt?", "o": ["a fifteen-year mortgage", "a sixty-month car loan", "a six-month loan from a finance company", "a thirty-year U.S. Treasury bond"], "a": 1, "s": "Exam (Revision)", "src": "exam", "x": "60 months equals 5 years, which falls in the one-to-ten-year range defining intermediate-term debt. A 15-year mortgage and 30-year bond are long-term; a six-month loan is short-term."}, {"q": "When I purchase ______, I own a portion of a firm and have the right to vote on issues important to the firm and to elect its directors.", "o": ["bonds", "bills", "notes", "stock"], "a": 3, "s": "Test Bank", "src": "tb", "x": "Stock (equity) represents ownership in a firm, giving shareholders voting rights and a claim on residual earnings. Bonds, bills, and notes are debt instruments with no ownership rights."}, {"q": "Which of the following benefit directly from any increase in the corporation's profitability?", "o": ["a bond holder", "a commercial paper holder", "a shareholder", "a T-bill holder"], "a": 2, "s": "Test Bank", "src": "tb", "x": "Shareholders are residual owners; when profits rise, dividends and share value increase. Bondholders and T-bill holders receive fixed contractual payments regardless of the firm's profitability."}, {"q": "Which of the following statements about the characteristics of debt and equity is false?", "o": ["They can both be long-term financial instruments.", "They can both be short-term financial instruments.", "They both involve a claim on the issuer's income.", "They both enable a corporation to raise funds."], "a": 1, "s": "Exam 2024", "src": "exam", "x": "Equity has no fixed maturity — it is always long-term. Debt can be short-, intermediate-, or long-term. Therefore the claim that both can be short-term is false."}, {"q": "______ are residual claimants.", "o": ["Bond holders", "Treasury-bill holders", "Mortgage holders", "Equity holders"], "a": 3, "s": "Exam (Revision)", "src": "exam", "x": "Residual claimants receive whatever is left after all other obligations (wages, debt payments) are paid. Equity holders fit this exactly; bondholders and mortgage holders have prior fixed claims."}, {"q": "A share of common stock is a claim on a corporation's", "o": ["debt.", "liabilities.", "expenses.", "earnings and assets."], "a": 3, "s": "Exam 2024", "src": "exam", "x": "Common stock gives its holder a proportional ownership stake, entitling them to a share of the corporation's earnings (dividends) and a claim on assets if the firm is liquidated."}, {"q": "A corporation acquires new funds only when its securities are sold in the", "o": ["primary market by an investment bank.", "primary market by a stock exchange broker.", "secondary market by a securities dealer.", "secondary market by a commercial bank."], "a": 0, "s": "Test Bank", "src": "tb", "x": "New funds flow to the issuer only at the first sale — the primary market. Investment banks underwrite these new issues. Subsequent trades in secondary markets transfer ownership between investors, not to the issuer."}, {"q": "A financial market in which previously issued securities can be resold is called a ______ market.", "o": ["primary", "secondary", "tertiary", "used securities"], "a": 1, "s": "Test Bank", "src": "tb", "x": "The secondary market is defined as the marketplace where previously issued (existing) securities are bought and sold among investors."}, {"q": "An important financial institution that assists in the initial sale of securities in the primary market is the", "o": ["investment bank.", "commercial bank.", "stock exchange.", "brokerage house."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Investment banks specialize in underwriting new securities in the primary market — they guarantee a price and sell the issue to the public. Commercial banks and brokerages typically operate in other roles."}, {"q": "When an investment bank ______ securities, it guarantees a price for a corporation's securities and then sells them to the public.", "o": ["underwrites", "undertakes", "overwrites", "overtakes"], "a": 0, "s": "Test Bank", "src": "tb", "x": "Underwriting means the investment bank guarantees a price to the issuing corporation and then sells the securities to the public, bearing the price risk if demand falls short."}, {"q": "______ work in the secondary markets matching buyers with sellers of securities.", "o": ["Dealers", "Underwriters", "Brokers", "Claimants"], "a": 2, "s": "Test Bank", "src": "tb", "x": "Brokers match buyers with sellers and earn a commission without taking ownership of the securities. Dealers, by contrast, buy and hold securities in their own inventory."}, {"q": "When secondary market buyers and sellers of securities meet in one central location to conduct trades, the market is called a(n)", "o": ["exchange.", "over-the-counter market.", "common market.", "barter market."], "a": 0, "s": "Test Bank", "src": "tb", "x": "An exchange (e.g., NYSE) is a physical or electronic venue where all trading is centralized in one location. The over-the-counter market, by contrast, is a decentralized dealer network."}, {"q": "In a(n) ______ market, dealers in different locations buy and sell securities to anyone who comes to them and is willing to accept their prices.", "o": ["exchange", "over-the-counter", "common", "barter"], "a": 1, "s": "Test Bank", "src": "tb", "x": "In an over-the-counter (OTC) market, geographically dispersed dealers post prices and trade directly with customers, rather than meeting in a single centralized location."}, {"q": "Shares of corporations that are not listed on one of the organized exchanges are called", "o": ["blue chips.", "junk bonds.", "dividends.", "over-the-counter stocks."], "a": 3, "s": "Test Bank", "src": "tb", "x": "Shares not listed on a formal exchange trade OTC — dealers quote prices and transact directly with buyers. Blue chips are exchange-listed; junk bonds are debt; dividends are payments."}, {"q": "A financial market in which only short-term debt instruments are traded is called the ______ market.", "o": ["bond", "money", "capital", "stock"], "a": 1, "s": "Test Bank", "src": "tb", "x": "The money market is defined by its instruments having maturities of less than one year (e.g., T-bills, commercial paper). Capital markets handle longer-term instruments."}, {"q": "Equity instruments are traded in the ______ market.", "o": ["money", "bond", "capital", "commodities"], "a": 2, "s": "Test Bank", "src": "tb", "x": "The capital market encompasses both long-term debt and equity instruments. Money markets are limited to short-term debt; there is no separate equity market at the short end."}, {"q": "Equity and debt instruments with maturities greater than one year are called ______ market instruments.", "o": ["capital", "money", "federal", "benchmark"], "a": 0, "s": "Test Bank", "src": "tb", "x": "Capital market instruments include debt with maturities over one year and all equity. Money markets are restricted to instruments maturing within one year."}, {"q": "Markets for financial instruments with maturities less than a year are", "o": ["primary markets.", "secondary markets.", "money markets.", "capital markets."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Money markets are defined by short-term maturities (under one year). Capital markets cover instruments with maturities of one year or more."}, {"q": "Markets for financial instruments with maturities of a year or longer are", "o": ["primary markets.", "secondary markets.", "money markets.", "capital markets."], "a": 3, "s": "Test Bank", "src": "tb", "x": "Capital markets trade instruments with maturities of one year or longer, including long-term bonds, mortgages, and equities."}, {"q": "Newly issued financial instruments are traded mainly in", "o": ["primary markets.", "secondary markets.", "wholesale markets.", "discount markets."], "a": 0, "s": "Test Bank", "src": "tb", "x": "The primary market is where new securities are issued for the first time; the issuing entity raises fresh funds here. Secondary markets handle subsequent trading of existing securities."}, {"q": "Newly issued three-month Treasury bills are traded in: I. money markets  II. capital markets  III. primary markets  IV. secondary markets", "o": ["Both I and III.", "Both I and IV.", "Both II and III.", "Both II and IV."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Three-month T-bills are newly issued (primary market) and mature in under one year (money market). Both classifications apply simultaneously."}, {"q": "A 10-year corporate bond that was issued last year is sold in the: I. money market  II. capital market  III. primary market  IV. secondary market", "o": ["Both I and III.", "Both I and IV.", "Both II and III.", "Both II and IV."], "a": 3, "s": "Test Bank", "src": "tb", "x": "A bond issued last year is already outstanding, so it trades in the secondary market. With a 10-year original maturity it is a capital market instrument. It is not newly issued, so it is not primary, and not short-term, so not money market."}, {"q": "Secondary markets make financial instruments more", "o": ["solid.", "vapid.", "liquid.", "risky."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Secondary markets allow holders to sell instruments quickly to other investors, making those instruments liquid. Without a secondary market, investors would be locked in until maturity."}, {"q": "A liquid asset is", "o": ["an asset that can easily and quickly be sold to raise cash.", "a share of an ocean resort.", "difficult to resell.", "always sold in an over-the-counter market."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Liquidity means the ability to convert an asset into cash quickly and at low cost. An asset is liquid if it can be sold easily; illiquid assets are hard to sell without a significant price concession."}, {"q": "Which of the following is NOT a financial instrument?", "o": ["Treasury bond", "Federal funds loan", "A house", "Commercial paper"], "a": 2, "s": "Test Bank", "src": "tb", "x": "A house is a real asset, not a financial instrument. Financial instruments are contracts that create financial claims (bonds, loans, commercial paper). Real assets are tangible property."}, {"q": "Bond-like debt instruments backed by a bundle of individual mortgages are", "o": ["stocks.", "mortgage-backed securities.", "Treasury bills.", "municipal bonds."], "a": 1, "s": "Exam 2024", "src": "exam", "x": "Mortgage-backed securities bundle many individual home loans together and issue bond-like claims against that pool, spreading and transferring the underlying mortgage risk to capital market investors."}, {"q": "______ are long-term debt instruments issued by state and local government to finance expenditure on schools, roads, and other large programs.", "o": ["Treasury bills", "Stocks", "Treasury bonds", "Municipal bonds"], "a": 3, "s": "Exam 2024", "src": "exam", "x": "Municipal bonds are issued by state and local governments to fund public projects. Treasury bonds are federal; T-bills are short-term federal instruments; stocks are equity."}, {"q": "Compared to interest rates on three-month Treasury bills, interest rates on long-term government bonds are ______ on average.", "o": ["higher", "less", "equal", "cannot be determined"], "a": 0, "s": "Exam 2024", "src": "exam", "x": "Investors require a higher return to lock up funds for longer periods (term premium) and to compensate for greater uncertainty. Long-term bond yields therefore exceed short-term T-bill rates on average."}, {"q": "The money market is a financial market in which only short-term debt instruments are traded.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "This is the textbook definition of the money market: it trades only debt instruments with maturities of less than one year."}, {"q": "'Financial markets' refers to any marketplace where the savings from several sources are mobilized towards those who need funds.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "Financial markets mobilize savings from various sources — households, firms, foreign investors — and channel them to those who need funds, exactly matching this statement."}, {"q": "A secondary market is a financial market in which new issues of a security are sold to initial buyers by the corporation or government agency borrowing the funds.", "o": ["True", "False"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "This description defines a <b>primary<\/b> market, not a secondary market. A secondary market is where previously issued securities are resold among investors."}]}, {"id": "mb3", "l": "Ch.3", "c": "#27AE60", "grp": "mb", "mid": "pre", "t": "Ch. 3 — Financial Intermediaries & Internationalization", "d": "Pre-midterm · Why intermediaries exist (transaction costs, risk sharing, asymmetric information) and the three categories of financial intermediaries; foreign vs. Eurobonds.", "S": [{"h": "Indirect finance & intermediaries", "p": ["An intermediary borrows from lenders/savers and uses the funds to make loans to borrowers/spenders.", "This route is <strong>indirect finance<\/strong> and involves a <strong>financial intermediary<\/strong>."]}, {"h": "Why intermediaries exist", "p": ["<strong>Transaction costs<\/strong> — time and money spent on financial transactions; intermediaries reduce them via expertise and <strong>economies of scale<\/strong>, and provide <strong>liquidity services<\/strong>.", "<strong>Risk sharing<\/strong> (asset transformation) — they create/sell low-risk assets and buy riskier ones; turning risky assets into safer ones for investors.", "<strong>Diversification<\/strong> — investing in a portfolio of assets whose returns don't move together lowers overall risk ('don't put all your eggs in one basket')."]}, {"h": "Asymmetric information", "p": ["<strong>Asymmetric information<\/strong> — one party doesn't know enough about the other to make accurate decisions.", "<strong>Adverse selection<\/strong> — problem created <strong>before<\/strong> the transaction: the riskiest borrowers are the most eager to borrow.", "<strong>Moral hazard<\/strong> — problem created <strong>after<\/strong> the transaction: the borrower engages in undesirable (risky) activities making repayment less likely."]}, {"h": "Three categories of intermediaries", "p": ["<strong>Depository institutions (banks)<\/strong> — commercial banks, savings & loan associations, mutual savings banks, credit unions; raise funds via checkable, savings, and time deposits.", "<strong>Contractual savings institutions<\/strong> — life insurance companies and pension funds; acquire funds at periodic intervals on a contractual basis.", "<strong>Investment intermediaries<\/strong> — finance companies, mutual funds, money-market mutual funds."]}, {"h": "Internationalization of financial markets", "p": ["<strong>Foreign bond<\/strong> — sold in a foreign country and denominated in that country's currency (e.g. Porsche selling a dollar bond in the US).", "<strong>Eurobond<\/strong> — denominated in a currency other than that of the country where it is sold (e.g. a dollar bond sold in London)."]}, {"h": "🔑 Exam keyword cues — what to pick when you see…", "p": ["&ldquo;<strong>time and money spent on transactions<\/strong>&rdquo; → transaction costs", "&ldquo;<strong>risky assets into safer assets / create low-risk, buy risky<\/strong>&rdquo; → asset transformation (risk sharing)", "&ldquo;<strong>don't put all eggs in one basket / returns don't move together<\/strong>&rdquo; → diversification", "&ldquo;<strong>before the transaction / riskiest are most eager to borrow<\/strong>&rdquo; → adverse selection", "&ldquo;<strong>after the transaction / engages in undesirable (risky) activities<\/strong>&rdquo; → moral hazard", "&ldquo;<strong>funds at periodic intervals on a contractual basis<\/strong>&rdquo; → contractual savings institutions", "&ldquo;<strong>denominated in the foreign country's own currency<\/strong>&rdquo; → foreign bond &nbsp;·&nbsp; &ldquo;<strong>a currency other than where it's sold<\/strong>&rdquo; → Eurobond", "&ldquo;<strong>NOT a depository institution<\/strong>&rdquo; → a finance company / mutual fund"]}, {"h": "🔑 Exam keyword cues · Part 2 — more phrases → answers", "p": ["&ldquo;<strong>cost per dollar falls as size rises<\/strong>&rdquo; → economies of scale", "&ldquo;<strong>accepts deposits and makes loans<\/strong>&rdquo; → a depository institution (commercial bank)", "&ldquo;<strong>banks, savings &amp; loans, credit unions<\/strong>&rdquo; → depository institutions", "&ldquo;<strong>insurance companies &amp; pension funds<\/strong>&rdquo; → contractual savings institutions", "&ldquo;<strong>finance companies, mutual funds, investment banks<\/strong>&rdquo; → investment intermediaries", "&ldquo;<strong>the 'lemons' (used-car) problem<\/strong>&rdquo; → adverse selection", "&ldquo;<strong>collateral &amp; high net worth<\/strong>&rdquo; → reduce adverse selection", "&ldquo;<strong>restrictive covenants &amp; monitoring<\/strong>&rdquo; → reduce moral hazard", "&ldquo;<strong>others benefit without paying for the information<\/strong>&rdquo; → the free-rider problem"]}, {"h": "🔑 Exam keyword cues · Part 3 — even more phrases → answers", "p": ["&ldquo;<strong>the manager (agent) acts against the owners (principals)<\/strong>&rdquo; → the principal-agent problem (a moral hazard)", "&ldquo;<strong>savings &amp; loan associations and mutual savings banks<\/strong>&rdquo; → thrift institutions", "&ldquo;<strong>collect premiums, pay out on claims<\/strong>&rdquo; → insurance companies", "&ldquo;<strong>regular contributions saved for retirement<\/strong>&rdquo; → pension funds", "&ldquo;<strong>sell shares and invest in a diversified portfolio<\/strong>&rdquo; → mutual funds", "&ldquo;<strong>make small loans funded by selling commercial paper/bonds<\/strong>&rdquo; → finance companies", "&ldquo;<strong>screening and monitoring borrowers<\/strong>&rdquo; → how intermediaries cut asymmetric information", "&ldquo;<strong>US dollars deposited in banks outside the US<\/strong>&rdquo; → Eurodollars", "&ldquo;<strong>expertise that lowers information &amp; transaction costs<\/strong>&rdquo; → why intermediaries exist"]}], "Q": [{"q": "Financial intermediaries", "o": ["provide a channel for linking those who want to save with those who want to invest.", "produce nothing of value and are therefore a drain on society's resources.", "can hurt the performance of the economy.", "hold very little of the average person's wealth."], "a": 0, "s": "Exam 2023", "src": "exam", "x": "Financial intermediaries exist precisely to channel funds from savers (surplus units) to investors (deficit units), reducing the friction of direct lending and making the financial system more efficient."}, {"q": "The financial intermediaries that the average person interacts with most frequently are", "o": ["exchanges.", "over-the-counter markets.", "finance companies.", "banks."], "a": 3, "s": "Exam 2023", "src": "exam", "x": "Banks are by far the most common intermediary in everyday life — people deposit wages, get loans, and use payment services through them far more than through any other institution."}, {"q": "The time and money spent in carrying out financial transactions are called", "o": ["economies of scale.", "financial intermediation.", "liquidity services.", "transaction costs."], "a": 3, "s": "Test Bank", "src": "tb", "x": "Transaction costs is the standard term for the time, effort, and money consumed when carrying out financial dealings, such as searching for a counterparty or drawing up legal contracts."}, {"q": "______ are the time and resources spent trying to exchange goods and services.", "o": ["Bargaining costs", "Transaction costs", "Contracting costs", "Barter costs"], "a": 1, "s": "Test Bank", "src": "tb", "x": "Transaction costs cover all resources used in arranging exchanges — not just money but also the time spent negotiating and completing a deal. Barter or contracting costs are narrower concepts."}, {"q": "Economies of scale enable financial institutions to", "o": ["reduce transactions costs.", "avoid the asymmetric information problem.", "avoid adverse selection problems.", "reduce moral hazard."], "a": 0, "s": "Exam 2024", "src": "exam", "x": "Economies of scale let a large institution spread fixed costs (legal, administrative) over many transactions, driving down the per-unit cost — the main way intermediaries cut transaction costs."}, {"q": "An example of economies of scale in the provision of financial services is", "o": ["investing in a diversified collection of assets.", "providing depositors with a variety of savings certificates.", "hiring more support staff so customers don't wait so long.", "spreading the cost of writing a standardized contract over many borrowers."], "a": 3, "s": "Exam 2024", "src": "exam", "x": "A standardized loan contract costs the same to draft whether used for 10 or 10,000 borrowers; spreading that fixed cost over many borrowers is the classic example of economies of scale in finance."}, {"q": "The process where financial intermediaries create and sell low-risk assets and use the proceeds to purchase riskier assets is known as", "o": ["risk sharing.", "risk aversion.", "risk neutrality.", "risk selling."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Risk sharing (also called asset transformation) describes how intermediaries issue low-risk liabilities (e.g., deposits) to savers and use those funds to hold riskier assets, redistributing risk in the process."}, {"q": "The process of asset transformation refers to the conversion of", "o": ["safer assets into risky assets.", "safer assets into safer liabilities.", "risky assets into safer assets.", "risky assets into risky liabilities."], "a": 2, "s": "Exam 2024", "src": "exam", "x": "Asset transformation means an intermediary takes on risky assets (loans) and finances them by issuing safer liabilities (deposits), effectively converting risky claims into safer ones for savers."}, {"q": "Reducing risk through the purchase of assets whose returns do not always move together is", "o": ["diversification.", "intermediation.", "intervention.", "discounting."], "a": 0, "s": "Exam 2023", "src": "exam", "x": "Diversification means spreading investments across assets whose returns are not perfectly correlated, so losses on one are offset by gains on another, reducing overall portfolio risk."}, {"q": "The concept of diversification is captured by the statement", "o": ["don't look a gift horse in the mouth.", "don't put all your eggs in one basket.", "it never rains, but it pours.", "make hay while the sun shines."], "a": 1, "s": "Test Bank", "src": "tb", "x": "\"Don't put all your eggs in one basket\" captures the idea that spreading risk across many assets (diversification) protects against total loss — exactly what diversification achieves."}, {"q": "Financial intermediaries promote risk sharing by investing funds in different assets. This is known as", "o": ["asset transformation.", "diversification.", "moral hazard.", "adverse selection."], "a": 1, "s": "Exam (Revision)", "src": "exam", "x": "When an intermediary spreads funds across many different investments rather than concentrating them, it is diversifying — the mechanism through which risk sharing is implemented."}, {"q": "Typically, borrowers have superior information relative to lenders about the potential returns and risks of an investment project. This difference in information is called", "o": ["moral selection.", "risk sharing.", "asymmetric information.", "adverse hazard."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Asymmetric information describes the situation where one party (typically the borrower) knows more about the risk and return of a project than the other party (the lender)."}, {"q": "The problem created by asymmetric information before the transaction occurs is called ______, while the problem created after the transaction occurs is called ______.", "o": ["adverse selection; moral hazard", "moral hazard; adverse selection", "costly state verification; free-riding", "free-riding; costly state verification"], "a": 0, "s": "Exam 2024", "src": "exam", "x": "Adverse selection occurs <em>before<\/em> a deal because high-risk borrowers are most eager to borrow, skewing the pool. Moral hazard arises <em>after<\/em> because borrowers may take on more risk once they have the funds."}, {"q": "The problem associated with asymmetric information after the financial transaction occurs is known as", "o": ["moral hazard.", "adverse selection.", "free-riding.", "inside trading."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Moral hazard is a post-transaction problem: after receiving funds the borrower may engage in riskier behaviour than the lender would approve of, since the lender bears much of the downside."}, {"q": "Adverse selection means loans are likely to go to ______, so ______ may decide not to make any loans.", "o": ["bad credit risks, lenders", "bad credit risks, borrowers", "good credit risks, lenders", "good credit risks, borrowers"], "a": 0, "s": "Exam (Revision)", "src": "exam", "x": "Because high-risk borrowers seek loans most aggressively (adverse selection), lenders face a pool skewed toward bad credit risks; fearing losses, they may rationally refuse to lend at all."}, {"q": "Asymmetric information, adverse selection, and moral hazard are among the reasons that", "o": ["cause individuals to commit crimes.", "cause individuals to prefer only new banks.", "cause many savers to prefer to have their savings in financial intermediaries.", "cause individuals to prefer to lend directly to a borrower rather than keep the funds in an intermediary."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Intermediaries specialize in screening and monitoring borrowers, mitigating asymmetric information problems that would deter individual savers from lending directly — making intermediaries the safer home for savings."}, {"q": "Individuals may find it efficient to save their funds in a financial intermediary because", "o": ["financial intermediaries have higher transaction costs when making loans.", "they help reduce the exposure of investors to risk.", "it is more difficult for them to provide liquidity services.", "they cannot incorporate economies of scale."], "a": 1, "s": "Exam 2024", "src": "exam", "x": "Intermediaries diversify across many assets and use expertise to manage risk, reducing the exposure each individual saver faces compared with lending directly to a single borrower."}, {"q": "When financial intermediation is needed between savers and borrowers, the investment process is called", "o": ["inequity finance.", "equity finance.", "indirect finance.", "direct finance."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Indirect finance means funds flow from savers to borrowers through an intermediary rather than through direct negotiation; the intermediary stands between both parties."}, {"q": "Which of the following financial intermediaries is not a depository institution?", "o": ["A savings and loan association", "A commercial bank", "A credit union", "A finance company"], "a": 3, "s": "Exam 2023", "src": "exam", "x": "Finance companies do not accept deposits from the public; they raise funds by issuing securities and commercial paper. Depository institutions — banks, S&Ls, credit unions — are defined by taking deposits."}, {"q": "All of the following are depository institutions EXCEPT", "o": ["credit unions.", "savings banks.", "savings and loan associations.", "stock exchanges."], "a": 3, "s": "Test Bank", "src": "tb", "x": "Stock exchanges are marketplaces that facilitate trading of existing securities; they do not accept deposits and therefore are not depository institutions."}, {"q": "______ institutions are financial intermediaries that acquire funds at periodic intervals on a contractual basis.", "o": ["Investment", "Contractual savings", "Thrift", "Depository"], "a": 1, "s": "Exam 2024", "src": "exam", "x": "Contractual savings institutions (life insurers, pension funds) receive funds on a regular, contractually fixed schedule — premiums or payroll contributions — rather than on demand."}, {"q": "Which of the following is a contractual savings institution?", "o": ["A life insurance company", "A credit union", "A savings and loan association", "A mutual fund"], "a": 0, "s": "Test Bank", "src": "tb", "x": "Life insurance companies collect regular premium payments under contract, making them contractual savings institutions. Credit unions and S&Ls are depository, and mutual funds are investment intermediaries."}, {"q": "Which of the following are not contractual savings institutions?", "o": ["Life insurance companies", "Credit unions", "Pension funds", "State and local government retirement funds"], "a": 1, "s": "Test Bank", "src": "tb", "x": "Credit unions are <em>depository<\/em> institutions — they take deposits and make loans to members. Life insurers, pension funds, and government retirement funds all receive contractually fixed periodic contributions."}, {"q": "All of the following are considered investment intermediaries EXCEPT", "o": ["money market mutual funds.", "hedge funds.", "finance companies.", "credit unions."], "a": 3, "s": "Exam 2024", "src": "exam", "x": "Credit unions are depository institutions (they accept deposits), not investment intermediaries. Money market mutual funds, hedge funds, and finance companies all fall under the investment intermediary category."}, {"q": "An investment bank helps ______ issue securities.", "o": ["a corporation", "the SEC", "a credit union", "an individual depositor"], "a": 0, "s": "Test Bank", "src": "tb", "x": "Investment banks assist corporations in raising capital by helping them design and sell new equity or debt securities to investors — not individuals or government regulatory bodies."}, {"q": "An investment bank purchases securities from a corporation at a predetermined price and then resells them in the market. This process is called", "o": ["underwriting.", "underhanded.", "understanding.", "undertaking."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Underwriting is the process where the investment bank buys a new issue from the issuer at an agreed price, bearing the risk of reselling it to the public at a profit."}, {"q": "If a company sells a bond in London and it is denominated in dollars, the bond is a", "o": ["Eurobond.", "foreign bond.", "British bond.", "currency bond."], "a": 0, "s": "Exam (Revision)", "src": "exam", "x": "A Eurobond is sold in a country other than the one whose currency denominates it. A dollar bond issued in London is sold outside the US in a non-dollar market, fitting the Eurobond definition exactly."}, {"q": "Euro deposits in Germany are considered", "o": ["a Euro bond.", "Euro-currency.", "Euro deposits.", "ordinary deposits."], "a": 1, "s": "Exam 2024", "src": "exam", "x": "Eurocurrency is any currency deposited in a bank located outside the country that issues that currency. Euro deposits held in Germany are deposits of the euro <em>outside<\/em> their country of issue, making them Eurocurrency."}, {"q": "A bond sold in a foreign country and denominated in that country's currency is a", "o": ["Eurobond.", "foreign bond.", "domestic bond.", "municipal bond."], "a": 1, "s": "Test Bank", "src": "tb", "x": "A foreign bond is sold in a foreign country but is denominated in <em>that<\/em> country's own currency (e.g., a Samurai bond in Japan in yen). A Eurobond, by contrast, is denominated in a currency other than the host country's."}, {"q": "Mutual funds acquire funds by", "o": ["accepting checkable deposits.", "selling shares to many individuals and using the proceeds to buy diversified portfolios of stocks and bonds.", "issuing insurance policies.", "making consumer loans only."], "a": 1, "s": "Test Bank", "src": "tb", "x": "Mutual funds pool money from many investors by selling shares and use the proceeds to buy diversified portfolios, giving small investors access to diversification and lower transaction costs."}, {"q": "Finance companies raise funds primarily by", "o": ["accepting demand deposits.", "selling commercial paper and issuing stocks and bonds.", "collecting insurance premiums.", "accepting savings deposits."], "a": 1, "s": "Test Bank", "src": "tb", "x": "Finance companies do not take deposits; instead they issue commercial paper and sell equity and bonds in capital markets to raise the funds they then lend to consumers and businesses."}, {"q": "Risk sharing is also sometimes referred to as asset transformation.", "o": ["True", "False"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "True. When an intermediary issues low-risk liabilities (safe assets for savers) and holds riskier assets, it is sharing/transforming risk — the two terms describe the same process from different angles."}, {"q": "Moral hazard is the problem created by asymmetric information before the transaction occurs.", "o": ["True", "False"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "False. Moral hazard is the problem that arises <em>after<\/em> a transaction, when the borrower may act in ways that increase risk. The <em>pre<\/em>-transaction asymmetric information problem is adverse selection."}, {"q": "Mutual funds allow shareholders to pool their resources so they can take advantage of lower transaction costs when buying large blocks of stocks or bonds.", "o": ["True", "False"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "True. By pooling resources, mutual fund shareholders collectively buy large blocks of securities at lower per-unit transaction costs than any individual small investor could achieve alone."}]}, {"id": "mb4", "l": "Ch.4", "c": "#8E44AD", "grp": "mb", "mid": "pre", "t": "Ch. 4 — Commercial Banks: Financial Management", "d": "Pre-midterm · The bank balance sheet (assets/liabilities), reserves (required, excess, secondary), bank capital, deposit outflows, and the four areas of bank management.", "S": [{"h": "The commercial bank & its balance sheet", "p": ["<strong>Commercial banks<\/strong> receive deposits from savers and give loans to investors, earning the <strong>interest rate spread (IRS)<\/strong>.", "On the balance sheet: <strong>sources of funds = liabilities<\/strong> (a cost); <strong>uses of funds = assets<\/strong> (a return).", "Total assets = total liabilities + equity capital."]}, {"h": "Liabilities (sources of funds)", "p": ["<strong>Deposits<\/strong> — checkable (demand), savings, and time deposits; a liability toward savers.", "<strong>Borrowings<\/strong> — from other banks or the central bank (e.g. discount loans).", "<strong>Capital<\/strong> — a liability toward the owners (shareholders); bank capital = total assets − total liabilities."]}, {"h": "Assets (uses of funds)", "p": ["<strong>Reserves<\/strong> — the most liquid asset; vault cash + deposits at the central bank. <strong>Required reserves RR = rd × D<\/strong>; <strong>excess reserves ER = re × D<\/strong>; total reserves R = RR + ER.", "<strong>Securities<\/strong> — the 'secondary reserves'; ranked 2nd in liquidity after reserves.", "<strong>Loans<\/strong> — the main function of the bank; consumer, business, and mortgage loans earn interest.", "<strong>Fixed assets<\/strong> — buildings and land."]}, {"h": "The four areas of bank management", "p": ["<strong>Asset management<\/strong> — set the optimal diversified portfolio of assets to maximize return.", "<strong>Liability management<\/strong> — set the optimal mix of liabilities to minimize cost.", "<strong>Liquidity management<\/strong> — hold the optimal level of reserves (avoid shortage without overestimating).", "<strong>Capital adequacy management<\/strong> — hold enough capital to cover losses and avoid insolvency without sacrificing too much profitability."]}, {"h": "Managing a liquidity shortage", "p": ["Borrow from other commercial banks (federal funds market).", "Sell securities (must accept the current market price).", "Recall loans (risks losing customers).", "Borrow from the central bank at the discount rate (repeated use risks 'closing the window')."]}, {"h": "Worked example — reserves &amp; maximum lending", "p": ["<strong>Required reserves = required-reserve ratio × deposits<\/strong> (RR = r<sub>d<\/sub> × D). Whatever is left over can be lent out or invested.", "<strong>Example<\/strong>: a $100 deposit with a 10% ratio → keep $10, so the bank can lend at most <strong>$90<\/strong>. A $200 deposit with a 12% ratio → keep $24, lend at most <strong>$176<\/strong>.", "A <strong>deposit outflow<\/strong> reduces deposits and reserves equally. To cover a shortfall, banks prefer (in order): <strong>borrow federal funds<\/strong> from other banks → sell <strong>secondary reserves<\/strong> (securities) → borrow from the central bank → call in loans (most costly).", "A federal-funds loan is an <strong>asset<\/strong> to the lending bank and a <strong>liability<\/strong> to the borrowing bank."]}, {"h": "🔑 Exam keyword cues — what to pick when you see…", "p": ["&ldquo;<strong>uses of funds<\/strong>&rdquo; → assets &nbsp;·&nbsp; &ldquo;<strong>sources of funds<\/strong>&rdquo; → liabilities", "&ldquo;<strong>the most liquid asset<\/strong>&rdquo; → reserves", "&ldquo;<strong>secondary reserves<\/strong>&rdquo; → short-term Treasury securities", "&ldquo;<strong>most important asset / main source of profit<\/strong>&rdquo; → loans", "&ldquo;<strong>first choice for a reserve deficiency<\/strong>&rdquo; → borrow from other banks (federal funds)", "&ldquo;<strong>total assets − total liabilities<\/strong>&rdquo; → bank capital", "&ldquo;<strong>liabilities exceed assets<\/strong>&rdquo; → insolvent / bank failure", "&ldquo;<strong>required by regulation to hold<\/strong>&rdquo; → required reserves", "&ldquo;<strong>for the borrowing bank … for the lending bank<\/strong>&rdquo; → liability ; asset"]}, {"h": "🔑 Exam keyword cues · Part 2 — more phrases → answers", "p": ["&ldquo;<strong>vault cash + deposits at the central bank<\/strong>&rdquo; → reserves", "&ldquo;<strong>total reserves − required reserves<\/strong>&rdquo; → excess reserves", "&ldquo;<strong>checkable + savings + time deposits<\/strong>&rdquo; → bank liabilities (sources of funds)", "&ldquo;<strong>the simplified balance-sheet tool<\/strong>&rdquo; → a T-account", "&ldquo;<strong>acquire low-risk assets &amp; keep enough liquidity<\/strong>&rdquo; → asset management", "&ldquo;<strong>acquire funds at the lowest cost<\/strong>&rdquo; → liability management", "&ldquo;<strong>net profit after tax ÷ total assets<\/strong>&rdquo; → return on assets (ROA)", "&ldquo;<strong>net profit after tax ÷ bank capital<\/strong>&rdquo; → return on equity (ROE)", "&ldquo;<strong>cushion against a drop in asset value<\/strong>&rdquo; → bank capital"]}, {"h": "🔑 Exam keyword cues · Part 3 — even more phrases → answers", "p": ["&ldquo;<strong>customers unexpectedly withdraw funds<\/strong>&rdquo; → a deposit outflow (why banks hold reserves)", "&ldquo;<strong>loan-interest income minus deposit-interest cost<\/strong>&rdquo; → the net interest margin (source of profit)", "&ldquo;<strong>fee income, guarantees, loan sales<\/strong>&rdquo; → off-balance-sheet activities", "&ldquo;<strong>loss from a change in interest rates<\/strong>&rdquo; → interest-rate risk", "&ldquo;<strong>measuring how rate changes hit assets vs liabilities<\/strong>&rdquo; → gap / duration analysis", "&ldquo;<strong>refusing or limiting loans to risky borrowers<\/strong>&rdquo; → credit rationing", "&ldquo;<strong>a minimum deposit the borrower must keep<\/strong>&rdquo; → a compensating balance", "&ldquo;<strong>many depositors withdraw at once<\/strong>&rdquo; → a bank run", "&ldquo;<strong>acquire funds and use them profitably while staying liquid<\/strong>&rdquo; → the goals of bank management"]}], "Q": [{"q": "A bank's assets are", "o": ["the various uses of funds that are acquired.", "the various sources of funds that are acquired.", "those items that are owed by the bank to depositors and others.", "by definition equal to the bank's liabilities."], "a": 0, "s": "Test Bank", "src": "tb", "x": "Assets are what a bank <b>does<\/b> with the funds it raises — loans made, securities bought, reserves held. Liabilities (option B) are the sources of funds, not the uses."}, {"q": "A bank's liabilities are", "o": ["the various uses of funds that are acquired.", "the various sources of funds that are acquired.", "those items the bank owns and earns income from.", "by definition equal to the bank's reserves."], "a": 1, "s": "Test Bank", "src": "tb", "x": "Liabilities are the bank's <b>sources of funds<\/b> — money owed to depositors and creditors. Assets (option A) are the uses of those funds, not the sources."}, {"q": "Which of the following statements is true?", "o": ["A bank's assets are its sources of funds.", "A bank's liabilities are its uses of funds.", "A bank's balance sheet shows that total assets equal total liabilities plus equity capital.", "A bank's balance sheet indicates whether or not the bank is profitable."], "a": 2, "s": "Test Bank", "src": "tb", "x": "The fundamental balance-sheet identity is <b>Assets = Liabilities + Equity Capital<\/b>. Options A and B reverse assets and liabilities; option D confuses the balance sheet with an income statement."}, {"q": "Which of the following statements is false?", "o": ["A bank's assets are its uses of funds.", "A bank issues liabilities to acquire funds.", "The bank's assets provide the bank with income.", "Bank capital is recorded as an asset on the bank balance sheet."], "a": 3, "s": "Test Bank", "src": "tb", "x": "Bank capital (equity) is listed on the <b>liability side<\/b> of the balance sheet as a source of funds — it is what owners contributed. Recording it as an asset would violate basic accounting identity."}, {"q": "Which of the following are reported as liabilities on a bank's balance sheet?", "o": ["Reserves", "Checkable deposits", "Loans", "Deposits with other banks"], "a": 1, "s": "Test Bank", "src": "tb", "x": "Checkable deposits are money the bank <b>owes<\/b> to depositors, making them liabilities. Reserves, loans, and deposits with other banks are all things the bank owns — assets."}, {"q": "Which of the following items is reported as a liability on a bank's balance sheet?", "o": ["Discount loans (borrowings)", "Reserves", "U.S. Treasury securities", "Loans"], "a": 0, "s": "Test Bank", "src": "tb", "x": "Discount loans are funds <b>borrowed<\/b> from the central bank, so the bank owes repayment — a liability. Reserves, Treasury securities, and loans are all bank-owned assets."}, {"q": "Which of these are NOT bank liabilities?", "o": ["Checkable deposits", "CDs", "Mortgage loans", "Borrowings from the central bank"], "a": 2, "s": "Test Bank", "src": "tb", "x": "Mortgage loans are money the bank lent out — a bank <b>asset<\/b>. Checkable deposits, CDs, and central-bank borrowings are all obligations the bank owes, making them liabilities."}, {"q": "The primary liabilities of a commercial bank are", "o": ["bonds.", "mortgages.", "deposits.", "commercial paper."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Deposits (checkable, savings, time) are the dominant funding source for commercial banks and therefore their <b>primary liabilities<\/b>. Bonds, mortgages, and commercial paper are assets or minor items."}, {"q": "Because checking accounts are ______ liquid for the depositor than passbook savings, they earn ______ interest rates.", "o": ["less; higher", "less; lower", "more; higher", "more; lower"], "a": 3, "s": "Test Bank", "src": "tb", "x": "Checking accounts are <b>more<\/b> liquid — instantly accessible — so depositors accept a <b>lower<\/b> interest rate for that convenience. Less liquid passbook savings require a higher rate as compensation."}, {"q": "Bank reserves include", "o": ["deposits at the central bank and short-term Treasury securities.", "vault cash and short-term Treasury securities.", "vault cash and deposits at the central bank.", "deposits at other banks and deposits at the central bank."], "a": 2, "s": "Test Bank", "src": "tb", "x": "Bank reserves consist of <b>vault cash<\/b> (physical currency on hand) and <b>deposits held at the central bank<\/b>. Treasury securities are secondary reserves, not primary reserves."}, {"q": "The amount of checkable deposits that banks are required by regulation to hold are the", "o": ["excess reserves.", "required reserves.", "vault cash.", "total reserves."], "a": 1, "s": "Exam 2022", "src": "exam", "x": "The <b>required reserve ratio<\/b> set by regulators determines the minimum fraction of checkable deposits a bank must hold as reserves. Excess reserves are any holdings above that mandated amount."}, {"q": "Which of the following are reported as assets on a bank's balance sheet?", "o": ["Borrowings", "Reserves", "Savings deposits", "Bank capital"], "a": 1, "s": "Test Bank", "src": "tb", "x": "Reserves — vault cash plus central bank deposits — are things the bank <b>owns and controls<\/b>, so they are assets. Borrowings, savings deposits, and bank capital are all liabilities or equity."}, {"q": "Which of the following are NOT reported as assets on a bank's balance sheet?", "o": ["Cash items in the process of collection", "Deposits with other banks", "U.S. Treasury securities", "Checkable deposits"], "a": 3, "s": "Test Bank", "src": "tb", "x": "Checkable deposits are amounts the bank <b>owes<\/b> to customers — liabilities, not assets. Cash items in collection, deposits with other banks, and Treasury securities are all bank-owned assets."}, {"q": "Which of the following bank assets is the most liquid?", "o": ["Consumer loans", "Reserves", "Cash items in process of collection", "U.S. government securities"], "a": 1, "s": "Test Bank", "src": "tb", "x": "<b>Reserves<\/b> (vault cash and central bank deposits) can be used immediately without selling anything, making them the most liquid asset. Securities and loans require time or a market transaction to convert to cash."}, {"q": "Secondary reserv
