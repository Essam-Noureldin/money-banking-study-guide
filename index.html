ts.", "ATMs.", "the hands of the nonbank public.", "the central bank."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following is not included in the measure of M1?", "o": ["NOW accounts", "Demand deposits", "Currency", "Savings deposits"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following is not included in M1 but is included in M2?", "o": ["Currency", "Demand deposits", "Checkable deposits", "Small-denomination time deposits"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following is included in both M1 and M2?", "o": ["Currency", "Savings deposits", "Small-denomination time deposits", "Money market deposit accounts"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "From this data: currency in circulation = 100, checkable deposits = 50, savings deposits = 100, long-term deposits = 100. M1 equals", "o": ["150", "250", "350", "300"], "a": 0, "s": "Exam 2023", "src": "exam"}, {"q": "From this data: currency in circulation = 100, checkable deposits = 50, savings deposits = 100, long-term deposits = 100. M2 equals", "o": ["150", "250", "350", "300"], "a": 1, "s": "Exam 2023", "src": "exam"}, {"q": "From this data: currency in circulation = 100, checkable deposits = 50, savings deposits = 100, long-term deposits = 100. M3 equals", "o": ["150", "250", "350", "300"], "a": 2, "s": "Exam 2023", "src": "exam"}, {"q": "If an individual moves money from a small-denomination time deposit to a demand deposit account,", "o": ["M1 increases and M2 stays the same.", "M1 stays the same and M2 increases.", "M1 stays the same and M2 stays the same.", "M1 increases and M2 decreases."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "If an individual moves money from currency to a demand deposit account,", "o": ["M1 decreases and M2 stays the same.", "M1 stays the same and M2 increases.", "M1 stays the same and M2 stays the same.", "M1 increases and M2 stays the same."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "If an individual moves money from a money market deposit account to currency,", "o": ["M1 increases and M2 stays the same.", "M1 stays the same and M2 increases.", "M1 stays the same and M2 stays the same.", "M1 increases and M2 decreases."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "______ is the relative ease and speed with which an asset can be converted into a medium of exchange.", "o": ["Efficiency", "Liquidity", "Deflation", "Specialization"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Since it does not have to be converted into anything else to make purchases, ______ is the most liquid asset.", "o": ["money", "stock", "artwork", "gold"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Of the following assets, the least liquid is", "o": ["stocks.", "traveler's checks.", "checking deposits.", "a house."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Ranking assets from most liquid to least liquid, the correct order is", "o": ["savings bonds; house; currency.", "currency; savings bonds; house.", "currency; house; savings bonds.", "house; savings bonds; currency."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Small-denomination time deposits refer to certificates of deposit with a denomination of less than", "o": ["$1,000", "$10,000", "$100,000", "$1,000,000"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "The conversion of a barter economy to one that uses money", "o": ["increases efficiency by reducing the need to exchange goods and services.", "increases efficiency by reducing the need to specialize.", "increases efficiency by reducing transactions costs.", "does not increase economic efficiency."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Wealth includes not only money but also other assets such as bonds, stocks, land, furniture, cars, and houses.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Money is not the only store of value. Many assets, such as stocks, bonds, and gold, can be used as a store of value.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Financial systems use the monetary aggregates for measuring money.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "M2 includes M2 and the long-term time deposits (with a maturity of more than one year).", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}]}, {"id": "mb2", "l": "Ch.2", "c": "#457B9D", "grp": "mb", "mid": "pre", "t": "Ch. 2 — Analyzing the Financial System", "d": "Pre-midterm · Financial markets, direct vs. indirect finance, debt vs. equity, primary/secondary markets, exchanges vs. OTC, and money vs. capital markets.", "S": [{"h": "Function of financial markets", "p": ["<strong>Financial markets<\/strong> are any marketplace where savings are channeled from savers/lenders to borrowers/spenders.", "They move funds from people who have <strong>surplus funds<\/strong> (saved by spending less than income) to those with a <strong>shortage of funds<\/strong>.", "This raises production and efficiency for the overall economy."]}, {"h": "Direct vs. indirect finance", "p": ["<strong>Direct finance<\/strong> — borrowers borrow directly from lenders by selling them <strong>securities<\/strong> (financial instruments) in financial markets.", "<strong>Indirect finance<\/strong> — funds move through a <strong>financial intermediary<\/strong> (e.g. a bank).", "<strong>Securities<\/strong> are assets for the buyer but liabilities for the issuer."]}, {"h": "Debt vs. equity markets", "p": ["<strong>Debt instrument<\/strong> (bond/mortgage) — a contractual agreement to pay fixed amounts (interest + principal) until maturity.", "<strong>Short-term<\/strong>: maturity < 1 year · <strong>Intermediate<\/strong>: 1–10 years · <strong>Long-term<\/strong>: 10 years or more.", "<strong>Equity<\/strong> (common stock) — a claim to share in net income and assets; pays dividends, no maturity (long-term).", "An equity holder is a <strong>residual claimant<\/strong> (paid after debt holders) but benefits directly from rising profitability."]}, {"h": "Primary vs. secondary; exchanges vs. OTC", "p": ["<strong>Primary market<\/strong> — new issues sold to initial buyers; the <strong>investment bank<\/strong> underwrites them.", "<strong>Secondary market<\/strong> — previously-issued securities are resold; <strong>brokers<\/strong> match buyers/sellers, <strong>dealers<\/strong> buy/sell at stated prices.", "<strong>Exchanges<\/strong> — buyers and sellers meet in one central location.", "<strong>Over-the-counter (OTC)<\/strong> — dealers in different locations stand ready to buy/sell at their prices."]}, {"h": "Money vs. capital markets", "p": ["<strong>Money market<\/strong> — only <strong>short-term<\/strong> debt instruments (maturity < 1 year) are traded.", "<strong>Capital market<\/strong> — longer-term debt (≥ 1 year) and equity instruments are traded."]}], "Q": [{"q": "Financial markets have the basic function of", "o": ["getting people with funds to lend together with people who want to borrow funds.", "assuring that the swings in the business cycle are less pronounced.", "assuring that governments need never resort to printing money.", "providing a risk-free repository of spending power."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Financial markets promote economic efficiency by", "o": ["channeling funds from investors to savers.", "creating inflation.", "channeling funds from savers to investors.", "reducing investment."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Financial markets promote greater economic efficiency by channeling funds from ______ to ______.", "o": ["investors; savers", "borrowers; savers", "savers; borrowers", "savers; lenders"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Well-functioning financial markets", "o": ["cause inflation.", "eliminate the need for indirect finance.", "cause financial crises.", "produce an efficient allocation of capital."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "The principal lender-savers are", "o": ["governments.", "businesses.", "households.", "foreigners."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following can be described as direct finance?", "o": ["You take out a mortgage from your local bank.", "You borrow $2500 from a friend.", "You buy shares of common stock in the secondary market.", "You buy shares in a mutual fund."], "a": 2, "s": "Exam 2023", "src": "exam"}, {"q": "With ______ finance, borrowers obtain funds from lenders by selling them securities in the financial markets.", "o": ["active", "determined", "indirect", "direct"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Securities are ______ for the person who buys them but are ______ for the individual or firm that issues them.", "o": ["assets; liabilities", "liabilities; assets", "negotiable; nonnegotiable", "nonnegotiable; negotiable"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "If the maturity of a debt instrument is less than one year, the debt is called", "o": ["short-term.", "intermediate-term.", "long-term.", "prima-term."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Long-term debt has a maturity that is", "o": ["between one and ten years.", "less than a year.", "between five and ten years.", "ten years or longer."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following is an example of an intermediate-term debt?", "o": ["a fifteen-year mortgage", "a sixty-month car loan", "a six-month loan from a finance company", "a thirty-year U.S. Treasury bond"], "a": 1, "s": "Exam (Revision)", "src": "exam"}, {"q": "When I purchase ______, I own a portion of a firm and have the right to vote on issues important to the firm and to elect its directors.", "o": ["bonds", "bills", "notes", "stock"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following benefit directly from any increase in the corporation's profitability?", "o": ["a bond holder", "a commercial paper holder", "a shareholder", "a T-bill holder"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following statements about the characteristics of debt and equity is false?", "o": ["They can both be long-term financial instruments.", "They can both be short-term financial instruments.", "They both involve a claim on the issuer's income.", "They both enable a corporation to raise funds."], "a": 1, "s": "Exam 2024", "src": "exam"}, {"q": "______ are residual claimants.", "o": ["Bond holders", "Treasury-bill holders", "Mortgage holders", "Equity holders"], "a": 3, "s": "Exam (Revision)", "src": "exam"}, {"q": "A share of common stock is a claim on a corporation's", "o": ["debt.", "liabilities.", "expenses.", "earnings and assets."], "a": 3, "s": "Exam 2024", "src": "exam"}, {"q": "A corporation acquires new funds only when its securities are sold in the", "o": ["primary market by an investment bank.", "primary market by a stock exchange broker.", "secondary market by a securities dealer.", "secondary market by a commercial bank."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "A financial market in which previously issued securities can be resold is called a ______ market.", "o": ["primary", "secondary", "tertiary", "used securities"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "An important financial institution that assists in the initial sale of securities in the primary market is the", "o": ["investment bank.", "commercial bank.", "stock exchange.", "brokerage house."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "When an investment bank ______ securities, it guarantees a price for a corporation's securities and then sells them to the public.", "o": ["underwrites", "undertakes", "overwrites", "overtakes"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "______ work in the secondary markets matching buyers with sellers of securities.", "o": ["Dealers", "Underwriters", "Brokers", "Claimants"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "When secondary market buyers and sellers of securities meet in one central location to conduct trades, the market is called a(n)", "o": ["exchange.", "over-the-counter market.", "common market.", "barter market."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "In a(n) ______ market, dealers in different locations buy and sell securities to anyone who comes to them and is willing to accept their prices.", "o": ["exchange", "over-the-counter", "common", "barter"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Shares of corporations that are not listed on one of the organized exchanges are called", "o": ["blue chips.", "junk bonds.", "dividends.", "over-the-counter stocks."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "A financial market in which only short-term debt instruments are traded is called the ______ market.", "o": ["bond", "money", "capital", "stock"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Equity instruments are traded in the ______ market.", "o": ["money", "bond", "capital", "commodities"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Equity and debt instruments with maturities greater than one year are called ______ market instruments.", "o": ["capital", "money", "federal", "benchmark"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Markets for financial instruments with maturities less than a year are", "o": ["primary markets.", "secondary markets.", "money markets.", "capital markets."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Markets for financial instruments with maturities of a year or longer are", "o": ["primary markets.", "secondary markets.", "money markets.", "capital markets."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Newly issued financial instruments are traded mainly in", "o": ["primary markets.", "secondary markets.", "wholesale markets.", "discount markets."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Newly issued three-month Treasury bills are traded in: I. money markets  II. capital markets  III. primary markets  IV. secondary markets", "o": ["Both I and III.", "Both I and IV.", "Both II and III.", "Both II and IV."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "A 10-year corporate bond that was issued last year is sold in the: I. money market  II. capital market  III. primary market  IV. secondary market", "o": ["Both I and III.", "Both I and IV.", "Both II and III.", "Both II and IV."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Secondary markets make financial instruments more", "o": ["solid.", "vapid.", "liquid.", "risky."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "A liquid asset is", "o": ["an asset that can easily and quickly be sold to raise cash.", "a share of an ocean resort.", "difficult to resell.", "always sold in an over-the-counter market."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following is NOT a financial instrument?", "o": ["Treasury bond", "Federal funds loan", "A house", "Commercial paper"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Bond-like debt instruments backed by a bundle of individual mortgages are", "o": ["stocks.", "mortgage-backed securities.", "Treasury bills.", "municipal bonds."], "a": 1, "s": "Exam 2024", "src": "exam"}, {"q": "______ are long-term debt instruments issued by state and local government to finance expenditure on schools, roads, and other large programs.", "o": ["Treasury bills", "Stocks", "Treasury bonds", "Municipal bonds"], "a": 3, "s": "Exam 2024", "src": "exam"}, {"q": "Compared to interest rates on three-month Treasury bills, interest rates on long-term government bonds are ______ on average.", "o": ["higher", "less", "equal", "cannot be determined"], "a": 0, "s": "Exam 2024", "src": "exam"}, {"q": "The money market is a financial market in which only short-term debt instruments are traded.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "'Financial markets' refers to any marketplace where the savings from several sources are mobilized towards those who need funds.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}]}, {"id": "mb3", "l": "Ch.3", "c": "#27AE60", "grp": "mb", "mid": "pre", "t": "Ch. 3 — Financial Intermediaries & Internationalization", "d": "Pre-midterm · Why intermediaries exist (transaction costs, risk sharing, asymmetric information) and the three categories of financial intermediaries; foreign vs. Eurobonds.", "S": [{"h": "Indirect finance & intermediaries", "p": ["An intermediary borrows from lenders/savers and uses the funds to make loans to borrowers/spenders.", "This route is <strong>indirect finance<\/strong> and involves a <strong>financial intermediary<\/strong>."]}, {"h": "Why intermediaries exist", "p": ["<strong>Transaction costs<\/strong> — time and money spent on financial transactions; intermediaries reduce them via expertise and <strong>economies of scale<\/strong>, and provide <strong>liquidity services<\/strong>.", "<strong>Risk sharing<\/strong> (asset transformation) — they create/sell low-risk assets and buy riskier ones; turning risky assets into safer ones for investors.", "<strong>Diversification<\/strong> — investing in a portfolio of assets whose returns don't move together lowers overall risk ('don't put all your eggs in one basket')."]}, {"h": "Asymmetric information", "p": ["<strong>Asymmetric information<\/strong> — one party doesn't know enough about the other to make accurate decisions.", "<strong>Adverse selection<\/strong> — problem created <strong>before<\/strong> the transaction: the riskiest borrowers are the most eager to borrow.", "<strong>Moral hazard<\/strong> — problem created <strong>after<\/strong> the transaction: the borrower engages in undesirable (risky) activities making repayment less likely."]}, {"h": "Three categories of intermediaries", "p": ["<strong>Depository institutions (banks)<\/strong> — commercial banks, savings & loan associations, mutual savings banks, credit unions; raise funds via checkable, savings, and time deposits.", "<strong>Contractual savings institutions<\/strong> — life insurance companies and pension funds; acquire funds at periodic intervals on a contractual basis.", "<strong>Investment intermediaries<\/strong> — finance companies, mutual funds, money-market mutual funds."]}, {"h": "Internationalization of financial markets", "p": ["<strong>Foreign bond<\/strong> — sold in a foreign country and denominated in that country's currency (e.g. Porsche selling a dollar bond in the US).", "<strong>Eurobond<\/strong> — denominated in a currency other than that of the country where it is sold (e.g. a dollar bond sold in London)."]}], "Q": [{"q": "Financial intermediaries", "o": ["provide a channel for linking those who want to save with those who want to invest.", "produce nothing of value and are therefore a drain on society's resources.", "can hurt the performance of the economy.", "hold very little of the average person's wealth."], "a": 0, "s": "Exam 2023", "src": "exam"}, {"q": "The financial intermediaries that the average person interacts with most frequently are", "o": ["exchanges.", "over-the-counter markets.", "finance companies.", "banks."], "a": 3, "s": "Exam 2023", "src": "exam"}, {"q": "The time and money spent in carrying out financial transactions are called", "o": ["economies of scale.", "financial intermediation.", "liquidity services.", "transaction costs."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "______ are the time and resources spent trying to exchange goods and services.", "o": ["Bargaining costs", "Transaction costs", "Contracting costs", "Barter costs"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Economies of scale enable financial institutions to", "o": ["reduce transactions costs.", "avoid the asymmetric information problem.", "avoid adverse selection problems.", "reduce moral hazard."], "a": 0, "s": "Exam 2024", "src": "exam"}, {"q": "An example of economies of scale in the provision of financial services is", "o": ["investing in a diversified collection of assets.", "providing depositors with a variety of savings certificates.", "hiring more support staff so customers don't wait so long.", "spreading the cost of writing a standardized contract over many borrowers."], "a": 3, "s": "Exam 2024", "src": "exam"}, {"q": "The process where financial intermediaries create and sell low-risk assets and use the proceeds to purchase riskier assets is known as", "o": ["risk sharing.", "risk aversion.", "risk neutrality.", "risk selling."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "The process of asset transformation refers to the conversion of", "o": ["safer assets into risky assets.", "safer assets into safer liabilities.", "risky assets into safer assets.", "risky assets into risky liabilities."], "a": 2, "s": "Exam 2024", "src": "exam"}, {"q": "Reducing risk through the purchase of assets whose returns do not always move together is", "o": ["diversification.", "intermediation.", "intervention.", "discounting."], "a": 0, "s": "Exam 2023", "src": "exam"}, {"q": "The concept of diversification is captured by the statement", "o": ["don't look a gift horse in the mouth.", "don't put all your eggs in one basket.", "it never rains, but it pours.", "make hay while the sun shines."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Financial intermediaries promote risk sharing by investing funds in different assets. This is known as", "o": ["asset transformation.", "diversification.", "moral hazard.", "adverse selection."], "a": 1, "s": "Exam (Revision)", "src": "exam"}, {"q": "Typically, borrowers have superior information relative to lenders about the potential returns and risks of an investment project. This difference in information is called", "o": ["moral selection.", "risk sharing.", "asymmetric information.", "adverse hazard."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "The problem created by asymmetric information before the transaction occurs is called ______, while the problem created after the transaction occurs is called ______.", "o": ["adverse selection; moral hazard", "moral hazard; adverse selection", "costly state verification; free-riding", "free-riding; costly state verification"], "a": 0, "s": "Exam 2024", "src": "exam"}, {"q": "The problem associated with asymmetric information after the financial transaction occurs is known as", "o": ["moral hazard.", "adverse selection.", "free-riding.", "inside trading."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Adverse selection means loans are likely to go to ______, so ______ may decide not to make any loans.", "o": ["bad credit risks, lenders", "bad credit risks, borrowers", "good credit risks, lenders", "good credit risks, borrowers"], "a": 0, "s": "Exam (Revision)", "src": "exam"}, {"q": "Asymmetric information, adverse selection, and moral hazard are among the reasons that", "o": ["cause individuals to commit crimes.", "cause individuals to prefer only new banks.", "cause many savers to prefer to have their savings in financial intermediaries.", "cause individuals to prefer to lend directly to a borrower rather than keep the funds in an intermediary."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Individuals may find it efficient to save their funds in a financial intermediary because", "o": ["financial intermediaries have higher transaction costs when making loans.", "they help reduce the exposure of investors to risk.", "it is more difficult for them to provide liquidity services.", "they cannot incorporate economies of scale."], "a": 1, "s": "Exam 2024", "src": "exam"}, {"q": "When financial intermediation is needed between savers and borrowers, the investment process is called", "o": ["inequity finance.", "equity finance.", "indirect finance.", "direct finance."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following financial intermediaries is not a depository institution?", "o": ["A savings and loan association", "A commercial bank", "A credit union", "A finance company"], "a": 3, "s": "Exam 2023", "src": "exam"}, {"q": "All of the following are depository institutions EXCEPT", "o": ["credit unions.", "savings banks.", "savings and loan associations.", "stock exchanges."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "______ institutions are financial intermediaries that acquire funds at periodic intervals on a contractual basis.", "o": ["Investment", "Contractual savings", "Thrift", "Depository"], "a": 1, "s": "Exam 2024", "src": "exam"}, {"q": "Which of the following is a contractual savings institution?", "o": ["A life insurance company", "A credit union", "A savings and loan association", "A mutual fund"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following are not contractual savings institutions?", "o": ["Life insurance companies", "Credit unions", "Pension funds", "State and local government retirement funds"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "All of the following are considered investment intermediaries EXCEPT", "o": ["money market mutual funds.", "hedge funds.", "finance companies.", "credit unions."], "a": 3, "s": "Exam 2024", "src": "exam"}, {"q": "An investment bank helps ______ issue securities.", "o": ["a corporation", "the SEC", "a credit union", "an individual depositor"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "An investment bank purchases securities from a corporation at a predetermined price and then resells them in the market. This process is called", "o": ["underwriting.", "underhanded.", "understanding.", "undertaking."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "If a company sells a bond in London and it is denominated in dollars, the bond is a", "o": ["Eurobond.", "foreign bond.", "British bond.", "currency bond."], "a": 0, "s": "Exam (Revision)", "src": "exam"}, {"q": "Euro deposits in Germany are considered", "o": ["a Euro bond.", "Euro-currency.", "Euro deposits.", "ordinary deposits."], "a": 1, "s": "Exam 2024", "src": "exam"}, {"q": "A bond sold in a foreign country and denominated in that country's currency is a", "o": ["Eurobond.", "foreign bond.", "domestic bond.", "municipal bond."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Mutual funds acquire funds by", "o": ["accepting checkable deposits.", "selling shares to many individuals and using the proceeds to buy diversified portfolios of stocks and bonds.", "issuing insurance policies.", "making consumer loans only."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Finance companies raise funds primarily by", "o": ["accepting demand deposits.", "selling commercial paper and issuing stocks and bonds.", "collecting insurance premiums.", "accepting savings deposits."], "a": 1, "s": "Test Bank", "src": "tb"}]}, {"id": "mb4", "l": "Ch.4", "c": "#8E44AD", "grp": "mb", "mid": "pre", "t": "Ch. 4 — Commercial Banks: Financial Management", "d": "Pre-midterm · The bank balance sheet (assets/liabilities), reserves (required, excess, secondary), bank capital, deposit outflows, and the four areas of bank management.", "S": [{"h": "The commercial bank & its balance sheet", "p": ["<strong>Commercial banks<\/strong> receive deposits from savers and give loans to investors, earning the <strong>interest rate spread (IRS)<\/strong>.", "On the balance sheet: <strong>sources of funds = liabilities<\/strong> (a cost); <strong>uses of funds = assets<\/strong> (a return).", "Total assets = total liabilities + equity capital."]}, {"h": "Liabilities (sources of funds)", "p": ["<strong>Deposits<\/strong> — checkable (demand), savings, and time deposits; a liability toward savers.", "<strong>Borrowings<\/strong> — from other banks or the central bank (e.g. discount loans).", "<strong>Capital<\/strong> — a liability toward the owners (shareholders); bank capital = total assets − total liabilities."]}, {"h": "Assets (uses of funds)", "p": ["<strong>Reserves<\/strong> — the most liquid asset; vault cash + deposits at the central bank. <strong>Required reserves RR = rd × D<\/strong>; <strong>excess reserves ER = re × D<\/strong>; total reserves R = RR + ER.", "<strong>Securities<\/strong> — the 'secondary reserves'; ranked 2nd in liquidity after reserves.", "<strong>Loans<\/strong> — the main function of the bank; consumer, business, and mortgage loans earn interest.", "<strong>Fixed assets<\/strong> — buildings and land."]}, {"h": "The four areas of bank management", "p": ["<strong>Asset management<\/strong> — set the optimal diversified portfolio of assets to maximize return.", "<strong>Liability management<\/strong> — set the optimal mix of liabilities to minimize cost.", "<strong>Liquidity management<\/strong> — hold the optimal level of reserves (avoid shortage without overestimating).", "<strong>Capital adequacy management<\/strong> — hold enough capital to cover losses and avoid insolvency without sacrificing too much profitability."]}, {"h": "Managing a liquidity shortage", "p": ["Borrow from other commercial banks (federal funds market).", "Sell securities (must accept the current market price).", "Recall loans (risks losing customers).", "Borrow from the central bank at the discount rate (repeated use risks 'closing the window')."]}], "Q": [{"q": "A bank's assets are", "o": ["the various uses of funds that are acquired.", "the various sources of funds that are acquired.", "those items that are owed by the bank to depositors and others.", "by definition equal to the bank's liabilities."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "A bank's liabilities are", "o": ["the various uses of funds that are acquired.", "the various sources of funds that are acquired.", "those items the bank owns and earns income from.", "by definition equal to the bank's reserves."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following statements is true?", "o": ["A bank's assets are its sources of funds.", "A bank's liabilities are its uses of funds.", "A bank's balance sheet shows that total assets equal total liabilities plus equity capital.", "A bank's balance sheet indicates whether or not the bank is profitable."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following statements is false?", "o": ["A bank's assets are its uses of funds.", "A bank issues liabilities to acquire funds.", "The bank's assets provide the bank with income.", "Bank capital is recorded as an asset on the bank balance sheet."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following are reported as liabilities on a bank's balance sheet?", "o": ["Reserves", "Checkable deposits", "Loans", "Deposits with other banks"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following items is reported as a liability on a bank's balance sheet?", "o": ["Discount loans (borrowings)", "Reserves", "U.S. Treasury securities", "Loans"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Which of these are NOT bank liabilities?", "o": ["Checkable deposits", "CDs", "Mortgage loans", "Borrowings from the central bank"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "The primary liabilities of a commercial bank are", "o": ["bonds.", "mortgages.", "deposits.", "commercial paper."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Because checking accounts are ______ liquid for the depositor than passbook savings, they earn ______ interest rates.", "o": ["less; higher", "less; lower", "more; higher", "more; lower"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Bank reserves include", "o": ["deposits at the central bank and short-term Treasury securities.", "vault cash and short-term Treasury securities.", "vault cash and deposits at the central bank.", "deposits at other banks and deposits at the central bank."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "The amount of checkable deposits that banks are required by regulation to hold are the", "o": ["excess reserves.", "required reserves.", "vault cash.", "total reserves."], "a": 1, "s": "Exam 2022", "src": "exam"}, {"q": "Which of the following are reported as assets on a bank's balance sheet?", "o": ["Borrowings", "Reserves", "Savings deposits", "Bank capital"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following are NOT reported as assets on a bank's balance sheet?", "o": ["Cash items in the process of collection", "Deposits with other banks", "U.S. Treasury securities", "Checkable deposits"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following bank assets is the most liquid?", "o": ["Consumer loans", "Reserves", "Cash items in process of collection", "U.S. government securities"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Secondary reserves include", "o": ["deposits at the central bank.", "deposits at other large banks.", "short-term Treasury securities.", "consumer loans."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Because of their ______ liquidity, ______ U.S. government securities are called secondary reserves.", "o": ["low; short-term", "low; long-term", "high; short-term", "high; long-term"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Banks make their profits primarily by issuing", "o": ["equity.", "negotiable CDs.", "loans.", "NOW accounts."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "The most important category of assets on a bank's balance sheet is", "o": ["discount loans.", "securities.", "loans.", "cash items in the process of collection."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following are bank assets?", "o": ["the building owned by the bank", "a discount loan", "a negotiable CD", "a customer's checking account"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Bank capital is equal to ______ minus ______.", "o": ["total assets; total liabilities", "total liabilities; total assets", "total assets; total reserves", "total liabilities; total borrowings"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Bank capital is listed on the ______ side of the bank's balance sheet because it represents a ______ of funds.", "o": ["liability; use", "liability; source", "asset; use", "asset; source"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Bank loans from the central bank are called ______ and represent a ______ of funds.", "o": ["discount loans; use", "discount loans; source", "fed funds; use", "fed funds; source"], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "When a new depositor opens a checking account at the bank, the bank's assets ______ and its liabilities ______.", "o": ["increase; increase", "increase; decrease", "decrease; increase", "decrease; decrease"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "When you deposit a $50 bill in a bank,", "o": ["its liabilities decrease by $50.", "its assets increase by $50.", "its reserves decrease by $50.", "its cash items in the process of collection increase by $50."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "When you deposit $50 in currency at Old National Bank,", "o": ["its assets increase by less than $50 because of reserve requirements.", "its reserves increase by less than $50 because of reserve requirements.", "its liabilities increase by $50.", "its liabilities decrease by $50."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "When a $10 check written on the First National Bank of Chicago is deposited in an account at Citibank, then", "o": ["the liabilities of the First National Bank increase by $10.", "the reserves of the First National Bank increase by $10.", "the liabilities of Citibank increase by $10.", "the assets of Citibank fall by $10."], "a": 2, "s": "Exam 2022", "src": "exam"}, {"q": "When $1 million is deposited at a bank, the required reserve ratio is 20 percent, and the bank chooses not to hold any excess reserves but makes loans instead, then in the bank's final balance sheet,", "o": ["the assets at the bank increase by $800,000.", "the liabilities of the bank increase by $1,000,000.", "the liabilities of the bank increase by $800,000.", "reserves increase by $160,000."], "a": 1, "s": "Exam 2022", "src": "exam"}, {"q": "With a 10% reserve requirement ratio, a $100 deposit into New Bank means that the maximum amount New Bank could lend is", "o": ["$90.", "$100.", "$10.", "$110."], "a": 0, "s": "Exam 2022", "src": "exam"}, {"q": "With a 12% reserve requirement ratio, a $200 deposit into New Bank means that the maximum amount New Bank could lend is", "o": ["$176.", "$200.", "$24.", "$224."], "a": 0, "s": "Exam 2023", "src": "exam"}, {"q": "A $5 million deposit outflow from a bank has the immediate effect of", "o": ["reducing deposits and reserves by $5 million.", "reducing deposits and loans by $5 million.", "reducing deposits and securities by $5 million.", "reducing deposits and capital by $5 million."], "a": 0, "s": "Exam 2022", "src": "exam"}, {"q": "If a bank has excess reserves greater than the amount of a deposit outflow, the outflow will result in equal reductions in", "o": ["deposits and reserves.", "deposits and loans.", "capital and reserves.", "capital and loans."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "If, after a deposit outflow, a bank needs an additional $3 million to meet its reserve requirements, the bank can", "o": ["reduce deposits by $3 million.", "increase loans by $3 million.", "sell $3 million of securities.", "repay its discount loans from the central bank."], "a": 2, "s": "Exam 2022", "src": "exam"}, {"q": "Of the following, which would be the first choice for a bank facing a reserve deficiency?", "o": ["Call in loans", "Borrow from the central bank", "Sell securities", "Borrow from other banks"], "a": 3, "s": "Exam 2022", "src": "exam"}, {"q": "A bank with insufficient reserves can increase its reserves by", "o": ["lending federal funds.", "calling in loans.", "buying short-term Treasury securities.", "buying municipal bonds."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Bankers' concerns regarding the optimal mix of excess reserves, secondary reserves, and borrowings to deal with deposit outflows is an example of", "o": ["liability management.", "liquidity management.", "managing interest rate risk.", "managing credit risk."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following statements most accurately describes the task of bank asset management?", "o": ["Banks seek the highest returns possible subject to minimizing risk and making adequate provisions for liquidity.", "Banks seek the highest liquidity possible subject to earning a positive rate of return.", "Banks seek to prevent bank failure at all cost.", "Banks seek to acquire funds in the least costly way."], "a": 0, "s": "Exam 2022", "src": "exam"}, {"q": "The goals of bank asset management include", "o": ["maximizing risk.", "minimizing liquidity.", "lending at high interest rates regardless of risk.", "purchasing securities with high returns and low risk."], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "A bank failure occurs whenever", "o": ["a bank cannot satisfy its obligations to pay its depositors and meet its reserve requirements.", "a bank suffers a large deposit outflow.", "a bank has to call in a large volume of loans.", "a bank is not allowed to borrow from the central bank."], "a": 0, "s": "Exam 2022", "src": "exam"}, {"q": "A bank is insolvent when", "o": ["its liabilities exceed its assets.", "its assets exceed its liabilities.", "its capital exceeds its liabilities.", "its assets increase in value."], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Holding large amounts of bank capital helps prevent bank failures because", "o": ["it means the bank has a higher income.", "it makes loans easier to sell.", "it can be used to absorb the losses resulting from bad loans.", "it makes it easier to call in loans."], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Bank capital has both benefits and costs for the bank owners. Higher bank capital ______ the likelihood of bankruptcy, but higher bank capital ______ the return on equity for a given return on assets.", "o": ["reduces; reduces", "increases; increases", "reduces; increases", "increases; reduces"], "a": 0, "s": "Test Bank", "src": "tb"}, {"q": "Banks that actively manage liabilities will most likely meet a reserve shortfall by", "o": ["calling in loans.", "borrowing federal funds.", "selling municipal bonds.", "seeking new deposits."], "a": 1, "s": "Test Bank", "src": "tb"}, {"q": "______ may antagonize customers and thus can be a very costly way of acquiring funds to meet an unexpected deposit outflow.", "o": ["Selling securities", "Selling loans", "Calling in loans", "Selling negotiable CDs"], "a": 2, "s": "Test Bank", "src": "tb"}, {"q": "Which of the following would a bank NOT hold as insurance against the highest cost of a deposit outflow — bank failure?", "o": ["Excess reserves", "Secondary reserves", "Bank capital", "Mortgages"], "a": 3, "s": "Test Bank", "src": "tb"}, {"q": "A loan of excess reserves from one bank to another bank is recorded as a(n) ______ for the borrowing bank and a(n) ______ for the lending bank.", "o": ["asset; asset", "asset; liability", "liability; liability", "liability; asset"], "a": 3, "s": "Exam 2022", "src": "exam"}, {"q": "Large-denomination CDs are ______, so that like a bond they can be resold in a ______ market before they mature.", "o": ["nonnegotiable; secondary", "nonnegotiable; primary", "negotiable; secondary", "negotiable; primary"], "a": 2, "s": "Exam (Revision)", "src": "exam"}, {"q": "Banks hold excess and secondary reserves to", "o": ["reduce the interest-rate risk problem.", "provide for deposit outflows.", "satisfy margin requirements.", "achieve higher earnings than they can with loans."], "a": 1, "s": "Test Bank", "src": "tb"}]}, {"id": "mb5", "l": "Ch.5", "c": "#2A9D8F", "grp": "mb", "mid": "post", "t": "Ch. 5 — Central Banking & Monetary Policy", "d": "Post-midterm · The role and functions of the central bank and the instruments of monetary policy. Questions here are expected/practice questions written from your lecture notes.", "S": [{"h": "What is a central bank?", "p": ["A <strong>central bank<\/strong> is an independent national authority that conducts monetary policy, regulates banks, and provides financial services including economic research.", "Its goals are to stabilize the nation's currency, keep unemployment low, and prevent inflation.", "It holds a <strong>monopoly<\/strong> on increasing the monetary base and usually prints the national currency (legal tender).", "It acts as a <strong>lender of last resort<\/strong> to the banking sector during financial crises."]}, {"h": "Functions of the central bank", "p": ["<strong>Issue of currency<\/strong> — sole monopoly of issuing currency; keeps a reserve of gold and foreign securities.", "<strong>Banker to government<\/strong> — carries out the government's banking business; government keeps cash balances with it and can borrow by selling securities.", "<strong>Banker's bank & supervisor<\/strong> — custodian of banks' cash reserves, lender of last resort, and bank of central clearance/settlement; supervises banks to ensure solvency.", "<strong>Controller of credit & money supply<\/strong> — controls credit and money supply through monetary policy."]}, {"h": "Monetary policy & its instruments", "p": ["The main objective of credit control is <strong>price stability with full employment<\/strong>.", "The central bank adjusts a monetary aggregate, an interest rate, or the exchange rate to affect goals it does not directly control.", "<strong>Reserve requirement<\/strong> — banks must hold a fraction of deposit liabilities as reserves; limits how much they can lend.", "<strong>Open market operations (OMO)<\/strong> — buying/selling securities (e.g. Treasury bills) affects the supply of reserves and money.", "<strong>Interest rate<\/strong> — lending to sound banks at the <strong>minimum rediscount rate (MRR)<\/strong> sets the floor for money-market rates."]}], "Q": [{"q": "A central bank is best described as", "o": ["a private commercial bank that maximizes profit.", "an independent national authority that conducts monetary policy, regulates banks, and provides financial services.", "a bank that only accepts deposits from individuals.", "an international lending organization."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Which of the following is a function of the central bank?", "o": ["Issuing the national currency", "Accepting checkable deposits from the public", "Granting consumer loans", "Selling shares to investors"], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The central bank acts as a 'lender of last resort,' meaning it", "o": ["lends to households during recessions.", "provides loans to banks during times of financial crisis.", "guarantees all bank deposits.", "never lends to commercial banks."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The central bank has a monopoly on", "o": ["accepting deposits.", "increasing the monetary base and issuing currency.", "making consumer loans.", "trading stocks."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "When the central bank carries out the banking business of the government, it is acting as", "o": ["banker's bank.", "banker to the government.", "lender of last resort.", "controller of credit."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "As the 'banker's bank,' the central bank acts in all of the following capacities EXCEPT", "o": ["custodian of banks' cash reserves.", "lender of last resort.", "bank of central clearance and settlement.", "issuer of corporate equity."], "a": 3, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The main objective of the credit-control function of the central bank is", "o": ["maximizing bank profits.", "price stability along with full employment.", "increasing government spending.", "eliminating commercial banks."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Which of the following is an instrument of monetary policy?", "o": ["Reserve requirement", "Income tax rates", "Government wages", "Tariffs"], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "When the central bank raises the reserve requirement, the amount of loans banks can make to the economy", "o": ["increases.", "decreases.", "stays the same.", "becomes unlimited."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Open market operations refer to the central bank's", "o": ["setting of tax rates.", "buying or selling of securities (such as Treasury bills) in the open market.", "printing of corporate bonds.", "supervision of bank branches."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "When the central bank buys securities in the open market, the supply of reserves and money", "o": ["decreases.", "increases.", "is unaffected.", "becomes zero."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The rate at which the central bank lends to financially sound banks is called the", "o": ["minimum rediscount rate (MRR).", "federal funds rate.", "prime rate.", "coupon rate."], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "By controlling the volume of currency and credit, the central bank functions as the", "o": ["controller of credit and money supply.", "residual claimant.", "underwriter.", "broker."], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Which of the following best describes a goal of the central bank?", "o": ["Maximizing inflation", "Stabilizing the nation's currency and keeping unemployment low", "Maximizing commercial-bank dividends", "Expanding the barter system"], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "To conduct monetary policy, the central bank adjusts variables such as", "o": ["a monetary aggregate, an interest rate, or the exchange rate.", "corporate profits.", "household savings directly.", "import quotas."], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "When the central bank sells securities in the open market, the money supply will", "o": ["increase.", "decrease.", "not change.", "double."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "If a commercial bank repeatedly borrows from the central bank at the discount window, it may face", "o": ["higher profits.", "the case of 'closing the window' (restricted access).", "an automatic bailout.", "lower reserve requirements."], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The central bank keeps a reserve in the form of ______ to back the currency it issues.", "o": ["gold and foreign securities", "consumer loans", "corporate stock", "real estate"], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Which institution supervises and regulates commercial banks to ensure their solvency?", "o": ["The central bank", "The stock exchange", "Finance companies", "Mutual funds"], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "A lower minimum rediscount rate (MRR) tends to ______ the supply of credit and investment.", "o": ["decrease", "increase", "not affect", "freeze"], "a": 1, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Monetary policy primarily aims to influence goals the central bank does not directly control, such as", "o": ["full employment and price stability.", "the number of bank branches.", "corporate dividend policy.", "tariff schedules."], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "The reserve requirement works by requiring banks to hold a fraction of their ______ as reserves.", "o": ["deposit liabilities", "total loans", "equity capital", "fixed assets"], "a": 0, "s": "Ch.5 · Expected", "src": "gen"}, {"q": "Which of the following is NOT a function of the central bank of a country?", "o": ["Being the custodian of foreign exchange reserves", "Accepting deposits from the general public", "Both a and b are correct", "Both a and b are incorrect"], "a": 1, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "Which of the following statements represents the main function of the central bank in a country?", "o": ["It is responsible for the regulation over the supply of money in the market", "It is responsible for the issuance of notes within the country", "It acts as a banker both to the government and to other banks in the country", "All of the above"], "a": 3, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "Which statement gives a true picture of the effect of lowering the cash reserve ratio by the central bank of a country?", "o": ["The lending capacity of commercial banks will increase", "The lending capacity of commercial banks will decrease", "The lending capacity of commercial banks may increase or decrease", "There is no effect on the lending capacity of commercial banks"], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "Expansionary fiscal policy refers to:", "o": ["A reduction in government expenditures and/or an increase in taxes", "An increase in government expenditures and/or a decrease in taxes", "An increase in the money supply", "A decrease in the money supply"], "a": 1, "s": "Final 2024 (Model 2)", "src": "exam"}]}, {"id": "it1", "l": "IT.1", "c": "#F4A261", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 1 — The Pattern & Importance of World Trade", "d": "The value and importance of trade, GDP vs GNP, the index of openness, standard of living and economic growth. All questions are real, answer-keyed revision questions.", "S": [{"h": "Why trade & what it lets countries do", "p": ["<strong>International trade<\/strong> = trade between <strong>residents<\/strong> of two countries (residents may be persons, firms, non-profit organizations, or other associations).", "<strong>Exports<\/strong> — goods/services sold by economic units in one country to units in other countries. <strong>Imports<\/strong> — goods/services bought by domestic units from other countries.", "Trade lets a country obtain goods it cannot produce domestically (or that would cost much more at home), clear out <strong>production surpluses<\/strong>, and import raw materials and <strong>intermediate goods<\/strong> for development.", "No country today — however large — can live in complete economic isolation."]}, {"h": "GDP vs GNP, capital & growth", "p": ["<strong>GDP<\/strong> = value of final goods & services produced <strong>within<\/strong> a country (by anyone inside its borders).", "<strong>GNP<\/strong> = value of final goods & services produced by a country's <strong>domestic factors<\/strong> of production (including those working overseas).", "<strong>Physical capital<\/strong> = investment in plants and equipment. <strong>Human capital<\/strong> = the accumulation of knowledge and skills by workers — a major source of economic growth.", "<strong>Economic growth<\/strong> is measured by the growth rate of per-capita income / GDP / GNP."]}, {"h": "Index of openness & standard of living", "p": ["<strong>Index of openness = (Exports / GDP or GNP) × 100<\/strong> — measures the participation and importance of international trade to a country. It varies between <strong>0 and 100<\/strong>.", "<strong>High<\/strong> index → the country trades a lot with the rest of the world → <strong>relatively open<\/strong>. <strong>Low<\/strong> index → <strong>relatively closed<\/strong>.", "<strong>Standard of living<\/strong> is directly measured by <strong>per-capita income<\/strong> (GDP or GNP per person) = how much each person would have if production were divided equally.", "A country with an <strong>abundant<\/strong> endowment of a factor tends to have a comparative advantage in goods that use that factor intensively."]}], "Q": [{"q": "The formula (Exports / GDP or GNP × 100) measures which of the following?", "o": ["A country's total population density", "The inflation rate relative to the global average", "The scale of domestic tax revenue", "The participation and importance of international trade to a country"], "a": 3, "s": "Revision", "src": "rev"}, {"q": "If a country scores a very low value on the Index of Openness, it is considered to be:", "o": ["Relatively open", "Relatively closed", "Highly dependent on oil production", "Economically unstable"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "If a country scores a high value on the Index of Openness (it trades a lot with the rest of the world), it is considered to be:", "o": ["Relatively open", "Relatively closed", "Highly dependent on oil production", "Economically unstable"], "a": 0, "s": "Revision", "src": "rev"}, {"q": "How is per-capita income (or per-capita GDP/GNP) calculated?", "o": ["Total Exports × Total Imports", "GDP or GNP / Population", "Physical Capital + Human Capital", "(Primary Products / Manufactured Goods) × 100"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "A major source of economic growth is the accumulation of knowledge and skills by workers, which is known as:", "o": ["Physical capital", "Human capital", "Comparative advantage", "Production surplus treasure"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "What term is defined as \"the value of final goods and services produced within a country\"?", "o": ["Gross National Product (GNP)", "Index of Openness", "Gross Domestic Product (GDP)", "Comparative Advantage"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "What term is defined as \"the value of final goods and services produced by domestic factors of production\"?", "o": ["Gross National Product (GNP)", "Index of Openness", "Gross Domestic Product (GDP)", "Comparative Advantage"], "a": 0, "s": "Revision", "src": "rev"}, {"q": "Standard of living in a country is directly measured by:", "o": ["Gross area size", "The index of openness value", "Per-capita income, GDP, or GNP", "The volume of structural export surpluses"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "If a country is described as having a high Index of Openness, it means the country:", "o": ["Imposes heavy trade restrictions", "Trades a lot with the rest of the world", "Has a declining population size", "Focuses purely on primary goods"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Per-capita income explicitly tells us:", "o": ["The total value of raw materials imported", "The exact number of industrial factories built", "How much each person would have if production value were equally divided", "The opportunity cost of missing factor endowments"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "What is defined as \"investment in plants and equipment\"?", "o": ["Human capital", "Physical capital", "Comparative advantage", "Index of openness"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "International trade allows countries to clear out their:", "o": ["Production deficits", "Production surpluses", "Index limits", "Human capital investments"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "What type of goods, alongside raw materials, does trade help countries import for economic development?", "o": ["Final luxury items", "Closed commodities", "Intermediate goods", "Depleted resources"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "The ______ is a trade between residents of two countries; the residents may be persons, firms, non-profit organizations, or other forms of association.", "o": ["International trade", "Exports", "Imports", "Investments"], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "Less Developed Countries (LDCs) only export manufactured goods and do not export primary products.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "There are several large countries in the world today that can live completely in economic isolation from the rest of the world.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The Index of Openness value will always vary between 0 and 100.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "International trade contributes to a country's standard of living by allowing it to obtain goods it cannot produce domestically, or goods that would cost much more to produce at home.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Gross National Product (GNP) measures the final goods and services produced exclusively by domestic factors of production.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "If a country has an abundant endowment of a specific factor, it will tend to have a comparative advantage in producing goods that use that factor intensively.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Japan, Australia, and New Zealand are classified as industrial countries.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Today, very large countries can easily live in complete economic isolation from the rest of the world because of their population size.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The Index of Openness is calculated by dividing GDP/GNP by total exports and then multiplying by 100.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Countries with low values on the Index of Openness are said to be relatively open.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Standard of living can be measured by both the quantity and quality of goods and services an average person consumes.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Foreign trade lowers a country's standard of living because it forces dependency on foreign nations.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "International trade helps a country obtain items it can produce domestically, but only if domestic production costs are lower than import costs.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Economic growth is measured by the growth rate of per-capita income, GDP, or GNP.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Human capital refers to the accumulation of buildings, machinery, and production plants.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "International trade creates a competitive environment that encourages the growth of human capital.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Gross Domestic Product (GDP) includes goods and services produced by domestic factors of production working overseas.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Exports are defined as goods and services sold by economic units in one country to economic units located in other countries.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Imports are goods and services purchased by domestic economic units from other countries.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "An abundance of a particular production factor gives a country a comparative advantage in goods that use that factor intensively.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "A decrease in exports increases trade openness.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Foreign trade enables countries to obtain goods that they do not produce domestically.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}]}, {"id": "it2", "l": "IT.2", "c": "#E76F51", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 2 — Classical Theory: Absolute & Comparative Advantage", "d": "The labour theory of value, the classical assumptions, Adam Smith's absolute advantage and Ricardo's comparative advantage (opportunity cost). Real answer-keyed revision questions + 2024 final.", "S": [{"h": "Mercantilism (the pre-classical view)", "p": ["<strong>Mercantilists<\/strong> believed in <strong>running trade surpluses<\/strong> — export more than you import to accumulate bullion/gold.", "They saw <strong>trade as a zero-sum activity<\/strong>, viewed imports as undesirable, and supported government-granted monopolies.", "The classical economists (Smith, Ricardo) replaced this with mutual gains from trade."]}, {"h": "Assumptions of the classical theory", "p": ["<strong>Labour theory of value<\/strong> — labour is the <strong>only<\/strong> factor of production; a commodity's value = the amount of labour spent on it; all labour is <strong>homogeneous<\/strong> (identical).", "<strong>International immobility of factors<\/strong> — factors move freely within a country but not between countries, so wage differences persist (migration can't eliminate them).", "<strong>Perfect competition<\/strong> — Price = Marginal Cost = Average Cost; unit labour cost (and price) stays constant as output expands.", "Simplifying assumptions: <strong>two countries, two commodities, zero transport costs<\/strong>; analysis is at the <strong>barter level, without money<\/strong>."]}, {"h": "Adam Smith — Absolute Advantage", "p": ["<strong>Absolute advantage<\/strong> = the ability to produce a good using <strong>lower unit-labour requirements<\/strong> than other countries.", "Each country specializes in and exports the good it produces at <strong>lower cost<\/strong>, and imports the other.", "Solving a table: the country needing <strong>fewer labour hours<\/strong> for a good is more efficient → has the absolute advantage → exports it."]}, {"h": "David Ricardo — Comparative Advantage", "p": ["A nation has a <strong>comparative advantage<\/strong> in a good if its <strong>opportunity cost<\/strong> of producing it is <strong>lower<\/strong> than the other country's.", "<strong>Opportunity cost<\/strong> = the quantity of other goods that must be sacrificed to produce one more unit of a good.", "Trade benefits both countries <strong>even when one has an absolute advantage in both goods<\/strong> — each specializes by comparative advantage.", "Solving a table: opportunity cost of X = (labour for X) / (labour for Y). The country with the <strong>lower<\/strong> ratio has the comparative advantage in X.", "Ricardo's classic illustration: <strong>Portugal & England; Wine & Cloth<\/strong>. Gains from trade = higher consumption with the same resources."]}], "Q": [{"q": "According to the classical theory of international trade, what is considered the only factor of production?", "o": ["Capital", "Land", "Labor", "Entrepreneurship"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "The Pure Theory of International Trade primarily aims to provide an explanation for which of the following?", "o": ["Exchange rate fluctuations", "The world trade pattern", "Central bank interventions", "Domestic inflation rates"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Who developed the Theory of Absolute Advantage?", "o": ["David Ricardo", "Adam Smith", "John Maynard Keynes", "Milton Friedman"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Who introduced the Theory of Comparative Advantage?", "o": ["Adam Smith", "David Ricardo", "Alfred Marshall", "Thomas Malthus"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "What does the Labor Theory of Value state?", "o": ["The value of a commodity is determined by its scarcity.", "The value of a commodity is determined by consumer demand.", "The value of a commodity is determined by the amount of labor spent on its production.", "The value of a commodity is determined by the cost of capital."], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Under the classical theory's assumption of perfect competition, what is the relationship between price, marginal cost (MC), and average cost (AC)?", "o": ["Price > MC > AC", "Price = MC = AC", "Price < MC = AC", "Price is unrelated to MC and AC"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "What happens to the unit labor cost as production output expands under the classical assumptions of perfect competition?", "o": ["It rises sharply.", "It falls steadily.", "It fluctuates randomly.", "It neither rises nor falls (prices remain constant)."], "a": 3, "s": "Revision", "src": "rev"}, {"q": "Which of the following describes the mobility of factors of production in the classical trade theory?", "o": ["Fully mobile between countries, but immobile within a country.", "Immobile both within a country and between countries.", "Fully mobile within a country, but entirely immobile between countries.", "Fully mobile globally without any restrictions."], "a": 2, "s": "Revision", "src": "rev"}, {"q": "If wages are higher in Country A than in Country B, why do classical economists argue that they stay higher?", "o": ["Governments set strict minimum wage laws.", "Labor migration cannot take place on a scale sufficient to eliminate discrepancies.", "Capital flows quickly to offset the differences.", "Consumers prefer goods from Country A."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "To simplify the classical trade models, how many countries and how many commodities are typically assumed?", "o": ["3 countries, 3 commodities", "2 countries, 3 commodities", "2 countries, 2 commodities", "1 country, 2 commodities"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Absolute advantage is defined as the ability to produce a good using:", "o": ["Higher total capital inputs than other nations.", "Lower unit labor requirements than other countries.", "More natural resources than neighboring countries.", "Complex domestic trade tariffs."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The classical theory of international trade is primarily concerned with production and exchange at what level?", "o": ["The monetary policy level", "The banking and credit level", "The barter level, without the intervention of money", "The digital currency level"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "What is defined as the quantity of other goods that must be sacrificed to produce one more unit of a specific good?", "o": ["Absolute cost", "Marginal utility", "Opportunity cost", "Factor endowment"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "Factor endowment refers to:", "o": ["The total amount of trade tariffs collected by a government.", "The amount of factors of production (e.g., capital and labor) available in an economy.", "The level of education of the workforce.", "The historical wealth of a country's banking system."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "If Country A requires 10 hours to produce a unit of Good X and Country B requires 20 hours, which country has the absolute advantage in Good X?", "o": ["Country B", "Neither country", "Country A", "Both countries share it"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "If Country A has an absolute advantage in producing all goods over Country B, David Ricardo proved that:", "o": ["Trade cannot benefit Country A.", "Trade cannot benefit Country B.", "Trade will still benefit both countries if they specialize according to comparative advantage.", "Country B should fully close its borders to trade."], "a": 2, "s": "Revision", "src": "rev"}, {"q": "In David Ricardo's classic model, which two countries and two goods were utilized for illustration?", "o": ["France and Germany; Wheat and Beer", "Portugal and England; Wine and Cloth", "Spain and Italy; Olives and Silk", "America and Britain; Cotton and Tobacco"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "A nation possesses a comparative advantage in a good if its domestic opportunity cost for producing that good is:", "o": ["Higher than the other country's opportunity cost.", "Lower than the other country's opportunity cost.", "Equal to the other country's opportunity cost.", "Determined entirely by currency exchange rates."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "When countries engage in international trade based on comparative advantage, they can enjoy:", "o": ["A lower level of overall consumption.", "A higher level of consumption with the same amount of resources.", "An immediate reduction in total domestic employment.", "Isolation from global economic shocks."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "If Country A must give up 2 units of Good Y to produce 1 unit of Good X, and Country B must give up 3 units of Good Y to produce 1 unit of Good X, which country has a comparative advantage in Good X?", "o": ["Country B", "Country A", "Neither country", "Both countries have the same advantage"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Under autarky, if Country A requires 20 hours to make a unit of Good Y, and under trade it can exchange a unit of Good X (which takes 10 hours to make) for a unit of Good Y, how many hours does Country A effectively save per unit of Y?", "o": ["5 hours", "10 hours", "15 hours", "20 hours"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "According to the classical trade theory, what factor causes different production costs among countries?", "o": ["Fluctuating exchange rates", "Differing labor productivities", "Divergent corporate tax structures", "Varying transportation infrastructure quality"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "Which of the following is an explicit simplifying assumption of the classical theory of international trade?", "o": ["High transportation costs", "Domestically immobile labor", "Zero transportation costs", "Massive global labor migration"], "a": 2, "s": "Revision", "src": "rev"}, {"q": "The concept that states all units of labor are identical and uniform within a country is known as labor being:", "o": ["Heterogeneous", "Homogeneous", "Specialized", "Fragmented"], "a": 1, "s": "Revision", "src": "rev"}, {"q": "International trade enables countries to buy foreign goods at a price that is:", "o": ["Higher than it costs to make the same goods at home.", "Lower than it costs to make the same goods at home.", "Exactly equal to domestic production costs.", "Unrelated to domestic production costs."], "a": 1, "s": "Revision", "src": "rev"}, {"q": "The Mercantilists believed in", "o": ["running trade surpluses", "balanced trade", "the logic of Adam Smith", "no government intervention in markets"], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "Which of the following statements would a mercantilist NOT agree with?", "o": ["Imports are desirable.", "Trade is a zero-sum activity.", "The purpose of trade is to amass revenues from exports.", "A country can benefit by granting monopoly rights to individuals."], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "If a country has an absolute advantage in both goods, the country should specialize in and export that good which is", "o": ["relatively more efficient", "relatively less efficient", "relatively less inefficient", "None of the above"], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "According to absolute advantage theory, each country will specialize in a good that it produces at ______ cost.", "o": ["Higher", "Lower", "The same", "None of the above"], "a": 1, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "According to the theory of comparative advantage, countries gain from trade because", "o": ["Trade makes firms behave more competitively, reducing their market power.", "All firms can take advantage of cheap labor.", "Output per worker in each firm increases.", "World output can rise when each country specializes in what it does relatively best."], "a": 3, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "Each table shows labour hours to produce one unit of X and Y. X: A=1, B=6; Y: A=4, B=8. Identify which country has a comparative advantage in good X.", "o": ["Country A has a comparative advantage in good X.", "Country B has a comparative advantage in good X.", "Country A has a comparative disadvantage in good X.", "Country A has an absolute advantage in good X."], "a": 0, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "Each table shows labour hours to produce one unit of X and Y. X: A=3, B=6; Y: A=4, B=12. Identify which country has a comparative advantage in good X.", "o": ["Country A has a comparative advantage in good X.", "Country B has a comparative advantage in good X.", "Country A has an absolute disadvantage in good X.", "Country A has an absolute advantage in good X."], "a": 1, "s": "Final 2024 (Model 2)", "src": "exam"}, {"q": "David Ricardo developed the Theory of Absolute Advantage.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The classical theory of international trade assumes that labor is completely mobile between different countries.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "According to the Labor Theory of Value, all labor is considered homogeneous.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "In a condition of perfect competition, marginal cost is equal to average cost, which is equal to price (MC = AC = Price).", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The classical theory assumes that unit labor costs rise significantly as output expands.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Adam Smith's theory of absolute advantage focuses on exchange at the barter level without using money.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Absolute advantage refers to a country's ability to produce a commodity at a lower relative opportunity cost than another nation.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "If a country has an absolute disadvantage in all lines of production, it cannot gain or benefit from international trade.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Opportunity cost is defined as the quantity of other goods that must be sacrificed to produce one more unit of a good.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Under the assumptions of the classical trade model, there are high transportation costs that cause prices to differ between nations after trade occurs.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Comparative advantage arises from international differences in the availability of factors of production.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Autarky refers to a state of economic isolation where a country does not engage in international trade.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "In Ricardo's model, Portugal had an absolute advantage in both wine and cloth over England.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "If Country A has a lower opportunity cost in producing cloth than Country B, then Country A has a comparative advantage in cloth.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Reallocating factors of production to lines of comparative advantage allows trading countries to achieve higher consumption levels.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Classical economists viewed capital and land as the primary factors that determine the value of a commodity.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Differing labor productivities among nations lead to differing production costs, which in turn encourage trade.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Under perfect competition, prices are assumed to be constant as output expands because unit labor costs do not change.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "If labor can move perfectly across international borders, the classical assumption of international immobility of factors of production still holds true.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "In the 2-country, 2-commodity model, if a country specializes in a good, it exchanges that product for a good in which it has a comparative disadvantage.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "International trade forces countries to spend more hours of labor to obtain goods than they would under autarky.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Factor endowment refers to the total monetary wealth and gold reserves held by a nation's central bank.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "According to Ricardo, even if a country is less efficient at producing all goods, it can still successfully participate in trade.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "The classical model assumes that a country will export goods that it produces at a higher relative cost than other nations.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "International trade enables nations to specialize, which increases total world production output.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}, {"q": "Classical economists assume that there is no transportation cost.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1}]}, {"id": "it3", "l": "IT.3", "c": "#9B59B6", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 3 — Factor Endowments & Heckscher-Ohlin", "d": "The two-factor H-O model, production functions, factor abundance (by prices and physically), factor-price equalization and why H-O fails in reality. Real answer-keyed revision questions + 2024 final.", "S": [{"h": "From Ricardo to Heckscher-Ohlin", "p": ["Ricardo: labour is
