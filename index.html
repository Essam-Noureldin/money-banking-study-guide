em> unit labor costs as output expands; prices remain stable because MC = AC and neither rises with scale."}, {"q": "Adam Smith's theory of absolute advantage focuses on exchange at the barter level without using money.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Classical theory operates at a barter level, exchanging one good for another without money, to isolate the real productive determinants of trade."}, {"q": "Absolute advantage refers to a country's ability to produce a commodity at a lower relative opportunity cost than another nation.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The definition given — lower relative opportunity cost — is comparative advantage. Absolute advantage means lower <em>unit labor requirements<\/em>, not lower opportunity cost."}, {"q": "If a country has an absolute disadvantage in all lines of production, it cannot gain or benefit from international trade.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Ricardo proved that even a country with an absolute disadvantage in every good can still gain from trade by specializing in the good where its relative inefficiency is smallest."}, {"q": "Opportunity cost is defined as the quantity of other goods that must be sacrificed to produce one more unit of a good.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Opportunity cost captures what is given up: to produce one more unit of good X, a country must sacrifice a certain quantity of good Y."}, {"q": "Under the assumptions of the classical trade model, there are high transportation costs that cause prices to differ between nations after trade occurs.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The classical theory assumes <em>zero<\/em> transportation costs, which is why prices equalize across countries after trade opens."}, {"q": "Comparative advantage arises from international differences in the availability of factors of production.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Countries differ in their endowments of labor, capital, and land, leading to productivity differences and hence comparative advantages that drive trade."}, {"q": "Autarky refers to a state of economic isolation where a country does not engage in international trade.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Autarky means economic self-sufficiency — a country produces everything it consumes and does not trade internationally."}, {"q": "In Ricardo's model, Portugal had an absolute advantage in both wine and cloth over England.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. In Ricardo's numbers, Portugal needed fewer labor-hours than England for both wine and cloth, giving it an absolute advantage in both goods."}, {"q": "If Country A has a lower opportunity cost in producing cloth than Country B, then Country A has a comparative advantage in cloth.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. A lower opportunity cost of producing cloth means Country A gives up less of other goods per unit of cloth; this relative cheapness defines comparative advantage."}, {"q": "Reallocating factors of production to lines of comparative advantage allows trading countries to achieve higher consumption levels.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Shifting resources to each country's comparative-advantage sector raises total world output, enabling both trading partners to consume beyond their own PPF."}, {"q": "Classical economists viewed capital and land as the primary factors that determine the value of a commodity.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Classical economists used the <b>Labor Theory of Value<\/b>, recognizing labor — not capital or land — as the primary determinant of a commodity's value."}, {"q": "Differing labor productivities among nations lead to differing production costs, which in turn encourage trade.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. When workers in one country produce more output per hour than in another, unit costs differ; these cost differences provide the incentive to trade."}, {"q": "Under perfect competition, prices are assumed to be constant as output expands because unit labor costs do not change.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Constant labor productivity means no diminishing returns, so as output rises MC and AC stay the same and prices remain stable."}, {"q": "If labor can move perfectly across international borders, the classical assumption of international immobility of factors of production still holds true.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Perfect international labor mobility would contradict the classical assumption; the classical model specifically assumes labor cannot move between countries."}, {"q": "In the 2-country, 2-commodity model, if a country specializes in a good, it exchanges that product for a good in which it has a comparative disadvantage.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Specialization means each country concentrates on its comparative-advantage good and then imports the other good — the one in which it is relatively less efficient."}, {"q": "International trade forces countries to spend more hours of labor to obtain goods than they would under autarky.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Trade allows a country to obtain goods at a lower labor cost than domestic production; it saves hours rather than spending more of them."}, {"q": "Factor endowment refers to the total monetary wealth and gold reserves held by a nation's central bank.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Factor endowment refers to the economy's stock of productive inputs (labor, capital, land), not monetary reserves or gold held by the central bank."}, {"q": "According to Ricardo, even if a country is less efficient at producing all goods, it can still successfully participate in trade.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Ricardo's comparative advantage principle shows that relative — not absolute — efficiency determines trade gains; even the least efficient country has a comparative advantage in something."}, {"q": "The classical model assumes that a country will export goods that it produces at a higher relative cost than other nations.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Countries export goods produced at a <em>lower<\/em> relative cost; exporting high-relative-cost goods would imply no trade gain."}, {"q": "International trade enables nations to specialize, which increases total world production output.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Specialization lets each country produce more of what it is best at, so total world output across both goods rises compared to each country producing everything itself."}, {"q": "Classical economists assume that there is no transportation cost.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Zero transportation costs is a classical simplifying assumption, ensuring that price differences fully reflect productivity differences and not shipping expenses."}, {"q": "What does the classical theory say about the mobility of factors of production (like workers)?", "o": ["They are fully mobile within the country but not at all mobile between countries.", "They are fully mobile everywhere in the world.", "They are completely immobile everywhere.", "They can only move if transportation is free."], "a": 0, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "They are fully mobile within the country but not at all mobile between countries. This assumption reflects real-world barriers to international migration while allowing domestic industries to compete for workers."}, {"q": "According to classical economists, what is considered the ONLY factor of production?", "o": ["Land", "Labour", "Technology", "Capital"], "a": 1, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Labour is the only factor of production in the classical model, consistent with the Labor Theory of Value, which holds that labor alone creates the value embedded in goods."}, {"q": "What does \"Absolute Advantage\" mean?", "o": ["The quantity of other goods that must be sacrificed to produce one more unit.", "The ability to produce goods with lower unit labour requirements than in other countries.", "The amount of factors of production available in an economy.", "The ability to produce services without any labour."], "a": 1, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Absolute advantage means a country uses fewer labor-hours per unit of output than its trading partner — it is absolutely more productive, not just relatively so."}, {"q": "How does the classical theory view the workforce in terms of skills?", "o": ["All labour is completely different (heterogeneous).", "Labour skills depend on the country.", "All labour is exactly the same (homogeneous).", "Labour is considered a capital asset."], "a": 2, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "The classical model assumes homogeneous labor: all workers are equally skilled, so cost differences come purely from how many hours are needed, not from worker quality."}, {"q": "In Ricardo's example, what two goods were the countries producing?", "o": ["Shawerma and Pepsi", "Wine and cloth", "Cars and Computers", "Perfumes and T-shirts"], "a": 1, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Ricardo's canonical numerical example used wine and cloth produced by Portugal and England to demonstrate mutual gains from specialization even when one country is more efficient in both goods."}, {"q": "The classical theory assumes perfect competition. In perfect competition, what is the relationship between costs and price?", "o": ["Marginal cost = average cost = price", "Marginal cost is always lower than price", "Average cost is always higher than marginal cost", "Price is determined only by transportation costs"], "a": 0, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "In perfect competition, free entry eliminates economic profit in the long run, equalizing marginal cost, average cost, and price at the same level."}, {"q": "How do the classical theories handle the concept of money in international exchange?", "o": ["They don't; they operate at the barter level without the intervention of money.", "They only use the US Dollar.", "They assume all trade is done with gold coins.", "They rely heavily on digital banking."], "a": 0, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Classical trade theory works at the barter level — goods trade directly for goods — to keep the analysis focused on real productivity differences without exchange-rate complications."}, {"q": "What is the definition of \"Opportunity Cost\"?", "o": ["The financial cost of transporting goods between two countries.", "The total wages paid to workers in a factory.", "The quantity of other goods that must be sacrificed to produce one more unit of a good.", "The ability to produce goods with lower labour requirements."], "a": 2, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Opportunity cost measures the real trade-off: to produce one more unit of good X, resources must be pulled from good Y, so a certain quantity of Y is sacrificed."}, {"q": "Which economist developed the theory of absolute advantage to explain the main determinant of international trade?", "o": ["Adam Smith", "David Ricardo", "John Maynard Keynes", "Bertil Ohlin"], "a": 0, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Adam Smith argued that nations should export goods they can produce more efficiently than others — i.e., where they have an absolute advantage — making Smith the founder of this theory."}, {"q": "What is the definition of \"Factor Endowment\"?", "o": ["The total wages paid to all workers in a specific country.", "The value of a commodity based on the labour spent on it.", "The amount of factors of production (e.g. capital and labour) available in an economy.", "The cost of transporting goods between two countries."], "a": 2, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Factor endowment is the total supply of productive inputs — labor, capital, natural resources — available to an economy, which underlies its comparative productivity profile."}, {"q": "According to the classical assumption on factor mobility, what happens if wages are significantly higher in Country A than in Country B?", "o": ["Wages stay higher in Country A because migration cannot take place on a scale sufficient to eliminate discrepancies.", "Workers immediately migrate to Country A until wages balance out.", "The government in Country B subsidizes local wages.", "Capital flows into Country B to replace the missing labour."], "a": 0, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Because large-scale international migration is impractical (language, legal, cultural barriers), workers do not move freely enough to equalize wages across countries."}, {"q": "Because the classical theory assumes perfect competition, what is expected to happen to unit labour costs as a factory expands its output?", "o": ["They will neither rise nor fall (prices remain constant).", "They will steadily increase due to resource scarcity.", "They will drop rapidly due to economies of scale.", "They will perfectly match the opportunity cost."], "a": 0, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "The classical assumption of constant returns means each additional unit of output requires the same amount of labor; therefore unit labor costs and prices stay flat as output grows."}, {"q": "At a fundamental level, what is the primary reason countries engage in international trade?", "o": ["To equalize currency exchange rates globally.", "To buy foreign goods at a lower price than it costs to make the same goods at home.", "To increase domestic unit labour costs.", "To restrict the global supply of raw materials."], "a": 1, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "The fundamental motive for trade is cost saving: a country imports what foreigners produce more cheaply (in labor terms) rather than making it domestically at higher cost."}, {"q": "To keep the math simple, the classical model assumes zero transportation costs. What is the direct theoretical result?", "o": ["Opportunity costs become irrelevant to the trade model.", "Countries trade only with immediate geographic neighbours.", "Goods' prices under trade will be the exact same in all countries.", "The total volume of international trade drops to zero."], "a": 2, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Without transport costs, the full price signal of comparative advantage is transmitted between countries; once trade opens, competitive arbitrage drives prices to a single world level."}, {"q": "Why did David Ricardo specifically introduce the concept of \"Comparative Advantage\"?", "o": ["To show that trade benefits everyone, even if one country has an absolute advantage in all lines of production.", "To prove that countries with limited resources should avoid international trade.", "To replace perfect competition with a monopoly model.", "To explain the negative economic impact of high tariffs."], "a": 0, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Ricardo needed comparative advantage to explain why even a country dominated in absolute efficiency by its partner still gains from specialization and trade, answering the \"why trade at all\" question."}, {"q": "Economists use the term \"Autarky\" when analyzing trade models. What does it describe?", "o": ["A state of maximum export capacity.", "A condition where perfect competition breaks down.", "A state of isolation before international trade occurs.", "A trade agreement that eliminates all border tariffs."], "a": 2, "s": "Dr. Hadeer Quiz", "src": "rev", "x": "Autarky describes the pre-trade, self-sufficient baseline used as a reference point; economists compare welfare under trade to this isolated state to show the gains from trade."}, {"q": "Labour productivity (output per hour) — US: 6 wheat or 4 cloth; UK: 1 wheat or 2 cloth. Which country has the comparative advantage in cloth?", "o": ["The US", "The UK", "Both countries", "No country"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "UK opportunity cost of cloth = 1/2 wheat (giving up 0.5 wheat per cloth); US opportunity cost of cloth = 4/6 = 2/3 wheat. UK's cost is lower, so UK has the comparative advantage in cloth."}, {"q": "Labour productivity (output per hour) — US: 6 wheat or 4 cloth; UK: 1 wheat or 2 cloth. Which country has the comparative advantage in wheat?", "o": ["The US", "The UK", "Both countries", "No country"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "US opportunity cost of wheat = 4/6 = 2/3 cloth; UK opportunity cost of wheat = 2/1 = 2 cloth. The US sacrifices far less cloth per wheat, giving it the comparative advantage in wheat."}, {"q": "Labour productivity (output per hour) — US: 6 wheat or 4 cloth; UK: 1 wheat or 2 cloth. Which country has an absolute advantage in both goods?", "o": ["The US", "The UK", "Both countries", "No country"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "The US produces 6 wheat or 4 cloth per hour vs. UK's 1 wheat or 2 cloth; the US is more productive in <em>both<\/em> goods, so it holds the absolute advantage in both."}, {"q": "Labour productivity (output per hour) — US: 6 wheat or 4 cloth; UK: 1 wheat or 2 cloth. Which country has an absolute disadvantage in both goods?", "o": ["The US", "The UK", "Both countries", "No country"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "The UK produces fewer units per hour in both wheat (1 vs. 6) and cloth (2 vs. 4) compared to the US, giving it an absolute disadvantage in both goods."}, {"q": "Labour productivity (output per hour) — US: 6 wheat or 4 cloth. The opportunity cost of producing wheat in the US is equal to:", "o": ["2/3 cloth", "2 cloth", "1.5 wheat", "0.5 wheat"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "With output-per-hour, OC of 1 wheat = (cloth per hour) ÷ (wheat per hour) = 4/6 = <strong>2/3 cloth<\/strong>."}, {"q": "Labour productivity (output per hour) — UK: 1 wheat or 2 cloth. The opportunity cost of producing wheat in the UK is equal to:", "o": ["2/3 cloth", "2 cloth", "1.5 wheat", "0.5 wheat"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "OC of 1 wheat in the UK = 2/1 = <strong>2 cloth<\/strong>. (US gives up only 2/3 cloth per wheat, so the US has the comparative advantage in wheat.)"}, {"q": "The more gold and silver a nation had, the nation will be ______ (mercantilist view).", "o": ["Rich", "Poor", "Weak", "The same"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "Mercantilists equated national wealth with the stock of precious metals; more gold and silver meant more wealth and power in their view."}, {"q": "If Burundi can produce wheat using 2 working hours and Zambia using 3 working hours, then Zambia ______", "o": ["is more efficient in production than Burundi", "has an absolute advantage", "has a comparative advantage", "has an absolute disadvantage"], "a": 3, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "Zambia needs 3 hours vs. Burundi's 2 hours — it is less productive, meaning it has an absolute disadvantage in wheat production."}, {"q": "According to comparative advantage, ______ returns to scale exist.", "o": ["increasing", "decreasing", "constant", "both increasing and decreasing"], "a": 2, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "The Ricardian model assumes constant returns to scale: doubling inputs doubles output, so the PPF is a straight line and opportunity costs are constant regardless of output level."}, {"q": "According to comparative advantage, ______ government intervention exists.", "o": ["no", "encouraged", "maximum", "increasing"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "x": "Ricardo's comparative advantage model assumes free markets with no government intervention; the invisible hand of comparative costs guides specialization without tariffs or subsidies."}, {"q": "According to the mercantilists, a nation's welfare would improve if it maintained a surplus of exports over imports.", "o": ["True", "False"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "True. Mercantilists believed a trade surplus — exports exceeding imports — brought gold inflows, increasing national wealth and therefore national welfare."}, {"q": "Trade causes output prices to change.", "o": ["True", "False"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "True. When trade opens, increased demand for the export good and reduced demand for the import-competing good shift relative prices in both countries, altering what producers receive."}, {"q": "Adam Smith believed that:", "o": ["Trade is a zero-sum game.", "All trading partners would be rich and powerful.", "Governments should have full control over all economic activities and trade.", "None of the above."], "a": 1, "s": "Mid-Term 2016/17", "src": "exam", "x": "Adam Smith argued that free trade creates mutual gains, making <em>all<\/em> trading partners better off — directly opposing the mercantilist zero-sum view and government control of trade."}, {"q": "Mercantilists advocated:", "o": ["Strict government control over all economic activities and trade.", "Incentives for exports and restrictions on imports.", "Achieving a trade surplus.", "All of the above."], "a": 3, "s": "Mid-Term 2016/17", "src": "exam", "x": "Mercantilism combined all three: strict state control of trade, export subsidies and import restrictions, and the goal of achieving a trade surplus to accumulate bullion."}, {"q": "The Ricardian model demonstrates that:", "o": ["Trade between two countries will benefit both countries equally.", "Trade between two countries may benefit both if each exports the product in which it has a comparative advantage.", "Trade between two countries may benefit one but harm the other.", "Trade always benefits the country with the larger labour force."], "a": 1, "s": "Mid-Term 2016/17", "src": "exam", "x": "The Ricardian model's core result is that mutual gains from trade arise when each country exports the good in which it has a comparative (not absolute) advantage."}, {"q": "With specialization in production and trade, each country can produce and consume at points:", "o": ["Above its Production Possibility Frontier (PPF).", "On its Production Possibility Frontier.", "Below its Production Possibility Frontier.", "None of the above."], "a": 0, "s": "Mid-Term 2016/17", "src": "exam", "x": "Specialization and trade allow a country to consume a combination of goods that lies beyond its own PPF — effectively expanding consumption possibilities through the gains from trade."}, {"q": "Points inside the Production Possibility Frontier (PPF) are:", "o": ["Efficient and attainable.", "Inefficient and unattainable.", "Inefficient and attainable.", "Efficient and unattainable."], "a": 2, "s": "Mid-Term 2016/17", "src": "exam", "x": "Points inside the PPF are attainable (the economy can reach them) but inefficient (resources are underutilized); points outside are unattainable without trade or growth."}, {"q": "If a country is less efficient in the production of both commodities, it can still benefit from trade on the basis of:", "o": ["Absolute advantage.", "Comparative advantage.", "Mercantilist theory.", "All of the above."], "a": 1, "s": "Mid-Term 2016/17", "src": "exam", "x": "When a country is less efficient in both goods, absolute advantage cannot help, but comparative advantage still applies: specialize in the good with the relatively smaller cost disadvantage."}, {"q": "The closer the rate of exchange is to the domestic rate of exchange of the trading country, the:", "o": ["smaller is the share of the gain from trade going to that country.", "greater is the share of the gain from trade going to that country.", "there is no relation.", "none of the above."], "a": 0, "s": "Mid-Term 2016/17", "src": "exam", "x": "The gain from trade comes from the difference between the world exchange rate and the domestic rate. The closer the world rate is to your domestic rate, the smaller the improvement for you."}, {"q": "If China is absolutely more efficient than Egypt in producing all commodities, then mutually beneficial trade between the two countries is impossible.", "o": ["True", "False"], "a": 1, "s": "Mid-Term 2016/17", "src": "exam", "tf": 1, "x": "False. Even if China is absolutely more efficient in everything, Egypt still has a comparative advantage in some good. Ricardo's principle guarantees that mutually beneficial trade remains possible."}, {"q": "According to the mercantilists, trade is a win-win situation.", "o": ["True", "False"], "a": 1, "s": "Mid-Term 2016/17", "src": "exam", "tf": 1, "x": "False. Mercantilists viewed trade as <em>zero-sum<\/em>: one country's surplus is another's deficit; only the surplus country wins. Adam Smith later refuted this by showing trade benefits both sides."}]}, {"id": "it3", "l": "IT.3", "c": "#9B59B6", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 3 — Factor Endowments & Heckscher-Ohlin", "d": "The two-factor H-O model, production functions, factor abundance (by prices and physically), factor-price equalization and why H-O fails in reality. Real answer-keyed revision questions + 2024 final.", "S": [{"h": "From Ricardo to Heckscher-Ohlin", "p": ["Ricardo: labour is the only factor → a <strong>one-factor model<\/strong>; trade is caused by differences in <strong>labour productivity<\/strong>.", "<strong>H-O model<\/strong>: labour and capital are the <strong>two factors<\/strong> → a <strong>two-factor model<\/strong>.", "A <strong>capital-rich<\/strong> country exports <strong>capital-intensive<\/strong> goods; a <strong>labour-rich<\/strong> country exports <strong>labour-intensive<\/strong> goods.", "Each country imports goods that use intensively its relatively <strong>scarce<\/strong> factor."]}, {"h": "H-O assumptions & production functions", "p": ["<strong>Zero transport costs<\/strong> → goods' prices are the same in both trading countries; <strong>perfect competition<\/strong> → prices are given (producers are price-takers).", "Production functions are <strong>homogeneous of the first degree<\/strong>: doubling all inputs doubles output (raising K & L by a proportion raises output by the same proportion).", "<strong>MPL<\/strong> (marginal productivity of labour) rises as the stock of capital used rises; <strong>MPK<\/strong> is the extra output from one more unit of capital, holding labour constant.", "Profit-maximizing factor combination: <strong>MPK / MPL = PK / PL<\/strong> — the slope of the isoquant equals the factor-price ratio."]}, {"h": "Factor abundance, equalization & limits", "p": ["<strong>By factor prices<\/strong>: A is capital-rich vs. B if capital is relatively cheaper in A, i.e. <strong>P_AK/P_AL &lt; P_BK/P_BL<\/strong>.", "<strong>In physical terms<\/strong>: A is capital-rich if <strong>K_A/L_A &gt; K_B/L_B<\/strong> (higher capital-to-labour ratio).", "Trade takes place when <strong>relative prices differ<\/strong> between countries; trade <strong>reduces<\/strong> international differences in the prices of homogeneous factors (factor-price equalization).", "Full equalization needs <strong>no transport costs and no trade barriers<\/strong> — which is why the strict H-O conclusions are not met in the real world (tariffs, transport costs, economies of scale exist).", "Summary: the trade pattern is determined <strong>solely by international differences in supply (factor-endowment) conditions<\/strong>; tastes and technology are assumed the same."]}, {"h": "Worked logic — H-O: who exports what?", "p": ["Step 1 — find each country's <strong>abundant factor<\/strong>. By <strong>prices<\/strong>: the cheaper factor is the abundant one (A is capital-rich if P<sub>K<\/sub>/P<sub>L<\/sub> is lower in A than in B). <strong>Physically<\/strong>: a higher <strong>K/L ratio<\/strong> means capital-rich.", "Step 2 — a country <strong>exports<\/strong> the good that uses its <strong>abundant<\/strong> factor intensively and <strong>imports<\/strong> the good that uses its <strong>scarce<\/strong> factor intensively.", "A good is <strong>capital-intensive<\/strong> if its K/L ratio is higher than the other good's (exam phrasing: 'when K/L is higher in one good relative to another, that good is capital intensive').", "Trade raises demand for (and the price of) the abundant factor and lowers the scarce factor's price → factor prices move toward equality across countries (<strong>factor-price equalization<\/strong>), assuming no transport costs and no trade barriers.", "Exam trap — H-O assumes <strong>perfect competition<\/strong> (not monopoly), the <strong>same technology<\/strong> in both countries, and <strong>no international mobility<\/strong> of factors."]}, {"h": "🔑 Exam keyword cues — what to pick when you see…", "p": ["&ldquo;<strong>two factors (labour &amp; capital)<\/strong>&rdquo; → Heckscher-Ohlin &nbsp;·&nbsp; &ldquo;<strong>one factor (labour)<\/strong>&rdquo; → Ricardo", "&ldquo;<strong>capital-rich country<\/strong>&rdquo; → exports capital-intensive goods", "&ldquo;<strong>labour-rich country<\/strong>&rdquo; → exports labour-intensive goods", "&ldquo;<strong>higher K/L ratio / cheaper factor<\/strong>&rdquo; → that factor is abundant", "&ldquo;<strong>K/L higher in one good<\/strong>&rdquo; → that good is capital-intensive", "&ldquo;<strong>trade equalises factor prices<\/strong>&rdquo; → factor-price equalization", "&ldquo;<strong>the one thing NOT equalised<\/strong>&rdquo; → transportation costs", "&ldquo;<strong>MP_K / MP_L = P_K / P_L<\/strong>&rdquo; → optimal factor combination", "&ldquo;<strong>same technology &amp; tastes, differ in endowments<\/strong>&rdquo; → H-O assumptions", "&ldquo;<strong>determined solely by supply / factor-endowment conditions<\/strong>&rdquo; → the H-O conclusion"]}, {"h": "🔑 Exam keyword cues · Part 2 — more phrases → answers", "p": ["&ldquo;<strong>the modern / neoclassical theory of trade<\/strong>&rdquo; → Heckscher-Ohlin", "&ldquo;<strong>differences in factor endowments are the cause of trade<\/strong>&rdquo; → the H-O theorem", "&ldquo;<strong>export the good that uses your abundant factor intensively<\/strong>&rdquo; → the H-O statement", "&ldquo;<strong>the abundant factor gains, the scarce factor loses<\/strong>&rdquo; → Stolper-Samuelson", "&ldquo;<strong>two countries, two goods, two factors (2×2×2)<\/strong>&rdquo; → the H-O framework", "&ldquo;<strong>identical technology &amp; identical tastes across countries<\/strong>&rdquo; → H-O assumptions", "&ldquo;<strong>relative factor prices become equal across countries<\/strong>&rdquo; → factor-price equalization", "&ldquo;<strong>the cheaper / more plentiful factor<\/strong>&rdquo; → the abundant factor"]}, {"h": "🔑 Exam keyword cues · Part 3 — even more phrases → answers", "p": ["&ldquo;<strong>a land-abundant country<\/strong>&rdquo; → exports land-intensive (agricultural) goods", "&ldquo;<strong>strong taste differences override endowments<\/strong>&rdquo; → demand reversal (an exception to H-O)", "&ldquo;<strong>a rise in one factor raises output of the good using it intensively<\/strong>&rdquo; → the Rybczynski theorem", "&ldquo;<strong>isoquants and isocost lines<\/strong>&rdquo; → tools for the optimal factor combination", "&ldquo;<strong>constant returns to scale in both goods<\/strong>&rdquo; → an H-O assumption", "&ldquo;<strong>perfect competition in goods and factor markets<\/strong>&rdquo; → an H-O assumption", "&ldquo;<strong>no factor-intensity reversal allowed<\/strong>&rdquo; → an H-O assumption", "&ldquo;<strong>abundance defined by quantity of factors<\/strong>&rdquo; → the physical definition &nbsp;·&nbsp; &ldquo;<strong>abundance defined by relative factor price<\/strong>&rdquo; → the price definition", "&ldquo;<strong>the two goods must differ in factor intensity<\/strong>&rdquo; → a condition for H-O trade"]}], "Q": [{"q": "According to the Ricardian theory of international trade, what is the only factor of production?", "o": ["Capital", "Land", "Labour", "Technology"], "a": 2, "s": "Revision", "src": "rev", "x": "Ricardo's model has only one factor of production — labour — and explains trade through differences in labour productivity (comparative advantage). Capital plays no role in the Ricardian framework."}, {"q": "The Heckscher-Ohlin (H-O) model is explicitly characterized as a:", "o": ["One-factor model", "Two-factor model", "Three-factor model", "Multi-factor dynamic model"], "a": 1, "s": "Revision", "src": "rev", "x": "The H-O model explicitly expands on Ricardo by introducing two factors — capital and labour — to explain how factor endowments drive trade patterns."}, {"q": "In the Ricardian theory, the primary cause of international trade is a difference in:", "o": ["Consumer tastes", "Resource endowments", "Capital accumulation", "Labour productivity"], "a": 3, "s": "Revision", "src": "rev", "x": "In the Ricardian model, comparative advantage arises because countries differ in labour productivity (output per worker), not in resource endowments or capital stocks."}, {"q": "Under the H-O model assumptions, what is the effect of having zero transportation costs?", "o": ["Wages become completely unequal worldwide.", "Goods' prices will be the same in both trading countries.", "Trade becomes completely impossible.", "Capital flows instantly across borders."], "a": 1, "s": "Revision", "src": "rev", "x": "With zero transportation costs, goods can move freely until their prices are identical in both countries; transport costs are precisely what creates a price wedge between trading partners."}, {"q": "A production function is said to be homogeneous of the first degree if doubling all inputs results in:", "o": ["Tripling the final output", "Keeping the output constant", "Doubling the final output", "Decreasing marginal returns only"], "a": 2, "s": "Revision", "src": "rev", "x": "Homogeneity of degree one (constant returns to scale) means output scales proportionally: doubling all inputs exactly doubles output. Tripling would imply increasing returns."}, {"q": "If a firm's production function is homogeneous of the first degree, what happens to output when capital and labour are increased by a specific proportion?", "o": ["Output increases by a larger proportion.", "Output increases by the exact same proportion.", "Output remains completely unchanged.", "Output drops due to crowding effects."], "a": 1, "s": "Revision", "src": "rev", "x": "A first-degree homogeneous (constant-returns-to-scale) function means output rises in exactly the same proportion as all inputs, by definition."}, {"q": "According to the properties of the H-O production functions, the marginal productivity of labour (MPL) increases when:", "o": ["The stock of capital used increases.", "The amount of labour decreases while capital remains zero.", "The wage rate drops.", "Capital is held strictly at zero."], "a": 0, "s": "Revision", "src": "rev", "x": "More capital per worker raises each worker's productivity because capital is complementary to labour; a higher capital stock means each unit of labour has more tools to work with, lifting MPL."}, {"q": "Marginal productivity of capital (MPK) is defined as the increase in output caused by a one-unit increase in capital while assuming:", "o": ["Technology is constantly improving.", "Labour is kept constant.", "Output prices are falling.", "The amount of capital is halved."], "a": 1, "s": "Revision", "src": "rev", "x": "MPK measures the extra output from one more unit of capital while everything else — especially labour — stays fixed, isolating capital's marginal contribution."}, {"q": "The more capital-intensive a country's methods of production are, the:", "o": ["Lower the marginal productivity of labour becomes.", "Higher the marginal productivity of labour becomes.", "Lower the total output will be.", "Higher the trade barriers must be."], "a": 1, "s": "Revision", "src": "rev", "x": "More capital-intensive methods mean more capital per worker, which raises each worker's MPL since labour and capital are complements in production."}, {"q": "Under perfect competition in both commodity and factor markets, prices are treated as:", "o": ["Entirely unpredictable", "Given", "Set by the largest monopoly", "Determined by transportation costs"], "a": 1, "s": "Revision", "src": "rev", "x": "Under perfect competition no single buyer or seller can influence the market; all agents treat prices as externally determined (given), responding to them rather than setting them."}, {"q": "To maximize profits, a producer will combine labour and capital such that the slope of the isoquant curve equals:", "o": ["The absolute amount of total cost", "The factor prices ratio (PK / PL)", "The consumer preference ratio", "The total supply of commodities"], "a": 1, "s": "Revision", "src": "rev", "x": "Profit maximisation requires the firm to set the marginal rate of technical substitution (slope of the isoquant) equal to the relative factor price ratio PK/PL, the slope of the isocost line."}, {"q": "The mathematical condition for profit maximization and optimal factor combination is given as:", "o": ["MPK × MPL = PK × PL", "MPK / MPL = PK / PL", "MPK / PK = LA × KA", "KA / LA = KB / LB"], "a": 1, "s": "Revision", "src": "rev", "x": "At the optimum the ratio of marginal products must equal the ratio of factor prices: MPK/MPL = PK/PL. This ensures the last dollar spent on each factor yields equal output."}, {"q": "When defining factor abundance by factor prices, Country A is considered capital-rich compared to Country B if:", "o": ["Total capital in A is numerically less than in B.", "Capital is relatively cheaper in A than in B.", "Wages are lower in A than in B.", "Interest rates are higher in A than in B."], "a": 1, "s": "Revision", "src": "rev", "x": "The price definition of abundance focuses on relative cost, not absolute quantity. If capital is relatively cheaper in A (lower PK/PL ratio), A is capital-abundant by this definition."}, {"q": "Which algebraic expression correctly defines Country A as capital-abundant based on factor prices?", "o": ["P_AK / P_AL < P_BK / P_BL", "P_AK / P_AL > P_BK / P_BL", "K_A / L_A < K_B / L_B", "P_AK × P_AL = P_BK × P_BL"], "a": 0, "s": "Revision", "src": "rev", "x": "A lower capital-to-labour price ratio in A (P_AK/P_AL < P_BK/P_BL) means capital is relatively cheaper there, so A is capital-abundant under the factor-price definition."}, {"q": "When defining factor abundance in physical terms, we directly compare the:", "o": ["Interest rates and wages of both countries", "Physical amounts of labour and capital", "Total value of exports and imports", "Tariffs and transport fees"], "a": 1, "s": "Revision", "src": "rev", "x": "The physical definition bypasses prices entirely and directly compares each country's capital-to-labour ratio (K/L) to determine which is relatively better endowed with capital."}, {"q": "Which algebraic expression states that Country A is capital-rich in physical terms?", "o": ["P_AK / P_AL < P_BK / P_BL", "K_A / L_A > K_B / L_B", "K_A / L_A < K_B / L_B", "L_A / K_A > L_B / K_B"], "a": 1, "s": "Revision", "src": "rev", "x": "A is capital-rich in physical terms when its capital-to-labour ratio exceeds B's: K_A/L_A > K_B/L_B. The other options either refer to price ratios or invert the inequality."}, {"q": "According to the H-O theory, a country that is rich in capital will export:", "o": ["Labour-intensive goods", "Capital-intensive goods", "Agricultural goods only", "Low-technology commodities"], "a": 1, "s": "Revision", "src": "rev", "x": "H-O predicts each country exports goods that use its abundant factor intensively. A capital-rich country has relatively cheap capital, giving it a cost advantage in capital-intensive production."}, {"q": "According to the H-O theory, a country that is rich in labour will export:", "o": ["Capital-intensive goods", "High-tech goods", "Labour-intensive goods", "Services exclusively"], "a": 2, "s": "Revision", "src": "rev", "x": "H-O symmetrically predicts a labour-abundant country exports labour-intensive goods, since its relatively cheap labour lowers production costs for those goods."}, {"q": "International trade continues to equalize prices until relative differences are eliminated, with the exception of:", "o": ["Labour costs", "Technology differences", "Transportation costs", "Capital endowments"], "a": 2, "s": "Revision", "src": "rev", "x": "Trade equalises commodity prices and, through them, factor prices — except that real-world transport costs impose a permanent wedge, preventing complete equalisation."}, {"q": "Trade between two nations takes place when:", "o": ["Relative prices are identical in both countries.", "Relative prices differ between countries.", "Transportation costs are higher than commodity prices.", "Both countries have the exact same factor endowments."], "a": 1, "s": "Revision", "src": "rev", "x": "Trade is driven by a price incentive: countries export where their relative price is low and import where it is high. If prices were identical, there would be no gain from trade."}, {"q": "As Country A produces more capital-intensive machines and less wheat, its internal demand for:", "o": ["Capital falls while labour rises.", "Both capital and labour fall.", "Capital rises while labour falls.", "Both capital and labour rise."], "a": 2, "s": "Revision", "src": "rev", "x": "Shifting resources into capital-intensive machines increases demand for capital (raising its price) and releases labour from wheat production, reducing labour demand."}, {"q": "International trade acts to:", "o": ["Magnify the global gaps in factor prices.", "Reduce international differences in prices of homogeneous factors.", "Ensure that capital-rich countries eventually lose all their capital.", "Eliminate the use of technology."], "a": 1, "s": "Revision", "src": "rev", "x": "As trade redirects each country toward its abundant-factor industry, demand for that factor rises and its price is bid up, compressing factor-price gaps between nations."}, {"q": "Which of the following is an explicit condition required for factor price equalization to occur?", "o": ["High protective tariffs", "No transportation costs and no trade barriers", "Imperfect competition in commodity markets", "Different production technologies for the same good"], "a": 1, "s": "Revision", "src": "rev", "x": "Factor price equalisation requires goods to trade at the same price worldwide, which only holds when there are no transport costs and no tariffs or other trade barriers."}, {"q": "Why are the strict conclusions of the H-O model not perfectly met in the real world?", "o": ["Because real-world markets have perfect competition.", "Because transportation costs and trade barriers actually exist.", "Because technology is perfectly uniform across all nations.", "Because economies of scale do not exist in reality."], "a": 1, "s": "Revision", "src": "rev", "x": "The H-O assumptions (zero transport costs, no barriers, perfect competition) are simplifications. In reality transport costs and tariffs prevent complete price equalisation."}, {"q": "According to the H-O summary, the trade pattern is determined solely by international differences in:", "o": ["Demand conditions alone", "Supply conditions alone", "Government regulations alone", "Consumer preferences alone"], "a": 1, "s": "Revision", "src": "rev", "x": "H-O focuses entirely on supply-side differences — factor endowments — as the determinant of comparative advantage, assuming identical tastes (demand) across countries."}, {"q": "A difference in relative commodity prices between two nations can be based upon a difference in:", "o": ["factor endowments", "technology", "tastes", "all of the above"], "a": 3, "s": "Final 2024 (Model 2)", "src": "exam", "x": "Relative commodity price differences can stem from different factor endowments (H-O), different technologies (Ricardian), or different tastes; all three are valid sources of comparative advantage."}, {"q": "The Ricardian theory relies on a model that incorporates both labour and capital as production factors.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The Ricardian model is a <em>one-factor<\/em> model using only labour. Capital is introduced later by H-O."}, {"q": "The Heckscher-Ohlin model assumes that capital and labour are the two main factors of production.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. H-O explicitly adds capital alongside labour as the two factors, enabling it to explain trade based on relative factor endowments."}, {"q": "Trade eliminates the differences in factor prices between participating countries according to the H-O model.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. By shifting each country toward its abundant-factor good, trade bids up the abundant factor's price and pushes down the scarce factor's price, converging factor prices internationally."}, {"q": "The H-O model assumes that transportation costs are heavy and heavily influence final trade equilibrium prices.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The H-O model assumes <em>zero<\/em> transportation costs. Heavy transport costs would violate this core assumption and prevent the price equalisation the model predicts."}, {"q": "Homogeneity of the first degree means that if you double only your labour input while keeping capital constant, your final output will double.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. First-degree homogeneity requires <em>all<\/em> inputs to be doubled. Doubling only labour while holding capital fixed does not double output; output rises by less due to diminishing returns."}, {"q": "The marginal productivity of labour (MPL) drops as the stock of capital increases.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. MPL <em>rises<\/em> as the capital stock increases, because more capital makes each worker more productive (complementarity between capital and labour)."}, {"q": "The marginal productivity of capital (MPK) increases when the amount of labour used increases.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. More labour makes each unit of capital more productive (complementarity), so MPK rises as labour increases."}, {"q": "Methods of production that are highly capital-intensive result in a higher marginal productivity of labour.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Higher capital intensity (more capital per worker) raises each worker's MPL, because workers have more machinery and equipment to work with."}, {"q": "In conditions of perfect competition, producers are price-takers, meaning prices are given.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Price-taking is the defining feature of perfect competition: no individual firm or consumer can influence the market price, so prices are given to them."}, {"q": "The slope of the isoquant curve represents the ratio of the marginal productivities of capital and labour.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. The slope of the isoquant (MRTS) equals MPL/MPK — the ratio of marginal productivities — representing how much capital can be saved per extra unit of labour while keeping output constant."}, {"q": "The slope of the price or cost line represents the factor prices ratio.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. The isocost line has slope PL/PK (or PK/PL depending on axis convention), so its slope directly represents the relative price of the two factors."}, {"q": "The production functions in the H-O model assume that all commodities share the exact same factor intensities.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. A key H-O assumption is that the two goods have <em>different<\/em> factor intensities (one is capital-intensive, the other labour-intensive); otherwise factor endowments would not drive trade."}, {"q": "The H-O model assumes that a specific good (e.g., good X) is produced using entirely different technologies in different countries.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. H-O assumes all countries use the <em>same<\/em> production technology for each good. Technology differences are a Ricardian, not H-O, source of comparative advantage."}, {"q": "Defining factor abundance by factor prices relies on comparing physical ratios of resources (K/L).", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. The factor-price definition compares price ratios (PK/PL), not physical K/L ratios. Physical ratios are the basis of the <em>physical<\/em> definition of abundance."}, {"q": "If P_AK / P_AL < P_BK / P_BL, it means capital is relatively cheaper in Country A than in Country B.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. A lower PK/PL ratio in A means capital is cheap relative to labour in A compared to B, which is the price-based definition of capital abundance."}, {"q": "In the equation for physical factor abundance, K_A stands for the total amount of capital in Country A.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. In the physical-abundance formula K_A/L_A > K_B/L_B, K_A is indeed the total (or per-capita) stock of capital available in Country A."}, {"q": "According to the physical definition of abundance, Country A is capital-rich if K_A / L_A > K_B / L_B.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. If Country A's capital-to-labour ratio exceeds Country B's, A has relatively more capital per worker and is therefore capital-abundant under the physical definition."}, {"q": "Once international relative differences in commodity prices are fully eliminated, trade stops expanding.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Trade expands as long as relative price differences exist between countries. Once those differences are fully arbitraged away, the incentive to expand trade is exhausted."}, {"q": "When Country A increases its production of capital-intensive goods, its internal price of capital (interest rate) decreases.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Producing more capital-intensive goods increases the demand for capital, which <em>raises<\/em> the return to capital (interest rate), not lowers it."}, {"q": "Tariffs are an example of trade barriers that prevent perfect factor price equalization in the real world.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. Tariffs raise the domestic price of imports above the world price, creating a price wedge that prevents complete factor price equalisation as predicted by H-O."}, {"q": "The H-O model assuming \"no economies of scale\" is perfectly reflected in real-world industries.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Real-world industries exhibit significant economies of scale, which the H-O model ignores. This mismatch means the model's predictions are imperfect empirically."}, {"q": "The H-O theory assumes that trading countries have completely different tastes and consumption preferences.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. H-O assumes <em>identical<\/em> tastes across countries so that demand differences do not confound the supply-side (endowment-based) explanation of trade."}, {"q": "Differences in relative factor endowments lead to differences in relative factor prices, which ultimately drive international trade.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. The H-O chain of causation runs exactly this way: endowment differences → relative factor price differences → relative commodity price differences → comparative advantage → trade."}, {"q": "Under H-O theory, each country imports products that use intensively its relatively abundant factor of production.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "False. Under H-O each country <em>exports<\/em> goods intensive in its abundant factor and <em>imports<\/em> goods intensive in its scarce factor — not the other way around."}, {"q": "Each country imports products that intensively use its relatively scarce factor of production.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "True. A country is relatively inefficient at producing goods that require the factor it has little of (its scarce factor), so it imports those goods instead."}, {"q": "According to Heckscher-Ohlin theory assumptions, monopoly prevails in both nations.", "o": ["True", "False"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "False. H-O assumes <em>perfect competition<\/em> in both commodity and factor markets in both countries, ruling out monopoly entirely."}, {"q": "According to Heckscher-Ohlin theory assumptions, there is flexibility in the movement of factors of production internationally.", "o": ["True", "False"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "False. H-O assumes factors are <em>immobile<\/em> internationally (they move freely <em>within<\/em> each country but not across borders). International factor mobility is explicitly ruled out."}, {"q": "According to Heckscher-Ohlin theory assumptions, different nations use different production techniques.", "o": ["True", "False"], "a": 1, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "False. H-O assumes all countries use identical production techniques for each good; it is differences in factor endowments, not technology, that drive trade."}, {"q": "According to Heckscher-Ohlin theory, when K/L is higher in one good relative to another, then this good is capital intensive.", "o": ["True", "False"], "a": 0, "s": "Exam 2022 (Model 2)", "src": "exam", "tf": 1, "x": "True. Factor intensity is defined by the K/L ratio used in production: a good with a higher K/L ratio than another good is the capital-intensive good, by definition."}]}, {"id": "it4", "l": "IT.4", "c": "#3498DB", "grp": "it", "mid": "post", "t": "Int'l Trade Ch. 4 — New Theories of Trade", "d": "The Leontief Paradox, the Human-Skills (neofactor) theory, the Technology-Gap model and Vernon's Product Life Cycle. Real answer-keyed revision questions.", "S": [{"h": "The Leontief Paradox", "p": ["H-O predicts a capital-rich country exports capital-intensive goods. Using <strong>input-output tables<\/strong>, <strong>Leontief<\/strong> found the US's exports had a <strong>lower<\/strong> capital-labour ratio than its imports — the opposite of H-O.", "This <strong>Leontief Paradox directly contradicts the Heckscher-Ohlin assumption<\/strong>.", "Explanations: a US demand bias toward capital-intensive goods (which can reverse comparative advantage), <strong>factor-intensity reversal<\/strong>, US import restrictions biased against labour-intensive imports, and abundant US skilled labour.", "<strong>Factor-intensity reversal<\/strong>: a good that is capital-intensive at one set of factor prices becomes labour-intensive at another — breaking the link between factor endowments and comparative advantage."]}, {"h": "Human-Skills (neofactor) theory", "p": ["The traditional theory treated labour as <strong>homogeneous<\/strong>; the human-skills theory separates skilled from unskilled labour.", "It resolves the paradox by <strong>increasing the numerator (capital) by adding the value of labour skills<\/strong> (creating skills needs saving/investment) — making the US capital-abundant.", "Because it <strong>adds a new factor of production (labour skills)<\/strong> to the H-O model, it is called a <strong>'neofactor'<\/strong> theory."]}, {"h": "Technology-Gap model (Posner) & lags", "p": ["Developed by <strong>Michael Posner<\/strong>; examines technological change between countries with <strong>similar factor endowments<\/strong>.", "Innovations take two forms: <strong>process innovations<\/strong> (cheaper production) and the <strong>production of wholly new products / improvements<\/strong>.", "An <strong>imitation lag<\/strong> stops foreign nations from copying instantly, giving the innovator an <strong>export monopoly<\/strong>; its duration depends on patent protection.", "A <strong>demand lag<\/strong> is the time foreign consumers take to react/accept the new product. Trade occurs because the demand lag is usually <strong>shorter<\/strong> than the imitation lag.", "Limitation: the model can't explain why some countries are persistent leaders and others followers."]}, {"h": "Vernon's Product Life Cycle", "p": ["Unlike Posner, Vernon's model relies on <strong>different factor endowments across countries<\/strong> and frames both trade <strong>and investment<\/strong>.", "Three stages: <strong>New product → Maturing product → Standardized product<\/strong>.", "<strong>New product<\/strong>: introduced in a <strong>capital-rich, labour-scarce<\/strong> country; unstable production functions, short runs, highly skilled labour.", "<strong>Maturing product<\/strong>: mass production; labour shifts from skilled to semiskilled; firms keep market share via product differentiation (promotion & packaging).", "<strong>Standardized product<\/strong>: comparative advantage shifts to <strong>labour-abundant countries with low unit-labour costs<\/strong>."]}, {"h": "🔑 Exam keyword cues — what to pick when you see…", "p": ["&ldquo;<strong>input-output tables / US exports less capital-intensive than imports<\/strong>&rdquo; → Leontief Paradox", "&ldquo;<strong>contradicts Heckscher-Ohlin<\/strong>&rdquo; → Leontief Paradox", "&ldquo;<strong>adds labour skills as a new factor / neofactor<\/strong>&rdquo; → Human-Skills theory", "&ldquo;<strong>imitation lag / export monopoly / similar factor endowments<\/strong>&rdquo; → Technology-Gap model (Posner)", "&ldquo;<strong>time for foreign consumers to react<\/strong>&rdquo; → the demand lag", "&ldquo;<strong>New → Maturing → Standardized<\/strong>&rdquo; → Product Life Cycle (Vernon)", "&ldquo;<strong>standardized stage<\/strong>&rdquo; → shifts to labour-abundant, low-wage countries", "&ldquo;<strong>capital-intensive at one set of prices, labour-intensive at another<\/strong>&rdquo; → factor-intensity reversal"]}, {"h": "🔑 Exam keyword cues · Part 2 — more phrases → answers", "p": ["&ldquo;<strong>economies of scale / increasing returns to scale<\/strong>&rdquo; → the new trade theory", "&ldquo;<strong>a country both exports AND imports the same kind of good<\/strong>&rdquo; → intra-industry trade", "&ldquo;<strong>differentiated manufactures traded between similar economies<\/strong>&rdquo; → the Linder (preference-similarity) hypothesis", "&ldquo;<strong>imitation lag = demand lag + reaction lag<\/strong>&rdquo; → Posner's technology-gap components", "&ldquo;<strong>R&amp;D- and skill-intensive goods<\/strong>&rdquo; → exported by developed countries", "&ldquo;<strong>the new-product stage<\/strong>&rdquo; → produced in the innovating (developed) country", "&ldquo;<strong>the maturing-product stage<\/strong>&rdquo; → production spreads to other developed countries", "&ldquo;<strong>first-mover / temporary monopoly from innovation<\/strong>&rdquo; → the technology-gap advantage"]}, {"h": "🔑 Exam keyword cues · Part 3 — even more phrases → answers", "p": ["&ldquo;<strong>US imports were MORE capital-intensive than US exports<\/strong>&rdquo; → the Leontief finding (the paradox)", "&ldquo;<strong>treats skilled labour / human capital as a separate factor<\/strong>&rdquo; → the human-capital explanation", "&ldquo;<strong>abundant natural resources distort the capital count<\/strong>&rdquo; → the natural-resource explanation of the paradox", "&ldquo;<strong>monopolistic competition plus scale economies (Krugman)<\/strong>&rdquo; → the modern new trade theory", "&ldquo;<strong>consumers value having many varieties / brands<\/strong>&rdquo; → a gain from product differentiation", "&ldquo;<strong>benefits that come from an industry's overall size<\/strong>&rdquo; → external economies of scale", "&ldquo;<strong>selling abroad below cost / below the home price<\/strong>&rdquo; → dumping", "&ldquo;<strong>protecting a young industry until it can compete<\/strong>&rdquo; → the infant-industry argument", "&ldquo;<strong>a lead in research and development<\/strong>&rdquo; → the basis of the technology-gap model"]}], "Q": [{"q": "The Heckscher-Ohlin model assumes that a country will export products that intensively use its:", "o": ["Relatively scarce factors of production", "Relatively abundant factors of production", "Natural resources only", "Technology-intensive inputs"], "a": 1, "s": "Revision", "src": "rev", "x": "H-O theory holds that a country gains comparative advantage in goods that intensively use its <b>abundant<\/b> (and therefore cheaper) factors — exporting them and importing goods that use its scarce factors."}, {"q": "Wassily Leontief discovered his famous paradox by analyzing international trade data using:", "o": ["Consumer indifference curves", "Production possibility frontiers", "Input-output tables", "Linear programming models"], "a": 2, "s": "Revision", "src": "rev", "x": "Leontief applied <b>input-output tables<\/b> — which trace factor requirements through the entire production chain — to measure the capital and labor content of US exports and import-replacements."}, {"q": "The Leontief Paradox found that the capital-labor ratio in US exports was:", "o": ["Higher than the capital-labor ratio in its imports", "Lower than the capital-labor ratio in its imports", "Exactly equal to the capital-labor ratio in its imports", "Double the country's national savings rate"], "a": 1, "s": "Revision", "src": "rev", "x": "H-O predicts the capital-rich US would export capital-intensive goods, but Leontief found US exports were <strong>less<\/strong> capital-intensive (lower K/L) than its imports — the paradox that contradicts H-O."}, {"q": "Which theory or model does the Leontief Paradox directly contradict?", "o": ["The Technology Gap Model", "The Product Life Cycle Model", "The Human-Skills Theory of Trade", "The Heckscher-Ohlin Assumption"], "a": 3, "s": "Revision", "src": "rev", "x": "H-O predicts a capital-rich country like the US exports capital-intensive goods; Leontief's data showed the reverse, directly contradicting the <b>Heckscher-Ohlin assumption<\/b>."}, {"q": "If a capital-abundant country has a strong demand bias toward capital-intensive goods, this bias can:", "o": ["Reinforce its existing comparative advantage", "Reverse its comparative advantage in those specific goods", "Keep domestic prices strictly below foreign prices", "Eliminate the need for any domestic labor force"], "a": 1, "s": "Revision", "src": "rev", "x": "Heavy domestic demand for capital-intensive goods raises their price at home, potentially making them <b>cheaper to import<\/b> and <b>reversing<\/b> the expected export advantage despite abundant capital."}, {"q": "When factor-intensity reversal occurs, a good that is capital-intensive at one set of factor prices becomes:", "o": ["Wholly obsolete at another set of factor prices", "Standardized across all nations instantly", "Labor-intensive compared to another good at a different set of factor prices", "Dependent entirely on technology gaps"], "a": 2, "s": "Revision", "src": "rev", "x": "Factor-intensity reversal means the same good's relative factor-use can flip with factor prices: what is capital-intensive at high labor costs can become <b>labor-intensive<\/b> when capital is cheap relative to labor."}, {"q": "Factor-intensity reversal breaks the fundamental link between:", "o": ["Technology innovations and consumer preferences", "Import restrictions and domestic tariff rates", "Factor endowments and comparative advantage", "Human skills and capital-intensive manufacturing"], "a": 2, "s": "Revision", "src": "rev", "x": "H-O links factor endowments to comparative advantage; factor-intensity reversal severs that link because the same good's intensity — and thus trade direction — changes with factor prices across countries."}, {"q": "If the US imposes heavy tariffs and trade restrictions targeted specifically against labor-intensive imports, the observed result will be:", "o": ["A higher labor intensity for US imports than under free trade", "A lower labor intensity for US imports than in the absence of restrictions", "An immediate end to all domestic technology innovation", "An absolute specialization in agricultural products"], "a": 1, "s": "Revision", "src": "rev", "x": "Tariffs that disproportionately block labor-intensive imports filter out those goods, leaving measured imports artificially <b>less labor-intensive<\/b> than they would be under free trade."}, {"q": "The traditional theory of international trade simplified its analysis by treating labor as:", "o": ["A heterogeneous factor of production", "A homogeneous factor of production", "A neofactor based on high-technology patents", "A completely obsolete input"], "a": 1, "s": "Revision", "src": "rev", "x": "Classical and H-O trade models assumed all labor units were identical (<b>homogeneous<\/b>), ignoring skill differences — a simplification later challenged by neofactor theories."}, {"q": "To resolve his paradox, Leontief suggested that if an American worker is three times as productive as a foreign worker, the analyst should:", "o": ["Multiply the total number of American workers by three", "Divide the total US capital stock by three", "Subtract the value of human skills from the capital numerator", "Eliminate labor calculations from the model entirely"], "a": 0, "s": "Revision", "src": "rev", "x": "Leontief's own suggestion was to <b>multiply the US workforce by three<\/b> (to reflect superior American productivity), which would restate the US as effectively labor-abundant and dissolve the paradox."}, {"q": "The Technology Gap Model was originally developed by:", "o": ["Wassily Leontief", "Raymond Vernon", "Michael Posner", "Bertil Ohlin"], "a": 2, "s": "Revision", "src": "rev", "x": "The technology-gap model was developed by <b>Michael Posner<\/b> (1961). Vernon later extended the technology theme into the product life cycle; Leontief and Ohlin belong to different traditions."}, {"q": "The human-skills theory of trade differentiates itself from Leontief's worker adjustment by:", "o": ["Multiplying the denominator (labor) by three", "Increasing the numerator (capital) by adding the value of labor skills", "Restricting all skilled labor to the service sector", "Assuming human skills do not require any previous saving or investment"], "a": 1, "s": "Revision", "src": "rev", "x": "The human-skills theory adds the capitalized value of workers' skills to the <b>capital (numerator)<\/b>, redefining the US as relatively capital-abundant once human capital is counted — unlike Leontief's labor-denominator adjustment."}, {"q": "Why is the human skills approach classified as a \"neofactor\" theory?", "o": ["It replaces capital completely with digital algorithms", "It treats international trade as a static, closed environment", "It adds a new factor of production (labor skills) to the traditional H-O model", "It completely eliminates the role of natural resources"], "a": 2, "s": "Revision", "src": "rev", "x": "\"Neofactor\" means a new, additional factor is introduced into the standard model. Human-skills theory adds <b>labor skills as a distinct, investable factor<\/b> alongside physical capital and raw labor."}, {"q": "According to technology theories of trade, technological innovations can take two basic forms: process innovations (more economical production methods) and:", "o": ["Complete elimination of import restrictions", "The production of wholly new products and improvements in existing goods", "The reduction of human skills in favor of raw labor", "Permanent expansion of demand bias"], "a": 1, "s": "Revision", "src": "rev", "x": "Technological innovation can cut costs via <b>process innovation<\/b> or create demand via <b>product innovation<\/b> — wholly new goods or improved versions of existing ones — both giving the innovator a trade edge."}, {"q": "The Technology Gap Model specifically examines the influence of technological change on trade between countries that have:", "o": ["Drastically different natural resource allocations", "Similar factor endowments", "No domestic consumer demand for manufactured goods", "Closed economic boundaries and strict tariffs"], "a": 1, "s": "Revision", "src": "rev", "x": "Posner designed his model specifically for trade among <b>similar nations<\/b> (comparable factor endowments), explaining why industrialized countries trade technology-intensive goods with each other."}, {"q": "What prevents non-innovating countries from immediately replicating a new product?", "o": ["A permanent demand lag", "An imitation lag", "A factor-intensity reversal", "Strict mass-production quotas"], "a": 1, "s": "Revision", "src": "rev", "x": "The <b>imitation lag<\/b> is the time it takes foreign producers to copy and commercially produce a new good; until they do, the innovating country faces no foreign competition in that product."}, {"q": "During the imitation lag period, the innovating country enjoys:", "o": ["An import dependency on low-wage nations", "An export monopoly", "Perfectly elastic domestic demand curves", "A completely stable and fixed production function"], "a": 1, "s": "Revision", "src": "rev", "x": "Before competitors can copy the innovation, the original inventor faces no rival producers abroad and therefore holds an <b>export monopoly<\/b> — selling exclusively into foreign markets."}, {"q": "The demand lag occurs because foreign consumers:", "o": ["Take time to react to the price drop or need time to accept the new product as a substitute", "Refuse to purchase any goods containing human skills", "Are legally blocked from trading by the World Trade Organization", "Instantly copy the product design within day zero"], "a": 0, "s": "Revision", "src": "rev", "x": "Foreign buyers may not yet know the product exists, may distrust it, or may still prefer familiar substitutes, so they <b>take time<\/b> before their demand rises enough to generate trade."}, {"q": "The duration of the imitation or reaction lag depends heavily on the nature of the innovation and:", "o": ["The abundance of unskilled labor", "Whether the innovating country has patent protection", "The size of the input-output table", "The presence of a strong demand bias toward old goods"], "a": 1, "s": "Revision", "src": "rev", "x": "Strong <b>patent protection<\/b> extends the period rivals cannot legally copy the invention, lengthening the imitation lag and prolonging the innovator's export monopoly."}, {"q": "Trade successfully takes place because the net effect of the two lags usually shows that:", "o": ["The imitation lag is shorter than the demand lag", "The demand lag is shorter than the reaction or imitation lag", "Both lags are perfectly equal to zero", "The demand lag disappears immediately upon innovation"], "a": 1, "s": "Revision", "src": "rev", "x": "Trade occurs in the window where foreign consumers already want the product (<b>demand lag has expired<\/b>) but foreign producers still cannot supply it (imitation lag persists). Net trade = imitation lag minus demand lag > 0."}, {"q": "A major limitation of the Technology Gap Model is that it fails to explain:", "o": ["Why trade happens between similar nations", "Why certain countries are technological leaders while others are followers", "The concept of an export monopoly", "The existence of consumer demand"], "a": 1, "s": "Revision", "src": "rev", "x": "Posner's model explains <b>how<\/b> technology gaps generate trade but does not explain <b>why<\/b> the US, Japan, or Germany consistently innovate while others follow — that determinant is left unexplored."}, {"q": "Unlike the Posner analysis, Vernon's product life cycle model explicitly relies on:", "o": ["Identical consumer behavior worldwide", "Disappearing imitation lags", "Different factor endowments across countries", "Fixed, unalterable technology parameters"], "a": 2, "s": "Revision", "src": "rev", "x": "Vernon builds on Posner by explicitly tying each life-cycle stage to <b>different factor endowments<\/b>: innovation in capital-rich countries, maturation spreading to similar nations, standardization shifting to labor-abundant countries."}, {"q": "What are the three successive stages of the product life cycle?", "o": ["Innovation, Replication, Obsolescence", "Primary product, Secondary product, Standardized product", "New product, Maturing product, and Standardized product", "Domestic product, Exported product, Restrained product"], "a": 2, "s": "Revision", "src": "rev", "x": "Vernon's three stages are <b>new product<\/b> (pioneering, skill-intensive), <b>maturing product<\/b> (mass production begins, exports grow), and <b>standardized product<\/b> (cost competition, production moves to low-wage countries)."}, {"q": "In the first stage of the Product Life Cycle, the new product is typically introduced in a country that is:", "o": ["Capital-poor and labor-abundant", "Capital-rich and labor-scarce", "Dependent entirely on natural resource imports", "Characterized by low wages and high production volumes"], "a": 1, "s": "Revision", "src": "rev", "x": "New products emerge where R&D capacity and high-income consumers are concentrated — <b>capital-rich, labor-scarce<\/b> nations like the US — because innovation requires capital and targets affluent buyers."}, {"q": "During the \"new product\" stage, production is characterized by:", "o": ["Highly stable production functions and massive production scales", "Long production runs using unskilled labor", "Unstable production functions, short production runs, and highly skilled labor", "Intensely fierce price competition from foreign nations"], "a": 2, "s": "Revision", "src": "rev", "x": "Early-stage production involves trial and error, frequent design changes (<b>unstable production functions<\/b>), small batch sizes, and heavy reliance on <b>highly skilled<\/b> scientists and engineers."}, {"q": "As a product moves into the \"maturing product\" stage, firms often attempt to maintain market share by:", "o": ["Stopping all exports to foreign nations", "Utilizing product differentiation through promotion and packaging", "Increasing their reliance on highly specialized, expensive scientific labor", "Making the demand curve completely price inelastic"], "a": 1, "s": "Revision", "src": "rev", "x": "As rivals enter, innovators shift competition from price to brand loyalty, using <b>product differentiation<\/b> through advertising and packaging to retain customers despite growing competition."}, {"q": "When a product enters the \"standardized product\" stage, the comparative advantage shifts toward:", "o": ["Countries with the highest concentration of research and development", "Labor-abundant countries where unit labor costs are relatively low", "Nations that possess an absolute export monopoly", "Countries with small, highly unstable production markets"], "a": 1, "s": "Revision", "src": "rev", "x": "Once technology is standardized and widely known, production shifts to countries with <b>low labor costs<\/b>, since cheap unskilled or semiskilled labor becomes the key competitive factor."}, {"q": "The Heckscher-Ohlin model assumes that a capital-abundant country will import capital-intensive goods.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "H-O predicts the opposite: a capital-abundant country will <b>export<\/b> capital-intensive goods, not import them. Importing capital-intensive goods would contradict the model's core prediction."}, {"q": "Wassily Leontief's empirical findings supported the primary assumptions of the Heckscher-Ohlin theorem regarding US trade patterns.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "Leontief found US exports were <b>less capital-intensive<\/b> than US import-replacements — the opposite of H-O's prediction — making his findings a direct empirical refutation, not a confirmation."}, {"q": "A strong domestic demand bias toward capital-intensive goods in a capital-rich country can make those goods more expensive domestically and alter traditional trade flows.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "Strong domestic demand bids up the domestic price of capital-intensive goods above the world price, making <b>imports cheaper than domestic production<\/b> and reversing the expected export advantage."}, {"q": "Factor-intensity reversal occurs when a good remains capital-intensive relative to another good across all possible ranges of factor prices.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "By definition, factor-intensity reversal means the capital/labor ranking between two goods <b>switches<\/b> at different factor-price ratios. If it never switches, there is no reversal."}, {"q": "If factor reversibility occurs, a labor-rich country could establish a comparative advantage in a capital-intensive good.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "Factor reversibility means a good's intensity can flip with factor prices; a labor-rich country facing low capital costs could make a nominally capital-intensive good cheaply, gaining comparative advantage in it."}, {"q": "The Heckscher-Ohlin model comprehensively integrates the role of scarce natural resources in determining international trade patterns.", "o": ["True", "False"], "a": 1, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "The standard H-O model is built on just two factors — capital and labor — and does not incorporate natural resources, a recognized limitation when explaining trade in primary commodities."}, {"q": "If US import restrictions are heavily biased against labor-intensive goods, the recorded data will reflect a lower labor intensity for US imports than would occur under free trade conditions.", "o": ["True", "False"], "a": 0, "s": "Revision · T/F", "src": "rev", "tf": 1, "x": "Restricting labor-intensive imports excludes the most labor-intensive goods fr
